<style>

presenta un desafío sin precedentes para el ámbito médico. Este fenómeno surge mientras el debate público se ha centrado en el impacto de las redes sociales en la salud mental juvenil, desviando la atención de esta nueva tendencia.", "why": "Este cambio plantea nuevas preguntas sobre la eficacia, la ética y la regulación de la IA en la salud mental de los jóvenes.", "importance": 4, "tags": ["IA", "Salud Mental", "Adolescentes", "Psicología"], "published": "2026-06-06T12:31:09+00:00", "sources": [{"name": "Xataka IA", "url": "https://www.xataka.com/medicina-y-salud/millones-adolescentes-han-convertido-a-ia-su-psicologo-cabecera-reto-precedentes-para-medicina", "type": "blog"}]}, {"id": "0a85177060", "topic": "geo", "title": "Armadores de petroleros temen un colapso del mercado tras beneficios récord por la guerra de Irán", "summary": "Los propietarios de petroleros, que obtuvieron beneficios récord debido a la guerra de Irán, temen ahora un colapso del mercado. Han invertido sus ganancias inesperadas en nuevos buques y se preparan para una fuerte caída en las tarifas de transporte. Esta situación se daría si el Estrecho de Ormuz, una vía marítima crucial, se reabre completamente y se normaliza la navegación.", "why": "La volatilidad en el transporte de petróleo refleja la inestabilidad geopolítica y sus efectos económicos globales.", "importance": 4, "tags": ["Petróleo", "Geopolítica", "Estrecho de Ormuz", "Economía"], "published": "2026-06-06T12:28:02+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/786f23d9-876d-4c56-a9e8-67ac5b78cd49", "type": "blog"}]}, {"id": "c18f999ebf", "topic": "geo", "title": "Análisis Geopolítico: El Dilema Estratégico de Israel", "summary": "Un análisis geopolítico aborda la compleja cuestión de cómo un país debe interactuar con actores que buscan su destrucción. La respuesta inicial sugiere que la capacidad real de estos actores para llevar a cabo sus intenciones es el primer factor a considerar 05/the-token-bill-comes-due-inside-the-industry-scramble-to-manage-ais-runaway-costs/", "type": "blog"}]}, {"id": "1027aaee00", "topic": "ia", "title": "La salida a bolsa de Anthropic sugiere una nueva fase para la IA", "summary": "La reciente solicitud de salida a bolsa de Anthropic indica una evolución en el sector de la inteligencia artificial. El futuro de la IA podría depender menos de la creación de modelos revolucionarios y más de la capacidad para obtener y gestionar los vastos recursos necesarios para construir y mantener estas tecnologías.", "why": "Esto subraya que la viabilidad económica y la infraestructura serán clave para el desarrollo futuro de la IA.", "importance": 4, "tags": ["IA", "Inversión", "Economía", "Anthropic"], "published": "2026-06-05T14:35:02+00:00", "sources": [{"name": "AI Business", "url": "https://aibusiness.com/generative-ai/prompt-anthropic-s-ipo-filing-signals-ai-s-next-phase", "type": "blog"}]}, {"id": "4507a1b57f", "topic": "geo", "title": "India impulsa su ambición espacial con startups de tecnología profunda", "summary": "Las startups indias de tecnología espacial avanzada están redefiniendo las aspiraciones espaciales del país. El gobierno está aumentando su apoyo a la innovación privada para fortalecer la posición estratégica y económica de la India en la carrera espacial global.", "why": "Esta colaboración público-privada posiciona a India como un actor clave en el futuro de la exploración y la economía espacial.", "importance": 4, "tags": ["India", "Espacio", "Tecnología", "Innovación"], "published": "2026-06-05T14:01:00+00:00", "sources": [{"name": "The Diplomat", "url": "https://thediplomat.com/2026/06/indias-eye-in-the-sky-the-rise-of-a-state-deep-tech-startup-space-partnership/", "type": "blog"}]}, {"id": "fda4f5f1f4", "topic": "ia", "title": "Emergent logra 100 millones de dólares en ARR en seis meses gracias a la experimentación con IA", "summary": "La empresa de software de IA Emergent ha alcanzado los 100 millones a relacionada con el antiguo Ala Este de la Casa Blanca. Esta postura se ha expresado en el contexto de un argumento más amplio sobre la autoridad presidencial.", "why": "Este argumento subraya los límites percibidos del poder judicial frente a las acciones del ejecutivo, sentando un precedente potencial.", "importance": 3, "tags": ["Trump", "DOJ", "Casa Blanca", "Poder judicial"], "published": "2026-06-06T08:37:54+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/05/white-house-ballroom-donald-trump-00951892?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "1cb20157d8", "topic": "ia", "title": "Creciente escepticismo sobre la productividad real de la IA frente a la inversión.", "summary": "Un artículo analiza la tensión existente entre el entusiasmo por la inversión en infraestructura de inteligencia artificial y el creciente escepticismo sobre su retorno real en términos de productividad. A pesar de las dudas, la historia sugiere que las caídas en las acciones de IA suelen ser temporales.", "why": "Esta dicotomía entre la inversión y el rendimiento real de la IA es crucial para el futuro desarrollo y la adopción de la tecnología.", "importance": 3, "tags": ["IA", "Inversión", "Productividad", "Mercado tecnológico"], "published": "2026-06-06T07:41:27+00:00", "sources": [{"name": "RadarAI", "url": "https://www.bestblogs.dev/en/article/af2c2c10?utm_source=rss&utm_medium=feed&utm_campaign=resources&entry=rss_article_item", "type": "blog"}]}, {"id": "f1a2b681ff", "topic": "ia", "title": "La programación con IA permite a no programadores crear herramientas personalizadas.", "summary": "Leah Libresco Sargeant ha demostrado cómo agentes de programación de IA pueden ser utilizados por personas sin conocimientos de codificación para desarrollar herramientas personalizadas. Un ejemplo es una extensión de navegador que añade una página de transición relajante antes de cargar Twitter, mejorando la experiencia online con esfuerzo y juicio humano.", "why": "Esto democratiza la creación de software, permitiendo a más usuarios adaptar la tecnología a sus necesidades específicas sin ser expertos en programación.", "importance": 3, "tags": ["IA", "Programación", "Accesibilidad", "Herramientas personalizadas"], "published": "2026-06-06T06:45:00+00:00", "sources": [{"name": "RadarAI", "url": "https://www.bestblogs.dev/en/article/0c636fdd?utm_source=rss&utm_medium=feed&utm_campaign=resources&entry=rss_article_item", "type": "blog"}]}, {"id": "bf9cde9342", "topic": "ia", "title": "Y Combinator lanza Paxel, un analizador gratuito de sesiones de codificación con IA.", "summary": "Garry Tan ha anunciado el lanzamiento de Paxel, una herramienta gratuita de Y Combinator que se ejecuta localmente en Docker. Paxel está diseñada para analizar sesiones de codificación asistidas por IA (como Claude, Codex o Cursor), ayudando a los desarrolladores a crear software de manera más eficiente y rápida, manteniendo la privacidad del código.", "why": "Esta herramienta mejora la productividad de los desarrolladores que usan IA, ofreciendo análisis de código privado y acelerando el ciclo de desarrollo de software.", "importance": 3, "tags": ["IA", "Desarrollo software", "Herramientas", "Privacidad código"], "published": "2026-06-06T06:30:21+00:00", "sources": [{"name": "RadarAI", "url": "https://www.bestblogs.dev/en/status/2063146456106795457?utm_source=rss&utm_medium=feed&utm_campaign=resources&entry=rss_article_item", "type": "blog"}]}, {"id": "4012d653eb", "topic": "ia", "title": "Auge de laboratorios de péptidos financiados con criptomonedas en China", "summary": "Se ha observado un rápido crecimiento de laboratorios dedicados a la investigación de péptidos en China, los cuales están siendo financiados mediante criptomonedas. Este fenómeno forma parte de un informe de seguridad que también aborda otros temas tecnológicos relevantes de la semana.", "why": "La financiación con cr  "https://www.bestblogs.dev/en/article/4d079191?utm_source=rss&utm_medium=feed&utm_campaign=resources&entry=rss_article_item", "type": "blog"}]}, {"id": "f0f0e2a405", "topic": "geo", "title": "Presión sobre Irlanda por exportaciones de alúmina a Rusia", "summary": "El gobierno irlandés está bajo presión debido a las exportaciones de alúmina a Rusia desde una planta vinculada al oligarca Oleg Deripaska. Legisladores exigen sanciones de la UE si se confirma que esta materia prima se utiliza en la fabricación de armamento ruso.", "why": "El caso destaca las complejidades de las sanciones y el comercio en tiempos de conflicto, y podría tener implicaciones diplomáticas y económicas para Irlanda y la UE.", "importance": 3, "tags": ["Irlanda", "Rusia", "Sanciones", "Alúmina"], "published": "2026-06-06T04:00:49+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/4f271639-cf23-4c36-bfda-9c739eaa0797", "type": "blog"}]}, {"id": "b80a532a46", "topic": "geo", "title": "Europa se adapta a la política de grandes potencias", "summary": "Europa ha desarrollado estrategias de contención, consolidación y cooptación para manejar la dinámica de la política de grandes potencias. Este enfoque refleja una adaptación a un panorama geopolítico donde las principales potencias ejercen una influencia significativa.", "why": "Entender cómo Europa navega la política de grandes potencias es crucial para comprender la estabilidad y el equilibrio global.", "importance": 3, "tags": ["Geopolítica", "Europa", "Grandes potencias", "Estrategia"], "published": "2026-06-05T18:40:00+00:00", "sources": [{"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/05/europe-strategy-turkey-russia-china-putin-erdogan-brussels/", "type": "blog"}]}, {"id": "3ff59bc9fb", "topic": "geo", "title": "Herta Müller critica a Rumanía por su \"arte de olvidar\" la historia", "summary": "La premio Nobel Herta Müller ha condenado a su país natal, Rumanía, en sus nuevas memori nt.space/p/ainews-not-much-happened-today-6b8", "type": "newsletter"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, read: new Set(lsGet("read", [])) };

const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function relTime(iso){
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 3600) return "hace " + Math.max(1,Math.round(d/60)) + " min";
  if (d < 86400) return "hace " + Math.round(d/3600) + " h";
  return "hace " + Math.round(d/86400) + " d";
}
const typeIcon = t => t==="youtube" ? "▶" : t==="newsletter" ? "✉" : "◆";

function saveRead(){ lsSet("read", [...state.read]); }

function visible(){
  const q = state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if (s.topic !== state.tab) return false;
    if (state.hideRead && state.read.has(s.id)) return false;
    if (q){
      const hay = (s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+
        (s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render(){
  const counts = {ia:0, geo:0};
  (DIGEST.stories||[]).forEach(s=>counts[s.topic]!==undefined && counts[s.topic]++);
  $("#nIa").textContent = counts.ia;
  $("#nGeo").textContent = counts.geo;

  const list = visible();
  const feed = $("#feed");
  if (!list.length){
    feed.innerHTML = `<div class="empty"><div class="big">Nada por aquí</div>
      ${state.q ? "Prueba con otra búsqueda." : "No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML = list.map(s=>{
    const dots = [1,2,3,4,5].map(n=>`<i class="${n<=s.importance?'on':''}"></i>`).join("");
    const tags = (s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips = (s.sources||[]).map(x=>
      `<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener">
         <span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi = (s.sources||[]).length>1
      ? `${s.sources.length} fuentes lo cubren` : "Fuente";
    const isRead = state.read.has(s.id);
    return `<article class="card ${isRead?'read':''}" data-topic="${s.topic}" data-id="${s.id}">
      <div class="crow">
        <span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>
        <div class="imp">${dots}</div>
        <span class="time">${relTime(s.published)}</span>
      </div>
      <h2>${esc(s.title)}</h2>
      <div class="summary">${esc(s.summary)}</div>
      ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
      ${tags?`<div class="tags">${tags}</div>`:""}
      <div class="srcline">
        <div class="srclabel">${multi}</div>
        <div class="chips">${chips}</div>
      </div>
      <div class="actions">
        <button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id;
    state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

// Pestañas
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; render();
});
$("#q").oninput = e => { state.q = e.target.value; render(); };
$("#hideRead").onclick = function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

// Cabecera
(function(){
  const g = DIGEST.generated_at ? new Date(DIGEST.generated_at) : new Date();
  const f = g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent = `Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").textContent = `Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados`;
})();

render();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>

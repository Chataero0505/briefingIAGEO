"relevance": 5, "tags": ["IA", "Economía", "Samsung", "Corea del Sur"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F111b17f6-0df3-49f3-b3e1-60c3a0fe6fab.jpg?source=next-barrier-page", "published": "2026-06-13T00:08:31+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/52cdae7d-5553-4b8b-9fd7-90c167e9c1a4", "type": "blog"}]}, {"id": "c95b63a0c3", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "Conflictos globales sacuden los sistemas energéticos, forzando reconfiguraciones estratégicas", "summary": "Las guerras en Ucrania e Irán están generando efectos compuestos en los sistemas energéticos globales, obligando a los países a rediseñar sus estrategias de seguridad energética. Líderes del sector energético han destacado en el Atlantic Council Global Energy Forum las soluciones implementadas para mejorar la seguridad, especialmente ante la \"weaponización\" del gas ruso, y han señalado vulnerabilidades persistentes, como la restricción del tráfico a través del Estrecho de Ormuz.\n\nEuropa Central y del Este ha avanzado significativamente en la resiliencia de sus sistemas energéticos desde la invasión rusa de Ucrania en 2022, mediante la inversión en gasoductos inversos y pequeños reactores. Sin embargo, se advierte que la infraestructura aún no está completamente preparada para resistir futuras crisis.\n\nLa lección principal de la guerra en Ucrania es que la \"supervivencia\" debe ser el principio organizador de los sistemas energéticos, no solo la eficiencia. La destrucción sistemática de plantas y redes eléctricas ucranianas por parte de Rusia demuestra que la distancia geográfica ya no garantiza la protección frente a las disrupciones.", "why": "Los conflictos bélicos están redefiniendo las estrategias de seguridad energética global y la resiliencia de las infraestructuras.", "importance": 4, "relevance": 5, "tags": ["Energía", "Seguridad", "Conflictos", "Europa"], "image": "https://www.atlanticcouncil.org/wp-content/uploads/2026/06/061026_AC-Global-Energy-Forum_-24.jpg", "published": "2026-06-12T15:18:47+00:00", "sources": [{"name": "Atlantic Council", "url": "https://www.atlanticcouncil.org/blogs/energysource/conflicts-are-jolting-energy-systems-will-they-cause-structural-breaks/", "type": "blog"}]}, {"id": "ba3a0b8d76", "category": "cruce", "topic": "geo", "subtopic": "Regulación", "cruce": true, "title": "La UE considera una estructura de dos niveles para las 'gigafábricas' de IA", "summary": "La Comisión Europea está explorando la posibilidad de establecer una estructura de dos niveles para las \"gigafábricas\" de inteligencia artificial, según fuentes internas. Esta iniciativa busca potenciar la capacidad de cómputo de la UE en el ámbito de la IA, adoptando un enfoque más distribuido para el desarrollo de estos centros.\n\nEl objetivo es fortalecer la posición de Europa en la carrera tecnológica global, asegurando el acceso a la infraestructura necesaria para entrenar y desplegar modelos de IA avanzados. La propuesta de una estructura de dos niveles podría implicar diferentes tipos de instalaciones o niveles de especialización dentro de estas \"gigafábricas\".\n\nEsta medida se enmarca en los esfuerzos de la UE por fomentar la soberanía tecnológica y reducir la dependencia de infraestructuras de computación de IA ubicadas fuera del bloque. La configuración específica y los detalles de esta estructura de dos niveles aún están en fase de diseño y discusión.", "why": "La UE busca fortalecer su capacidad de cómputo en IA mediante una estructura de 'gigafábricas' de dos niveles.", "importance": 4, "relevance": 5, "tags": ["IA", "UE", "Semiconductores", "Regulación"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2254050110-1182x788.jpg", "published": "2026-06-12T13:52:15+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/eu-eyeing-two-tier-structure-for-ai-gigafactories-insiders-say/", "type": "blog"}]}, {"id": "7ef846e367", "category": "cruce", "topic": "geo", "subtopic": "EE. UU.", "cruce": true, "title": "SpaceX debuta en bolsa con subida del 19,2%, pero enfrenta un desafío en Asia", "summary": "Las acciones de SpaceX cerraron su primer día de cotización en el Nasdaq con un alza del 19,2%, tras una Oferta Pública Inicial (OPI) que valoró la empresa en aproximadamente 1,75 billones de dólares. Esta operación ha catapultado a Elon Musk a convertirse en la primera persona en alcanzar el billón de dólares de patrimonio.\n\nSin embargo, el futuro crecimiento de SpaceX, más allá de asegurar el funcionamiento de sus productos clave como Starlink, depende en gran medida de su penetración en el mercado asiático. La limitada presencia de Starlink y de sus soluciones de IA en la región plantea interrogantes sobre la consecución de sus elevadas valoraciones.\n\nLa exitosa salida a bolsa de SpaceX marca un hito en la historia de las OPI, pero la compañía deberá abordar los desafíos de expansión en mercados estratégicos como Asia para justificar su valoración y asegurar su crecimiento a largo plazo.", "why": "La OPI de SpaceX, la mayor de la historia, la valora en 1,75 billones de dólares, pero su éxito futuro está condicionado a la expansión en Asia y la adopción de sus tecnologías de IA y conectividad.", "importance": 5, "relevance": 4, "tags": ["SpaceX", "OPI", "Tecnología", "Asia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F9%2F1%2F8%2F12608196-1-eng-GB%2Fc3238488530f-2026-06-11T161848Z_2116664479_RC2SRLAIB9IA_RTRMADP_3_SPACEX-IPOa.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T11:35:01.244110+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/technology/spacex-closes-up-nearly-20-in-market-debut-but-faces-an-asia-problem", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/a7f4246d-9ae2-4f7b-90af-e5a53c52203b", "type": "blog"}]}, {"id": "3ccedd9c13", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "La guerra en Oriente Medio golpea a los agricultores estadounidenses por el alza de precios energéticos y de fertilizantes", "summary": "La prolongada guerra en Oriente Medio, que supera los 100 días, está provocando un aumento sostenido de los precios de la energía, afectando gravemente a un sector clave del electorado republicano en EE. UU. El conflicto ha mermado la producción energética en la región y ha estrangulado los flujos a través del Estrecho de Ormuz.\n\nEste escenario ha disparado los precios globales de la energía y los fertilizantes, impactando duramente a los agricultores estadounidenses. La situación se agrava por las presiones previas derivadas de las políticas arancelarias y la restricción de la inmigración de la administración Trump, que ya habían afectado la mano de obra agrícola y la disponibilidad de ayudas y préstamos.\n\nLa noticia pone de manifiesto la interconexión entre conflictos geopolíticos, mercados energéticos y la agricultura, con potenciales repercusiones políticas internas en EE. UU. de cara a las elecciones de mitad de mandato.", "why": "Demuestra cómo los conflictos geopolíticos y la volatilidad energética impactan directamente en sectores económicos clave y en la estabilidad política interna.", "importance": 4, "relevance": 4, "tags": ["Guerra", "Energía", "Agricultura", "EE. UU."], "image": "https://foreignpolicy.com/wp-content/uploads/2026/06/GettyImages-2280067763.jpg", "published": "2026-06-12T17:59:12+00:00", "sources": [{"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/12/iran-war-energy-farmers-fertilizer-economic-strain-midterms/", "type": "blog"}]}, {"id": "9b5dd57ca0", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Francia acoge la cumbre del G7 en un contexto de fragmentación geopolítica e inseguridad económica", "summary": "Los líderes de las economías más avanzadas se reunirán en Évian-les-Bains, Francia, del 15 al 17 de junio para la cumbre del G7. El evento se produce en un momento marcado por la fragmentación geopolítica, la inseguridad económica y el cuestionamiento del papel del foro.\n\nLa reunión evoca la primera cumbre del G6 en 1975, convocada tras las crisis del petróleo y el colapso del orden monetario de Bretton Woods. Hoy, las mismas ansiedades estructurales resurgen con fuerza: inseguridad energética, tensiones comerciales, deuda soberana, competencia industrial y dudas sobre la capacidad de coordinación de las economías avanzadas en un mundo más dividido.\n\nFrancia ha enfocado su presidencia en revitalizar el G7 como foro de diálogo y en reducir los desequilibrios globales. Los datos de comercio bilateral entre el G7 y China, con un notable aumento de las exportaciones chinas y una caída de sus importaciones en un solo año, subrayan la urgencia de abordar la sobrecapacidad industrial china.", "why": "La cumbre del G7 abordará los desafíos económicos y geopolíticos globales, incluyendo la competencia industrial con China y la seguridad energética.", "importance": 4, "relevance": 4, "tags": ["G7", "Francia", "Geopolítica", "Comercio"], "image": "https://www.atlanticcouncil.org/wp-content/uploads/2026/06/2026-06-11T080121Z_1832832968_RC2O3LAXXGIQ_RTRMADP_3_G7-SUMMIT-PREVIEW.jpg", "published": "2026-06-12T15:37:22+00:00", "sources": [{"name": "Atlantic Council", "url": "https://www.atlanticcouncil.org/dispatches/seven-charts-that-will-define-frances-g7-summit/", "type": "blog"}]}, {"id": "088f3596a4", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "La OTAN busca transformar su estrategia militar ante la evolución de las amenazas", "summary": "El Almirante Pierre Vandier, Comandante Supremo Aliado de la Transformación de la OTAN (ACT), discute en el podcast \"So what’s the strategy?\" cómo la Alianza está abordando la cambiante naturaleza de la guerra y las amenazas emergentes. El ACT lidera la adaptación militar de la OTAN, coordinando esfuerzos entre las naciones miembro para identificar desafíos y oportunidades que mantengan la ventaja bélica de la Alianza sobre sus adversarios.\n\nLa conversación se centra en la necesidad de adaptar las estrategias militares de la OTAN a las nuevas realidades del campo de batalla. Se reconoce que Rusia ha modificado sus tácticas de combate, lo que exige una respuesta acorde por parte de la Alianza para evitar enfrentarse a un \"enemigo antiguo\" con métodos obsoletos.\n\nEl podcast, presentado por Matthew Kroenig, vicepresidente y director sénior del Scowcroft Center for Strategy and Security del Atlantic Council, explora las estrategias que configuran los desafíos de seguridad global más apremiantes, inspirándose en la pregunta del General Brent Scowcroft: \"Entonces, ¿cuál es la estrategia?\".", "why": "La OTAN está adaptando su estrategia militar para responder a la evolución de las amenazas y la cambiante naturaleza de la guerra.", "importance": 4, "relevance": 4, "tags": ["OTAN", "Defensa", "Estrategia", "Guerra"], "image": "https://www.atlanticcouncil.org/wp-content/uploads/2026/06/SWTS-S1E4.jpg", "published": "2026-06-12T14:30:58+00:00", "sources": [{"name": "Atlantic Council", "url": "https://www.atlanticcouncil.org/commentary/podcast/so-whats-the-strategy-for-natos-transformation/", "type": "blog"}]}, {"id": "770ccfe0be", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Hollywood explora el uso de IA más allá de la generación de vídeo básico", "summary": "A pesar del revuelo sobre la IA generativa en el cine, los proyectos presentados hasta ahora no han logrado cautivar al público, produciendo principalmente clips cortos y visualmente inconsistentes. Algunas colaboraciones entre estudios de Hollywood y empresas de IA se han disuelto, sugiriendo una dependencia incierta de la tecnología.\n\nSin embargo, proyectos experimentales presentados en el Festival de Cine de Tribeca demuestran un enfoque más prometedor, donde los artistas humanos utilizan la IA como una herramienta para potenciar su creatividad, en lugar de depender de modelos genéricos.\n\nEstos avances sugieren que el futuro de la IA en la industria cinematográfica podría residir en su integración como herramienta de apoyo artístico, en lugar de como un sustituto de la creación humana.", "why": "La industria cinematográfica busca integrar la IA de forma más sofisticada, yendo más allá de la simple generación de contenido básico.", "importance": 3, "relevance": 4, "tags": ["IA generativa", "cine", "Hollywood", "herramientas IA"], "image": "https://platform.theverge.com/wp-content/uploads/sites/2/2026/06/Figure05_700_6_1080p.png?quality=90&strip=all&crop=0%2C3.4613147178592%2C100%2C93.077370564282&w=1200", "published": "2026-06-13T11:00:00+00:00", "sources": [{"name": "The Verge (IA)", "url": "https://www.theverge.com/ai-artificial-intelligence/948425/tribeca-2026-dear-upstairs-neighbors-google-deepmind-openai", "type": "blog"}]}, {"id": "c728570e14", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "Farmacéuticas japonesas recurren a China para descubrimiento de fármacos y crecimiento", "summary": "Empresas farmacéuticas japonesas están incrementando sus inversiones en China, el segundo mercado farmacéutico más grande del mundo. El objetivo es aprovechar las capacidades de descubrimiento de fármacos de sus socios chinos, que han mejorado rápidamente, para identificar nuevos candidatos prometedores.\n\nEl CEO de Takeda ha señalado que las capacidades de desarrollo en China se acercan a los niveles de Estados Unidos. Astellas Pharma, por ejemplo, está abriendo una nueva instalación de I+D en un parque industrial de Beijing, reflejando esta tendencia de colaboración y desarrollo conjunto.\n\nEsta estrategia permite a las farmacéuticas japonesas acceder a un mercado en expansión y beneficiarse de la innovación emergente en China, al tiempo que China se posiciona como un centro clave para la investigación y desarrollo farmacéutico global.", "why": "Las farmacéuticas japonesas buscan en China no solo un mercado en crecimiento, sino también capacidades de investigación y desarrollo de fármacos que se están volviendo cada vez más competitivas a nivel mundial.", "importance": 4, "relevance": 3, "tags": ["Japón", "China", "Farmacéuticas", "Investigación"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F5%2F1%2F0%2F12610156-2-eng-GB%2Fe1ce8a4c01fb-photo_SXM2026061100007569.png?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T11:35:02.338487+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/pharmaceuticals/japan-pharma-companies-turn-to-china-for-drug-discovery-growth", "type": "blog"}]}, {"id": "a8e7b3ac5a", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "La UE aprueba el inicio de las negociaciones de adhesión con Ucrania y Moldavia.", "summary": "Los 27 países miembros de la Unión Europea han votado a favor de abrir las primeras negociaciones de adhesión con Ucrania y Moldavia. La decisión se hará efectiva el próximo lunes, cuando se abrirá el primer grupo de temas, centrado en los valores fundamentales del bloque, como el Estado de derecho y las instituciones democráticas.\n\nAmbos países, que han enfrentado la agresión militar rusa desde la caída de la Unión Soviética, ven en la membresía de la UE un pivote decisivo para alejarse de la influencia de Moscú. Esta aprobación representa un paso significativo en su aspiración europea y un mensaje político importante en el contexto geopolítico actual.\n\nEl proceso de adhesión será largo y complejo, requiriendo que ambos países cumplan con rigurosos criterios. Sin embargo, la apertura de negociaciones subraya el compromiso de la UE con la estabilidad y la integración de sus vecinos orientales, con posibles repercusiones en la seguridad y la economía de la región.", "why": "La apertura de negociaciones de adhesión con Ucrania y Moldavia marca un hito geopolítico y económico para la UE y sus vecinos orientales.", "importance": 4, "relevance": 3, "tags": ["UE", "Ucrania", "Moldavia", "Adhesión"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/06/13/GettyImages-2219053976-scaled.jpg", "published": "2026-06-13T09:35:41+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/eu-countries-membership-talks-with-ukraine-and-moldova/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "b25a8e9d0a", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "Marcas chinas Puma y Kelme visten al 27% de los equipos del Mundial", "summary": "Las marcas de ropa deportiva Puma y Kelme, de propiedad china, están equipando al 27% de las selecciones participantes en el Mundial de fútbol, consolidando la presencia de China como un actor importante en la industria de uniformes deportivos. La cuota de mercado combinada de estas dos marcas compite con gigantes como Adidas y Nike.\n\nEjemplos de su alcance incluyen a la selección de Bosnia-Herzegovina vistiendo Kelme y a Portugal luciendo el logo de Puma. Esta presencia significativa en un evento deportivo global de gran magnitud demuestra el creciente poder de las marcas chinas en el mercado internacional.\n\nLa noticia destaca la creciente influencia de China en la fabricación y comercialización de productos de consumo a nivel mundial, incluso en sectores dominados tradicionalmente por empresas occidentales.", "why": "La notable presencia de marcas chinas en la equipación de selecciones mundialistas evidencia la creciente competitividad y alcance global de la industria textil deportiva china.", "importance": 3, "relevance": 3, "tags": ["China", "Deportes", "Marcas", "Mundial"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F0%2F0%2F0%2F0%2F12610000-1-eng-GB%2Fcbd91254e9d2-photo_SXM2026061100011583.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T11:35:02.478582+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/sports/world-cup-2026/china-owned-puma-and-kelme-supply-27-of-world-cup-uniforms", "type": "blog"}]}, {"id": "0639655b9f", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Croacia se posiciona como hub marítimo conectando Asia y Europa Central", "summary": "Croacia aspira a consolidarse como la puerta de entrada marítima entre Asia y Europa Central y Oriental, según declaraciones del viceprimer ministro Oleg Butkovic a Nikkei.\n\nEl país planea expandir las instalaciones de una terminal en el puerto de Rijeka, en el mar Adriático, con el objetivo de quintuplicar su capacidad de manejo de carga. Esta inversión busca mejorar la conectividad y el flujo comercial.\n\nLa iniciativa subraya la importancia estratégica de Croacia en las rutas comerciales euroasiáticas y su potencial para convertirse en un nodo logístico clave.", "why": "Croacia busca fortalecer su posición como un nexo logístico clave entre Asia y Europa, mejorando su infraestructura portuaria.", "importance": 3, "relevance": 3, "tags": ["Croacia", "logística", "Asia", "Europa"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F3%2F2%2F0%2F12600236-1-eng-GB%2F92242ee17a50-20260610N-Croatia-port.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T11:34:59.936536+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/editor-s-picks/interview/croatia-emerges-as-maritime-hub-connecting-asia-to-central-europe", "type": "blog"}]}, {"id": "61aa6228fd", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "China construye una isla artificial en el Mar del Sur de China", "summary": "Informes sugieren que China está expandiendo un arrecife deshabitado en el Mar del Sur de China, convirtiéndolo en una isla artificial de gran tamaño que podría albergar una base militar. La ubicación y el momento de esta construcción han generado interrogantes entre expertos.\n\nLa expansión de Antelope Reef, una pequeña masa de tierra hasta ahora, podría intensificar las tensiones diplomáticas entre China y Vietnam, países con reclamaciones territoriales en la región.\n\nEsta acción se enmarca en el contexto de las disputadas reclamaciones territoriales en el Mar del Sur de China, una zona de importancia estratégica y comercial.", "why": "La construcción de una isla artificial por parte de China en el Mar del Sur de China aumenta las tensiones regionales y las disputas territoriales.", "importance": 3, "relevance": 3, "tags": ["China", "Mar del Sur de China", "geopolítica", "militar"], "image": "https://i4.ytimg.com/vi/sh9q3Z9wlnk/hqdefault.jpg", "published": "2026-06-13T10:00:34+00:00", "sources": [{"name": "The Economist (YT)", "url": "https://www.youtube.com/shorts/sh9q3Z9wlnk", "type": "youtube"}]}, {"id": "68d8c0b96d", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "El 'fiasco' de los cazas europeos pone de manifiesto las dificultades de la UE en defensa.", "summary": "El desarrollo de un nuevo avión de combate europeo se ha visto plagado de dificultades, lo que pone de relieve los desafíos de la Unión Europea para coordinar proyectos de defensa ambiciosos y competir con potencias como Estados Unidos y China. Los retrasos, los sobrecostes y las divergencias entre los países miembros han mermado el progreso del programa.\n\nEste proyecto, concebido para fortalecer la autonomía estratégica europea en materia de defensa, se enfrenta a la complejidad de alinear los intereses nacionales de diversos estados miembros, así como a la competencia tecnológica de programas ya establecidos y de nuevas iniciativas en otros continentes. La falta de una política de defensa común cohesionada es un obstáculo recurrente.\n\nLa capacidad de Europa para desarrollar y desplegar capacidades militares de vanguardia de forma independiente es crucial para su seguridad y su papel en el escenario global. El fracaso o el retraso de proyectos como este podrían tener repercusiones en la credibilidad de la UE como actor de defensa y en su competitividad frente a otros bloques.", "why": "Las dificultades en el desarrollo de cazas europeos evidencian los obstáculos de la UE para lograr una autonomía estratégica en defensa y competir tecnológicamente.", "importance": 3, "relevance": 3, "tags": ["Defensa europea", "Cazas", "Autonomía estratégica", "UE"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F95fb8d43-6d30-4a70-9a97-c21d3f25309b.jpg?source=next-barrier-page", "published": "2026-06-13T10:00:04+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/3aef5865-962c-4010-8915-6b573b2ad705", "type": "blog"}]}, {"id": "f0b72b5460", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Los países de la UE no logran un acuerdo sobre nuevas normativas de pesticidas.", "summary": "Los países de la Unión Europea no han conseguido alcanzar un consenso sobre las nuevas reglas propuestas para el uso de pesticidas. La propuesta, presentada por la Comisión en diciembre, buscaba agilizar la adopción de pesticidas biológicos y permitir aprobaciones ilimitadas para sustancias sintéticas, además de endurecer el control de residuos de químicos prohibidos en alimentos importados.\n\nLa presidencia chipriota del Consejo presentó un borrador de compromiso que, tras semanas de negociaciones técnicas, no obtuvo la mayoría necesaria para iniciar conversaciones con el Parlamento Europeo. Una docena de países, incluyendo Alemania, Italia y España, se opusieron al texto. Uno de los puntos más controvertidos ha sido la restricción de importaciones con trazas de pesticidas prohibidos en la UE, medida criticada por socios comerciales y algunos estados miembros por su potencial impacto en el comercio y la competencia desleal.\n\nLa falta de acuerdo pone de manifiesto las tensiones entre la protección de la salud y el medio ambiente en la UE, la competitividad de sus agricultores y las relaciones comerciales internacionales. La próxima presidencia irlandesa del Consejo tendrá el desafío de encontrar un compromiso viable que satisfaga las diversas sensibilidades de los estados miembros y evite distorsiones en el mercado.", "why": "La incapacidad de la UE para acordar normativas sobre pesticidas refleja tensiones entre salud, medio ambiente, comercio y competitividad agrícola.", "importance": 3, "relevance": 3, "tags": ["UE", "Pesticidas", "Regulación", "Comercio"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-542626246.jpg", "published": "2026-06-13T09:01:45+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/eu-countries-fail-to-agree-on-new-pesticide-rules/", "type": "blog"}]}, {"id": "a45996d215", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "El 'decrecimiento' podría convertir a los europeos en 'Europoors', según un análisis.", "summary": "Un reciente análisis argumenta que la adopción de políticas de decrecimiento en Europa podría llevar a una reducción significativa del nivel de vida, acuñando el término \"Europoors\" para describir a sus ciudadanos. El debate se centra en la comparación de los estándares de vida europeos con los de Estados Unidos, donde algunos economistas europeos señalan la brecha creciente y la envidia hacia el sector tecnológico estadounidense.\n\nEl artículo contrapone dos visiones: por un lado, la de economistas como Mario Draghi, que abogan por reformas liberalizadoras para que Europa alcance a EE. UU., especialmente en tecnología. Por otro lado, se mencionan economistas estadounidenses como Paul Krugman, quienes sugieren que la diferencia se debe en parte a que los estadounidenses trabajan más y que el crecimiento de la productividad en EE. UU. puede ser un artefacto de medición.\n\nLa discusión subraya el debate subyacente sobre las \"variedades de capitalismo\", es decir, si los estados de bienestar y regulación europeos ofrecen mejores resultados para la población general o si el sistema de libre mercado estadounidense es superior. La elección entre crecimiento y decrecimiento, y sus implicaciones económicas y sociales, es un tema central para el futuro de Europa.", "why": "El debate sobre el decrecimiento en Europa plantea interrogantes sobre el futuro del modelo económico y el nivel de vida de sus ciudadanos frente a otras potencias.", "importance": 3, "relevance": 3, "tags": ["Decrecimiento", "Europa", "Economía", "Estándares de vida"], "image": "https://substackcdn.com/image/fetch/$s_!qmgy!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fbf8a2533-41b3-492a-b1f0-d570eac536d3_1000x660.jpeg", "published": "2026-06-13T08:25:32+00:00", "sources": [{"name": "Noahpinion", "url": "https://www.noahpinion.blog/p/degrowth-would-make-europeans-into", "type": "newsletter"}]}, {"id": "0de43177e5", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "Turquía impulsa la agenda de 'cero residuos' de cara a la COP31", "summary": "Turquía ha organizado su segundo Foro de Cero Residuos en Estambul, sirviendo como preludio a la agenda de la próxima cumbre climática de la ONU (COP31). El país lanzó su proyecto 'Zero Waste' en 2017 con el objetivo de reducir los 2.100 millones de toneladas de residuos generados anualmente a nivel mundial, promoviendo la eficiencia de recursos y la resiliencia climática.\n\nLa iniciativa, impulsada por la Primera Dama Emine Erdoğan y la Fundación Zero Waste, se centra en rediseñar el ciclo de vida de los recursos para maximizar la reutilización y recuperación de materiales. Este enfoque se alinea con el concepto de economías circulares, que busca mantener los materiales en circulación sostenible mediante la reutilización, reciclaje y compostaje.\n\nEl foro ha abordado soluciones prácticas y mecanismos de financiación, y la participación de Turquía como co-anfitrión de la COP31 en noviembre subraya la importancia de estas políticas ambientales en la agenda internacional.", "why": "Subraya el compromiso de Turquía con la sostenibilidad y la economía circular, posicionándose como actor clave en futuras negociaciones climáticas.", "importance": 3, "relevance": 3, "tags": ["Sostenibilidad", "Cero Residuos", "COP31", "Turquía"], "image": "https://www.atlanticcouncil.org/wp-content/uploads/2026/06/2026-06-05T000000Z_2049726722_MT1NURPHO000NN9F4U_RTRMADP_3_ISTANBUL-EVENT-ZEROWASTE.jpg", "published": "2026-06-12T18:10:36+00:00", "sources": [{"name": "Atlantic Council", "url": "https://www.atlanticcouncil.org/dispatches/dispatch-from-istanbul-why-turkey-is-throwing-its-weight-behind-zero-waste-ahead-of-cop31/", "type": "blog"}]}, {"id": "fe3df18d17", "category": "geo", "topic": "geo", "subtopic": "EE. UU.", "cruce": false, "title": "La política de Elon Musk como contratista gubernamental genera contradicciones", "summary": "Se cuestiona la percepción de Elon Musk como libertario, argumentando que su enfoque principal reside en la consecución de objetivos civilizatorios, para los cuales considera necesaria la intervención y el apoyo estatal. Su relación con el gobierno ha sido históricamente de dependencia, buscando reformatear las instituciones para alinearlas con sus metas y hacer sus servicios indispensables.\n\nDesde sus inicios, Musk ha dependido de subsidios, demanda y datos proporcionados por el estado. Su primera empresa, Zip2, se benefició de datos de la constelación GPS militar, y PayPal prosperó bajo el seguro de depósitos federal. Incluso como becario, promovió inversiones en deuda respaldada por el Tesoro de EE. UU.\n\nEsta dependencia del apoyo estatal contrasta con su retórica y podría socavar su posición como contratista gubernamental, generando interrogantes sobre la coherencia de sus acciones políticas y empresariales.", "why": "Las acciones de Elon Musk como contratista gubernamental plantean interrogantes sobre su alineación política y su relación con el estado.", "importance": 3, "relevance": 3, "tags": ["Elon Musk", "Contratista", "Política", "EE. UU."], "image": "https://foreignpolicy.com/wp-content/uploads/2026/06/GettyImages-2178455430.jpg", "published": "2026-06-12T15:19:02+00:00", "sources": [{"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/12/musk-spacex-ipo-military-policy/", "type": "blog"}]}, {"id": "1681499a30", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Grecia apoya la coordinación europea en acceso y precios de medicamentos ante presiones económicas y geopolíticas", "summary": "Grecia ha manifestado su apoyo a una mayor cooperación voluntaria entre los países de la UE para la adquisición de medicamentos, la seguridad del suministro y el intercambio de información. Esta iniciativa surge en un contexto de crecientes presiones económicas y geopolíticas que afectan la asequibilidad y disponibilidad de fármacos.\n\nAris Angelis, Secretario General de Planificación Estratégica del Ministerio de Salud griego, señaló que una colaboración más estrecha puede ayudar a los estados miembros a abordar desafíos comunes, manteniendo al mismo tiempo sus facultades de decisión nacionales. La UE y sus miembros deben trabajar conjuntamente con todos los actores relevantes para garantizar un acceso equitativo y oportuno a los medicamentos, asegurando la sostenibilidad de los sistemas sanitarios.\n\nLa propuesta busca avanzar en un debate políticamente sensible en Bruselas sobre la posibilidad de coordinar enfoques para la fijación de precios y la adquisición de productos farmacéuticos en Europa. La cuestión será discutida próximamente por los ministros de salud de la UE.", "why": "La coordinación europea en materia de medicamentos busca garantizar el acceso y la asequibilidad frente a presiones económicas y geopolíticas.", "importance": 3, "relevance": 3, "tags": ["UE", "Medicamentos", "Salud", "Coordinación"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/2556256.jpg", "published": "2026-06-12T14:33:48+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/athens-signals-support-for-eu-wide-push-on-medicines-access-and-pricing/", "type": "blog"}]}, {"id": "c3a24fae4b", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Kubota planea su quinta fábrica en India para impulsar exportaciones", "summary": "El fabricante japonés de maquinaria agrícola y de construcción Kubota construirá una nueva fábrica en el norte de la India, su quinta planta en el país. Esta expansión forma parte de una estrategia para duplicar su producción en la región para 2030 y aumentar las exportaciones a mercados como África.\n\nLa compañía ya produce tractores de modelos básicos y económicos en la India a través de su filial Escorts Kubota. La nueva instalación busca fortalecer su presencia en el mercado del sur de Asia y expandir su alcance global.\n\nEsta inversión subraya la creciente importancia de la India como centro de fabricación y exportación para empresas japonesas que buscan diversificar sus cadenas de suministro y acceder a nuevos mercados.", "why": "La expansión de Kubota en la India refleja una tendencia de las empresas manufactureras japonesas a utilizar el país como base para la producción y exportación, buscando eficiencia y acceso a mercados emergentes.", "importance": 3, "relevance": 2, "tags": ["India", "Fabricación", "Exportaciones", "Maquinaria"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F1%2F5%2F0%2F0%2F12610051-2-eng-GB%2F26faf12068e0-photo_SXM2026060300010693.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T11:35:04.254460+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/companies/tractor-maker-kubota-plans-5th-indian-factory-in-export-push", "type": "blog"}]}, {"id": "0365d23661", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Mitsui Chemicals adquiere fabricante de materiales dentales en EE. UU. por 900 millones de dólares", "summary": "Mitsui Chemicals anunció la compra del fabricante estadounidense de materiales dentales Ultradent Products por aproximadamente 900 millones de dólares. Esta adquisición representa la mayor compra realizada hasta la fecha por la productora química japonesa.\n\nLa operación forma parte de la estrategia de Mitsui Chemicals para expandir su presencia en el importante mercado estadounidense y fortalecer su cartera en el sector de la salud. Ultradent Products es un actor relevante en el ámbito de los materiales dentales.\n\nLa compra subraya la tendencia de las empresas japonesas a buscar crecimiento a través de adquisiciones en mercados extranjeros clave, especialmente en sectores de alto valor añadido como el de la salud.", "why": "La adquisición de Ultradent por Mitsui Chemicals es la mayor hasta la fecha para la empresa japonesa, marcando una apuesta significativa por el sector de materiales dentales en el mercado estadounidense.", "importance": 3, "relevance": 2, "tags": ["Japón", "EE. UU.", "Adquisición", "Salud"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F6%2F9%2F9%2F12609966-1-eng-GB%2F3fb9a10c2ff7-photo_SXM2026012200009993.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T11:35:03.374423+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/business-deals/mitsui-chemicals-to-buy-us-dental-materials-maker-for-900m", "type": "blog"}]}, {"id": "b9fb2221f2", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Kodansha imprimirá manga en India, pionera entre las grandes editoriales japonesas", "summary": "Kodansha se convertirá en la primera gran editorial japonesa en establecer una empresa en la India para imprimir manga. La compañía busca posicionarse en un mercado creciente para el contenido japonés y sortear problemas de piratería mediante la producción local.\n\nLa editorial espera que esta iniciativa facilite la distribución de títulos populares como 'Attack on Titan' y 'Blue Lock'. Actualmente, los volúmenes de manga en inglés vendidos en la India se importan desde EE. UU. y su coste es significativamente mayor que en Japón.\n\nEsta estrategia de localización de la producción de manga en India responde a la creciente demanda de contenido japonés en el país y a la búsqueda de modelos de negocio más eficientes y rentables para expandir su alcance.", "why": "Kodansha rompe barreras al ser la primera gran editorial japonesa en producir manga localmente en India, buscando capitalizar un mercado en auge y mejorar la accesibilidad de sus títulos.", "importance": 3, "relevance": 2, "tags": ["India", "Japón", "Manga", "Publicaciones"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F0%2F6%2F0%2F12610606-2-eng-GB%2F22388ef433f1-photo_SXM2026061000006855.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T11:35:01.382686+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/media-entertainment/kodansha-to-print-manga-in-india-in-first-for-major-japan-publisher", "type": "blog"}]}, {"id": "20abaf7ed9", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Japón entra en la competición de lanzamientos espaciales de bajo coste con el H3", "summary": "Japón ha lanzado con éxito su cohete insignia H3, marcando su entrada en el mercado global de lanzamientos espaciales de bajo coste, un sector actualmente dominado por SpaceX.\n\nLa Agencia de Exploración Aeroespacial de Japón (JAXA) ha puesto en órbita varios satélites pequeños con este lanzamiento. Se espera que Mitsubishi Heavy Industries asuma las operaciones de los cohetes de próxima generación.\n\nEsta iniciativa posiciona a Japón como un competidor en el mercado de lanzamientos espaciales, buscando ofrecer alternativas más económicas frente a los actores establecidos.", "why": "Japón busca competir en el mercado de lanzamientos espaciales de bajo coste, desafiando el dominio actual de SpaceX.", "importance": 3, "relevance": 2, "tags": ["Japón", "lanzamientos espaciales", "competencia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F4%2F3%2F0%2F12610346-2-eng-GB%2F3a81ade74e1c-photo_SXM2026061200005191.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T11:35:00.355346+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/aerospace-defense-industries/japan-enters-low-cost-rocket-competition-against-spacex-with-h3-launch", "type": "blog"}]}, {"id": "acd6af4fa6", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Suecia intercepta aviones de combate rusos cerca de su espacio aéreo", "summary": "Aviones de combate suecos JAS 39 Gripen fueron desplegados para interceptar dos aeronaves rusas que volaban sobre el mar Báltico, cerca del espacio aéreo sueco. Los incidentes ocurrieron en dos puntos distintos del mar Báltico.\n\nLa Fuerza Aérea sueca afirmó que las acciones rusas representan un patrón de comportamiento recurrente que amenaza la integridad territorial y la seguridad del país. Aviones de la OTAN también despegaron para mantener la seguridad del espacio aéreo compartido. El espacio aéreo sueco no fue violado en ninguna de las ocasiones.\n\nEstos eventos ocurren en un contexto de crecientes tensiones en la región del Báltico, especialmente desde la invasión a gran escala de Ucrania por parte de Rusia en 2022, y tras la reciente adhesión de Suecia a la OTAN en marzo de 2024.", "why": "La reciente adhesión de Suecia a la OTAN eleva la tensión en el mar Báltico con la interceptación de aeronaves rusas.", "importance": 3, "relevance": 2, "tags": ["Suecia", "Rusia", "OTAN", "mar Báltico"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2276908674.jpg", "published": "2026-06-13T10:42:26+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/swedish-fighters-intercept-russian-jets-near-border/", "type": "blog"}]}, {"id": "e3744bdd95", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Firmas de inversión compiten por el petróleo venezolano en una carrera de 100.000 millones de dólares impulsada por Donald Trump.", "summary": "Varias firmas de inversión se han sumado a una iniciativa liderada por Donald Trump para invertir hasta 100.000 millones de dólares en el sector petrolero de Venezuela. El objetivo es reactivar la producción del país sudamericano, que ha estado mermada durante años debido a sanciones y mala gestión.\n\nEsta carrera inversora se produce en un contexto de relajación de algunas sanciones estadounidenses sobre Venezuela, aunque la situación política y económica del país sigue siendo volátil. La posibilidad de un cambio de administración en EE. UU. añade incertidumbre a la sostenibilidad de estas inversiones a largo plazo.\n\nLa viabilidad de estas inversiones dependerá de la evolución de las sanciones, la estabilidad política en Venezuela y la capacidad del país para aumentar su producción de forma sostenible. Se observará de cerca el desarrollo de estas operaciones y su impacto en el mercado energético global.", "why": "La potencial reactivación del sector petrolero venezolano podría tener implicaciones significativas en los mercados energéticos globales y en la geopolítica de la región.", "importance": 3, "relevance": 2, "tags": ["Venezuela", "Petróleo", "Inversión", "Trump"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F0acca2d0-4bb5-43de-a6b3-01a38e6dbff6.jpg?source=next-barrier-page", "published": "2026-06-13T10:00:04+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/6982febe-5d1b-4e16-9505-fbee84ca60ab", "type": "blog"}]}, {"id": "1f9c0b4e18", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "La inflación general en EE. UU. sigue siendo relevante para los consumidores.", "summary": "Un análisis reciente destaca que la inflación general en Estados Unidos continúa siendo un factor importante para los consumidores. Aunque las cifras específicas no se detallan en el extracto, la mención de un gráfico semanal sugiere un seguimiento continuo de este indicador económico.\n\nLa inflación general, que incluye los precios de la energía y los alimentos, tiene un impacto directo en el poder adquisitivo de los hogares y en sus decisiones de gasto. Las fluctuaciones en este índice pueden influir en la confianza del consumidor y en la política monetaria del país.\n\nSe mantendrá la vigilancia sobre los datos de inflación para comprender su evolución y sus efectos en la economía estadounidense y, por extensión, en los mercados globales. La política de la Reserva Federal para controlar la inflación será un punto clave a observar.", "why": "El seguimiento de la inflación en EE. UU. es crucial para entender el poder adquisitivo de los consumidores y la dirección de la política económica.", "importance": 3, "relevance": 2, "tags": ["Inflación", "EE. UU.", "Consumidores", "Economía"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F58a9bc43-1d4a-4368-a348-54bf6acd00b5.jpg?source=next-barrier-page", "published": "2026-06-13T09:30:02+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/20509c5d-e995-4670-83f5-d3d705671ee1", "type": "blog"}]}, {"id": "9b682ecce9", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "EE. UU. abate al líder de la banda criminal venezolana Tren de Aragua", "summary": "Las fuerzas estadounidenses han llevado a cabo un ataque aéreo en el que ha muerto el líder de la banda criminal venezolana Tren de Aragua. Este suceso se enmarca en las operaciones contra el crimen organizado transnacional.\n\nLa noticia se presenta como un avance en la lucha contra redes delictivas que operan a nivel internacional, destacando la intervención de EE. UU. en la neutralización de líderes de estas organizaciones.\n\nSe ofrece información sobre suscripciones para acceder al contenido completo del Financial Times, incluyendo análisis de expertos y cobertura de noticias globales.", "why": "Destaca la acción de EE. UU. contra el crimen organizado transnacional y sus implicaciones de seguridad.", "importance": 3, "relevance": 2, "tags": ["EE. UU.", "Venezuela", "Crimen organizado", "Seguridad"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Fb4965aac-5c1e-4441-9873-fd6d31ededba.jpg?source=next-barrier-page", "published": "2026-06-13T03:42:18+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/298a1431-dc3e-4cbc-aa6f-769e54541b60", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

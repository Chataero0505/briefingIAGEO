<script>
const DIGEST = {"generated_at": "2026-06-13T19:51:56.452818+00:00", "count": 19, "daily_brief": "La IA en la industria avanza con robótica más intuitiva y la capacidad de leer emociones humanas, mientras que la geopolítica se agita con tensiones entre EE.UU. y Europa sobre la soberanía tecnológica de la IA y restricciones a modelos europeos. La competencia global se intensifica, con Japón buscando reducir su dependencia de China en tierras raras y EE.UU. y China enfrascados en una carrera tecnológica. La regulación de la IA y la política tecnológica de la UE son cruciales en este panorama, especialmente ante las preocupaciones de seguridad y privacidad de modelos de IA.", "top": ["482d72d2d4", "5a89439512", "d1145d035c", "a713d0f4ad", "bf2bc70a3d"], "stories": [{"id": "482d72d2d4", "category": "ia", "topic": "ia", "subtopic": "Regulación", "cruce": false, "title": "Amazon expresa preocupaciones de seguridad sobre modelos de IA de Anthropic, llevando a restricciones gubernamentales", "summary": "El CEO de Amazon, Andy Jassy, habría comunicado preocupaciones de seguridad sobre los modelos Claude Fable 5 y Mythos 5 de Anthropic a funcionarios del gobierno estadounidense. Según informes, Jassy señaló que investigadores de Amazon utilizaron estos modelos para obtener información que podría ser empleada en ciberataques. Posteriormente, el gobierno impuso una prohibición de control de exportaciones sobre ambos modelos, afectando su acceso a nivel mundial.\n\nAnthropic ha cumplido con la orden gubernamental, bloqueando el acceso a Fable 5 y Mythos 5 para todas las naciones, incluyendo a sus propios empleados. La compañía, sin embargo, afirma que el gobierno no proporcionó detalles específicos sobre la preocupación de seguridad y que las vulnerabilidades descubiertas eran menores y accesibles a través de otros modelos. Amazon, un inversor significativo en Anthropic, ha declarado que no comparte detalles de sus discusiones con el gobierno.\n\nEsta situación pone de relieve las tensiones entre la innovación en IA y las preocupaciones de seguridad nacional. La decisión de restringir el acceso a modelos de IA avanzados, basada en preocupaciones de seguridad, podría sentar un precedente para futuras regulaciones y controles de exportación en el sector de la IA, especialmente en el contexto de la competencia tecnológica global.", "why": "Las preocupaciones de seguridad de un gigante tecnológico sobre modelos de IA han resultado en restricciones gubernamentales de exportación, subrayando la creciente tensión entre innovación y seguridad en IA.", "importance": 4, "relevance": 5, "tags": ["IA", "seguridad", "Amazon", "Anthropic"], "image": "https://techcrunch.com/wp-content/uploads/2022/07/GettyImages-1348139958.jpg?resize=1200,767", "published": "2026-06-13T19:11:41+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/13/amazon-ceo-reportedly-raised-anthropic-model-concerns-before-government-crackdown/", "type": "blog"}, {"name": "The Verge (IA)", "url": "https://www.theverge.com/ai-artificial-intelligence/949553/anthropic-fable-5-mythos-5-government-national-security", "type": "blog"}]}, {"id": "5a89439512", "category": "cruce", "topic": "ia", "subtopic": "Europa", "cruce": true, "title": "EE. UU. restringe acceso a modelos de IA europeos, avivando el debate sobre soberanía tecnológica", "summary": "La decisión del gobierno de EE. UU. de bloquear el acceso de ciudadanos no estadounidenses a modelos avanzados de IA como Mythos y Fable de Anthropic ha generado un fuerte llamado en Europa para acelerar la soberanía tecnológica y reducir la dependencia de la tecnología estadounidense. La medida, justificada por preocupaciones de ciberseguridad, ha sido vista por algunos como una señal de una \"guerra de la IA\" en curso.\n\nLa Comisión Europea ha reiterado la necesidad de \"soberanía tecnológica\" para Europa, señalando que las leyes comunitarias de ciberseguridad e IA son una base sólida para protegerse contra amenazas impulsadas por la IA. La Comisión planea presentar un plan de acción específico sobre ciberseguridad e IA, subrayando que la soberanía tecnológica es una prioridad clave para la UE en los últimos años.\n\nEsta situación pone de relieve las crecientes tensiones geopolíticas en torno al desarrollo y control de la inteligencia artificial. La UE busca establecer un marco regulatorio y tecnológico propio que le permita competir y protegerse en el ámbito de la IA, mientras EE. UU. implementa medidas que, si bien buscan la seguridad, generan inquietud en sus aliados sobre el acceso a tecnologías críticas.", "why": "La restricción de acceso a modelos de IA por parte de EE. UU. intensifica la urgencia europea por lograr la soberanía tecnológica y reducir la dependencia de plataformas extranjeras.", "importance": 4, "relevance": 5, "tags": ["Soberanía tecnológica", "IA", "Europa", "Geopolítica"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2278152680.jpg", "published": "2026-06-13T15:49:59+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/us-decision-to-block-mythos-access-fuels-european-calls-for-sovereignty/", "type": "blog"}]}, {"id": "d1145d035c", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "La IA en el borde (Edge AI) revoluciona la robótica con interfaces más amigables", "summary": "La llegada de procesadores de IA en el borde (Edge AI) está democratizando el uso de la robótica, de forma similar a como Windows lo hizo con los ordenadores personales en su momento. Empresas como NVIDIA, AMD, Qualcomm y Hailo están impulsando esta tendencia con sus chips embebidos que ejecutan modelos de IA directamente en los sistemas robóticos y automatizados.\n\nHistóricamente, la programación y el uso de ordenadores, y posteriormente de robots, requerían conocimientos técnicos avanzados, incluyendo sistemas operativos de línea de comandos y desarrollo de software desde cero. La aparición de interfaces gráficas y hardware plug-and-play, como Windows, simplificó drásticamente el acceso y la usabilidad de la tecnología para el público general.\n\nEsta evolución hacia la IA en el borde promete hacer la robótica más accesible y versátil, expandiendo su aplicabilidad en diversas industrias y facilitando su integración en sistemas automatizados sin depender exclusivamente de la nube, lo que abre nuevas posibilidades para la automatización industrial y la cobótica.", "why": "La IA en el borde está haciendo que la robótica sea más accesible y fácil de usar, similar a la revolución que supuso Windows para los PCs.", "importance": 4, "relevance": 5, "tags": ["Edge AI", "Robótica", "Automatización"], "image": "https://www.therobotreport.com/wp-content/uploads/2026/06/software_layer_diagram.png", "published": "2026-06-13T12:30:52+00:00", "sources": [{"name": "The Robot Report", "url": "https://www.therobotreport.com/computers-software-windows-utility-robots/", "type": "blog"}]}, {"id": "a713d0f4ad", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Modelos de Lenguaje Visual Entrenan a Robots para Leer Emociones Humanas", "summary": "Investigadores han desarrollado una nueva técnica para entrenar robots colaborativos en la lectura de emociones humanas, yendo más allá de las expresiones faciales para incluir factores contextuales en las interacciones. El estudio, publicado en IEEE Robotics and Automation Letters, evaluó cómo la capacidad de un robot para percibir y reaccionar a las emociones humanas afecta la percepción humana de sus capacidades.\n\nLos experimentos, realizados con 40 voluntarios, demostraron que si bien las capacidades emocionales de los robots tienen un límite en la percepción humana, la interacción y la adaptación del comportamiento robótico son cruciales para una colaboración exitosa. El investigador principal, Seung Chan Hong, enfatiza la necesidad de innovar no solo en las capacidades físicas de los robots, sino también en su interacción con las personas.\n\nEste avance es relevante para la creciente implementación de robots en entornos de trabajo colaborativo (cobótica), donde la comprensión y respuesta a las señales emocionales humanas puede mejorar significativamente la eficiencia y la aceptación de la automatización en la Industria 5.0.", "why": "El desarrollo de robots capaces de interpretar emociones humanas es un paso clave hacia una colaboración más fluida y efectiva en entornos industriales y de servicio.", "importance": 3, "relevance": 5, "tags": ["Cobótica", "IA Emocional", "Industria 5.0", "Robótica"], "image": "https://spectrum.ieee.org/media-library/illustration-of-a-shoulders-up-human-silhouette-with-facial-attributes-vaguely-outlined-by-recognition-points.jpg?id=66888123&width=980", "published": "2026-06-13T13:00:01+00:00", "sources": [{"name": "IEEE Spectrum (IA)", "url": "https://spectrum.ieee.org/robot-emotions-visual-language-models", "type": "blog"}]}, {"id": "bf2bc70a3d", "category": "geo", "topic": "geo", "subtopic": "EE. UU.", "cruce": false, "title": "Acuerdo de paz entre EE.UU. e Irán inminente; Trump participará en cumbre del G7 con Zelenskyy", "summary": "Fuentes diversas, incluyendo el Primer Ministro de Pakistán y medios como Financial Times y Politico Europe, sugieren que un acuerdo de paz entre Estados Unidos e Irán está cerca de ser firmado, posiblemente este domingo. El expresidente estadounidense Donald Trump habría jugado un papel clave en estas negociaciones, con reportes que indican que el texto del acuerdo ya ha sido acordado. Paralelamente, se confirma la participación de Trump en una sesión de trabajo del G7 en Francia junto al presidente ucraniano Volodímir Zelenskyy, abordando el apoyo a Ucrania y las condiciones para negociaciones con Rusia.\n\nLa posible distensión entre EE.UU. e Irán, que podría implicar la reapertura del Estrecho de Ormuz, se produce en un momento de alta tensión geopolítica. La participación de Trump en la cumbre del G7, donde se discutirá la guerra en Ucrania y la asistencia europea ante la reducción de donaciones militares de EE.UU., añade otra capa de complejidad a la agenda internacional. La inclusión de un alto el fuego en Líbano como parte del acuerdo con Irán ha sido mencionada por líderes canadienses, y aliados republicanos de Trump han establecido un plazo para el fin de la guerra en Ucrania.\n\nLa convergencia de estas noticias sobre Irán y Ucrania en la agenda del G7 es significativa. La participación de Trump en un evento centrado en la seguridad europea y el conflicto ucraniano, mientras se negocia un acuerdo con Irán, podría redefinir las alianzas y las prioridades geopolíticas. Será crucial observar cómo se desarrollan estas negociaciones y qué impacto tienen en la estabilidad regional y global, así como en la política energética y de transporte marítimo.", "why": "Se vislumbra una potencial distensión entre EE.UU. e Irán y una reconfiguración de la diplomacia internacional con la participación de Trump en la cumbre del G7, abordando simultáneamente el conflicto ucraniano.", "importance": 5, "relevance": 4, "tags": ["EE.UU.-Irán", "G7", "Ucrania", "diplomacia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F4907d370-2c34-4f44-8a58-72135b4211c6.jpg?source=next-barrier-page", "published": "2026-06-13T19:31:47+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/726f4afe-c3ff-4ec0-bfc9-b572b419e11f", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/13/trump-says-agreement-to-end-monthslong-war-with-iran-will-be-signed-sunday-00961472?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/canadas-carney-sees-timely-role-for-g7-in-any-iran-deal/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/trump-to-participate-in-g7-working-session-with-zelenskyy-official/", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/13/trump-to-attend-dinner-at-versailles-post-g7-00961395?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/12/iran-war-trump-midterms-labor-day-00960925?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/b91fc27b-8e50-48c1-b9e6-0c93aea19b76", "type": "blog"}]}, {"id": "6f7fe204ef", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "Japón explorará la minería de tierras raras en Groenlandia para reducir su dependencia de China", "summary": "El gobierno japonés planea iniciar estudios sobre la posibilidad de extraer tierras raras y otros minerales críticos en Groenlandia a partir de este verano. El objetivo es facilitar la inversión de empresas japonesas en proyectos de tierras raras en el territorio danés.\n\nEsta iniciativa se enmarca en la estrategia de Japón por diversificar sus fuentes de suministro de minerales esenciales, reduciendo así la dependencia de China, que actualmente domina el mercado global de tierras raras. La exploración se centrará en yacimientos ubicados en Groenlandia.\n\nLa noticia es relevante para la geopolítica de los recursos naturales y la seguridad de las cadenas de suministro, especialmente en un contexto de crecientes tensiones comerciales y tecnológicas.", "why": "Japón busca activamente asegurar el suministro de minerales críticos fuera de China, diversificando sus fuentes para fortalecer su resiliencia industrial.", "importance": 4, "relevance": 4, "tags": ["tierras raras", "Groenlandia", "cadena de suministro"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F3%2F2%2F6%2F0%2F12610623-2-eng-GB%2Fc9cf9a4641c0-photo_SXM2026060800000757.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T19:51:05.308136+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/politics/international-relations/japan-to-explore-rare-earth-mining-in-greenland-to-cut-china-reliance", "type": "blog"}]}, {"id": "407a9620dc", "category": "ia", "topic": "ia", "subtopic": "Regulación", "cruce": false, "title": "Investigan a OpenAI por posibles infracciones de datos y prácticas de privacidad", "summary": "Una coalición de fiscales generales de varios estados de EE. UU. ha iniciado una investigación sobre OpenAI, la empresa detrás de ChatGPT. Según informes, la compañía recibió una citación del fiscal general de Nueva York solicitando documentos sobre diversos aspectos de sus operaciones, incluyendo publicidad, retención de usuarios, manejo de datos de consumidores y de salud, y el tratamiento de menores y personas mayores.\n\nOpenAI ha declarado que está cooperando con la investigación y que se toma \"muy en serio\" las preocupaciones planteadas. Un portavoz de la compañía mencionó que ChatGPT ahora incluye salvaguardas más protectoras para menores y personas en situaciones difíciles, dirigiéndolas a recursos reales y contactos humanos de confianza. Sin embargo, la empresa no ha especificado los estados involucrados ni los detalles exactos de la información solicitada.\n\nEsta investigación se produce en un momento en que la IA generativa está bajo un escrutinio creciente por parte de reguladores y legisladores a nivel mundial. Las preocupaciones giran en torno a la privacidad de los datos, la seguridad, el potencial de desinformación y el impacto en el empleo. Los resultados de esta investigación podrían sentar un precedente importante para la regulación futura de las empresas de IA.", "why": "Las investigaciones sobre la privacidad y el manejo de datos de OpenAI por parte de fiscales generales estatales podrían tener implicaciones significativas para la regulación de la IA en EE. UU.", "importance": 4, "relevance": 4, "tags": ["OpenAI", "Privacidad", "Regulación", "Investigación"], "image": "https://techcrunch.com/wp-content/uploads/2026/05/openai-logo-code-background.jpg?resize=1200,798", "published": "2026-06-13T16:47:18+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/13/openai-faces-investigation-from-state-attorneys-general/", "type": "blog"}]}, {"id": "d2ba0669e3", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Apple introduce nuevas herramientas de edición de fotos con IA en iOS 27", "summary": "Apple ha lanzado nuevas funciones de edición de fotos impulsadas por inteligencia artificial en la beta para desarrolladores de iOS 27. Las herramientas incluyen \"Clean Up\", una versión mejorada para eliminar elementos no deseados de las fotos, \"Extend\", que amplía los bordes de la imagen rellenando el espacio con IA, y \"Spatial Reframing\", que permite recomponer fotos existentes simulando el movimiento de la cámara.\n\nAunque estas funciones son consideradas \"tmidas\" en comparación con las ofertas de otros competidores como Google Pixel, representan un avance significativo para la aplicación nativa de Fotos en iPhone. La herramienta \"Clean Up\" ha recibido una mejora notable, pasando de ser prácticamente inútil a ser funcional.\n\nEstas novedades, que estarán disponibles para el público general con el lanzamiento oficial de iOS 27, podrían cambiar la forma en que los usuarios interactúan y editan sus recuerdos fotográficos en el iPhone, marcando un punto de inflexión en las capacidades de edición nativa.", "why": "Apple integra herramientas de edición de fotos con IA en iOS 27, mejorando las capacidades nativas de la aplicación Fotos.", "importance": 3, "relevance": 4, "tags": ["Apple", "iOS 27", "Edición de fotos", "IA"], "image": "https://platform.theverge.com/wp-content/uploads/sites/2/2026/06/DSC03778_processed.jpg?quality=90&strip=all&crop=0%2C10.723165084465%2C100%2C78.55366983107&w=1200", "published": "2026-06-13T12:00:00+00:00", "sources": [{"name": "The Verge (IA)", "url": "https://www.theverge.com/tech/949360/apple-ai-photo-edit-reframe-extend-clean-up-hands-on", "type": "blog"}]}, {"id": "4f90275a71", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Dilemas estratégicos detrás de la crisis del gasto en defensa del Reino Unido", "summary": "El Reino Unido se enfrenta a serios dilemas estratégicos en relación con su gasto en defensa, una situación que ha generado preocupación y debate sobre la capacidad del país para mantener su postura de seguridad.\n\nLa gestión del presupuesto de defensa ha sido un desafío constante, exacerbado por las cambiantes prioridades geopolíticas y las presiones económicas internas. La necesidad de modernizar las fuerzas armadas y responder a amenazas emergentes choca con las limitaciones fiscales.\n\nLa forma en que el gobierno aborde estos dilemas será crucial para el futuro de la capacidad de defensa británica y su papel en la escena internacional, especialmente en el contexto de la seguridad europea.", "why": "La política de defensa y el gasto asociado son fundamentales para la seguridad nacional y la influencia geopolítica de un país.", "importance": 4, "relevance": 3, "tags": ["defensa", "Reino Unido", "estrategia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F638e0aa8-892b-42f8-a476-474c19f017cd.jpg?source=next-barrier-page", "published": "2026-06-12T17:50:34+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/c5af5ea9-b40f-4d4d-b428-4693a8eb1906", "type": "blog"}]}, {"id": "2be4f87ace", "category": "cruce", "topic": "geo", "subtopic": "Empresas", "cruce": true, "title": "La OPV de SpaceX, un reflejo del dominio de Musk", "summary": "La potencial Oferta Pública de Venta (OPV) de SpaceX se perfila como una demostración del considerable poder e influencia de Elon Musk en la industria aeroespacial y tecnológica.\n\nSpaceX ha revolucionado el sector espacial con sus innovaciones y su capacidad para reducir costes, lo que ha llevado a especulaciones sobre su valoración y el impacto de una salida a bolsa. La empresa ha logrado hitos significativos en la exploración espacial y el transporte de carga y personal.\n\nUna OPV de SpaceX podría tener implicaciones importantes para el mercado de valores y el futuro de la exploración espacial comercial, además de consolidar aún más la posición de Musk como figura clave en la tecnología.", "why": "Las empresas tecnológicas con ambiciones espaciales y un fuerte liderazgo pueden redefinir industrias enteras y mercados financieros.", "importance": 4, "relevance": 3, "tags": ["SpaceX", "Elon Musk", "espacio", "OPV"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F19484ecc-016e-4052-bc44-1382cd813dbb.jpg?source=next-barrier-page", "published": "2026-06-12T17:40:55+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/71372647-bf7f-448a-bb4c-a2d278020e33", "type": "blog"}]}, {"id": "a17ab5f380", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Japón e Italia impulsarán una regulación espacial más estricta", "summary": "Japón e Italia acordarán profundizar su cooperación en el ámbito espacial, comprometiéndose a colaborar en el desarrollo de normativas más robustas para abordar amenazas como los ataques a satélites. El acuerdo se formalizará durante la reunión entre los Primeros Ministros Sanae Takaichi y Giorgia Meloni en Roma.\n\nAmbos líderes también discutirán el apoyo a las industrias espaciales de sus respectivos países. La iniciativa busca establecer un marco regulatorio internacional más fuerte para garantizar la seguridad y sostenibilidad de las actividades espaciales.\n\nEste pacto subraya la creciente importancia de la regulación internacional en el espacio, un dominio cada vez más estratégico y con potencial de conflicto.", "why": "Dos potencias industriales buscan fortalecer la gobernanza del espacio ultraterrestre ante las crecientes amenazas a la infraestructura satelital.", "importance": 3, "relevance": 3, "tags": ["espacio", "regulación", "Japón", "Italia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F5%2F1%2F1%2F12611155-2-eng-GB%2F11674d6389f7-38829ad3-acb4-471e-9d83-b65933a79f13.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T19:51:04.862451+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/politics/international-relations/japan-and-italy-to-issue-joint-pledge-for-stronger-space-regulation", "type": "blog"}]}, {"id": "9b106dc66a", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Desarrollo de aplicaciones con IA generativa: un proyecto personal para el cuidado del jardín", "summary": "El autor relata su experiencia utilizando Gemini, un modelo de IA generativa, para crear una aplicación destinada a gestionar el cuidado de su jardín. A través de un \"vibe-coding\" o codificación por intuición, proporcionó instrucciones a la IA para generar el código de una aplicación funcional, aunque se encontró con un error que requirió una intervención manual para ser corregido.\n\nEl proceso, descrito como \"emocionante\" a pesar de la complejidad técnica subyacente, demuestra el potencial de las herramientas de IA para democratizar el desarrollo de software y permitir a usuarios sin experiencia profunda en programación crear soluciones personalizadas. La aplicación busca ayudar a organizar las tareas de jardinería, que se habían vuelto un desafío tras ignorar el mantenimiento durante años.\n\nEsta experiencia ilustra la evolución de las herramientas de IA hacia la asistencia en tareas complejas, como el desarrollo de software, y su aplicación práctica en la vida cotidiana. Si bien la IA puede generar código, la supervisión humana y la resolución de problemas siguen siendo aspectos importantes del proceso.", "why": "La capacidad de la IA generativa para facilitar la creación de aplicaciones personalizadas, incluso para tareas complejas como la gestión de jardines, democratiza el desarrollo de software.", "importance": 2, "relevance": 3, "tags": ["IA Generativa", "Desarrollo de Software", "Gemini", "Automatización"], "image": "https://platform.theverge.com/wp-content/uploads/sites/2/2026/06/268530_SUMMER_UPGRADE_WEEK_VIBECODING_BACKYARD_ADemidova.jpg?quality=90&strip=all&crop=0%2C10.732984293194%2C100%2C78.534031413613&w=1200", "published": "2026-06-13T13:00:00+00:00", "sources": [{"name": "The Verge (IA)", "url": "https://www.theverge.com/ai-artificial-intelligence/942119/vibecoding-backyard-app-gardening-organizing", "type": "blog"}]}, {"id": "a950cfe6d4", "category": "geo", "topic": "geo", "subtopic": "EE. UU.", "cruce": false, "title": "Análisis de la nueva presidencia de la Fed", "summary": "Se espera que la primera reunión de política monetaria bajo la dirección del nuevo presidente de la Reserva Federal (Fed), Kevin Warsh, ofrezca pistas sobre la futura dirección de la política económica en Estados Unidos.\n\nLa designación de Warsh al frente de la Fed se produce en un momento clave para la economía estadounidense, con debates sobre la inflación, el crecimiento y la estabilidad financiera. Su enfoque y decisiones serán observados de cerca por los mercados y los analistas.\n\nLas políticas que implemente la Fed bajo su liderazgo tendrán repercusiones no solo en EE. UU. sino también a nivel global, afectando las tasas de interés, el valor de las divisas y los flujos de capital internacionales.", "why": "Las decisiones de política monetaria de la Reserva Federal de EE. UU. tienen un impacto global significativo en la economía y los mercados financieros.", "importance": 4, "relevance": 2, "tags": ["Fed", "política monetaria", "economía"], "image": "", "published": "2026-06-12T17:20:22+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/1e26e057-f4cc-4902-aabd-2f0b94bae1f6", "type": "blog"}]}, {"id": "1baaa3b390", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Warburg Pincus busca adquirir J.S.B., líder japonés en residencias estudiantiles, por 1.250 millones de dólares", "summary": "La firma de inversión estadounidense Warburg Pincus lanzará una oferta pública de adquisición para comprar J.S.B., un proveedor japonés de viviendas para estudiantes, por un valor estimado de 200.000 millones de yenes (1.250 millones de dólares). La operación, anunciada el viernes, responde a la creciente demanda de alojamiento para estudiantes internacionales en Japón.\n\nJ.S.B. es el líder del sector en Japón, gestionando aproximadamente 100.000 unidades de alquiler en todo el país. La inversión de Warburg Pincus se alinea con las tendencias del mercado que anticipan un aumento en la necesidad de este tipo de infraestructuras.\n\nEsta adquisición podría tener implicaciones en el mercado inmobiliario estudiantil japonés y en la estrategia de inversión de fondos internacionales en activos educativos y de vivienda.", "why": "Una importante firma de inversión estadounidense apuesta por el mercado de residencias estudiantiles en Japón, indicando confianza en el crecimiento del sector.", "importance": 3, "relevance": 2, "tags": ["inversión", "Japón", "vivienda estudiantil"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F0%2F9%2F9%2F12609905-1-eng-GB%2Fbcb08cae5ebd-photo_SXM2026061200010854.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T19:51:05.401569+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/business-deals/warburg-pincus-to-launch-1.2bn-tender-offer-for-japan-dorm-operator-j.s.b", "type": "blog"}, {"name": "CSIS (YT)", "url": "https://www.youtube.com/shorts/vxzSb-STtlI", "type": "youtube"}]}, {"id": "26d52a9c11", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Suecia intercepta aeronaves militares rusas en dos incidentes separados", "summary": "La Fuerza Aérea de Suecia informó haber desplegado cazas JAS 39 Gripen para interceptar aeronaves militares rusas en dos incidentes distintos ocurridos el viernes en la región del Mar Báltico. Los aviones rusos, identificados como Su-24 y Su-34, se aproximaron a las fronteras suecas pero no llegaron a penetrar el espacio aéreo del país.\n\nLa vicealmirante Ewa Skoog Haslum, jefa del Mando de Operaciones de las Fuerzas Armadas suecas, calificó las acciones rusas como \"serias\" y un \"comportamiento recurrente que amenaza tanto nuestra integridad territorial como la seguridad\". Subrayó que la rápida respuesta de los cazas suecos y aliados aseguró el territorio de Suecia y de la OTAN.\n\nEstos incidentes subrayan la persistente tensión en la región del Báltico, especialmente tras la reciente adhesión de Suecia a la OTAN. La actividad militar rusa cerca de las fronteras aliadas es un recordatorio de la importancia de la vigilancia y la defensa colectiva en el contexto de la seguridad europea actual.", "why": "La interceptación de aviones rusos por cazas suecos resalta las crecientes tensiones militares y la vigilancia en la región del Báltico tras la entrada de Suecia en la OTAN.", "importance": 3, "relevance": 2, "tag 0-days-procurement-chief-says/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "542c13dd09", "category": "geo", "topic": "geo", "subtopic": "EE. UU.", "cruce": false, "title": "El nombre de Trump es eliminado del Kennedy Center", "summary": "El nombre del expresidente Donald Trump ha sido eliminado del Kennedy Center, marcando el fin de un esfuerzo prolongado por parte del expresidente para ejercer control sobre la institución, uno de los lugares más emblemáticos de Washington D.C.\n\nLa medida simboliza un cambio en la influencia y el legado de la administración Trump en instituciones culturales y políticas clave.\n\nEsta noticia, aunque no directamente relacionada con la IA, refleja cambios en la esfera política y cultural de Estados Unidos.", "why": "Se produce una reconfiguración simbólica en una institución cultural estadounidense clave, eliminando la conexión con la administración Trump.", "importance": 2, "relevance": 1, "tags": ["política", "EE.UU.", "cultura"], "image": "", "published": "2026-06-13T17:07:35+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/13/trumps-name-kennedy-center-00961458?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "a71eef20c0", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Riesgo de sobrecalentamiento en estadios del Mundial por altas temperaturas", "summary": "La ubicación de varios estadios en EE. UU. y México, junto con la celebración del Mundial en pleno verano, expone a jugadores y aficionados a un riesgo significativo de sobrecalentamiento. Las condiciones climáticas extremas plantean serias preocupaciones para la salud y el rendimiento durante el torneo.\n\nLas autoridades deportivas y organizadores se enfrentan al desafío de mitigar estos riesgos, implementando medidas como hidratación intensiva, pausas para el enfriamiento y ajustes en los horarios de los partidos. La gestión de la salud en eventos deportivos de gran magnitud bajo condiciones climáticas adversas es un aspecto crítico a considerar.\n\nEste escenario subraya la creciente interconexión entre eventos globales, el cambio climático y la necesidad de planificar infraestructuras y calendarios que tengan en cuenta las condiciones ambientales extremas, afectando tanto la logística como la seguridad de los participantes.", "why": "Las condiciones climáticas extremas durante el Mundial de fútbol plantean riesgos para la salud de atletas y espectadores, evidenciando el impacto del cambio climático en eventos globales.", "importance": 2, "relevance": 1, "tags": ["Clima", "Deportes", "Riesgos"], "image": "", "published": "2026-06-13T14:29:37+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.com/live-updates/2026/06/13/world-cup-2026/heat-waves-humidity-00961300?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "53d4863823", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "El fútbol eclipsará a la política en el Mundial", "summary": "El próximo Mundial de fútbol se perfila como un evento donde el deporte principal acaparará la atención, dejando en un segundo plano las tensiones políticas y sociales que a menudo rodean a este tipo de competiciones.\n\nHistóricamente, los Mundiales han sido escenarios donde las dinámicas políticas globales se reflejan o incluso se intensifican, pero las circunstancias actuales sugieren un enfoque renovado en el aspecto deportivo.\n\nSerá interesante observar si esta tendencia se mantiene y cómo los eventos deportivos de gran magnitud pueden influir en la percepción pública de los asuntos globales.", "why": "Los grandes eventos deportivos pueden tener un impacto significativo en la percepción pública y las dinámicas sociales, a menudo eclipsando otras noticias.", "importance": 2, "relevance": 1, "tags": ["deporte", "política", "Mundial"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Fec73ba25-1faa-468b-8eba-5e9f12db63f8.jpg?source=next-barrier-page", "published": "2026-06-12T18:03:36+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/80086001-6fe2-4480-8277-4af356b651ea", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

nce": 3, "relevance": 2, "tags": ["política monetaria", "inflación", "economía"], "image": "", "published": "2026-06-08T04:30:01+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/646cb006-c58d-4384-8d9d-b00d3304aaea", "type": "blog"}]}, {"id": "2e8e028118", "topic": "geo", "subtopic": "Europa", "cruce": true, "title": "Aranceles al acero amenazan la construcción de viviendas en el Reino Unido", "summary": "La industria de la construcción del Reino Unido ha advertido que la imposición de aranceles al acero podría retrasar significativamente la construcción de viviendas. El sector argumenta que estos cambios arriesgan causar una 'escasez significativa' de productos clave, afectando la disponibilidad y el coste de los materiales.\n\nLa medida, que busca proteger la industria siderúrgica nacional, podría tener efectos colaterales no deseados en otros sectores dependientes del acero. La construcción, en particular, enfrenta ya desafíos relacionados con la cadena de suministro y los costes de materiales.\n\nEs crucial evaluar el impacto real de estos aranceles en la cadena de suministro de materiales de construcción y en la viabilidad de nuevos proyectos residenciales. La posible escasez y el aumento de precios podrían agravar la crisis de vivienda en el país.", "why": "Las políticas comerciales, como los aranceles al acero, tienen un impacto directo en sectores clave como la construcción y la disponibilidad de vivienda.", "importance": 3, "relevance": 2, "tags": ["economía", "cadena de suministro", "política"], "image": "", "published": "2026-06-08T04:00:14+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/d6f9d15e-2309-4340-bc63-abbdb69f2c1e", "type": "blog"}]}, {"id": "16857e45a9", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Presión en el Reino Unido para reformar el sistema electoral ante un panorama político fragmentado", "summary": "El sistema electoral británico de \"el primero en la meta\" (first-past-the-post) enfrenta una creciente presión para ser reformado. Este impulso se intensifica a medida que el panorama político del país se vuelve cada vez más fragmentado, lo que sugiere una insatisfacción con el sistema actual y un deseo de alternativas.\n\nHistóricamente, el sistema de \"el primero en la meta\" ha sido un pilar del sistema político británico, donde el candidato con más votos en un distrito electoral gana el escaño. Sin embargo, este método ha sido criticado por distorsionar la representación y favorecer a los partidos mayoritarios, lo que lleva a debates recurrentes sobre su idoneidad en un contexto político cambiante.\n\nLa creciente fragmentación política podría ser un catalizador para un cambio significativo. Los votantes y los partidos políticos podrían buscar un sistema que refleje mejor la diversidad de opiniones y garantice una representación más equitativa, lo que hace que la reforma electoral sea un tema a seguir en el futuro político del Reino Unido.", "why": "La posible reforma del sistema electoral británico podría alterar significativamente el panorama político y la representación de los partidos.", "importance": 3, "relevance": 2, "tags": ["Reino Unido", "Reforma electoral", "Política"], "image": "", "published": "2026-06-08T04:00:14+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/abd034c8-596d-4316-9d2b-a212edd90320", "type": "blog"}]}, {"id": "0ba0a75497", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "La CDU alemana busca estrategias para contrarrestar a la AfD en el este del país", "summary": "Ante las inminentes elecciones estatales en Sajonia-Anhalt y Mecklemburgo-Pomerania Occidental, donde la AfD (Alternativa para Alemania) lidera las encuestas con alrededor del 40%, la CDU (Unión Demócrata Cristiana) enfrenta una presión considerable. El líder de la CDU, Friedrich Merz, ha propuesto una fórmula similar a la de Angela Merkel, \"Wir schaffen das\" (Lo lograremos), como una señal de campaña dirigida a las ramas regionales del partido.\n\nEl artículo también menciona la participación del ministro presidente de Sajonia-Anhalt, Sven Schulze, quien discute sus índices de aprobación personal, defiende la gestión de su gobierno y aborda el complejo debate sobre posibles alianzas postelectorales. Además, se hace referencia a las conversaciones del canciller con los interlocutores sociales sobre el mercado laboral, impuestos y reducción de burocracia.\n\nLa estrategia de la CDU para competir con la AfD en los estados del este es crucial para el futuro político del partido y la configuración del panorama político alemán. Las decisiones sobre posibles coaliciones y la respuesta a las demandas sociales y económicas serán determinantes.", "why": "La CDU alemana está adaptando sus estrategias políticas para enfrentar el auge de la AfD en el este del país, lo que podría tener implicaciones para la política nacional.", "importance": 3, "relevance": 2, "tags": ["Alemania", "Elecciones", "Extrema derecha"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2025/12/15/Berlin-Playbook-Website-card-1-1-1.jpg", "published": "2026-06-08T03:51:25+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/podcast/berlin-playbook-podcast/der-verwegene-plan-der-cdu-im-osten/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "77cb8932a8", "topic": "geo", "subtopic": "Europa", "cruce": true, "title": "Autoridades húngaras piden procesar a altos funcionarios por presunto desfalco", "summary": "El jefe de la Autoridad de Integridad de Hungría ha solicitado el procesamiento de altos funcionarios del círculo cercano del Primer Ministro Viktor Orbán, alegando que supervisaron un esquema para defraudar sistemáticamente los fondos públicos. La acusación sugiere una corrupción a gran escala dentro de la administración húngara.\n\nEsta solicitud se produce en un contexto de creciente escrutinio sobre la gobernanza y las prácticas anticorrupción en Hungría, especialmente en relación con los fondos de la Unión Europea. Las autoridades de la UE han expresado en repetidas ocasiones su preocupación por el estado de derecho y la lucha contra la corrupción en el país.\n\nEl caso podría tener implicaciones significativas para la credibilidad del gobierno húngaro y sus relaciones con la Unión Europea, además de plantear interrogantes sobre la transparencia en la gestión de los recursos públicos.", "why": "La acusación de corrupción contra el círculo cercano de Orbán por parte de un organismo húngaro pone de relieve tensiones internas y posibles repercusiones en la relación de Hungría con la UE.", "importance": 3, "relevance": 2, "tags": ["Hungría", "corrupción", "UE", "política"], "image": "", "published": "2026-06-08T02:00:00+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/hungary-watchdog-urges-probe-viktor-orban-officials-over-missing-eu-funds/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "dafb220c59", "topic": "geo", "subtopic": "Europa", "cruce": true, "title": "Partido del Primer Ministro de Kosovo se perfila ganador en elecciones anticipadas", "summary": "El partido del Primer Ministro de Kosovo, Albin Kurti, se encamina a obtener la victoria en las elecciones, aunque probablemente necesitará formar una coalición para gobernar. Esta elección se produce tras un año de inestabilidad política que ha afectado la candidatura de Kosovo para unirse a la Unión Europea.\n\nLa posible victoria de Kurti se da en un contexto de desafíos internos y externos para Kosovo, incluyendo las relaciones con Serbia y la necesidad de avanzar en las reformas para la integración europea. La formación de un gobierno estable será crucial para abordar estas cuestiones.\n\nLa consolidación política en Kosovo es vista como un factor clave para desbloquear su proceso de adhesión a la UE y para garantizar la estabilidad en la región de los Balcanes Occidentales.", "why": "La probable victoria del partido de Albin Kurti en Kosovo es un hito político que podría influir en la estabilidad regional y en el proceso de adhesión a la UE.", "importance": 3, "relevance": 2, "tags": ["Kosovo", "elecciones", "UE", "política"], "image": "", "published": "2026-06-07T20:52:16+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/kosovo-albin-kurti-party-election-win/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "2841862022", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "South Korean stock volatility increases concerns about leveraged investing", "summary": "", "why": "", "importance": 2, "relevance": 2, "tags": [], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F0%2F5%2F4%2F8%2F12588450-1-eng-GB%2F23b83265213b-g.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-08T09:35:29.140221+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/markets/trading-asia/south-korean-stock-volatility-increases-concerns-about-leveraged-investing", "type": "blog"}, {"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/markets/south-korean-stocks-end-8-lower-as-us-rate-fears-hit-high-flying-asia", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/2f0f727b-5315-445c-b8f1-6aa65bd7474c", "type": "blog"}]}, {"id": "d7f03398ed", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Taxis impulsados por VinFast debutan en India, marcando la expansión de la firma vietnamita más allá de la ASEAN", "summary": "Un operador de taxis vietnamita, utilizando vehículos eléctricos del fabricante VinFast, ha iniciado operaciones en India, marcando la primera incursión de la empresa fuera del Sudeste Asiático. Esta expansión representa un paso significativo para VinFast en uno de los mercados de vehículos eléctricos más grandes y de más rápido crecimiento del mundo.\n\nGreen SM, una empresa respaldada por Vingroup (la matriz de VinFast), ha lanzado sus servicios de taxi en India, compitiendo con plataformas establecidas como Uber y Ola. La entrada de VinFast en el mercado indio se produce en un momento en que la compañía busca diversificar sus mercados y fortalecer su posición financiera.\n\nLa expansión de VinFast en India podría tener implicaciones para la industria automotriz local y para otros fabricantes de vehículos eléctricos que buscan acceder a este mercado. El éxito de la empresa dependerá de su capacidad para adaptarse a las condiciones del mercado indio y competir en precio y calidad.", "why": "La expansión de VinFast en India demuestra la creciente competencia global en el sector de vehículos eléctricos y la importancia de los mercados emergentes.", "importance": 2, "relevance": 2, "tags": ["vehículos eléctricos", "India", "Asia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F6%2F7%2F6%2F12586766-2-eng-GB%2F34e81d5afb62-PHOTO-04.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-08T09:35:28.911232+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/automobiles/electric-vehicles/vinfast-powered-taxis-enter-india-in-vietnamese-firm-s-debut-beyond-asean", "type": "blog"}, {"name": "Asia Times", "url": "https://asiatimes.com/2026/06/xis-north-korea-visit-puts-a-trump-kim-summit-back-in-play/", "type": "blog"}]}, {"id": "1b8f2496fe", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "AXA lanza una nueva plataforma de gestión de patrimonio dirigida a los más ricos de Asia", "summary": "El grupo asegurador francés AXA ha lanzado una nueva plataforma de servicios financieros privados en Asia, con el objetivo de captar clientes de alto patrimonio en una región con una riqueza creciente. La plataforma ofrecerá soluciones de protección y gestión de activos, incluyendo cobertura para propiedades de lujo, colecciones de arte y riesgos como secuestros y extorsiones.\n\nEsta iniciativa responde al rápido crecimiento del mercado de grandes patrimonios en Asia, impulsado por el auge económico y la acumulación de riqueza en países como China, India y el Sudeste Asiático. AXA busca posicionarse como un proveedor clave de servicios financieros personalizados para este segmento de la población.\n\nEl lanzamiento de la plataforma por parte de AXA subraya la importancia estratégica del mercado asiático para las empresas de servicios financieros globales. La competencia en este sector se intensificará a medida que más firmas busquen atender las necesidades de los individuos más adinerados de la región.", "why": "La expansión de AXA en Asia refleja el crecimiento de la riqueza en la región y la creciente demanda de servicios financieros especializados.", "importance": 2, "relevance": 2, "tags": ["finanzas", "Asia", "mercado de alto patrimonio"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F2%2F8%2F7%2F8%2F12588782-1-eng-GB%2F992f24399908-2023-02-26T132924Z_3185134_RC2EIZ9VM6D2_RTRMADP_3_GLOBAL-COMPANY-AXA.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-08T09:35:28.683023+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/markets/wealth-management/axa-launches-new-wealth-platform-targeting-asia-s-rich", "type": "blog"}]}, {"id": "59f58f9162", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Roundup #83: I told you so!", "summary": "Roundup #83: I told you so!\nPiketty gets wacky; Tokenmaxxing fails; Trump, drones, and Ukraine; Tariffs on China, again; India's growth; Borjas again\nHowdy, folks! Today’s roundup is mostly a bunch of follow-ups to posts I wrote before. It’s very hard to decide when to post about a particular topic, and it often happens that some relevant news story or piece of data comes out a little bit later. T", "why": "", "importance": 2, "relevance": 2, "tags": [], "image": "https://substackcdn.com/image/fetch/$s_!ltQ3!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F57ee2c9c-5a0f-48ad-b3b0-862053f1a953_960x640.jpeg", "published": "2026-06-08T07:42:08+00:00", "sources": [{"name": "Noahpinion", "url": "https://www.noahpinion.blog/p/roundup-83-i-told-you-so", "type": "newsletter"}]}, {"id": "cdc0749a91", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Terremoto de magnitud 7.8 sacude el sur de Filipinas: al menos 19 muertos y 12 desaparecidos", "summary": "Un potente terremoto de magnitud 7.8 ha golpeado la costa sur de la isla de Mindanao, en Filipinas, dejando un saldo provisional de al menos 19 fallecidos y 12 personas desaparecidas. El sismo, que ocurrió a las 7:37 a.m. hora local, también causó 134 heridos y provocó el colapso de numerosos edificios, incluyendo escuelas y oficinas.\n\nEl epicentro se localizó a 15 kilómetros de la ciudad de General Santos, una de las zonas más afectadas junto con la provincia de Sarangani. Las agencias geofísicas de Filipinas e Indonesia emitieron alertas de tsunami, con reportes de olas de hasta 1.4 metros. Se registraron varias réplicas de magnitud superior a 6.\n\nLas autoridades continúan verificando los informes de víctimas, y se espera que la cifra pueda aumentar. Las alertas de tsunami fueron levantadas por la tarde y el aeropuerto de General Santos reanudó sus operaciones.", "why": "Los desastres naturales de gran magnitud tienen un impacto devastador en las infraestructuras y la vida de las poblaciones afectadas, requiriendo respuestas de emergencia y reconstrucción a gran escala.", "importance": 3, "relevance": 1, "tags": ["Filipinas", "Terremoto", "Desastres Naturales", "Tsunami"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F1%2F3%2F7%2F8%2F12588731-1-eng-GB%2F2d90c52f87e7-2026-06-08T034616Z_132573859_RC2FPLABNIMP_RTRMADP_3_PHILIPPINES-QUAKE.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-08T09:35:27.939845+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/economy/natural-disasters/19-dead-12-missing-after-7.8-magnitude-quake-hits-southern-philippines", "type": "blog"}]}, {"id": "1a22d1e8db", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Intesa Sanpaolo lanza oferta de 30.600 millones de euros por rival italiano", "summary": "El banco italiano Intesa Sanpaolo ha presentado una oferta no solicitada de 30.600 millones de euros para adquirir su rival Monte dei Paschi di Siena (MPS). La operación, si se materializa, podría generar importantes ahorros de costes y reconfigurar el panorama bancario italiano.\n\nMonte dei Paschi di Siena, uno de los bancos más antiguos del mundo, ha enfrentado dificultades financieras y ha requerido rescates estatales en el pasado. La oferta de Intesa Sanpaolo representa un movimiento estratégico para consolidar el sector bancario en Italia, un mercado fragmentado y con necesidad de eficiencias.\n\nLa posible fusión está sujeta a la aprobación regulatoria y a la aceptación de los accionistas de MPS. El éxito de esta operación podría sentar un precedente para futuras consolidaciones en el sector financiero europeo.", "why": "Una oferta de adquisición millonaria en el sector bancario italiano podría tener repercusiones en la estabilidad financiera y la competencia en Europa.", "importance": 3, "relevance": 1, "tags": ["Banca", "Italia", "Fusiones"], "image": "", "published": "2026-06-08T05:59:26+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/64cdd219-a131-46a0-946b-36922bbf4767", "type": "blog"}]}, {"id": "b4e3af7ee2", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Perú: Elecciones presidenciales en un empate técnico entre rivales", "summary": "Los candidatos presidenciales de Perú se encuentran en una carrera voto a voto tras la segunda vuelta electoral, con resultados demasiado ajustados para declarar un ganador definitivo. La hija de un exlíder de derecha se enfrenta a un legislador de izquierda en una contienda que definirá el futuro político del país.\n\nLa polarización política en Perú ha sido una constante en los últimos años, marcada por la inestabilidad gubernamental y profundas divisiones sociales. Esta elección representa un punto crucial para la dirección que tomará el país sudamericano.\n\nLos mercados y analistas observan de cerca el desenlace, ya que la elección podría tener implicaciones significativas para la política económica y las relaciones internacionales de Perú.", "why": "La incertidumbre política en Perú, uno de los mayores productores de cobre, genera preocupación por la estabilidad económica y las cadenas de suministro de materias primas.", "importance": 3, "relevance": 1, "tags": ["Perú", "Política", "Elecciones"], "image": "", "published": "2026-06-08T05:31:29+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/46362ad0-4aa4-4397-b8e0-b5dc42dcf65b", "type": "blog"}]}, {"id": "eae9ce7b1d", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Ebola y yihadismo amenazan el Parque Nacional Virunga en África", "summary": "El Parque Nacional Virunga, el más antiguo de África, se enfrenta a una doble amenaza: la propagación del ébola y las acciones de militantes yihadistas afiliados a Isis. Los guardaparques del parque están en la primera línea de defensa contra ambos peligros.\n\nVirunga es un ecosistema de vital importancia y hogar de gorilas de montaña en peligro de extinción. La inestabilidad en la región, agravada por conflictos armados y brotes de enfermedades, pone en riesgo tanto la biodiversidad como la seguridad de las comunidades locales y el personal del parque.\n\nLa situación en Virunga subraya la compleja interconexión entre la seguridad, la salud pública y la conservación en zonas de conflicto. La protección de este parque es esencial no solo para la fauna, sino también para la estabilidad regional y la lucha contra el terrorismo.", "why": "La seguridad y la conservación en áreas de conflicto como el Parque Nacional Virunga son cruciales para la biodiversidad y la estabilidad regional.", "importance": 3, "relevance": 1, "tags": ["geopolítica", "sostenibilidad", "conflicto"], "image": "", "published": "2026-06-08T04:00:14+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/1560124d-d3fa-4184-873b-c609dae8f00e", "type": "blog"}]}, {"id": "97b7868957", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Hg-backed Gen II busca una venta valorada en 6.000 millones de dólares", "summary": "El grupo Gen II, respaldado por Hg, está en conversaciones preliminares para iniciar un proceso de venta que podría valorarse en aproximadamente 6.000 millones de dólares. La compañía, con sede en Nueva York, está explorando opciones estratégicas que podrían culminar en su adquisición por parte de otra entidad.\n\nHg es una firma de capital privado conocida por invertir en empresas de software y servicios. La posible venta de Gen II se produce en un momento en que el mercado de fusiones y adquisiciones sigue activo, especialmente en el sector tecnológico y de servicios empresariales.\n\nEl resultado de estas conversaciones y la eventual valoración de la empresa serán indicadores importantes de la salud del mercado de capital privado y del apetito por activos en el sector de servicios empresariales.", "why": "La posible venta de Gen II podría indicar tendencias en el mercado de capital privado y fusiones y adquisiciones en el sector de servicios.", "importance": 3, "relevance": 1, "tags": ["Capital privado", "Fusiones y adquisiciones", "Servicios empresariales"], "image": "", "published": "2026-06-08T04:00:13+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/8e88675d-919b-4f72-9da9-7a9640957784", "type": "blog"}]}, {"id": "31a07d5253", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Japón aprueba presupuesto suplementario de 3.11 billones de yenes", "summary": "La Cámara de Consejeros de Japón ha aprobado el presupuesto suplementario del gobierno de Takaichi por un valor de 3.11 billones de yenes (aproximadamente 20 mil millones de dólares). La aprobación contó con el apoyo del Partido Democrático Popular (DPFP), Team Mirai y el Partido Conservador de Japón (CPJ), además del Partido Liberal Democrático (LDP) y Ishin no Kai.\n\nEl presupuesto fue aprobado con una \"extraordinaria celeridad\", según se informa, lo que sugiere una urgencia o consenso político significativo en torno a las medidas fiscales propuestas. Los detalles específicos sobre el destino de estos fondos no se detallan en la fuente, pero suelen estar orientados a responder a necesidades económicas o sociales apremiantes.\n\nLa rápida aprobación de un presupuesto de esta magnitud indica una acción decisiva por parte del gobierno japonés para abordar prioridades económicas o de seguridad, aunque el impacto específico de estas medidas requerirá un seguimiento posterior.", "why": "La aprobación rápida de un presupuesto suplementario significativo en Japón señala una priorización económica o de seguridad por parte del gobierno, con posibles implicaciones para la estabilidad financiera y el crecimiento.", "importance": 3, "relevance": 1, "tags": ["Japón", "presupuesto", "economía", "política"], "image": "", "published": "2026-06-07T14:57:30+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/the-week-in-japan-takaichi-gets-her-supplemental-budget/", "type": "blog"}]}, {"id": "209beef367", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Blackstone busca vender participaciones en fondos de inversión privada por 2.000 millones de dólares", "summary": "Blackstone, la firma de inversión, planea vender participaciones valoradas en aproximadamente 2.000 millones de dólares en sus fondos de inversión privada. Esta operación se enmarca en la estrategia de la compañía de gestionar su cartera y optimizar sus activos.\n\nLa venta de participaciones en fondos de inversión privada es una práctica común en el sector financiero, permitiendo a las gestoras como Blackstone ofrecer liquidez a sus inversores y reequilibrar sus propias carteras. Estos fondos suelen invertir en empresas no cotizadas, con horizontes de inversión a largo plazo.\n\nSerá importante observar cómo se desarrolla esta venta y qué tipo de inversores adquieren estas participaciones, ya que podría indicar tendencias en la demanda de activos alternativos y la liquidez del mercado secundario para este tipo de inversiones.", "why": "Las grandes desinversiones de fondos de capital privado pueden ser un indicador de la salud del mercado y de las estrategias de gestión de activos.", "importance": 2, "relevance": 1, "tags": ["inversión privada", "Blackstone", "gestión de activos"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F2419a290-1b37-40b3-9d7a-61bb9e750742.jpg?source=next-barrier-page", "published": "2026-06-08T09:00:03+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/98ccabf5-229f-4a47-b125-7c4538a6ee3f", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// ¿la historia pertenece a la pestaña actual? (las de cruce salen en ambas)
function inTab(s){ return s.topic===state.tab || (s.cruce && (state.tab==="ia"||state.tab==="geo")); }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0;
  (DIGEST.stories||[]).forEach(s=>{ if(s.topic==='ia'||s.cruce)ia++; if(s.topic==='geo'||s.cruce)geo++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

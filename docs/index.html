mary": "China ha establecido un objetivo audaz de penetración del 90% para terminales de nueva generación y agentes de IA para 2030, con un 70% previsto para 2027. El país considera la IA como la próxima tecnología de propósito general, comparable a la electricidad, y busca dominarla en sectores clave como ciencia, industria, consumo, bienestar público, gobernanza y cooperación global.\n\nEl gobierno chino ha enmarcado la IA como un motor de crecimiento fundamental para su economía, con la visión de una \"economía y sociedad inteligentes\" para 2035. A diferencia de otros países que se centran en subsidios, Beijing está dispuesto a legislar activamente para fomentar la adopción de la IA, señalando su compromiso político y estratégico con esta tecnología.\n\nEsta estrategia contrasta con el ritmo más pausado de Europa en la implementación de políticas de IA, mientras que países como Corea del Sur avanzan con marcos regulatorios específicos. La rápida progresión de Asia en la adopción de IA plantea un desafío para las economías occidentales en términos de competitividad y liderazgo tecnológico.", "why": "La ambiciosa estrategia de China para la adopción masiva de IA la posiciona como un actor dominante en la próxima revolución tecnológica global.", "importance": 4, "relevance": 5, "tags": ["China", "Adopción IA", "Estrategia tecnológica", "Industria 5.0"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/isr.jpg", "published": "2026-06-18T10:03:46+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/israel-cuts-all-contact-with-kaja-kallas-over-apartheid-comments/", "type": "blog"}, {"name": "ECFR", "url": "https://ecfr.eu/article/if-the-uk-wants-to-rejoin-the-european-union-it-first-needs-to-understand-it/", "type": "blog"}]}, {"id": "f52763e5eb", "category": "cruce", "topic": "ia", "subtopic": "IA China", "cruce": true, "title": "DeepSeek recauda 50.000 millones de yuanes, consolidándose como una de las startups de IA más valiosas de China", "summary": "La startup china de inteligencia artificial DeepSeek ha cerrado una ronda de financiación Serie A de aproximadamente 50.000 millones de yuanes (unos 59.200 millones de dólares), alcanzando una valoración posterior a la inversión de unos 400.000 millones de yuanes. Esta operación la posiciona como una de las empresas de IA más valiosas de China, superando a competidores como Moonshot AI y MiniMax AI, aunque aún por detrás de Zhipu AI.\n\nEl CEO de DeepSeek, Liang Wenfeng, ha reafirmado su compromiso con la búsqueda de la inteligencia artificial general (AGI), una visión que ha comunicado a los inversores. La compañía se centra exclusivamente en mejorar la inteligencia de los modelos de IA, descartando otras áreas de desarrollo.\n\nEsta significativa inyección de capital subraya la intensa competencia en el sector de la IA en China y la ambición de las empresas locales por liderar el desarrollo de modelos avanzados, compitiendo directamente con los laboratorios de investigación y desarrollo de Estados Unidos.", "why": "La financiación récord de DeepSeek demuestra la creciente inversión y ambición de China en el desarrollo de IA avanzada y AGI.", "importance": 4, "relevance": 5, "tags": ["DeepSeek", "IA", "financiación", "China"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/ge-digital-twin-1.jpg", "published": "2026-06-18T08:06:02+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/18/massachusetts-awards-2-million-to-six-local-robotics-companies/102643/", "type": "blog"}]}, {"id": "e64c7a2044", "category": "ia", "topic": "ia", "subtopic": "Investigación", "cruce": false, "title": "Radical AI acelera el descubrimiento de materiales con \"laboratorios de autoconducción\" y IA", "summary": "Radical AI, fundada por el científico de materiales Joseph Krause, está revolucionando el descubrimiento de nuevos materiales mediante el uso de \"laboratorios de autoconducción\" (self-driving labs) y técnicas avanzadas de inteligencia artificial. A diferencia de las moléculas biológicas, el éxito de los materiales depende de múltiples variables macroscópicas como las cadenas de suministro y los procesos de fabricación, lo que hace que el problema sea intrínsecamente complejo.\n\nKrause señala que la reproducibilidad, un desafío clave como se vio en el caso del LK99, a menudo se ve obstaculizada por la falta de información sobre los procesos de fabricación. Radical AI busca superar estas limitaciones, acelerando el proceso de descubrimiento de materiales a un ritmo significativamente mayor que los métodos tradicionales, como los utilizados por DARPA/GE MACH.\n\nLa iniciativa de Radical AI es crucial para el futuro de productos de consumo y avances tecnológicos, abordando la necesidad crítica de materiales innovadores de manera más eficiente y escalable, lo que podría tener un impacto significativo en diversas industrias.", "why": "La IA y los laboratorios automatizados están acelerando drásticamente el descubrimiento de nuevos materiales, un proceso tradicionalmente lento y complejo.", "importance": 4, "relevance": 5, "tags": ["IA", "Materiales", "Automatización", "Industria 5.0"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/sociality-startup-funding-meeting-4.png", "published": "2026-06-17T17:17:43+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/17/5-investor-narrative-mistakes-technology-companies-sociality/102628/", "type": "blog"}]}, {"id": "1fc92eea3c", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Nuevas iniciativas buscan remunerar a músicos por el uso de su música en el entrenamiento de IA", "summary": "Empresas como Sureel y SoundVerse están desarrollando soluciones para que los músicos reciban compensación económica cuando su música se utiliza para entrenar herramientas de IA generativa. Esto busca replicar el principio económico fundamental de que \"cuanto más se usa algo, más dinero genera\", adaptándolo a la era de la IA.\n\nSureel, recientemente adquirida por Warner Music Group, se ha asociado con la agencia sueca de derechos de autor STIM para explorar modelos de pago. Su software etiqueta medios en línea, como archivos de música, con instrucciones específicas del propietario, determinando cómo se puede usar el contenido. La idea es que el \"uso\" en el entrenamiento de IA sea reconocible y, por tanto, remunerable.\n\nEstas iniciativas pretenden transformar la industria de la IA generativa, que ha sido criticada por \"el mayor acto de robo de derechos de autor de la historia\", hacia un modelo de coexistencia armoniosa con los artistas. El debate se centra en si el uso de datos para entrenar una IA constituye un \"uso\" que deba ser pagado, similar a las ventas de discos o las reproducciones en streaming.", "why": "Se están creando mecanismos para asegurar que los creadores de música sean compensados por el uso de sus obras en el entrenamiento de modelos de IA, abordando un punto crítico de conflicto en la industria.", "importance": 4, "relevance": 5, "tags": ["IA Generativa", "Música", "Derechos de Autor", "Remuneración"], "image": "https://spectrum.ieee.org/media-library/conceptual-illustration-of-two-quarter-note-stems-going-through-an-s-resembling-a-dollar-sign.jpg?id=66750724&width=980", "published": "2026-06-17T15:04:23+00:00", "sources": [{"name": "IEEE Spectrum (IA)", "url": "https://spectrum.ieee.org/ai-music-attribution", "type": "blog"}]}, {"id": "0c9364c1f9", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "China expande su influencia económica y estratégica en los Balcanes Occidentales", "summary": "China ha consolidado su presencia en los Balcanes Occidentales a través de inversiones masivas en infraestructuras y proyectos energéticos, aprovechando la lentitud del proceso de adhesión a la UE de países como Montenegro y Serbia. Empresas chinas han financiado la construcción de autopistas, ferrocarriles y complejos industriales, además de adquirir activos clave como la única acería de Serbia y su mayor complejo de cobre.\n\nLa estrategia de Beijing incluye la expansión de Huawei en infraestructuras de telecomunicaciones y el fortalecimiento de lazos a través de bancos, universidades y acuerdos comerciales. Esta creciente influencia genera preocupación en la UE, que debate cómo gestionar sus relaciones con China y la ampliación del bloque ante las dependencias estratégicas.\n\nLa noticia subraya la competencia geopolítica y económica en la región, donde la presencia china plantea interrogantes sobre la soberanía, la deuda y la alineación estratégica de los países balcánicos, así como sobre la capacidad de la UE para contrarrestar la influencia de Pekín.", "why": "La expansión china en los Balcanes Occidentales es un ejemplo de la creciente competencia geopolítica y económica global.", "importance": 4, "relevance": 4, "tags": ["China", "Balcanes", "geopolítica", "inversión"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/RED-THREAD-6-2.png", "published": "2026-06-18T11:53:49+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/the-trojan-horse-dilemma/", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/35e079fa-04d7-44ae-9567-a595353f05aa", "type": "blog"}]}, {"id": "0c3f4515ae", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "China busca controlar los flujos de capital para estabilizar su economía, pero con riesgos", "summary": "Beijing ha implementado medidas recientes para restringir los canales a través de los cuales los ciudadanos chinos pueden mover capital al extranjero. La Comisión Reguladora de Valores de China (CSRC) ha tomado medidas enérgicas contra corredores no autorizados que canalizan dinero de inversores hacia mercados extranjeros y está presionando a las corredurías de Hong Kong y Singapur para que cesen sus operaciones transfronterizas de valores, futuros y fondos.\n\nEsta iniciativa, que se espera que se complete en un plazo de dos años, tiene como objetivo oficial \"flujos ilícitos\". Sin embargo, los analistas advierten que el cambio en el clima regulatorio podría tener un efecto paralizador no intencionado en la economía más grande de Asia. La incertidumbre sobre el alcance de estas medidas podría generar preocupación en los mercados y afectar negativamente al sector financiero de Hong Kong.\n\nLa metáfora de \"construir una mejor jaula para pájaros\" se utiliza para describir el intento de Xi Jinping de controlar los movimientos de dinero de los ciudadanos chinos en el extranjero. Si bien la intención es evitar el \"caos\" del mercado, existe el riesgo de que la represión se extienda más allá de los flujos ilícitos, generando una mayor aversión al riesgo y afectando la confianza de los inversores.", "why": "Las restricciones de capital de China podrían tener repercusiones significativas en los mercados financieros globales y en la percepción de la estabilidad económica del país.", "importance": 4, "relevance": 4, "tags": ["Control de capitales", "Economía china", "Mercados financieros"], "image": "https://df16bd12.delivery.rocketcdn.me/wp-content/uploads/2023/04/MENA_header_grey.jpg", "published": "2026-06-18T10:00:25+00:00", "sources": [{"name": "Geopolitical Futures", "url": "https://geopoliticalfutures.com/who-will-run-the-middle-east/", "type": "newsletter"}]}, {"id": "a96d9183b1", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "La prohibición de acceso a modelos de IA de Anthropic para no estadounidenses podría beneficiar a Europa, según un experto", "summary": "La reciente orden del gobierno de EE. UU. de suspender el acceso a los modelos de IA más potentes de Anthropic para ciudadanos no estadounidenses ha generado preocupación en Europa. Sin embargo, Uljan Sharka, fundador y CEO de la empresa italiana de modelos de IA Domyn, considera que esta medida representa una \"gran oportunidad\" para la región.\n\nSharka argumenta que la exclusión de usuarios no estadounidenses de modelos avanzados como Claude 3 podría impulsar el desarrollo de alternativas europeas. Señala que la UE está invirtiendo en soberanía tecnológica y que la dependencia de modelos extranjeros podría ser un obstáculo para su crecimiento en IA. La prohibición podría, por tanto, fomentar la inversión y la innovación local.\n\nEl CEO de Domyn cree que esta situación podría llevar a la UE a desarrollar sus propios modelos de IA de alto rendimiento, reduciendo la dependencia de empresas estadounidenses. Destaca que Europa tiene el potencial de crear un ecosistema de IA robusto y competitivo, y que la actual coyuntura podría ser el catalizador necesario para lograrlo.", "why": "Las restricciones en el acceso a la IA avanzada por parte de EE. UU. podrían impulsar el desarrollo y la competitividad de la industria de IA europea.", "importance": 3, "relevance": 5, "tags": ["IA europea", "Soberanía tecnológica", "Regulación IA"], "image": "https://asiatimes.com/wp-content/uploads/2020/09/China-Yuan-Currency.jpeg", "published": "2026-06-18T09:42:09+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/why-xi-is-walling-in-chinas-money-and-why-it-wont-work/", "type": "blog"}]}, {"id": "f2a73374a0", "category": "cruce", "topic": "ia", "subtopic": "IA China", "cruce": true, "title": "ByteDance explora chips de IA domésticos, beneficiando a startups chinas de semiconductores", "summary": "ByteDance, la empresa matriz de TikTok, está acelerando su transición hacia el uso de chips de fabricación nacional para sus cargas de trabajo de inteligencia artificial. La compañía considera la posibilidad de recurrir a fabricantes de chips de \"segunda categoría\" en China, como Iluvatar CoreX, Biren Technology, MetaX Integrated Circuits, Moore Threads Technology y Enflame Technology, para su infraestructura en la nube. Esta estrategia responde al impulso de Pekín por una mayor autosuficiencia en semiconductores y a las restricciones regulatorias que afectan a proveedores como Nvidia.\n\nAnalistas señalan que, aunque estas empresas chinas de semiconductores de menor tamaño podrían beneficiarse de la creciente demanda de ByteDance, su capacidad para escalar la producción y cumplir con los requisitos de calidad será crucial. La empresa ya ha realizado compras significativas de procesadores de IA a Iluvatar, lo que indica un interés concreto en estas alternativas domésticas.\n\nEsta tendencia subraya la creciente inversión de China en el desarrollo de su propia industria de semiconductores de IA, en un contexto de competencia tecnológica global. La capacidad de estas startups para satisfacer la demanda de grandes empresas tecnológicas como ByteDance determinará su éxito y su contribución a la soberanía tecnológica del país.", "why": "Las grandes tecnológicas chinas buscan alternativas a los semiconductores extranjeros, impulsando el crecimiento de startups locales de IA.", "importance": 4, "relevance": 4, "tags": ["ByteDance", "semiconductores", "IA", "China"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/06/18/e5871cf7-5994-4cbe-9986-1c3fa3ebb54a_0d1ec37b.jpg?itok=RbWaXj4S&v=1781770301", "published": "2026-06-18T08:11:42+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/tech/article/3357545/bytedance-spends-billions-ai-which-chinese-chip-start-ups-stand-gain?utm_source=rss_feed", "type": "blog"}, {"name": "SCMP Tech", "url": "https://www.scmp.com/tech/big-tech/article/3357525/how-deepseeks-landmark-funding-secures-liang-wenfengs-grip-chinas-ai-rivalry-heats?utm_source=rss_feed", "type": "blog"}, {"name": "SCMP Tech", "url": "https://www.scmp.com/tech/article/3357495/shanghai-bourse-opens-doors-unprofitable-ai-tech-start-ups-relaxed-ipo-rules?utm_source=rss_feed", "type": "blog"}]}, {"id": "ce662b82ee", "category": "cruce", "topic": "ia", "subtopic": "IA China", "cruce": true, "title": "Bolsa de Shanghái flexibiliza normas para la salida a bolsa de empresas de IA no rentables", "summary": "La Bolsa de Shanghái (SSE) ha clarificado sus reglas de cotización para permitir que desarrolladores de modelos de inteligencia artificial, especialmente aquellos centrados en grandes modelos de lenguaje (LLM), puedan salir a bolsa incluso si aún no son rentables. Los requisitos incluyen una capitalización de mercado anticipada de al menos 4.000 millones de yuanes (591 millones de dólares) y criterios de potencial de mercado.\n\nEsta medida está diseñada para apoyar a empresas de IA \"de alta calidad\" que han lanzado y operan al menos un producto LLM a escala, y que cuentan con \"acuerdos de comercialización claros\". La SSE reconoce que los LLM son un \"foco central de la competencia tecnológica global\" y que estas empresas necesitan \"apoyo urgente de capital\" para sostener sus esfuerzos en investigación, desarrollo, inversión en potencia de cálculo y talento especializado.\n\nLa iniciativa busca facilitar el acceso a financiación para las empresas chinas de IA en su carrera por alcanzar y superar a sus competidores estadounidenses, impulsando así la competitividad tecnológica del país en el ámbito de la inteligencia artificial.", "why": "Shanghái facilita la salida a bolsa de startups de IA para competir globalmente, especialmente frente a EE. UU.", "importance": 3, "relevance": 5, "tags": ["IA", "regulación", "financiación", "China"], "image": "https://semiengineering.com/wp-content/uploads/2026/06/amkor9.png?fit=470%2C368&ssl=1", "published": "2026-06-18T07:15:52+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/scaling-adas-to-10-cameras/", "type": "blog"}, {"name": "Semiconductor Engineering", "url": "https://semiengineering.com/accelerating-gaa-logic-yield-optimization-with-digital-twins-2/", "type": "blog"}, {"name": "Semiconductor Engineering", "url": "https://semiengineering.com/how-to-build-billions-of-bumps/", "type": "blog"}, {"name": "Semiconductor Engineering", "url": "https://semiengineering.com/vlsi-2026-intel-18a-platform-momentum-from-devices-to-routed-designs/", "type": "blog"}, {"name": "Semiconductor Engineering", "url": "https://semiengineering.com/a-new-fracture-engine-for-curvilinear-masks-and-multigon-mask-data/", "type": "blog"}, {"name": "Semiconductor Engineering", "url": "https://semiengineering.com/randomizing-wafers-to-zero-in-on-process-problems-much-faster/", "type": "blog"}, {"name": "Semiconductor Engineering", "url": "https://semiengineering.com/how-to-create-efficient-bump-and-tsv-plans-for-multi-die-designs/", "type": "blog"}, {"name": "Semiconductor Engineering", "url": "https://semiengineering.com/automated-310mm-panel-level-packaging-to-accelerate-ai-innovation-tech-brief/", "type": "blog"}]}, {"id": "3b979258ee", "category": "ia", "topic": "ia", "subtopic": "Semiconductores y hardware de IA", "cruce": false, "title": "Optimización del rendimiento de semiconductores con gemelos digitales y empaquetado avanzado", "summary": "La industria automotriz está adoptando sistemas avanzados de asistencia al conductor (ADAS) que requieren un número creciente de cámaras, potencialmente superando las 8-10 por vehículo. Esto impulsa la demanda de tecnologías de sensores y soluciones de empaquetado robustas, como el OBGA, para garantizar la fiabilidad en entornos automotrices.\n\nParalelamente, en la fabricación de semiconductores, la transición a arquitecturas Gate-All-Around (GAA) presenta desafíos de variabilidad en la producción. Lam ha desarrollado una metodología de optimización de rendimiento basada en gemelos digitales que simulan el proceso completo de fabricación GAA, permitiendo a los ingenieros explorar cambios de proceso virtualmente y reducir las tasas de fallo.\n\nOtras innovaciones en semiconductores incluyen el \"hybrid bonding\", que permite una densidad de interconexión sin precedentes, y el desarrollo de plataformas de empaquetado a nivel de panel (panel-level packaging) para acelerar la innovación en IA y HPC, ofreciendo mayor rendimiento y menor coste por paquete. Intel también avanza en su plataforma Intel 18A, con mejoras en rendimiento y nuevas tecnologías como el backside power y materiales avanzados.", "why": "Avances en empaquetado, gemelos digitales y nuevas arquitecturas de semiconductores son clave para la IA y la automoción.", "importance": 4, "relevance": 4, "tags": ["semiconductores", "IA", "ADAS", "gemelos digitales"], "image": "https://cdn-live.foreignaffairs.com/sites/default/files/styles/x_large_1x/public/images/2026/06/17/2026-01-12T143953Z_1404680672_RC2QZIAL4DGL_RTRMADP_3_FRANCE-POLITICS-RN.JPG?itok=G5Nms_zH", "published": "2026-06-18T04:00:00+00:00", "sources": [{"name": "Foreign Affairs", "url": "https://www.foreignaffairs.com/france/how-france-falls-far-right", "type": "blog"}, {"name": "The Diplomat", "url": "https://thediplomat.com/2026/06/philippine-senate-votes-to-remove-duterte-ally-from-chambers-presidency/", "type": "blog"}]}, {"id": "6b15a41f0e", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "AWS lanza AWS Context para mejorar la inteligencia de los agentes de IA con datos a escala", "summary": "Amazon Web Services (AWS) ha anunciado AWS Context, un nuevo servicio diseñado para dotar a los agentes de IA de la inteligencia contextual necesaria para tomar decisiones fiables. El servicio mapea automáticamente las relaciones entre los datos existentes en un grafo de conocimiento y proporciona búsqueda agentiva, permitiendo a los agentes de IA acceder a relaciones de datos gobernadas, reglas de negocio y conocimiento de dominio en tiempo de ejecución.\n\nLos administradores de datos podrán gestionar este grafo a través de una consola intuitiva, revisando las relaciones inferidas, promoviéndolas a producción y adjuntando conocimiento específico del dominio, como definiciones de negocio y reglas de uso. Esta innovación se basa en la misma tecnología de grafo de conocimiento que impulsa Amazon QuickSight.\n\nLa capacidad de los agentes de IA para acceder y razonar sobre un contexto amplio y diverso es crucial para su eficacia. AWS Context busca resolver el desafío de la información dispersa en lagos de datos, almacenes de datos y bases de datos, permitiendo a las organizaciones aprovechar al máximo sus datos para la toma de decisiones asistida por IA.", "why": "AWS Context busca democratizar el acceso a la inteligencia contextual para los agentes de IA, facilitando su integración en flujos de trabajo industriales y empresariales.", "importance": 4, "relevance": 4, "tags": ["AWS", "IA", "Agentes", "Contexto"], "image": "https://d2908q01vomqb2.cloudfront.net/f1f836cb4ea6efb2a0b1b99f41ad8b103eff4b59/2026/06/17/ml-21188.png", "published": "2026-06-17T17:17:37+00:00", "sources": [{"name": "AWS Machine Learning Blog", "url": "https://aws.amazon.com/blogs/machine-learning/context-intelligence-for-your-data-and-ai-agents-at-scale/", "type": "blog"}]}, {"id": "316bc7df11", "category": "ia", "topic": "ia", "subtopic": "Investigación", "cruce": false, "title": "La producción de código se vuelve 'gratuita e instantánea' con la IA, transformando la disciplina de ingeniería", "summary": "Según Charity Majors, citada por Simon Willison, el año 2025 marcó un punto de inflexión en la producción de código, volviéndola \"efectivamente gratuita e instantánea\". Este cambio radical ha transformado las líneas de código de ser un recurso \"preciado, reutilizado, cuidado y cuidadosamente curado\" a ser \"desechables y regenerables, prácticamente de la noche a la mañana\".\n\nEsta transformación, impulsada por los avances en IA generativa, plantea interrogantes sobre la disciplina de ingeniería necesaria para el desarrollo de software. La facilidad con la que se puede generar código podría llevar a una menor atención en la calidad y mantenibilidad, a pesar de la creciente complejidad de los sistemas.\n\nLa implicación principal es la necesidad de una mayor disciplina de ingeniería, no menor, para gestionar la proliferación de código generado por IA. Esto incluye asegurar la calidad, la seguridad y la eficiencia del código, incluso cuando su creación es trivial. Se mencionan también otros avances como GLM-5.2, la publicación de WASM wheels a PyPI y Claude Fable.", "why": "La IA está redefiniendo radicalmente la producción de software, exigiendo nuevas aproximaciones a la ingeniería y la gestión de código.", "importance": 3, "relevance": 5, "tags": ["IA", "Desarrollo de Software", "Ingeniería"], "image": "", "published": "2026-06-17T17:12:41+00:00", "sources": [{"name": "Simon Willison", "url": "https://simonwillison.net/2026/Jun/17/charity-majors/#atom-everything", "type": "blog"}]}, {"id": "eee886cbdf", "category": "ia", "topic": "ia", "subtopic": "Investigación", "cruce": false, "title": "Google presenta AMIE, una IA capaz de gestionar enfermedades a largo plazo", "summary": "Google ha presentado AMIE (Articulate Medical Intelligence Explorer), un sistema de IA avanzado diseñado para la gestión de enfermedades a largo plazo, basándose en su investigación previa en diagnósticos. La investigación, publicada en \"Nature\", detalla cómo AMIE utiliza las capacidades de largo contexto de los modelos Gemini para interactuar con pacientes y gestionar condiciones médicas a lo largo del tiempo.\n\nAMIE para la gestión de enfermedades incluye un agente de diálogo empático para conversaciones en tiempo real con pacientes y un agente de razonamiento de gestión que cruza referencias con cientos de páginas de conocimiento clínico. En un estudio ciego con actores, AMIE igualó a médicos especialistas en razonamiento de gestión y superó a médicos de atención primaria en precisión del plan y alineación con las directrices clínicas.\n\nEste avance sugiere que la IA podría complementar la atención médica, liberando tiempo para que los médicos se centren en la interacción con los pacientes. Google está explorando la implementación de AMIE en entornos clínicos y ha lanzado un estudio nacional para evaluar su rendimiento en atención virtual real.", "why": "La IA de Google muestra un potencial significativo para mejorar la gestión de enfermedades crónicas, aliviando la carga de los profesionales de la salud y mejorando la precisión del tratamiento.", "importance": 4, "relevance": 4, "tags": ["IA", "Salud", "Google", "Investigación Médica"], "image": "https://storage.googleapis.com/gweb-uniblog-publish-prod/images/AMIE_Mx_Nature_Social_Visual_Va.max-600x600.format-webp.webp", "published": "2026-06-17T15:00:00+00:00", "sources": [{"name": "Google AI Blog (DeepMind)", "url": "https://blog.google/innovation-and-ai/models-and-research/google-research/amie-for-disease-management-in-nature/", "type": "blog"}]}, {"id": "003d8287da", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Estonia otorgará identidades digitales a agentes de IA para definir responsabilidades", "summary": "Estonia implementará identidades digitales para los agentes de inteligencia artificial, permitiendo asignarles códigos de identificación únicos. El objetivo es clarificar quién actúa en nombre de quién, qué derechos tienen y quién es el responsable final de sus acciones, especialmente cuando estos programas realizan tareas digitales de forma autónoma.\n\nEsta iniciativa responde a la creciente popularidad de los agentes de IA, que pueden ejecutar desde la escritura de código complejo hasta la gestión de viajes. La medida busca ofrecer a los usuarios un control más granular sobre las capacidades de estos agentes, permitiéndoles definir límites claros sobre el acceso a datos o la ejecución de transacciones.\n\nLa decisión de Estonia se produce en un momento en que varios países buscan establecer marcos regulatorios para la IA. La falta de claridad sobre la autoría y responsabilidad de las acciones de los agentes de IA es un desafío emergente que requiere soluciones prácticas para garantizar la seguridad y la confianza en el uso de estas tecnologías.", "why": "La asignación de identidades digitales a agentes de IA es un paso fundamental para la gobernanza y la rendición de cuentas en el desarrollo de sistemas autónomos.", "importance": 3, "relevance": 4, "tags": ["Identidad digital IA", "Agentes IA", "Regulación", "Estonia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Fa422bd42-5828-4427-8242-53fd3c66a720.jpg?source=next-barrier-page", "published": "2026-06-18T10:57:57+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/1774f8a9-ac82-4fee-b8c0-10740de2b112", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/czechia-slovakia-weigh-in-on-methane-regulation-spat/", "type": "blog"}]}, {"id": "6a9d64e652", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "EE. UU. y Venezuela colaboran en un ataque con drones contra un líder de banda transnacional en América Latina", "summary": "Estados Unidos llevó a cabo un ataque con drones el 12 de junio contra Héctor Rusthenford Guerrero, alias \"Niño Guerrero\", líder de la banda \"Tren de Aragua\", en Venezuela. El ataque, que se mostró a través de imágenes de satélite, es una escalada de la doctrina de seguridad de la administración Trump para América Latina, que combina fuerza letal con pruebas públicas y cooperación de los gobiernos anfitriones.\n\nEsta acción marca la primera vez que EE. UU. utiliza un misil para eliminar a un líder de banda en la región, y se realizó en \"plena colaboración con las fuerzas de seguridad venezolanas\", según confirmó el gobierno interino de Venezuela. La operación se enmarca en la \"Operación Southern Spear\", que ha incluido más de sesenta videos de ataques con drones contra embarcaciones presuntamente dedicadas al narcotráfico.\n\nLa efectividad y la naturaleza colaborativa de este ataque sugieren una nueva fase en la lucha contra el crimen organizado transnacional en América Latina, con implicaciones para la estabilidad regional y la cooperación entre países en materia de seguridad.", "why": "Este evento representa una nueva táctica de EE. UU. en la lucha contra el crimen organizado en América Latina, utilizando fuerza letal y colaboración intergubernamental.", "importance": 4, "relevance": 3, "tags": ["EE. UU.", "Venezuela", "Crimen organizado", "Drones"], "image": "https://www.atlanticcouncil.org/wp-content/uploads/2026/06/2026-06-13T030309Z_196428693_RC2RSLAZ3E3L_RTRMADP_3_USA-TRUMP-VENEZUELA-STRIKE.jpg", "published": "2026-06-17T21:50:16+00:00", "sources": [{"name": "Atlantic Council", "url": "https://www.atlanticcouncil.org/dispatches/the-recent-us-venezuelan-strike-on-tren-de-araguas-leader-will-reverberate-across-latin-america/", "type": "blog"}, {"name": "Defense One", "url": "https://www.defenseone.com/threats/2026/06/peace-deal-iran-hackers/414246/", "type": "blog"}]}, {"id": "9f0465275b", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Acuerdo preliminar entre EE. UU. e Irán no detendrá las operaciones de hackers iraníes, según funcionarios estadounidenses", "summary": "Funcionarios estadounidenses advierten que el acuerdo preliminar alcanzado entre Estados Unidos e Irán, alcanzado durante el fin de semana, probablemente no impedirá las operaciones cibernéticas lanzadas desde Teherán y grupos afines contra sistemas estadounidenses. Los ciberataques son considerados una parte \"definitivamente parte de la guerra que continúa\" y una \"actividad normal y corriente\".\n\nLa mayoría de los funcionarios, que hablaron bajo condición de anonimato, señalaron que si bien la actividad cibernética podría desacelerarse temporalmente, \"definitivamente no se detendrá\". Un segundo funcionario opinó que \"no hay posibilidad\" de que Irán y sus afiliados cesen o reduzcan su actividad en el ciberespacio. Se mencionó que algunos colectivos de hackers pro-Irán, que no siempre están bajo el control directo del gobierno central iraní, podrían lanzar ataques para expresar su descontento con cualquier resolución final.\n\nEsta perspectiva subraya la persistencia del conflicto cibernético como una dimensión continua de las relaciones internacionales, incluso en periodos de acercamiento diplomático. La falta de control total del gobierno iraní sobre ciertos grupos de hackers añade una capa de imprevisibilidad a la seguridad cibernética global.", "why": "La guerra cibernética se considera una forma de conflicto persistente que continuará incluso después de acuerdos diplomáticos.", "importance": 3, "relevance": 4, "tags": ["Ciberseguridad", "Irán", "EE. UU.", "Hackers"], "image": "https://techcrunch.com/wp-content/uploads/2026/06/GettyImages-2281915461.jpg?resize=1200,800", "published": "2026-06-17T20:24:28+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/17/after-unveiling-ridiculously-expensive-ar-glasses-snaps-stock-takes-a-dive/", "type": "blog"}]}, {"id": "4d7d691d43", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "El Fondo Saudí advierte que la regulación europea 'perjudica' a inversores extranjeros", "summary": "El fondo soberano de Arabia Saudí ha expresado su preocupación por el impacto negativo de la regulación europea en los inversores extranjeros. La advertencia sugiere que las normativas actuales en la UE podrían estar disuadiendo la inversión internacional, afectando potencialmente a la economía y al desarrollo de proyectos en Europa.\n\nEsta declaración se produce en un contexto de creciente escrutinio regulatorio por parte de la UE en diversos sectores, incluyendo el tecnológico y financiero, y en un momento en que busca fortalecer su autonomía estratégica y competitividad.\n\nLa advertencia del fondo saudí resalta la tensión entre la necesidad de la UE de regular para proteger sus intereses y la importancia de mantener un entorno atractivo para la inversión extranjera, crucial para el crecimiento económico y la innovación.", "why": "Las advertencias de grandes fondos soberanos sobre la regulación europea señalan posibles fricciones en las relaciones económicas internacionales.", "importance": 3, "relevance": 3, "tags": ["inversión extranjera", "UE", "regulación"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Feee30878-ac0d-4597-9c7b-bca87436b884.jpg?source=next-barrier-page", "published": "2026-06-18T11:29:27+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/be8397df-7c74-4eac-89cb-5936d7261b95", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/poland-detains-suspect-russia-vladimir-putin-critic-murder-case/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "8d8b9bbf32", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "La iniciativa de los Tres Mares de Europa se desvía de un futuro de energía limpia, según un informe", "summary": "Un informe de ECFR señala que la Iniciativa de los Tres Mares (3SI), que agrupa a 13 estados miembros de la UE, ha sido fundamental para reducir la dependencia europea del gas ruso, disminuyendo las importaciones de casi 160.000 millones de metros cúbicos en 2021 a menos de 40.000 millones en 2025. Sin embargo, el informe critica que cinco de sus nueve proyectos energéticos insignia siguen centrados en el gas.\n\nLa 3SI, que abarca países entre los mares Adriático, Báltico y Negro, se creó para mejorar la conectividad en infraestructuras de energía, transporte y digital. Si bien ha logrado diversificar el suministro de gas, la sustitución del gas ruso por GNL de EE. UU. y los estados del Golfo Pérsico traslada la exposición geopolítica sin eliminar la dependencia de los combustibles fósiles.\n\nEl informe insta a la 3SI a dirigir su nuevo \"fondo de fondos\" de 2.000 millones de euros hacia la construcción de infraestructuras de energía limpia que perduren más allá de la era del gas, advirtiendo que la infraestructura actual tiene una vida útil de 20 a 30 años, lo que implica que los proyectos centrados en el gas podrían quedar obsoletos.", "why": "La transición energética de Europa y su seguridad de suministro están en juego si las inversiones estratégicas no se alinean con los objetivos de descarbonización a largo plazo.", "importance": 3, "relevance": 3, "tags": ["Energía limpia", "Seguridad energética", "Europa"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F53c402df-b78b-4463-93de-59a7d293ab81.jpg?source=next-barrier-page", "published": "2026-06-18T11:00:03+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/1ec145cd-ab31-444e-ade3-8251bc73dc5b", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/44e577c5-bac3-402b-891c-05753aa3e5a8", "type": "blog"}, {"name": "ECFR", "url": "https://ecfr.eu/article/gas-lit-the-three-seas-initiative-is-out-of-step-with-a-clean-energy-future/", "type": "blog"}, {"name": "ChinaTalk", "url": "https://www.chinatalk.media/p/blaming-china-for-datacenter-nimbyism", "type": "newsletter"}]}, {"id": "3c3f1e765a", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "Form Energy apuesta por baterías de hierro-aire para el almacenamiento de energía a gran escala", "summary": "Form Energy ha decidido centrar sus esfuerzos en la tecnología de baterías de hierro-aire tras un período de evaluación técnica intensiva. La empresa ha estado comparando diversas tecnologías de almacenamiento de energía durante 12 a 18 meses, y considera que las baterías de hierro-aire son las que han mostrado un mayor progreso y potencial.\n\nEsta decisión es crucial para el futuro del almacenamiento de energía a gran escala, un componente esencial para la integración de fuentes renovables intermitentes en la red eléctrica. La elección de Form Energy por esta tecnología específica podría acelerar su desarrollo y comercialización.\n\nEl desarrollo de soluciones de almacenamiento de energía eficientes y asequibles es fundamental para la transición energética global y la sostenibilidad. La apuesta por las baterías de hierro-aire por parte de una empresa innovadora como Form Energy será un factor a seguir en el avance hacia redes eléctricas más resilientes y descarbonizadas.", "why": "La elección de la tecnología de baterías de hierro-aire por parte de Form Energy podría ser un hito en el desarrollo del almacenamiento de energía a gran escala para la transición energética.", "importance": 3, "relevance": 3, "tags": ["Baterías", "Almacenamiento energía", "Sostenibilidad", "Form Energy"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/06/18/GettyImages-2281551951-scaled.jpg", "published": "2026-06-18T09:34:47+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/ukrainian-drones-strike-moscow-setting-oil-refinery-ablaze/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "ffd20ff01f", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Massachusetts otorga $2 millones a seis empresas de robótica para impulsar la innovación con gemelos digitales", "summary": "El estado de Massachusetts ha concedido casi 2 millones de dólares a seis empresas locales de robótica a través de la \"Massachusetts Robotic Digital Twin Initiative\". El objetivo es acelerar la comercialización de hardware robótico ampliando el acceso a tecnologías de gemelos digitales.\n\nLos gemelos digitales, réplicas virtuales y basadas en datos de robots físicos, permiten a los usuarios probarlos en entornos simulados antes de su despliegue real. Esto reduce costes, mejora la seguridad y acelera la innovación. Las empresas beneficiadas pondrán a disposición del ecosistema robótico sus gemelos digitales de producto.\n\nEsta iniciativa subraya el compromiso de Massachusetts con el liderazgo en robótica, proporcionando a las empresas las herramientas necesarias para desarrollar nuevas tecnologías, crear empleo y llevar al mercado los avances en robótica.", "why": "La inversión en gemelos digitales para robótica busca acelerar la innovación y comercialización en el sector.", "importance": 2, "relevance": 4, "tags": ["robótica", "gemelos digitales", "innovación", "Massachusetts"], "image": "https://i2.ytimg.com/vi/Qy25rSEXpPQ/hqdefault.jpg", "published": "2026-06-18T04:32:28+00:00", "sources": [{"name": "The Verge (IA)", "url": "https://www.theverge.com/ai-artificial-intelligence/952011/midjourney-medical-ai-ultrasound-scan", "type": "blog"}, {"name": "Latent Space", "url": "https://www.latent.space/p/ainews-midjourney-medical-scan-your", "type": "newsletter"}, {"name": "Matt Wolfe", "url": "https://www.youtube.com/shorts/Qy25rSEXpPQ", "type": "youtube"}]}, {"id": "1938d92258", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Midjourney presenta un escáner médico de cuerpo completo basado en ultrasonido", "summary": "Midjourney, conocido por su generador de imágenes de IA, ha sorprendido al presentar su primer producto de hardware: el \"Midjourney Scanner\". Este dispositivo utiliza tecnología de ultrasonido para realizar escaneos corporales completos, con el objetivo de ofrecer una calidad de imagen comparable a la de una resonancia magnética (MRI) de forma más rápida, económica y accesible.\n\nEl escáner, que utiliza un anillo de sensores para capturar \"rebanadas\" verticales del interior del cuerpo, analiza la composición de músculos, grasa, huesos y órganos. David Holz, CEO de Midjourney, sugiere que podría utilizarse anualmente o incluso a diario para monitorizar cambios corporales, como la respuesta a la dieta y el ejercicio. La compañía aspira a llevar esta tecnología de \"escaneo preventivo\" a miles de millones de personas a través de una experiencia de spa.\n\nAunque el dispositivo en sí no utiliza IA de forma inmediata, se espera que la inteligencia artificial sea fundamental para el procesamiento y análisis de las imágenes de ultrasonido CT, abriendo nuevas aplicaciones médicas. Este movimiento estratégico de Midjourney marca una diversificación significativa de su enfoque, pasando de la generación de imágenes a la tecnología médica.", "why": "Midjourney diversifica su enfoque de la IA generativa a la tecnología médica con un innovador escáner de ultrasonido.", "importance": 3, "relevance": 3, "tags": ["Midjourney", "IA", "salud", "hardware"], "image": "https://techcrunch.com/wp-content/uploads/2026/06/GettyImages-182884083.jpg?resize=1200,800", "published": "2026-06-18T01:23:51+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/17/how-to-turn-off-ai-in-your-google-docs/", "type": "blog"}, {"name": "AWS Machine Learning Blog", "url": "https://aws.amazon.com/blogs/machine-learning/get-back-hours-every-day-with-autonomous-agents-in-amazon-quick/", "type": "blog"}, {"name": "AI Business", "url": "https://aibusiness.com/agentic-ai/aws-s-new-agentic-tools-trail-rivals-respond-real-problems", "type": "blog"}, {"name": "The Verge (IA)", "url": "https://www.theverge.com/ai-artificial-intelligence/951653/pew-research-ai-chatbot-usage-advancing-too-quickly", "type": "blog"}, {"name": "The Verge (IA)", "url": "https://www.theverge.com/column/951516/trump-anthropic-feud-mythos-fable-white-house", "type": "blog"}, {"name": "The Verge (IA)", "url": "https://www.theverge.com/report/951481/snap-specs-wearables-smart-glasses-fashion", "type": "blog"}]}, {"id": "1270010316", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "La OTAN reconoce la necesidad de reforzar su flanco sur, con Portugal como actor clave", "summary": "Mientras los líderes de la OTAN se preparan para su cumbre en Ankara, la Alianza se enfrenta a la realidad de que su atención, predominantemente centrada en el flanco oriental debido a la guerra en Ucrania, ya no es suficiente. La OTAN, concebida originalmente como una alianza con múltiples ejes geográficos, desde el norte de Europa hasta el Mediterráneo, está descuidando su flanco sur.\n\nHistóricamente, países como Portugal desempeñaron un papel crucial en el anclaje de rutas marítimas y logísticas vitales. Sin embargo, la creciente inseguridad marítima, las amenazas híbridas, los riesgos para la infraestructura submarina y la competencia en el Atlántico están exponiendo vulnerabilidades que la estrategia de la Alianza aún no ha adaptado completamente. El \"punto ciego\" del sur de la OTAN se hizo evidente en la Cumbre de la OTAN de 2024 en Washington, DC, donde se reconoció este desequilibrio y se promovió un \"enfoque de 360 grados\".\n\nPortugal, dada su posición geográfica y su experiencia histórica, tiene el potencial de ser un pilar fundamental para fortificar el flanco sur de la OTAN, abordando las crecientes amenazas en la región mediterránea y atlántica y asegurando una defensa más integral para toda la Alianza.", "why": "La OTAN reconoce la necesidad de reequilibrar su enfoque estratégico hacia el flanco sur, identificando a Portugal como un actor clave para su fortalecimiento.", "importance": 3, "relevance": 3, "tags": ["OTAN", "Seguridad", "Portugal", "Geopolítica"], "image": "https://substackcdn.com/image/fetch/$s_!Oe-m!,w_1200,h_600,c_fill,f_jpg,q_auto:good,fl_progressive:steep,g_auto/https%3A%2F%2Fsubstack-video.s3.amazonaws.com%2Fvideo_upload%2Fpost%2F202058620%2Ffb833e64-2770-4c25-a683-a4d97267a2f7%2Ftranscoded-1781717199.png", "published": "2026-06-17T17:58:06+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/17/operational-security-beyond-access-controls-reindore-limited/102632/", "type": "blog"}, {"name": "Latent Space", "url": "https://www.latent.space/p/radical-ai", "type": "newsletter"}, {"name": "Interconnects", "url": "https://www.interconnects.ai/p/state-of-the-blog-mid-2026", "type": "newsletter"}]}, {"id": "078f2bd55d", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "La UE prepara ayuda comercial de emergencia para Armenia ante restricciones rusas", "summary": "La Unión Europea se prepara para ofrecer ayuda comercial de emergencia a Armenia, según informes del Financial Times. Esta medida busca contrarrestar el impacto de las recientes restricciones impuestas por Rusia a las importaciones de productos armenios.\n\nLa Comisión Europea planea reducir los aranceles sobre las importaciones de alimentos y productos agrícolas de Armenia. El objetivo es mitigar las consecuencias económicas de las medidas restrictivas rusas, que se implementaron poco antes de las recientes decisiones de Armenia de acercarse a Occidente.\n\nEsta iniciativa subraya el apoyo de la UE a Armenia en un contexto de tensiones geopolíticas crecientes y busca fortalecer los lazos comerciales y económicos entre el bloque europeo y el país caucásico, al tiempo que se menciona la \"IA francesa\" en el contexto de un análisis más amplio sobre política europea.", "why": "La UE refuerza su apoyo económico a Armenia, demostrando su influencia en la región y su respuesta a las acciones de Rusia.", "importance": 3, "relevance": 3, "tags": ["UE", "Armenia", "Rusia", "Comercio"], "image": "https://df16bd12.delivery.rocketcdn.me/wp-content/uploads/2020/11/Daily_Memo_dark_header.jpg", "published": "2026-06-17T15:12:01+00:00", "sources": [{"name": "Geopolitical Futures", "url": "https://geopoliticalfutures.com/daily-memo-european-support-for-armenia-french-ai/", "type": "newsletter"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

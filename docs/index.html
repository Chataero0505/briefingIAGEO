versión mejorada de Siri. El objetivo es resolver problemas cotidianos y hacer que el software sea más inteligente y capaz.\n\nEntre las nuevas funcionalidades se incluyen la división de cuentas de restaurantes mediante Apple Cash, la automatización de tareas, la organización de información y la mejora de la seguridad de contraseñas tras brechas de datos. Estas características, aunque individuales no sean tan impactantes como una Siri más conversacional, buscan mejorar la usabilidad general del iPhone.\n\nLas funciones de IA se implementarán gradualmente, comenzando con la beta para desarrolladores y seguida por la beta pública, antes del lanzamiento general de iOS 27 este otoño. La estrategia de Apple se centra en la utilidad práctica de la IA en la vida diaria de los usuarios.", "why": "La integración de IA en sistemas operativos móviles como iOS 27 puede acelerar la adopción de estas tecnologías por parte de los consumidores y fomentar el desarrollo de nuevas aplicaciones.", "importance": 3, "relevance": 5, "tags": ["IA", "iOS", "Apple", "Funciones"], "image": "https://techcrunch.com/wp-content/uploads/2026/01/tim-cook-iphone-GettyImages-2234563479.jpg?w=1024", "published": "2026-06-21T14:40:28+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/21/beyond-siri-here-are-the-practical-ai-features-coming-to-your-iphone-in-ios-27/", "type": "blog"}]}, {"id": "0ef60c6066", "category": "ia", "topic": "ia", "subtopic": "Investigación", "cruce": false, "title": "Startup china utiliza IA para acelerar el desarrollo de software de fusión nuclear", "summary": "La startup china VeloAlpha ha desarrollado 'FusionAlpha', un simulador basado en inteligencia artificial diseñado para optimizar el diseño de reactores de fusión nuclear. El software busca superar el 'triángulo imposible' de las herramientas de simulación existentes, que suelen ser precisas pero costosas computacionalmente, rápidas pero poco fiables, o demasiado simplistas para guiar el diseño de reactores de próxima generación.\n\nFusionAlpha mejora la eficiencia de la investigación al refinar estructuras matemáticas y aplicar avances en IA. Esto permite a los desarrolladores probar diseños de reactores en computadoras antes de incurrir en costosos experimentos físicos, acortando así el ciclo de prueba y error que ha sido un obstáculo para la energía de fusión durante décadas.\n\nEste avance representa un paso significativo para la energía de fusión, acercándola a ser una fuente de energía limpia y prácticamente ilimitada. La aplicación de IA en este campo crítico subraya el potencial de la tecnología para resolver desafíos científicos complejos y acelerar transiciones energéticas.", "why": "La aplicación de IA en la simulación de fusión nuclear podría acelerar drásticamente el desarrollo de una fuente de energía limpia y abundante.", "importance": 4, "relevance": 4, "tags": ["IA", "Energía de fusión", "China", "Simulación"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/06/20/187b15fd-e297-4286-a0a3-07498d8121f4_d7e0d06b.jpg?itok=wJJNrHd9&v=1781937112", "published": "2026-06-21T04:00:13+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/tech/tech-trends/article/3357765/chinese-start-tackles-fusion-energy-software-bottleneck-help-ai?utm_source=rss_feed", "type": "blog"}]}, {"id": "0a9cdee5d9", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Eventos clave en Asia: Foro de Verano de Davos, reunión de seguridad BRICS y elecciones en Bangkok", "summary": "La semana en Asia estará marcada por varios encuentros de alto nivel. El Foro de Verano de Davos, también conocido como la Reunión Anual de los Nuevos Campeones, se celebra en Dalian, China, bajo el lema \"Innovando a Escala\", con la inteligencia artificial y su impacto en la productividad como temas centrales.\n\nParalelamente, los asesores de seguridad nacional de los BRICS se reunirán en India, donde se espera que discutan la cooperación en seguridad global y regional. La asistencia del Ministro de Asuntos Exteriores chino, Wang Yi, a pesar de las tensiones territoriales y económicas con India, es un punto a destacar.\n\nOtros eventos incluyen la Exposición Internacional de la Cadena de Suministro de China en Beijing, que busca ser la primera exhibición nacional centrada en la cadena de suministro global.", "why": "Estos encuentros abordan temas cruciales como la innovación, la seguridad global y las cadenas de suministro, con implicaciones para la economía y la geopolítica mundial.", "importance": 4, "relevance": 3, "tags": ["BRICS", "Foro de Davos", "cadenas de suministro", "IA"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F7%2F0%2F5%2F1%2F12631507-1-eng-GB%2F5ad6597f9f98-2023-06-26T123711Z_1427010372_RC2YQ1A7CRIR_RTRMADP_3_WEF-CHINA.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-21T20:53:06.962858+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/your-week-in-asia/summer-davos-brics-security-meeting-bangkok-election", "type": "blog"}]}, {"id": "5a59f85bd8", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "SpaceX debuta en el Nasdaq con la mayor OPV de la historia, marcando el inicio de una era de mega-ofertas", "summary": "SpaceX, la compañía aeroespacial de Elon Musk, ha realizado su oferta pública inicial (OPV) en el Nasdaq el 12 de junio, logrando la mayor recaudación de la historia para una salida a bolsa. Este hito es visto por muchos participantes del mercado como el pistoletazo de salida para una intensa competencia por captar capital de inversión.\n\nLa operación, valorada en 75.000 millones de dólares, podría desencadenar una oleada de grandes empresas tecnológicas que busquen aprovechar un mercado favorable para las salidas a bolsa.\n\nEste evento señala un momento significativo para el sector tecnológico y de inversión, con potencial para reconfigurar el panorama de financiación de grandes empresas.", "why": "La OPV de SpaceX establece un nuevo récord y podría redefinir el acceso al capital para las grandes empresas tecnológicas.", "importance": 5, "relevance": 2, "tags": ["SpaceX", "OPV", "Nasdaq", "tecnología"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F0%2F8%2F1%2F2%2F12612180-1-eng-GB%2F67174cf9940f-illust_SXM2026061200009529c.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-21T20:53:06.868518+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/datawatch/spacex-s-debut-fires-first-salvo-in-new-era-of-mega-ipos", "type": "blog"}]}, {"id": "76467216ac", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Toto invertirá 495 millones de dólares en materiales para semiconductores avanzados", "summary": "El fabricante japonés de sanitarios Toto planea invertir 80.000 millones de yenes (495 millones de dólares) en los próximos cinco años para expandir su negocio de materiales para semiconductores. El objetivo es dar soporte a tecnologías de fabricación de chips de próxima generación, incluyendo la era de los 1 nanómetro.\n\nEsta inversión responde a la creciente demanda de semiconductores avanzados, impulsada en gran medida por el auge de la inteligencia artificial. Toto, conocido por sus productos de baño, busca diversificar y fortalecer su posición en la cadena de suministro de semiconductores.\n\nLa expansión de Toto subraya la importancia estratégica de los materiales para la fabricación de chips y la necesidad de asegurar el suministro para las tecnologías futuras. Se espera que esta inversión contribuya a la innovación en la industria de semiconductores y a la resiliencia de su cadena de suministro global.", "why": "Demuestra cómo la demanda de IA está impulsando inversiones significativas en toda la cadena de suministro de semiconductores, incluso en sectores inesperados.", "importance": 3, "relevance": 4, "tags": ["semiconductores", "inversión", "cadena de suministro", "IA"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F7%2F8%2F3%2F12633876-1-eng-GB%2F3b36c10d2634-photo_SXM2026060800009869.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-21T20:53:06.528997+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/tech/semiconductors/japan-s-toto-to-invest-495m-in-chip-materials-targeting-1-nm-era", "type": "blog"}]}, {"id": "7cf8085bfe", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Güdel presentará en Automate 2026 sistemas de movimiento para robótica industrial más allá de robots estacionarios", "summary": "Güdel AG, fabricante suizo de productos y sistemas de automatización, mostrará en la feria Automate 2026 un nuevo sistema diseñado para superar las limitaciones de los robots estacionarios en aplicaciones de acabado de superficies y rectificado.\n\nTradicionalmente, estas tareas, consideradas \"aburridas, sucias o peligrosas\", requieren múltiples robots y complejos reposicionamientos de piezas, lo que incrementa costes, tiempos de ciclo y fuentes de variación. El nuevo sistema de Güdel busca ofrecer estabilidad, mayor alcance y una reducción de la inversión necesaria para automatizar el procesamiento de piezas grandes o de difícil acceso.\n\nLa filial estadounidense de Güdel, con sede en Ann Arbor, Míchigan, provee soluciones a industrias como la automotriz, aeroespacial y logística. La compañía destaca que la expansión del espacio de trabajo de los robots es crucial para hacer factible la automatización en piezas de gran tamaño.", "why": "La innovación de Güdel podría expandir la aplicabilidad de la robótica en procesos industriales complejos y de gran escala.", "importance": 3, "relevance": 4, "tags": ["robótica industrial", "automatización", "Industria 5.0", "acabado de superficies"], "image": "https://www.therobotreport.com/wp-content/uploads/2026/06/TMF_TMV_grinding-app.jpg", "published": "2026-06-21T12:30:43+00:00", "sources": [{"name": "The Robot Report", "url": "https://www.therobotreport.com/gudel-to-showcase-grinding-beyond-stationary-robots-integrated-vertical-horizontal-motion-automate/", "type": "blog"}]}, {"id": "85767697c0", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "China lidera la expansión de redes de transmisión de alta tensión, superando a EE. UU. históricamente", "summary": "China ha construido más líneas de transmisión de alta tensión (HVDC y UHVDC) en los últimos quince años que Estados Unidos en toda su historia. El país asiático cuenta con la línea HVDC más larga del mundo, la Changji-Guquan, con 3.293 kilómetros y una capacidad de 12.000 megavatios (MW), capaz de abastecer a unos 8 millones de hogares.\n\nSolo durante el período del 14º Plan Quinquenal (2021-2025), la red de transmisión de ultra alta tensión de China creció de aproximadamente 28.000 a más de 40.000 kilómetros, con 45 proyectos UHV en operación a finales de 2025, incluyendo 19 líneas UHV AC y al menos 23 UHV DC. Estas infraestructuras operan a voltajes de 800-1100 kV, cifras poco comunes en Estados Unidos.\n\nEste desarrollo masivo en infraestructura energética subraya la prioridad estratégica que China otorga a la red eléctrica nacional, contrastando con la historia de desarrollo de la red estadounidense. La investigación, realizada por Dana Golden del Argonne National Labs, destaca la escala y velocidad de la expansión china.", "why": "La masiva inversión de China en infraestructura de transmisión eléctrica es un factor clave en su seguridad energética y su capacidad para gestionar recursos a gran escala.", "importance": 4, "relevance": 3, "tags": ["transmisión eléctrica", "China", "infraestructura energética", "HVDC"], "image": "https://substackcdn.com/image/fetch/$s_!plRC!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F8b853bb1-7853-467c-92a6-2e70e329b44e_1240x1086.png", "published": "2026-06-21T11:35:31+00:00", "sources": [{"name": "ChinaTalk", "url": "https://www.chinatalk.media/p/transmission-dominance-with-chinese", "type": "newsletter"}]}, {"id": "16d5811d8b", "category": "cruce", "topic": "ia", "subtopic": "Regulación", "cruce": true, "title": "Acuerdos transfronterizos en biotecnología entre EE. UU. y China se complican por controles de inversión", "summary": "Los acuerdos transfronterizos en biotecnología entre China y Estados Unidos se están volviendo más complejos y podrían experimentar una desaceleración moderada debido a las crecientes restricciones de Washington sobre la inversión y la transferencia de tecnología. A pesar de estas dificultades, se espera que la innovación china continúe atrayendo a empresas farmacéuticas occidentales.\n\nSe estima que el valor de los acuerdos de concesión de licencias externas entre empresas chinas y occidentales alcanzará los 240.000 millones de dólares este año, frente a los 136.000 millones de 2025. Sin embargo, la navegación del entorno político se está volviendo un desafío, limitando estas transacciones a las grandes farmacéuticas con los recursos y la escala necesarios para gestionar dichas complejidades.\n\nEsta tendencia subraya la creciente interconexión entre la innovación biotecnológica china y el mercado global, al mismo tiempo que refleja las tensiones geopolíticas y las medidas de control tecnológico que afectan a la colaboración internacional en sectores estratégicos.", "why": "Las restricciones de EE. UU. a la inversión y transferencia tecnológica complican la colaboración en biotecnología, afectando un sector clave para la innovación y la economía global.", "importance": 3, "relevance": 4, "tags": ["Biotecnología", "EE. UU.", "China", "Regulación"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/06/19/0f6dbd0a-1f62-4513-9a1f-c3a8e1367883_8f0e66a8.jpg?itok=rqfBLx7K&v=1781861125", "published": "2026-06-21T01:30:08+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/business/china-business/article/3357699/cross-border-biotech-deals-grow-more-complex-us-targets-china-investment-links?utm_source=rss_feed", "type": "blog"}]}, {"id": "516c672679", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Presidenta de Signal advierte sobre los riesgos de privacidad de los chatbots de IA", "summary": "Meredith Whittaker, presidenta de Signal, ha expresado serias preocupaciones sobre la privacidad y la naturaleza de los chatbots de inteligencia artificial como ChatGPT y Claude. Whittaker enfatiza que estas herramientas 'no son tus amigos', ni seres conscientes o sintientes, sino sistemas que promedian información existente.\n\nWhittaker utiliza herramientas de IA de forma limitada para tareas específicas, pero se muestra reacia a delegar procesos de pensamiento o escritura a estas tecnologías. Critica la predicción de que asistentes como Microsoft Copilot puedan gestionar compras navideñas, señalando que esto implicaría otorgar acceso a información sensible como datos de tarjetas de crédito, historial de navegación, comunicaciones privadas y calendarios, lo que considera una puerta trasera ('backdoor') en aplicaciones y servicios.\n\nSus declaraciones ponen de relieve el debate sobre la creciente integración de la IA en la vida cotidiana y los riesgos asociados a la cesión de datos personales y la dependencia de sistemas que, según ella, no comprenden ni protegen adecuante la privacidad del usuario.", "why": "La advertencia de la presidenta de Signal subraya los riesgos de privacidad inherentes a la adopción masiva de chatbots de IA y la cesión de datos personales.", "importance": 3, "relevance": 4, "tags": ["IA", "Privacidad", "Chatbots", "Signal"], "image": "https://techcrunch.com/wp-content/uploads/2024/03/meredith-whittaker-1.jpg?resize=1200,800", "published": "2026-06-20T20:32:29+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/20/signals-meredith-whittaker-wants-you-to-remember-that-ai-chatbots-are-not-your-friends/", "type": "blog"}]}, {"id": "fe7e13e36f", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Red china de fentanilo sospechosa de fraude con criptomonedas a través de una base en Japón", "summary": "Una investigación independiente ha revelado que una organización china, presuntamente involucrada en la exportación ilegal de precursores químicos para el fentanilo, también habría participado en fraudes a gran escala con criptomonedas utilizando una base operativa en Japón. La investigación ha encontrado vínculos con entidades sancionadas por Estados Unidos y evidencias de lavado de dinero.\n\nLas autoridades estadounidenses están trabajando activamente para detener el contrabando de este potente narcótico, que representa una grave amenaza para la salud pública.\n\nLa conexión entre el narcotráfico, el fraude financiero y el uso de criptomonedas, con implicaciones transnacionales, subraya la complejidad de los desafíos de seguridad y regulatorios actuales.", "why": "La interconexión entre el crimen organizado, las finanzas digitales y el tráfico de drogas plantea serios desafíos para la seguridad global y la regulación financiera.", "importance": 4, "relevance": 2, "tags": ["fentanilo", "criptomonedas", "fraude", "Japón"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F7%2F3%2F7%2F3%2F12633737-1-eng-GB%2F7751ea33fa8d-photo_SXM2026061800013674.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-21T20:53:06.615268+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/economy/trade-war/fentanyl-s-hidden-routes/chinese-fentanyl-network-suspected-of-crypto-fraud-via-japan-base", "type": "blog"}]}, {"id": "59544fbd6d", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "ByteDance pospone su salida a bolsa ante la incertidumbre del mercado chino", "summary": "ByteDance, la empresa matriz de TikTok, ha decidido aplazar sus planes de cotizar en bolsa, según fuentes internas. La compañía, que aspiraba a ser la primera empresa china en alcanzar una valoración de un billón de dólares, busca ahora un entorno de mercado más favorable.\n\nLa decisión se produce en un momento en que la economía china muestra cierta resiliencia, pero persisten las dudas sobre el sentimiento alcista en los mercados bursátiles. ByteDance ha estado explorando diferentes estrategias de financiación y listado, incluyendo la posibilidad de una oferta pública inicial en Hong Kong o Estados Unidos.\n\nEl aplazamiento de la salida a bolsa de ByteDance podría tener implicaciones para el sector tecnológico chino y para la percepción de las oportunidades de inversión en el país. La compañía, uno de los gigantes tecnológicos más valiosos del mundo, sigue siendo un actor clave en el panorama digital global.", "why": "Refleja la cautela de las grandes tecnológicas chinas ante las condiciones del mercado y la regulación, afectando las expectativas de valoración y financiación.", "importance": 3, "relevance": 3, "tags": ["ByteDance", "salida a bolsa", "China", "tecnología"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F8%2F8%2F7%2F6%2F12626788-2-eng-GB%2F4609ab638322-2026-06-15T024545Z_1856019783_RC2VQCAGY0QL_RTRMADP_3_CHINA-AI-SEMICONDUCTORS.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-21T20:53:06.218246+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/opinion/bytedance-sidelines-listing-as-china-s-first-1-trillion-valuation-nears", "type": "blog"}]}, {"id": "df2bdf744c", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Australia necesita interceptores baratos para drones de bajo coste, según análisis de conflictos recientes", "summary": "Australia debe reorientar urgentemente su programa de fabricación de municiones para producir drones interceptores capaces de neutralizar drones de ataque de bajo coste. Esta necesidad se desprende de las lecciones aprendidas en los conflictos de Ucrania e Irán, donde el uso masivo de drones baratos como los Shahed ha cambiado la dinámica de la guerra.\n\nEl alto coste de los sistemas de defensa tradicionales, como los interceptores PAC-3 estadounidenses que cuestan millones de dólares, hace inviable su uso masivo contra drones que valen decenas de miles de dólares. La guerra moderna exige soluciones más económicas y escalables, como la producción nacional rápida de interceptores.\n\nLa urgencia de esta adaptación es crítica para la defensa nacional. Australia debería buscar cooperación internacional, pero la prioridad inmediata es la movilización interna. La experiencia en Ucrania y Oriente Medio demuestra la capacidad de estos drones para causar daños significativos, lo que subraya la necesidad de una respuesta defensiva ágil y asequible.", "why": "Destaca la rápida evolución de la tecnología militar y la necesidad de adaptar las estrategias de defensa y producción a las nuevas amenazas de bajo coste.", "importance": 3, "relevance": 3, "tags": ["drones", "defensa", "Australia", "Ucrania"], "image": "https://www.aspistrategist.org.au/wp-content/uploads/2026/06/STING.jpg", "published": "2026-06-21T20:00:09+00:00", "sources": [{"name": "ASPI The Strategist", "url": "https://www.aspistrategist.org.au/to-beat-cheap-drones-australia-must-make-cheap-interceptors-quickly/", "type": "blog"}]}, {"id": "94e3c86b96", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "El Reino Unido, una década después del Brexit, muestra una creciente apertura a la reintegración con la UE", "summary": "Una década después del referéndum del Brexit, la opinión pública británica parece haber virado significativamente, con un 75% de los votantes deseando una relación más estrecha con la Unión Europea. Según una encuesta del European Council on Foreign Relations (ECFR), los británicos perciben el Brexit como un fracaso y ven en una mayor integración con la UE la clave para mejorar la economía, la seguridad y la gestión migratoria.\n\nLos resultados de la encuesta revelan un cambio generacional y de perspectiva, donde las antiguas divisiones entre \"leave\" y \"remain\" dan paso a nuevas categorizaciones como \"optimistas\" (a favor de la reintegración), \"realistas\" (buscando relaciones más cercanas negociadas) y \"aislacionistas\" (favoreciendo la distancia). Sorprendentemente, una mayoría se muestra abierta a la libertad de movimiento y a la participación en un sistema de disuasión nuclear europeo, y prefieren las relaciones con los estados de la UE e incluso con la propia UE por encima de las de Estados Unidos.\n\nEste cambio de sentimiento público plantea un desafío para la clase política británica, que se enfrenta a la necesidad de construir un consenso sobre las futuras relaciones con la UE que refleje la realidad de 2026 en lugar de las políticas de 2016. La creciente apertura a la UE contrasta con la percepción de que el Brexit no ha cumplido las expectativas, en un contexto global marcado por guerras comerciales, conflictos y el ascenso de China.", "why": "La opinión pública británica muestra un giro hacia una mayor cercanía con la Unión Europea, lo que podría reconfigurar las relaciones geopolíticas y económicas del Reino Unido.", "importance": 3, "relevance": 3, "tags": ["Brexit", "Unión Europea", "opinión pública"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F9005c81b-2506-4f13-8a00-76f21450564b.jpg?source=next-barrier-page", "published": "2026-06-21T17:15:10+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/0b0092ea-1fcd-4463-9e3b-c3d2a45d349f", "type": "blog"}, {"name": "ECFR", "url": "https://ecfr.eu/publication/brexit-isnt-working-british-voters-are-ready-for-a-european-future/", "type": "blog"}]}, {"id": "dff5e3ab1c", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Keir Starmer, primer ministro británico, estaría al borde de la dimisión ante presiones políticas", "summary": "Diversas informaciones apuntan a que Keir Starmer, actual primer ministro del Reino Unido, se encuentra en una situación política muy delicada y podría estar considerando su dimisión. La presión ha aumentado tras comentarios del expresidente estadounidense Donald Trump, quien sugirió que Starmer renunciaría pronto, criticando su gestión en materia de inmigración y energía, particularmente en lo referente a la explotación del petróleo del Mar del Norte.\n\nLos informes de medios como el Financial Times y Politico Europe indican que Starmer se ha retirado a Chequers, la residencia oficial del primer ministro, para reflexionar sobre su futuro político. La crisis interna en el Partido Laborista y las críticas externas, sumadas a un contexto de \"crisis política\" en el Reino Unido, parecen haber puesto a Starmer \"al borde de la dimisión\".\n\nLa situación es de alta expectación, ya que una posible dimisión de Starmer podría desencadenar un cambio significativo en el liderazgo del Reino Unido y reconfigurar el panorama político del país. Los analistas y observadores políticos están atentos a cualquier desarrollo que pueda confirmar o desmentir estos rumores y a las posibles repercusiones en la política nacional e internacional.", "why": "El liderazgo del primer ministro británico, Keir Starmer, se tambalea ante presiones internas y externas, lo que podría generar inestabilidad política en el Reino Unido.", "importance": 4, "relevance": 2, "tags": ["Reino Unido", "política", "liderazgo"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F9ee1c006-7b76-4419-a6d9-d59a8b6a17ac.jpg?source=next-barrier-page", "published": "2026-06-21T16:35:45+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/7852c1e4-9629-4a67-bf36-7177bc711e34", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/donald-trump-keir-starmer-uk-prime-minister-near-exit/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/ed96e673-8d46-4dec-aebc-d69863b9e801", "type": "blog"}]}, {"id": "2b5d32b3f6", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Asia lidera en rastreo de buques pesqueros, pero falla en la protección de sus tripulaciones", "summary": "A pesar de los avances tecnológicos en el monitoreo marítimo, incluyendo el uso de satélites e inteligencia artificial, que permiten un rastreo sin precedentes de la actividad pesquera global, persisten graves problemas de abusos laborales a bordo de embarcaciones. Informes recientes han destacado casos de explotación en pesquerías certificadas bajo estándares internacionales de sostenibilidad, poniendo en duda la efectividad de estos esfuerzos para garantizar el bienestar de los trabajadores.\n\nAsia ha experimentado una transformación rápida en la vigilancia marítima, haciendo que vastos dominios oceánicos sean cada vez más transparentes. Sistemas de monitoreo de embarcaciones y plataformas digitales permiten identificar movimientos, supervisar esfuerzos de pesca y detectar violaciones a una escala inimaginable hace una década. Según el informe anual de Global Fishing Watch, la organización apoya el monitoreo en más de [cifra no especificada] de espacios oceánicos.\n\nExiste una brecha creciente entre la visibilidad tecnológica y la protección humana. Mientras gobiernos, minoristas y reguladores enfrentan presión para asegurar que el marisco sea no solo ambientalmente sostenible sino también socialmente responsable, la falta de atención al bienestar de las personas que trabajan en el mar se convierte en un punto ciego crítico en la gobernanza pesquera.", "why": "La tecnología de IA y monitoreo marítimo mejora la trazabilidad pesquera, pero no aborda la explotación laboral, evidenciando una desconexión entre la sostenibilidad ambiental y social.", "importance": 3, "relevance": 3, "tags": ["IA", "Pesca", "Asia", "Derechos laborales"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/06/17/4ee6002a-9d3f-4b78-8f85-cb2b516cb494_4ff489a4.jpg?itok=gC-DJ3go&v=1781678028", "published": "2026-06-20T21:30:05+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/opinion/asia-opinion/article/3357392/asia-excels-tracking-fishing-vessels-fails-those-board?utm_source=rss_feed", "type": "blog"}]}, {"id": "3c2c90a8eb", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Kevin Warsh aboga por eliminar la orientación de la Fed, advierten los inversores", "summary": "El exgobernador de la Reserva Federal de EE. UU., Kevin Warsh, ha propuesto eliminar la orientación prospectiva de la Fed, una medida que, según advierten los inversores, podría aumentar los costes de endeudamiento en Estados Unidos. Esta propuesta busca devolver al mercado una mayor capacidad de fijación de precios, pero genera preocupación por la volatilidad y la incertidumbre en los mercados financieros.\n\nLa orientación de la Fed se refiere a las comunicaciones del banco central sobre sus futuras intenciones de política monetaria, que actualmente ayudan a guiar las expectativas del mercado. Eliminar esta guía podría hacer que los inversores tengan que basarse más en sus propias predicciones, lo que podría llevar a movimientos más bruscos en los tipos de interés y otros activos financieros.\n\nLos inversores y analistas están vigilando de cerca cómo cualquier cambio en la comunicación de la Fed podría afectar la estabilidad financiera y el coste del capital para empresas y consumidores. La incertidumbre generada por la eliminación de la orientación podría tener implicaciones significativas para la economía estadounidense.", "why": "Los cambios en la política de comunicación de la Reserva Federal de EE. UU. pueden tener un impacto directo en los costes de financiación a nivel global.", "importance": 4, "relevance": 1, "tags": ["Reserva Federal", "tipos de interés", "mercados financieros"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Ffc0c7b4c-9d1f-4ecb-8042-1189a672f5d5.jpg?source=next-barrier-page", "published": "2026-06-21T18:00:01+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/6a9330ad-a2db-494b-bf61-7dd417ab9c9a", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

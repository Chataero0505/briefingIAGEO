e la UE", "summary": "Irlanda, en su próxima presidencia del Consejo de la UE, planea impulsar normativas a nivel europeo sobre la edad mínima para acceder a servicios online y fortalecer la protección de la infancia en el entorno digital. El primer ministro Micheál Martin ha destacado la verificación de edad como un factor clave.\n\nParalelamente, Irlanda se ha fijado como objetivo potenciar la competitividad europea en inteligencia artificial, reconociendo que Europa se encuentra rezagada frente a Estados Unidos y China en este ámbito. Se busca fomentar la innovación y el desarrollo tecnológico en la región.\n\nLa presidencia irlandesa abordará así dos frentes cruciales: la seguridad de los menores en el ciberespacio y la necesidad estratégica de que Europa recupere terreno en la carrera global por la supremacía en IA.", "why": "La presidencia irlandesa de la UE se centrará en la seguridad infantil online y en impulsar la competitividad europea en IA frente a EE. UU. y China.", "importance": 3, "relevance": 5, "tags": ["UE", "IA", "Regulación", "Seguridad infantil"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2271039435-1.jpg", "published": "2026-06-10T16:32:51+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/ireland-targets-childrens-online-safety-in-eu-presidency-plans/", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/eu-tells-ai-companies-how-they-can-make-their-content-detectable/", "type": "blog"}]}, {"id": "b4af6ef7c0", "category": "cruce", "topic": "ia", "subtopic": "Regulación", "cruce": true, "title": "La UE pide a las empresas de IA que hagan sus contenidos detectables", "summary": "La Unión Europea está instando a las empresas de inteligencia artificial a implementar medidas para que los contenidos generados por IA, como vídeos, imágenes o textos, sean fácilmente detectables.\n\nEste código de transparencia final busca ofrecer \"soluciones\" para identificar la autoría de contenido creado por sistemas de IA, abordando las preocupaciones sobre la desinformación y la manipulación.\n\nLa iniciativa se enmarca en los esfuerzos de la UE por regular el desarrollo y uso de la IA, buscando un equilibrio entre la innovación y la protección de los ciudadanos y la integridad de la información.", "why": "La UE busca que los contenidos generados por IA sean identificables, un paso más en su estrategia de regulación del sector.", "importance": 3, "relevance": 5, "tags": ["UE", "IA", "Regulación", "Transparencia"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/Neura-Robotics-at-event-1.jpg", "published": "2026-06-10T16:22:34+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/10/neura-robotics-raises-record-series-c-of-1-4-billion-to-accelerate-physical-ai-platform/102443/", "type": "blog"}, {"name": "Sifted", "url": "https://sifted.eu/articles/neura-robotics-1-4bn-series-c/", "type": "blog"}, {"name": "The Robot Report", "url": "https://www.therobotreport.com/neura-robotics-raise-up-1-4b-in-series-c-funding-physical-ai/", "type": "blog"}]}, {"id": "b407bfca88", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "La startup alemana Neura recauda 1.400 millones de dólares para su impulso en robots humanoides", "summary": "La startup alemana Neura ha logrado una financiación de 1.400 millones de dólares, destinada a impulsar su desarrollo en el campo de los robots humanoides. Esta importante inyección de capital subraya el creciente interés y la inversión en la robótica avanzada y la inteligencia artificial aplicada a la manufactura y otras industrias.\n\nAunque el artículo original no proporciona detalles específicos sobre la empresa, la cantidad recaudada sugiere una ambiciosa estrategia de crecimiento y desarrollo tecnológico. La robótica humanoide es un área de investigación y desarrollo con un potencial transformador para la automatización industrial y la interacción humano-robot.\n\nLa noticia, aunque incompleta en su descripción, señala una tendencia clara hacia la inversión masiva en tecnologías de vanguardia. El éxito de Neura en la captación de fondos podría sentar un precedente para otras startups del sector y acelerar la adopción de robots humanoides en diversas aplicaciones.", "why": "Una startup alemana capta una financiación masiva para el desarrollo de robots humanoides, señalando un avance significativo en el sector de la robótica.", "importance": 4, "relevance": 4, "tags": ["IA", "Robótica", "Financiación", "Alemania"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F0%2F5%2F5%2F12595505-1-eng-GB%2F966fbfe8bddb-photo_SXM2026060200007767.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T16:52:57.292125+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/travel-leisure/rural-japan-hopes-to-charm-domestic-travelers-priced-out-of-overseas-trips", "type": "blog"}]}, {"id": "9fb3cbd4b3", "category": "cruce", "topic": "geo", "subtopic": "Energía", "cruce": true, "title": "TDK adquiere fabricante estadounidense de componentes de refrigeración para centros de datos de IA por hasta 400 millones de dólares", "summary": "El gigante japonés TDK invertirá hasta 400 millones de dólares para adquirir la startup estadounidense Fabric8Labs, especializada en componentes de refrigeración. La operación busca capitalizar la creciente demanda de soluciones eficientes para centros de datos de inteligencia artificial.\n\nFabric8Labs utiliza tecnología de impresión 3D para disipar el calor de las GPUs de manera más eficaz. Con esta adquisición, TDK pretende fortalecer su competitividad tecnológica en el sector de los centros de datos.\n\nLa adquisición subraya la importancia estratégica de la refrigeración en la infraestructura de IA y la creciente necesidad de hardware especializado para soportar la potencia computacional requerida por los modelos de IA más avanzados.", "why": "Una empresa de componentes electrónicos invierte en tecnología de refrigeración avanzada para centros de datos de IA, reconociendo la importancia de la infraestructura física para el avance de la IA.", "importance": 3, "relevance": 4, "tags": ["IA", "Centros de datos", "Hardware", "Refrigeración"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F3%2F5%2F2%2F0%2F12600253-1-eng-GB%2F76bbafc9f307-20260610N-TDK-logo.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T16:52:52.410231+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/business-deals/tdk-to-buy-us-maker-of-ai-data-center-cooling-components-for-up-to-400m", "type": "blog"}]}, {"id": "06aedc5b33", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Exportaciones estadounidenses de chatarra de tungsteno a Japón se disparan ante las restricciones chinas", "summary": "Los envíos de tungsteno reciclado de EE. UU. a Japón han aumentado drásticamente, ya que las restricciones de exportación impuestas por China están obligando a las empresas a buscar fuentes alternativas de este metal crítico.\n\nLos precios de la chatarra de tungsteno se cuadruplicaron aproximadamente en mayo en comparación con el año anterior. China, un actor dominante en el mercado del tungsteno, está compitiendo por material reciclado para salvaguardar su propio suministro.\n\nEsta situación pone de manifiesto la fragilidad de las cadenas de suministro de materiales críticos y la creciente competencia geopolítica por recursos esenciales para la industria y la tecnología avanzada.", "why": "Las restricciones chinas sobre materiales críticos como el tungsteno están alterando las cadenas de suministro globales y provocando un aumento de los precios y la búsqueda de alternativas.", "importance": 3, "relevance": 4, "tags": ["Tungsteno", "China", "Cadena de suministro", "Materiales críticos"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F1%2F3%2F7%2F0%2F12600731-2-eng-GB%2Ffb3b90de685a-2026-01-22T161820Z_841972025_RC2F6JAIHFSC_RTRMADP_3_USA-CHINA-RAREEARTHS.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T16:52:52.015342+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/supply-chain/us-tungsten-scrap-exports-to-japan-soar-on-chinese-curbs", "type": "blog"}]}, {"id": "0756ca6276", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Empresas de EE. UU. apuestan por China a pesar de los crecientes riesgos económicos y políticos", "summary": "Una encuesta anual revela que las empresas estadounidenses están redoblando su apuesta por China, impulsadas por la recuperación de la rentabilidad, a pesar de que la desaceleración económica del país asiático sigue afectando el sentimiento empresarial.\n\nLas preocupaciones sobre el crecimiento de China se situaron como el segundo desafío más importante para las empresas estadounidenses este año, un ascenso desde la quinta posición del año anterior. Sin embargo, los beneficios están mejorando, aunque las tarifas arancelarias continúan siendo una carga.\n\nEsta tendencia subraya la compleja relación entre las empresas estadounidenses y el mercado chino, donde los riesgos políticos y económicos coexisten con oportunidades de rentabilidad significativas.", "why": "Las empresas estadounidenses mantienen una fuerte presencia en China, incluso ante un entorno de crecientes tensiones y desaceleración económica.", "importance": 3, "relevance": 3, "tags": ["EE. UU.", "China", "Comercio", "Riesgos"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F3%2F6%2F0%2F12600636-1-eng-GB%2F3b403a8ded7b-US-CHina.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T16:52:53.735025+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/business-trends/us-firms-see-china-as-essential-despite-rising-economic-and-political-risks", "type": "blog"}]}, {"id": "88daf9ade3", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Brookfield apuesta por su negocio en Japón para superar a Hong Kong y Singapur", "summary": "Brookfield Asset Management está ampliando su oferta de inversiones alternativas para clientes de alto patrimonio en Japón. La firma está promocionando activos como infraestructuras y bienes raíces como cobertura contra la inflación y la volatilidad del mercado.\n\nLa estrategia de Brookfield se centra en aprovechar el potencial del mercado japonés, ofreciendo productos de inversión privada que históricamente han demostrado ser refugios seguros en tiempos de incertidumbre económica. La compañía, fundada en 1899, tiene experiencia en inversiones en infraestructuras, incluyendo energías renovables, servicios públicos y centros de datos.\n\nEsta apuesta por Japón se produce en un contexto de búsqueda de diversificación y protección de capital por parte de los inversores. La fortaleza de los activos reales y la infraestructura como inversiones alternativas podría ganar relevancia ante las fluctuaciones de los mercados financieros tradicionales.", "why": "Brookfield busca consolidar su presencia en Japón mediante inversiones alternativas, posicionándolo como un mercado clave frente a otros centros asiáticos.", "importance": 3, "relevance": 2, "tags": ["Inversiones", "Japón", "Infraestructura", "Economía"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F0%2F2%2F0%2F2%2F12582020-1-eng-GB%2Fd490f727c078-photo_SXM2022120800011210d.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T16:52:54.585194+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/sports/world-cup-tests-asia-s-appetite-for-costly-broadcast-rights", "type": "blog"}]}, {"id": "55be1282e5", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "El interior de Japón busca atraer a viajeros nacionales ante el encarecimiento de los viajes al extranjero", "summary": "Regiones menos visitadas de Japón, como Miyazaki y Akita, están lanzando campañas para atraer a turistas domésticos. Esta estrategia responde al aumento de los costes de los viajes internacionales, que disuade a muchos japoneses de viajar al extranjero.\n\nLas prefecturas ofrecen descuentos en hoteles y promociones especiales para incentivar el turismo interno. El objetivo es dinamizar la economía local y ofrecer alternativas atractivas a los viajeros que buscan experiencias de calidad sin incurrir en gastos excesivos.\n\nEsta tendencia refleja un ajuste en los patrones de consumo turístico a nivel global, donde la búsqueda de valor y la optimización del presupuesto de viaje se vuelven prioritarias. La promoción del turismo interno puede ser una estrategia clave para la recuperación y el desarrollo de economías regionales.", "why": "Las regiones rurales de Japón se adaptan al alza de precios internacionales para potenciar el turismo doméstico.", "importance": 2, "relevance": 1, "tags": ["Turismo", "Japón", "Economía"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F4%2F8%2F3%2F2%2F12582384-2-eng-GB%2F1c3872ca1c38-3t.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T16:52:55.964785+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/finance/brookfield-bets-on-its-japan-business-to-top-hong-kong-and-singapore", "type": "blog"}]}, {"id": "a28087ff24", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "El Mundial de Fútbol pone a prueba el apetito de Asia por los costosos derechos de transmisión", "summary": "Asia, a pesar de ser la mayor audiencia para la FIFA, enfrenta un desafío con los derechos de transmisión del próximo Mundial en Norteamérica. Los elevados costes y los horarios de emisión nocturna en la mayor parte de la región han llevado a los broadcasters a negociar a la baja las tarifas.\n\nLa complejidad de la situación se ve agravada por los nuevos hábitos de consumo de medios y el auge del streaming, que alteran los modelos de negocio tradicionales de la radiodifusión deportiva. Los patrocinadores y las plataformas de transmisión buscan adaptarse a estas nuevas realidades para maximizar su alcance y rentabilidad.\n\nEste escenario pone de manifiesto la tensión entre el valor de las audiencias masivas y la sostenibilidad económica de los derechos deportivos. La capacidad de la FIFA para mantener sus ingresos y la de los broadcasters para ofrecer contenidos atractivos a precios razonables serán factores clave en el futuro de la transmisión de eventos deportivos globales.", "why": "Los altos costes y los horarios del Mundial en Asia generan tensión entre la FIFA y las cadenas de televisión, afectando la distribución del evento.", "importance": 2, "relevance": 1, "tags": ["Deportes", "Asia", "Derechos de transmisión", "Economía"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F0%2F1%2F9%2F12599105-1-eng-GB%2Fe8602c410817-IMG_5928.jpeg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T16:52:54.486966+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/economy/fires/manslaughter-other-charges-filed-over-hong-kong-s-wang-fuk-court-fire", "type": "blog"}]}, {"id": "d45fdcdb1d", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Nippon Life aumenta sus activos en crédito privado hasta 4.600 millones de dólares", "summary": "Nippon Life Insurance ha invertido 750.000 millones de yenes (4.670 millones de dólares) en crédito privado, lo que representa el 0,9% de sus activos totales bajo gestión, según informó la compañía japonesa.\n\nLa subsidiaria estadounidense, Resolution Life, ya gestiona 20.000 millones de dólares en crédito privado. Nippon Life busca así diversificar sus inversiones hacia activos alternativos para mejorar sus rendimientos.\n\nEsta estrategia de inversión en crédito privado se alinea con la tendencia de las grandes aseguradoras japonesas de buscar fuentes de ingresos más allá de los bonos tradicionales, ante un entorno de bajos tipos de interés.", "why": "Una de las mayores aseguradoras de Japón está incrementando su exposición a activos alternativos como el crédito privado para mejorar la rentabilidad.", "importance": 2, "relevance": 1, "tags": ["Japón", "Inversión", "Crédito privado"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F8%2F1%2F0%2F12600185-1-eng-GB%2Fcff66c831270-20260610N-Nissay-logo.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T16:52:52.989265+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/insurance/nippon-life-s-private-credit-assets-reach-4.6bn", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

ploads/2026/06/about-amazon-hero-ai-merch-hero-amazon-news-lt-060226.jpg?resize=1200,675", "published": "2026-06-08T15:49:12+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/08/amazon-now-lets-you-design-custom-merch-using-ai/", "type": "blog"}]}, {"id": "5a30426097", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Startup china de camiones eléctricos Windrose enfrenta reclamos por salarios impagos", "summary": "Windrose, una startup de camiones eléctricos fundada por un empresario chino que generó gran atención mediática, está teniendo dificultades para cumplir sus ambiciosos objetivos en Estados Unidos. Ex empleados denuncian que la compañía les adeuda cientos de miles de dólares en salarios.\n\nLa empresa, que se presentó como una sensación internacional, parece estar luchando por materializar sus planes de expansión y penetración en el mercado estadounidense. El fundador ha admitido \"errores\" en la gestión, pero insiste en continuar con el proyecto.\n\nEsta situación pone de manifiesto los desafíos que enfrentan las startups tecnológicas internacionales al intentar establecerse en mercados competitivos como el de EE. UU., especialmente en el sector de vehículos eléctricos, y plantea interrogantes sobre su viabilidad a largo plazo y la gestión de sus compromisos financieros.", "why": "La startup de camiones eléctricos Windrose enfrenta serios problemas financieros y de gestión en EE. UU., lo que pone en duda la viabilidad de sus ambiciosos planes y la competencia tecnológica con empresas locales.", "importance": 2, "relevance": 3, "tags": ["vehículos eléctricos", "China", "EE. UU.", "startup"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F1%2F5%2F1%2F2%2F12592151-1-eng-GB%2F75f45950ce62-Windrose_Golden-Gate-Bridge.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-09T09:36:10.039654+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/automobiles/electric-vehicles/chinese-entrepreneur-s-e-truck-startup-windrose-faces-unpaid-wage-claims", "type": "blog"}]}, {"id": "a083c34b59", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Ucrania mejora tácticamente pero Rusia mantiene ventaja estructural en el frente", "summary": "Las fuerzas ucranianas han logrado mejoras tácticas significativas en el frente de guerra, recuperando terreno e iniciativa en ciertos ámbitos y demostrando una mayor capacidad para ejecutar ataques quirúrgicos y degradar capacidades logísticas rusas, especialmente mediante el uso de drones. Esta evolución ha generado una narrativa de reversión de la dinámica del conflicto.\n\nSin embargo, el análisis subraya que estos avances tácticos no alteran el equilibrio estructural de la guerra, que sigue favoreciendo a Rusia. La estrategia rusa se centra en el desgaste y en objetivos estructurales, como el debilitamiento del sistema energético ucraniano y la erosión de su resistencia a largo plazo.\n\nLa situación actual indica que, si bien Ucrania ha mejorado su adaptabilidad y capacidad de respuesta en el plano táctico, la guerra mantiene factores definitorios que otorgan a Rusia una ventaja inherente. La continuación de la estrategia de desgaste rusa y sus objetivos sistémicos son elementos clave a vigilar en el desarrollo futuro del conflicto.", "why": "Evalúa el estado actual del conflicto en Ucrania, destacando las mejoras tácticas ucranianas frente a las ventajas estructurales rusas.", "importance": 4, "relevance": 2, "tags": ["Ucrania", "Rusia", "Guerra"], "image": "https://www.descifrandolaguerra.es/wp-content/uploads/2026/06/ucrania-guerra-rusia.jpg", "published": "2026-06-09T06:11:21+00:00", "sources": [{"name": "Descifrando la Guerra", "url": "https://www.descifrandolaguerra.es/ucrania-frente-equilibrio-guerra/", "type": "blog"}]}, {"id": "5b3d57bb04", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Beneficios de aerolíneas globales caerán a la mitad por altos costos de combustible y guerra en Irán", "summary": "La principal asociación del sector prevé que los beneficios de las aerolíneas a nivel mundial se reducirán a la mitad este año. Esta drástica caída se atribuye a la prolongada guerra en Irán, que está deprimiendo la demanda en la región, y al consecuente aumento de los precios del combustible para aviones.\n\nLa situación actual está generando expectativas de un aumento en las fusiones y adquisiciones dentro del sector, ya que las aerolíneas lucharán por su supervivencia en un mercado cada vez más desafiante. Los altos costos operativos, especialmente los relacionados con el combustible, ejercen una presión significativa sobre los márgenes de beneficio.\n\nSe espera que esta tendencia afecte a la rentabilidad general de la industria de la aviación, obligando a las empresas a buscar estrategias de consolidación o eficiencia para mitigar el impacto económico adverso. La inestabilidad geopolítica y la volatilidad de los precios de la energía son factores clave a vigilar.", "why": "El encarecimiento del combustible y la inestabilidad geopolítica amenazan la rentabilidad del sector aéreo global, con posibles repercusiones en la cadena de suministro y el comercio.", "importance": 3, "relevance": 2, "tags": ["aviación", "combustible", "geopolítica", "economía"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F0%2F6%2F6%2F1%2F12591660-3-eng-GB%2F1ee9eec1591b-photo_SXM2026060700005286.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-09T09:36:10.427325+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/business-trends/global-airline-profits-projected-to-drop-by-half-as-jet-fuel-costs-soar", "type": "blog"}]}, {"id": "5b8c57b5b8", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Bank Indonesia sube tipos de interés de emergencia para defender la rupia", "summary": "El Banco de Indonesia anunció una subida de tipos de interés de 25 puntos básicos, hasta el 5,5%, tras una reunión de emergencia no programada. Esta medida se tomó para intentar estabilizar la moneda nacional, la rupia, que ha estado sufriendo presiones de venta persistentes.\n\nLas reservas de divisas del país han alcanzado su nivel más bajo en dos años, lo que subraya la urgencia de la situación. La decisión de subir los tipos de interés de forma inesperada busca atraer capital extranjero y frenar la depreciación de la rupia.\n\nLa rupia indonesia ha experimentado una depreciación significativa, lo que puede tener implicaciones para la inflación y el costo de las importaciones. La intervención del banco central es un intento por mantener la estabilidad económica y financiera del país en un entorno global volátil.", "why": "La subida de tipos de interés en Indonesia refleja la presión sobre las divisas emergentes y la necesidad de defender la estabilidad económica ante la volatilidad financiera global.", "importance": 3, "relevance": 2, "tags": ["Indonesia", "tipos de interés", "divisas", "economía"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F0%2F1%2F6%2F11596105-1-eng-GB%2Fe5a2040291ee-2018-08-13T074540Z_517365987_RC1C1EFF4B80_RTRMADP_3_INDONESIA-RUPIAH-1-.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-09T09:36:10.159870+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/economy/bank-indonesia-raises-rates-0.25-at-emergency-meeting-to-defend-rupiah", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/f8fb7ef5-03df-4c09-bca9-2bd4beda4e20", "type": "blog"}]}, {"id": "9dc6863672", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Elecciones en Corea del Sur: el legado de Yoon sobrevive parcialmente a la victoria progresista", "summary": "Los resultados de las recientes elecciones en Corea del Sur muestran una victoria progresista, aunque el legado del presidente Yoon Ha-myung parece haber sobrevivido parcialmente. La normalización de las relaciones con Japón ha sido aceptada, mientras que la política de \"ley marcial\" ha fragmentado a los conservadores.\n\nEl panorama político se presenta complejo, con divisiones significativas dentro del espectro conservador. La influencia de la política de \"ley marcial\", un término que podría referirse a medidas de seguridad o control excepcionales, ha generado una fragmentación entre los votantes y las facciones conservadoras.\n\nLa noticia sugiere que, a pesar de la victoria progresista, las políticas y el legado de la administración anterior siguen teniendo un impacto en la configuración del escenario político surcoreano, con implicaciones para las relaciones exteriores y la estabilidad interna.", "why": "Los resultados electorales en Corea del Sur indican una compleja reconfiguración política con implicaciones para las relaciones regionales y la estabilidad interna.", "importance": 3, "relevance": 2, "tags": ["Corea del Sur", "elecciones", "política", "Asia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F7%2F1%2F8%2F12578176-2-eng-GB%2Fc6bc56f9e922-2026-05-19T144643Z_1140740859_RC2ECLA4ZLAI_RTRMADP_3_SOUTHKOREA-JAPAN-1-.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-09T09:36:09.916006+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/opinion/south-korea-election-yoon-s-legacy-partially-survives-progressive-victory", "type": "blog"}]}, {"id": "ed2a0b33e6", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Bangladesh inicia una reconstrucción democrática tras el colapso de la autocracia", "summary": "Bangladesh se encuentra en un periodo de profunda incertidumbre y reconstrucción democrática tras el colapso de la autocracia de Sheikh Hasina en agosto de 2024. El reciente resultado electoral, que otorgó una mayoría de dos tercios al Partido Nacionalista de Bangladesh (BNP) y a su líder Tarique Rahman como primer ministro, marca un punto de inflexión histórico.\n\nEl nuevo gobierno enfrenta el desafío de desmantelar la cultura política de \"el ganador se lo lleva todo\" y honrar el legado de figuras clave en la historia del país, como Ziaur Rahman, fundador de la industria textil, y Begum Khaleda Zia, líder del movimiento democrático. Rahman busca equilibrar estas responsabilidades con la gestión de la \"aplastante responsabilidad\" del mandato recibido.\n\nLa transición política en Bangladesh es un caso de estudio sobre la consolidación democrática y la reforma institucional en un país densamente poblado. La forma en que el nuevo gobierno aborde los desafíos económicos y sociales, así como su relación con la industria textil, será crucial para su estabilidad y desarrollo futuro.", "why": "La estabilidad política y la reconstrucción institucional en economías emergentes son fundamentales para la resiliencia de las cadenas de suministro globales y el desarrollo industrial.", "importance": 3, "relevance": 2, "tags": ["Bangladesh", "Democracia", "Política", "Economía"], "image": "https://asiatimes.com/wp-content/uploads/2026/06/Bangladesh-Tarique-Rahman.jpg", "published": "2026-06-09T09:12:13+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/front-row-view-of-bangladeshs-democratic-reconstruction/", "type": "blog"}]}, {"id": "52e211a782", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Airbus impulsa una alianza liderada por Alemania para reemplazar cazas obsoletos", "summary": "Airbus está planeando la creación de una alianza liderada por Alemania con el objetivo de desarrollar y reemplazar el programa de cazas Eurofighter, que enfrenta dificultades.\n\nLa iniciativa busca asegurar la futura capacidad de defensa aérea europea mediante la colaboración industrial y tecnológica.\n\nEsta propuesta surge en un contexto de reevaluación de las capacidades militares y la necesidad de modernización en Europa.", "why": "La formación de esta alianza es crucial para la soberanía tecnológica y la capacidad de defensa de Europa en el sector aeroespacial militar.", "importance": 3, "relevance": 2, "tags": ["Defensa", "Airbus", "Alemania", "Aeroespacial"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Ffed10468-020f-425c-8388-05a30dd24031.jpg?source=next-barrier-page", "published": "2026-06-09T08:20:58+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/b326330d-41fa-45df-ab3d-7826b16bf7c9", "type": "blog"}]}, {"id": "c51c935b9c", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "India: Evaluación de dos años del tercer mandato de Modi y reformas económicas", "summary": "El Primer Ministro de la India, Narendra Modi, cumplirá dos años en su tercer mandato el 9 de junio de 2026. Este hito sirve como un momento propicio para evaluar el progreso de la India en materia de reformas económicas, un análisis que se aborda a través del \"India Reforms Scorecard\" desarrollado por el CSIS.\n\nEl informe, presentado por Aryan D’Rozario, Associate Fellow de la Cátedra de India en el CSIS, busca responder a la pregunta sobre el estado actual de las reformas económicas en el país. El CSIS se define como un think tank independiente enfocado en seguridad nacional, que busca ofrecer soluciones bipartidistas a desafíos globales.\n\nLa noticia se centra en la evaluación del desempeño económico de la India bajo el liderazgo de Modi, un tema relevante para la geopolítica y la economía global, especialmente considerando el creciente peso de la India en la escena internacional. Se espera que el análisis del \"India Reforms Scorecard\" ofrezca una perspectiva detallada sobre los avances y desafíos en la agenda de reformas del país.", "why": "Se evalúa el progreso de las reformas económicas en la India tras dos años del tercer mandato del Primer Ministro Modi, un actor clave en la geopolítica y economía global.", "importance": 3, "relevance": 2, "tags": ["India", "Reformas económicas", "Narendra Modi"], "image": "https://i2.ytimg.com/vi/muTGYajUXDo/hqdefault.jpg", "published": "2026-06-08T15:00:07+00:00", "sources": [{"name": "CSIS (YT)", "url": "https://www.youtube.com/shorts/muTGYajUXDo", "type": "youtube"}]}, {"id": "fe582c111c", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "El Banco de Japón se prepara para subir las tasas de interés al 1%", "summary": "El Banco de Japón (BoJ) se dispone a elevar su tipo de interés clave del 0,75% al 1% en su próxima reunión de política monetaria los días 15 y 16 de junio. Esta decisión responde a los crecientes riesgos de inflación que enfrenta la economía japonesa.\n\nAdemás de la subida de tipos, el BoJ está considerando pausar la reducción de sus compras de bonos del gobierno, un programa que se inició en abril de 2027. Estas medidas marcan un giro en la política monetaria ultraexpansiva que Japón ha mantenido durante años, buscando normalizar las condiciones financieras y controlar la inflación.\n\nLa evolución de la política monetaria japonesa será un factor a observar en el contexto económico global, especialmente en relación con la fortaleza del yen y los flujos de capital internacionales.", "why": "Un cambio en la política monetaria de Japón puede tener repercusiones significativas en los mercados financieros globales y en la economía internacional.", "importance": 3, "relevance": 1, "tags": ["Banco de Japón", "Tasas de interés", "Inflación", "Economía"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F1%2F3%2F3%2F3%2F12593331-2-eng-GB%2F78fdef89095a-photo_SXM2026042800010212.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-09T09:36:09.006231+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/economy/bank-of-japan/bank-of-japan-set-to-hike-key-interest-rate-to-1", "type": "blog"}]}, {"id": "594c977064", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "La inmigración europea en España: perfil y tendencias", "summary": "La inmigración europea en España, que representa una cuarta parte del total de inmigrantes (aproximadamente 2.400.000 personas), es un fenómeno antiguo y diverso. El número de europeos que residen en España duplica al de españoles que viven en otros países europeos.\n\nEsta población inmigrante procede en gran medida de países con una renta per cápita superior a la española. A diferencia de la tendencia del siglo XX, donde predominaba la \"migración de jubilados\", la inmigración europea actual está compuesta mayoritariamente por población activa, con altos niveles educativos, que ocupa puestos de trabajo cualificados y percibe salarios superiores a la media española. Sin embargo, se observa una disminución en la inmigración rumana y búlgara, con un retorno significativo a sus países de origen en los últimos 15 años.\n\nLas tasas de actividad y ocupación de los inmigrantes europeos son similares a las de la población autóctona, aunque con una ligera menor participación femenina. Su presencia es notable en el sector inmobiliario (16%), reflejando una concentración geográfica en zonas turísticas, y en conjunto ocupan el 6,3% de los puestos de trabajo en España.", "why": "Proporciona datos clave sobre la composición y el impacto de la inmigración europea en el mercado laboral español.", "importance": 3, "relevance": 1, "tags": ["inmigración", "mercado laboral", "España", "Europa"], "image": "https://media.realinstitutoelcano.org/wp-content/uploads/2026/06/20260609-gonzalez-martinez-inmigracion-y-mercado-de-trabajo-en-espana-la-inmigracion-europea.jpg", "published": "2026-06-09T09:00:00+00:00", "sources": [{"name": "Real Instituto Elcano", "url": "https://www.realinstitutoelcano.org/analisis/inmigracion-y-mercado-de-trabajo-en-espana-v-la-inmigracion-europea/", "type": "blog"}]}, {"id": "c2b197faed", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "GSK adquiere la biotecnológica estadounidense Nuvalent por 10.600 millones de dólares", "summary": "La farmacéutica británica GSK ha anunciado la adquisición de la empresa biotecnológica estadounidense Nuvalent, especializada en oncología, por un valor total de 10.600 millones de dólares.\n\nLa operación se enmarca en la estrategia de GSK de fortalecer su cartera de tratamientos contra el cáncer, un área terapéutica clave para la compañía.\n\nEsta adquisición representa una inversión significativa en el sector de la biotecnología y la investigación farmacéutica.", "why": "La compra de Nuvalent por GSK demuestra la continua consolidación y la alta valoración de las empresas biotecnológicas en el sector de la salud.", "importance": 3, "relevance": 1, "tags": ["Fusiones y Adquisiciones", "Biotecnología", "Farmacéutica", "Oncología"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F8ed7f5ed-87d7-4d56-a68d-f8a02b9948ac.jpg?source=next-barrier-page", "published": "2026-06-09T08:31:19+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/c22fca23-2917-420b-9538-744a093d4b47", "type": "blog"}]}, {"id": "d0c45ee263", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "El político británico Andy Burnham, bajo escrutinio por sus posturas migratorias y el plan de defensa del Reino Unido", "summary": "Andy Burnham, figura política británica, se encuentra en el centro de la atención mediática tras comentarios que sugieren una postura más firme en materia de inmigración, lo que ha llevado a comparaciones con Nigel Farage. Paralelamente, el plan de inversión en defensa del Reino Unido genera incertidumbre, con informes que indican que los altos mandos militares aún desconocen los detalles del mismo.\n\nEl debate se intensifica ante la preparación del Secretario de Defensa, John Healey, para defender la necesidad de aumentar la producción de equipamiento militar en el país. Sin embargo, persisten las dudas sobre la disponibilidad de fondos y la voluntad política para respaldar estas ambiciones.\n\nAdemás, se analizan los últimos sondeos de opinión, evaluando si la respuesta del partido Reform UK a un incidente reciente ha logrado resonar entre el electorado.", "why": "La política interna de un país clave como el Reino Unido, especialmente en áreas sensibles como defensa e inmigración, tiene implicaciones más allá de sus fronteras.", "importance": 3, "relevance": 1, "tags": ["Reino Unido", "Política", "Defensa", "Inmigración"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2025/03/27/PASAA_PODCAST-HERO-16BY9.png", "published": "2026-06-09T07:28:17+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/podcast/politics-at-sam-and-annes/why-burnham-agrees-with-farage/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "ca5bebdd7e", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Debate sobre la estrategia política de Keir Starmer", "summary": "El artículo plantea interrogantes sobre la postura y las decisiones estratégicas de Keir Starmer, líder del Partido Laborista británico.\n\nSe analiza la posible dicotomía entre una estrategia de confrontación o de ceder ante presiones políticas.\n\nLa noticia se centra en la política interna del Reino Unido.", "why": "La estrategia política de líderes clave puede tener un impacto significativo en el panorama político y económico de un país.", "importance": 2, "relevance": 1, "tags": ["Política", "Reino Unido", "Estrategia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Fc2f207d4-2a40-4f5b-bab6-cd370606bdf0.jpg?source=next-barrier-page", "published": "2026-06-09T08:30:05+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/a3fdcb1a-901d-47ac-82c2-ed92f4eaf597", "type": "blog"}]}, {"id": "b9302a6795", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Estrategias para evitar la rendición de cuentas tras un error de juicio estratégico", "summary": "El artículo reflexiona sobre los mecanismos que utilizan los analistas y asesores políticos para evadir la responsabilidad cuando sus predicciones o recomendaciones estratégicas resultan erróneas.\n\nSe discuten las dificultades inherentes a admitir errores en el ámbito de la política y la estrategia internacional, y las posibles consecuencias de consejos mal concebidos.\n\nLa pieza analiza cómo, a pesar de la falibilidad humana, existen formas de sortear la rendición de cuentas en el complejo mundo de la política exterior.", "why": "Comprender cómo se gestionan los errores en el asesoramiento estratégico es fundamental para evaluar la toma de decisiones en política internacional.", "importance": 2, "relevance": 1, "tags": ["Política Internacional", "Asesoramiento", "Estrategia"], "image": "https://foreignpolicy.com/wp-content/uploads/2026/06/GettyImages-2239438640.jpg", "published": "2026-06-09T08:17:18+00:00", "sources": [{"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/09/iran-advice-blame-accountability-escape/", "type": "blog"}]}]};

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

ors/samsung-sees-rising-chip-production-requests-from-byd-google-amd-sources", "type": "blog"}]}, {"id": "072f8db86d", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Genesis AI presenta Eno, su primer robot humanoide de propósito general impulsado por IA", "summary": "Genesis AI, una empresa global de robótica, ha desvelado Eno, su primer robot humanoide de propósito general. Eno está impulsado por GENE, el modelo fundacional de la compañía, diseñado para actuar como un agente físico capaz de razonar, adaptarse y completar tareas más allá de las predefinidas. La empresa planea iniciar la producción y despliegues selectivos a finales de 2026, comenzando con clientes industriales como fabricantes y empresas de logística, para luego expandirse a sectores de servicios y eventualmente al ámbito doméstico.\n\nLa compañía destaca el diseño minimalista de Eno y su enfoque de \"stack completo\" que integra hardware, software e inteligencia. Para fomentar la confianza, Eno ofrecerá una versión opcional con una interfaz cognitiva que mostrará en tiempo real lo que el robot está pensando y haciendo. Genesis AI, que recaudó 105 millones de dólares en financiación semilla el año pasado, prioriza la movilidad y la destreza sobre una apariencia completamente humana.\n\nEste lanzamiento representa un paso significativo en el desarrollo de robots de propósito general, con el potencial de integrarse en diversos entornos, tanto industriales como de consumo. La clave será la capacidad de Eno para demostrar un valor real y una adaptabilidad superior a las limitaciones de los robots actuales, marcando el inicio de una nueva era en la robótica impulsada por IA.", "why": "Genesis AI lanza Eno, un robot humanoide de propósito general impulsado por su propio modelo de IA, con planes de despliegue industrial a partir de 2026.", "importance": 4, "relevance": 5, "tags": ["Robótica", "IA", "Humanoide", "Genesis AI"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/genesis-ai-eno-humanoid-1.png", "published": "2026-06-17T08:01:11+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/17/genesis-ai-launches-first-general-purpose-humanoid-robot/102623/", "type": "blog"}, {"name": "The Robot Report", "url": "https://www.therobotreport.com/genesis-ai-launches-eno-general-purpose-robot/", "type": "blog"}]}, {"id": "5c192131f9", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Verificación de registros optimizados para síntesis en diseños complejos de chips", "summary": "El artículo aborda el desafío de determinar cuándo un diseño de chip complejo está listo para ser enviado a fabricación, asegurando que todos los elementos funcionarán correctamente. Se discuten las variables, las verificaciones necesarias y la generación de exenciones (waivers) en el proceso de \"sign-off\".\n\nSuresh Barla, director senior de aplicaciones de campo en Synopsys, explica cómo garantizar que el diseño a nivel de transferencia de registros (RTL) esté completamente optimizado para los objetivos de potencia, rendimiento y área (PPA) en diseños grandes, que pueden contener cientos de millones de puertas y docenas de bloques. El objetivo es asegurar que la lista de redes (netlist) cumpla con los estándares de calidad para el \"sign-off\".\n\nLa optimización de registros tras la síntesis es un paso crítico para asegurar la calidad y el rendimiento del chip final. Este proceso implica una verificación exhaustiva para cumplir con las especificaciones de diseño y evitar problemas en la fase de manufactura.", "why": "La optimización y verificación de registros en el diseño de chips es fundamental para la eficiencia y fiabilidad del hardware de IA y otros componentes tecnológicos avanzados.", "importance": 4, "relevance": 5, "tags": ["semiconductores", "diseño de chips", "optimización", "IA hardware"], "image": "https://semiengineering.com/wp-content/uploads/2026/06/Screenshot-2026-06-16-at-7.47.44-PM-963x1024.png", "published": "2026-06-17T07:15:07+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/signoff-of-synthesis-optimized-registers/", "type": "blog"}]}, {"id": "693b70940f", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "X Square Robot desarrolla el 'cerebro' para la IA encarnada con modelos de lenguaje y acción", "summary": "La empresa china X Square Robot se enfoca en dotar a los robots de la inteligencia necesaria para operar en entornos complejos y no estructurados, un desafío que considera el principal cuello de botella en la robótica actual. Mientras otras compañías avanzan en hardware, X Square Robot se centra en el \"cerebro\" de los robots.\n\nPara abordar esta brecha, la compañía ha liberado tres tecnologías de código abierto: Wall-OSS-0.5, un modelo de Visión-Lenguaje-Acción (VLA); WALL-WM, un Modelo de Acción Mundial para entender eventos físicos; y XRZero-G0, un marco de recopilación de datos y entrenamiento sin robots para reducir costos.\n\nEl objetivo es que estos modelos permitan a los robots aprender habilidades reales a través del preentrenamiento, en lugar de depender únicamente del ajuste fino para tareas específicas. La investigación busca responder si el preentrenamiento por sí solo puede enseñar habilidades útiles a los robots, allanando el camino para una IA encarnada más capaz y adaptable.", "why": "El desarrollo de modelos de IA avanzados para la robótica es clave para la automatización en entornos industriales y domésticos, impulsando la Industria 5.0.", "importance": 4, "relevance": 5, "tags": ["IA encarnada", "robótica", "modelos VLA", "código abierto"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/x-square-robot-1.png", "published": "2026-06-17T07:07:55+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/17/from-backflips-to-folding-laundry-how-x-square-robot-is-building-the-missing-brain-for-embodied-ai/102607/", "type": "blog"}]}, {"id": "850d165098", "category": "ia", "topic": "ia", "subtopic": "Investigación", "cruce": false, "title": "Diseño de chips con monitores on-die para autoexplicación y resiliencia", "summary": "Expertos de la industria de semiconductores discuten nuevas metodologías para cerrar la brecha entre la intención de diseño y el comportamiento real del silicio. Se centran en el uso de monitores on-die, análisis localizados y datos de ciclo de vida para mejorar la comprensión y la resiliencia de los chips.\n\nLa discusión, que incluye a representantes de Arteris, Baya Systems, Cadence, Keysight EDA, Movellus, Siemens EDA, Synopsys y Vinci, aborda cómo los datos recopilados por monitores integrados en el chip se analizan y optimizan. Se destaca el desafío del volumen de datos generados por los sensores (cientos de GB/s) y la latencia asociada a su procesamiento.\n\nEstas innovaciones permiten a los arquitectos de chips obtener una visión más profunda del rendimiento y el comportamiento de sus diseños en tiempo real. La capacidad de los chips para \"explicarse a sí mismos\" mediante el análisis de datos on-die es crucial para la depuración, la optimización y la garantía de fiabilidad en sistemas complejos, incluyendo aquellos utilizados en IA.", "why": "La capacidad de los chips para monitorizar y analizar su propio comportamiento es esencial para la fiabilidad y el rendimiento de la infraestructura de IA y la computación avanzada.", "importance": 4, "relevance": 5, "tags": ["semiconductores", "diseño de chips", "análisis on-die", "resiliencia"], "image": "https://semiengineering.com/wp-content/uploads/2026/05/Screenshot-2026-05-27-at-11.02.17-AM.png?fit=1116%2C1062&ssl=1", "published": "2026-06-17T07:01:56+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/designing-chips-that-can-explain-themselves/", "type": "blog"}]}, {"id": "c815fbc711", "category": "cruce", "topic": "ia", "subtopic": "IA China", "cruce": true, "title": "China experimenta con chips locales para entrenar modelos de IA ante restricciones de EE. UU.", "summary": "Un número creciente de laboratorios de inteligencia artificial en China está experimentando con el entrenamiento de sus modelos en chips de fabricación nacional. Esta tendencia responde a las crecientes restricciones de exportación impuestas por Estados Unidos y al impulso de China por alcanzar la autosuficiencia tecnológica.\n\nSi bien los modelos de IA chinos han ganado competitividad, el hardware local aún presenta un rezago significativo. Tradicionalmente, los chips domésticos se han utilizado principalmente para la inferencia (ejecución de modelos ya entrenados), mientras que el pre-entrenamiento, la fase más intensiva en computación, se realizaba con hardware extranjero. Ahora, se busca trasladar estas fases iniciales a silicio nacional.\n\nEste cambio, aunque puede implicar un desarrollo menos rápido en comparación con sus pares estadounidenses, busca construir una cadena de suministro de IA completamente doméstica. La estrategia a largo plazo de China es asegurar su soberanía tecnológica y reducir su dependencia de tecnologías extranjeras en un sector crítico como la IA.", "why": "El esfuerzo de China por entrenar modelos de IA en chips locales es un movimiento clave en la competencia tecnológica global y la resiliencia de su propia industria de IA.", "importance": 4, "relevance": 5, "tags": ["IA", "semiconductores", "EE. UU.", "China"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/06/17/860e7e48-5aee-41a8-a88d-2d2ca35137a1_5fe85a77.jpg?itok=U6Sczaxz&v=1781677437", "published": "2026-06-17T06:30:32+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/tech/tech-trends/article/3357391/can-chinese-silicon-replace-nvidia-here-are-5-ai-models-trained-local-chips?utm_source=rss_feed", "type": "blog"}]}, {"id": "6a164b9a58", "category": "cruce", "topic": "geo", "subtopic": "IA China", "cruce": true, "title": "Proyecto secreto de IA en EE. UU. impulsa centros de datos y genera controversia", "summary": "Un proyecto de infraestructura de IA llamado Stargate, iniciado por la administración Trump y con una inversión de 500 mil millones de dólares, está impulsando el despliegue masivo de centros de datos en todos los estados de EE. UU. Este proyecto, una asociación público-privada que incluye a gigantes tecnológicos como OpenAI, Microsoft, Nvidia y Oracle, tiene como objetivo principal establecer a EE. UU. como líder mundial en innovación de IA, especialmente frente a China.\n\nEl proyecto Stargate, aunque ha pasado desapercibido para el público general, parece estar conectado con la actual controversia sobre la construcción de centros de datos en el país. OpenAI describió Stargate como una iniciativa que no solo apoyará la reindustrialización de EE. UU., sino que también proporcionará una capacidad estratégica para proteger la seguridad nacional.\n\nLa magnitud de este proyecto y su conexión con la expansión de centros de datos, que consumen grandes cantidades de energía, plantean interrogantes sobre su impacto ambiental y su influencia en la política tecnológica estadounidense. La competencia con China en el ámbito de la IA y la seguridad nacional son factores clave en esta estrategia.", "why": "Un proyecto secreto de IA de 500 mil millones de dólares está acelerando la construcción de centros de datos en EE. UU. y genera controversia.", "importance": 4, "relevance": 5, "tags": ["IA", "EE. UU.", "centros de datos", "geopolítica"], "image": "https://asiatimes.com/wp-content/uploads/2026/06/US-Donald-Trump-Sam-Altman-Larry-Ellison-Masayoshi-Son.jpg", "published": "2026-06-17T06:13:02+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/how-and-why-ai-is-eroding-us-democracy/", "type": "blog"}]}, {"id": "6d05a70491", "category": "ia", "topic": "ia", "subtopic": "Modelos", "cruce": false, "title": "GLM-5.2 se posiciona como el mejor modelo de IA para codificación frontend, superando a competidores clave.", "summary": "El modelo GLM-5.2, desarrollado por Z.ai, ha emergido como el principal modelo de IA de código abierto para tareas de codificación frontend, según evaluaciones independientes. Este avance lo sitúa justo por detrás de GPT-4.8 en evaluaciones generales de codificación, pero lo corona como el líder en el ámbito específico de la codificación frontend.\n\nEl lanzamiento de GLM-5.2 se produce tras una serie de actualizaciones, siendo la versión 5.1 una mejora menor y la 5.2 una apuesta significativa para convertirse en el modelo de referencia para desarrolladores. A pesar de tener 744 mil millones de parámetros, considerablemente menos que modelos como Opus 4.8 o el próximo Composer de Cursor, su rendimiento en codificación frontend es notable, compitiendo directamente con los modelos más avanzados del mercado.\n\nLa información técnica detallada sobre GLM-5.2 es limitada, sin la publicación de un paper científico. Sin embargo, se menciona una mejora en la atención dispersa de DeepSeek que optimiza la eficiencia en contextos de texto muy largos. Este desarrollo es relevante en el contexto de la rápida evolución de los modelos de lenguaje y la competencia por liderar el mercado de la IA para desarrolladores.", "why": "Este avance tecnológico en modelos de IA para codificación tiene implicaciones directas en la eficiencia y productividad del desarrollo de software.", "importance": 4, "relevance": 5, "tags": ["IA", "Codificación", "Modelos de lenguaje"], "image": "https://substackcdn.com/image/fetch/$s_!tOcj!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F2c75ad4c-83e2-4317-8cf0-276d3cab6e59_1226x1830.png", "published": "2026-06-17T05:37:40+00:00", "sources": [{"name": "Latent Space", "url": "https://www.latent.space/p/ainews-glm-52-the-top-frontend-coding", "type": "newsletter"}]}, {"id": "54a120e16c", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "China se acerca a la paridad nuclear con EE. UU. y Rusia, complicando el balance estratégico global.", "summary": "El equilibrio estratégico nuclear global enfrenta un nuevo desafío ante la rápida expansión del arsenal nuclear de China. Expertos advierten que para principios de la década de 2030, las fuerzas nucleares combinadas de Rusia y China podrían superar significativamente a las de Estados Unidos, una situación que Washington considera inaceptable.\n\nEste cambio se produce en un contexto de incertidumbre global, marcado por la expiración del acuerdo New START entre EE. UU. y Rusia, dejando a las dos potencias nucleares sin un pacto sobre la disposición de sus armas estratégicas por primera vez en más de dos décadas. La inclusión de China en futuras negociaciones sobre control de armamento nuclear se vuelve imperativa, a pesar de su histórica reticencia a participar en discusiones técnicas, fundamentada en su menor número de armas en comparación con EE. UU. y Rusia.\n\nLa creciente capacidad nuclear de China, resultado de más de 30 años de desarrollo tecnológico secreto, podría desencadenar nuevas tensiones diplomáticas y reconfigurar el panorama de seguridad internacional. La negociación de un nuevo acuerdo internacional, si llega a concretarse, podría ser el último de su tipo en la historia, dada la complejidad y la creciente imprevisibilidad del escenario geopolítico y tecnológico.", "why": "La expansión del arsenal nuclear chino altera el balance de poder global y la estabilidad estratégica, afectando las negociaciones de control de armas.", "importance": 5, "relevance": 4, "tags": ["China", "Armamento nuclear", "Geopolítica"], "image": "https://www.aspistrategist.org.au/wp-content/uploads/2026/06/GettyImages-2233529225.jpg", "published": "2026-06-17T05:30:07+00:00", "sources": [{"name": "ASPI The Strategist", "url": "https://www.aspistrategist.org.au/the-complications-that-chinas-build-up-brings-to-nuclear-balance/", "type": "blog"}]}, {"id": "6b3e7697c4", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Raymond y Third Wave Automation colaboran para expandir la IA física en carretillas elevadoras", "summary": "The Raymond Corporation, parte de Toyota Material Handling North America, ha anunciado una colaboración tecnológica con Third Wave Automation para lanzar y expandir capacidades de automatización física habilitadas por IA en flotas de carretillas elevadoras automatizadas Raymond. Esta alianza se basa en varios años de desarrollo conjunto y aprendizaje operativo desde 2021, con el respaldo inicial de inversiones de Toyota Ventures y Woven Capital.\n\nRaymond integrará las capacidades de automatización de Third Wave en su ecosistema, ofreciendo a los clientes una vía escalable para mejorar el rendimiento del almacén mediante tecnología centrada en la IA. Arshan Poursohi, CEO de Third Wave Automation, destacó que la combinación de su software y los equipos de manejo de materiales de Raymond crea una solución automatizada sin precedentes, con mejoras sustanciales en rendimiento, flexibilidad y seguridad. Michael Field, COO de Toyota Material Handling North America, subrayó la integración de tecnología avanzada y capacidades impulsadas por IA para optimizar flujos de trabajo y mejorar la visibilidad operativa.\n\nEsta colaboración es significativa para la industria de la logística y la fabricación, ya que representa un avance en la aplicación de la IA física en entornos industriales. La integración de soluciones de automatización avanzadas en equipos de manejo de materiales promete aumentar la eficiencia y la seguridad en almacenes y centros de distribución, alineándose con los principios de la Industria 5.0.", "why": "La IA se está integrando cada vez más en la maquinaria industrial para mejorar la eficiencia y la seguridad en operaciones logísticas y de fabricación.", "importance": 3, "relevance": 5, "tags": ["IA física", "Automatización", "Logística", "Industria 5.0"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/raymond-autonomous-forklift-trucks-1.png", "published": "2026-06-17T07:33:40+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/17/raymond-partners-with-third-wave-automation-to-expand-physical-ai-across-lift-truck-fleets/102620/", "type": "blog"}]}, {"id": "268663a661", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Irlanda asume la presidencia del Consejo de la UE en un momento crucial para la política europea", "summary": "Irlanda asumirá la presidencia rotatoria del Consejo de la Unión Europea el 1 de julio, en un período de \"oportunidad política rara\" pero también de \"intensa presión de tiempo\". El gobierno irlandés busca aprovechar sus seis meses para avanzar en temas clave como la ampliación de la UE y el próximo presupuesto a largo plazo. Sin embargo, la proximidad de las elecciones presidenciales francesas en abril de 2027 limita la ventana para tomar decisiones políticas importantes, ya que Francia podría volverse más cautelosa ante decisiones controvertidas.\n\nLa presidencia irlandesa se ve facilitada por la salida de Viktor Orbán como obstáculo principal en la toma de decisiones de la UE, lo que genera un nuevo impulso en expedientes estancados. La agenda de Irlanda incluye la negociación del presupuesto plurianual (2028-2034), la revisión del Sistema de Comercio de Emisiones (ETS) de la UE, y la definición de políticas tecnológicas y de soberanía digital. Además, Irlanda enfrenta el desafío de garantizar la seguridad de cumbres y infraestructuras críticas, a pesar de su bajo gasto en defensa y su neutralidad militar histórica.\n\nLa presidencia irlandesa es particularmente relevante para los intereses de la UE en materia de regulación tecnológica y soberanía, dado que Irlanda es sede de numerosas grandes empresas tecnológicas estadounidenses. La presión para equilibrar los intereses de estas empresas con los objetivos de la UE en áreas como la IA y la privacidad será un desafío clave. La capacidad de Irlanda para mediar en disputas sobre el presupuesto y la política climática, así como para gestionar la seguridad en un contexto de crecientes amenazas, será crucial para el éxito de su presidencia.", "why": "La presidencia irlandesa de la UE se enfrenta a la tarea de avanzar en la agenda legislativa europea, incluyendo temas de tecnología y clima, en un plazo ajustado.", "importance": 4, "relevance": 4, "tags": ["Presidencia UE", "Irlanda", "Política europea", "Presupuesto UE"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/06/13/EU-Window-Final-scaled.jpg", "published": "2026-06-17T07:30:00+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/irish-presidency-thomas-byrne-eu-window-of-opportunity-can-ireland-deliver/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/ireland-eu-presidency-policy-agenda-trade-defense-health-climate-tech-cyber-enlargement-migration/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/ireland-faces-security-test-as-it-takes-over-eu-presidency/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/ireland-big-tech-dublin-clear-eyed-pressures-during-presidency/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/ireland-budget-deal-eu-presidency-christmas-tree/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/ireland-prepares-eu-presidency-play-dealmaker-climate-change-fight-of-the-year/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "d395f686b2", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "RLWRLD nombrada \"Technology Pioneer\" por el Foro Económico Mundial por su IA física", "summary": "RLWRLD, una empresa de IA física que desarrolla el modelo fundacional de robótica RLDX-1, ha sido seleccionada como \"Technology Pioneer\" 2026 por el Foro Económico Mundial (FEM). Este programa reconoce a 100 empresas tecnológicas innovadoras con potencial para generar un impacto transformador en industrias y sociedad a nivel global.\n\nSegún el FEM, la selección de este año se centró en empresas que proporcionan el software y la infraestructura central para el despliegue a gran escala de sistemas de IA autónomos capaces de percibir, razonar y actuar directamente en el mundo físico, yendo más allá de los chatbots conversacionales. RLWRLD es la única empresa de IA física en esta cohorte clasificada bajo el \"Centro de Excelencia en IA\", en lugar de \"Fabricación Avanzada\", lo que subraya su enfoque en la infraestructura fundamental.\n\nEsta designación valida el valor de RLWRLD como un \"cerebro universal\" capaz de integrarse flexiblemente con hardware y fabricantes de robótica de primer nivel, estableciendo una base para el crecimiento del ecosistema de la empresa en plataformas de hardware robótico de manufactura y logística a nivel mundial. El FEM también publicó un artículo sobre IA física escrito por el liderazgo de RLWRLD.\n\nLa inclusión de RLWRLD en la lista de \"Technology Pioneers\" del FEM destaca la creciente importancia de la IA física y los modelos fundacionales de robótica para la automatización industrial y la Industria 5.0. Este reconocimiento subraya el potencial de estas tecnologías para revolucionar la forma en que las máquinas interactúan con el mundo físico y mejoran la eficiencia y la capacidad de los sistemas autónomos.", "why": "El reconocimiento de RLWRLD por el FEM destaca el avance y la importancia de la IA física y los modelos fundacionales de robótica para la automatización industrial.", "importance": 3, "relevance": 5, "tags": ["IA física", "Robótica", "Foro Económico Mundial", "Industria 5.0"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/rlwrld-humanoid-hands-1.png", "published": "2026-06-17T07:25:05+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/17/rlwrld-named-world-economic-forum-technology-pioneer-for-advancing-physical-ai-infrastructure/102616/", "type": "blog"}]}, {"id": "459a27101f", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Kodiak utiliza IA y evaluación de riesgo probabilístico para medir la seguridad de camiones autónomos", "summary": "La empresa de camiones autónomos Kodiak ha implementado dos herramientas, una de ellas desarrollada con ayuda de IA, para acelerar y mejorar la precisión de su ingeniería de seguridad. Estas herramientas van más allá de los enfoques tradicionales y proporcionan evidencia rigurosa sobre la seguridad del sistema \"Kodiak Driver\", especialmente en escenarios raros e inusuales.\n\nLa primera herramienta es la Evaluación de Riesgo Probabilístico (PRA), una metodología que estima la tasa esperada de colisiones y sus severidades, identificando los factores de riesgo y modos de fallo de la autonomía más relevantes. Los resultados se comparan con el rendimiento humano, establecido en colaboración con centros de investigación de transporte líderes.\n\nLa segunda herramienta es BreakPoint, un sistema de validación de IA desarrollado internamente. BreakPoint está diseñado para identificar y analizar fallos en el sistema de conducción autónoma, permitiendo a Kodiak asegurar que sus vehículos pueden manejar situaciones complejas y garantizar un alto nivel de seguridad.", "why": "La aplicación de IA y metodologías avanzadas de evaluación de riesgos es crucial para la adopción segura y generalizada de vehículos autónomos en la industria del transporte.", "importance": 3, "relevance": 5, "tags": ["IA", "vehículos autónomos", "seguridad", "evaluación de riesgo"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/kodiak-dinosaur-1.png", "published": "2026-06-17T07:15:45+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/17/how-kodiak-uses-ai-and-probabilistic-risk-assessment-to-measure-autonomous-trucking-safety/102611/", "type": "blog"}]}, {"id": "67c500e9fa", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Vietnam enfrenta presiones de EE. UU. por su superávit comercial, amenazando la cooperación estratégica.", "summary": "La creciente relación entre Vietnam y Estados Unidos se encuentra en una fase crítica debido al abultado superávit comercial de Vietnam, que alcanzó los 123.500 millones de dólares en 2025. Este desequilibrio económico pone a prueba los cimientos de la asociación estratégica entre ambos países, especialmente ante el intensificado escrutinio de la administración estadounidense sobre sus socios comerciales.\n\nHanoi se enfrenta a la presión de Washington para abordar preocupaciones sobre el acceso al mercado, el cumplimiento normativo y la transparencia en la cadena de suministro. La administración estadounidense, enfocada en la reciprocidad y la manufactura doméstica, busca garantías de que Vietnam no solo se beneficia del reajuste de las cadenas de suministro globales, sino que también responde a las inquietudes estructurales planteadas por EE. UU.\n\nVietnam ha respondido con un enfoque pragmático y de compromiso, buscando reformas regulatorias y concesiones específicas para preservar una de sus relaciones económicas más importantes. La capacidad de Hanoi para satisfacer las demandas de Washington antes de que las tensiones comerciales eclipsen la cooperación estratégica en áreas como semiconductores, minerales críticos y seguridad en el Indo-Pacífico será crucial para el futuro de sus lazos bilaterales.", "why": "El desequilibrio comercial entre Vietnam y EE. UU. podría afectar la cooperación en áreas tecnológicas y de seguridad, impactando las cadenas de suministro globales.", "importance": 4, "relevance": 4, "tags": ["Vietnam", "Comercio", "EE. UU."], "image": "https://asiatimes.com/wp-content/uploads/2026/06/Vietnam-Made-in-Vietnam-Vietnam-Trade.jpg", "published": "2026-06-17T05:27:55+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/can-vietnam-satisfy-washington-before-trade-ties-fray/", "type": "blog"}]}, {"id": "86773f3b6a", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Macron redefine la disuasión nuclear francesa para Europa", "summary": "El presidente francés, Emmanuel Macron, ha anunciado un cambio significativo en la política nuclear de Francia, alejándose de la ortodoxia de décadas. Los cambios incluyen un aumento del arsenal nuclear, el fin de la transparencia sobre el tamaño de la fuerza de disuasión ('force de frappe') y el lanzamiento de un marco de \"disuasión avanzada\". Este nuevo marco ofrece a los socios europeos diálogos estratégicos, invitaciones a ejercicios nucleares franceses y la posibilidad de un despliegue anticipado de aeronaves francesas de doble capacidad.\n\nEstas medidas marcan un abandono de los principios tradicionales franceses de suficiencia estricta, divulgación calibrada y moderación soberana. La política nuclear francesa, refinada a lo largo de sucesivas presidencias, ahora prevé un crecimiento del arsenal, opacidad sobre su tamaño y una integración más estrecha de las fuerzas nucleares francesas en una arquitectura de seguridad europea más amplia. Sin embargo, la implementación de estos cambios enfrenta la posibilidad de ser socavada por fuerzas políticas internas francesas.\n\nLa reorientación de la política nuclear francesa tiene implicaciones profundas para la seguridad europea, especialmente en el contexto de la guerra en Ucrania y la creciente incertidumbre geopolítica. La oferta de una mayor integración nuclear podría fortalecer la autonomía estratégica de Europa, pero también genera debates sobre la soberanía y la dependencia de Francia en materia de seguridad nuclear.", "why": "Francia está redefiniendo su política nuclear para integrar más estrechamente a sus socios europeos, lo que podría alterar el panorama de la seguridad continental.", "importance": 4, "relevance": 3, "tags": ["Francia", "Disuasión nuclear", "Seguridad europea"], "image": "https://warontherocks.com/wp-content/uploads/wotr-og-images/wotr-og-44886-399a4c27d668.jpg", "published": "2026-06-17T07:30:35+00:00", "sources": [{"name": "War on the Rocks", "url": "https://warontherocks.com/macrons-nuclear-gamble-building-a-european-deterrent-faster-than-french-politics-can-tear-down/", "type": "blog"}]}, {"id": "cb26e58347", "category": "ia", "topic": "ia", "subtopic": "Investigación", "cruce": false, "title": "Avances en diseño y testeo de chips, mejora de imagen con IA y flujos de trabajo para semiconductores", "summary": "El blog de Semiconductor Engineering destaca varios avances técnicos en la industria de los semiconductores. Rajan Jani de Cadence explica la característica de memoria en el controlador NVMe (Controller Memory Buffer) para reducir latencia y mejorar la eficiencia del bus PCIe. Linus Tauro de Siemens detalla cómo duplicar la tasa de datos de un datapath SSN mediante un par BusFrequencyMultiplier y BusFrequencyDivider.\n\nAchim Nohl y colegas de Synopsys proponen adaptar flujos de trabajo colaborativos basados en Git, CI/CD y pull requests para el diseño y verificación de chips. Por otro lado, Idit Diamant y su equipo en Arm han mejorado la mejora de imágenes en baja luz para sistemas de visión artificial usando una técnica de IA generativa llamada \"latent flow matching\". Finalmente, Liang Kan y Eric Yu de Keysight abordan los desafíos de testear redes de IA, señalando que los micro-benchmarks no son suficientes.\n\nEl artículo también menciona el papel crucial del procesamiento húmedo en la fabricación fotónica, incluyendo limpieza, grabado y secado, según Ismail Kashkoush de JST para SEMI. Estos desarrollos abarcan desde la optimización de hardware y flujos de diseño hasta la mejora de algoritmos de IA para aplicaciones visuales.", "why": "Estos avances técnicos son fundamentales para la continua evolución del hardware de IA y la eficiencia en su diseño y fabricación.", "importance": 3, "relevance": 4, "tags": ["semiconductores", "IA", "diseño de chips", "hardware"], "image": "https://semiengineering.com/wp-content/uploads/AdobeStock_219648074-11-07-24-data-movement-scaled.jpeg?fit=2560%2C1707&ssl=1", "published": "2026-06-17T07:01:36+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/blog-review-june-17-3/", "type": "blog"}]}, {"id": "5ba2b1f986", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Cumbre UE-Reino Unido se agenda en medio de discusiones sobre inversión china y IA", "summary": "La Unión Europea y el Reino Unido han fijado una fecha para una cumbre bilateral. El encuentro se produce en un contexto de crecientes discusiones sobre la inversión china y el papel de la inteligencia artificial en la política tecnológica.\n\nAunque los detalles específicos de la agenda no se han revelado completamente, la mención de la inversión china y la IA sugiere que estos temas serán centrales en las conversaciones. La UE busca fortalecer sus lazos con el Reino Unido mientras navega por un panorama geopolítico y tecnológico complejo, marcado por la competencia global y la necesidad de regulación en áreas emergentes como la IA.\n\nEste tipo de cumbres son cruciales para alinear políticas y estrategias entre socios clave, especialmente en áreas de alta tecnología y seguridad económica.", "why": "La coordinación entre la UE y el Reino Unido en temas de inversión y tecnología es relevante para el equilibrio geopolítico y la regulación de la IA a nivel internacional.", "importance": 3, "relevance": 4, "tags": ["UE", "Reino Unido", "geopolítica", "IA"], "image": "https://www.euractiv.com/content/uploads/sites/2/2025/11/FIREPOWER-2-1182x788.png", "published": "2026-06-17T06:30:51+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/firepower-eu-uk-summit-gets-a-date/", "type": "blog"}]}, {"id": "c6287d67d1", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Francia sustituye a Palantir de EE. UU. por la empresa nacional ChapsVision", "summary": "Francia ha decidido reemplazar la plataforma de análisis de datos estadounidense Palantir por una solución de la empresa nacional ChapsVision. Esta decisión se enmarca en una estrategia más amplia de soberanía tecnológica y de fomento de la industria local.\n\nLa noticia se presenta en el contexto de discusiones sobre \"gigafábricas de IA\", la industria de los videojuegos y la soberanía tecnológica. La elección de ChapsVision sobre Palantir subraya el esfuerzo de Francia por confiar en proveedores nacionales para tecnologías críticas, buscando reducir la dependencia de empresas extranjeras, especialmente en áreas sensibles.\n\nEste movimiento es indicativo de una tendencia geopolítica donde las naciones buscan fortalecer sus capacidades tecnológicas internas y asegurar el control sobre sus datos y sistemas, un tema particularmente relevante en el ámbito de la inteligencia artificial y la defensa.", "why": "La decisión de Francia de priorizar una empresa nacional sobre una estadounidense en tecnología de análisis de datos refuerza la tendencia hacia la soberanía tecnológica y la competencia en el sector de la IA.", "importance": 3, "relevance": 4, "tags": ["soberanía tecnológica", "Francia", "IA", "datos"], "image": "https://www.euractiv.com/content/uploads/sites/2/2025/10/thumbnail_Thumbnails-04-1182x788.png", "published": "2026-06-17T06:21:11+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/the-hack-france-phases-out-us-palantir-for-alternative-chapsvision/", "type": "blog"}]}, {"id": "9b9cdc3da3", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Netanyahu, principal damnificado del acuerdo entre EE. UU. e Irán", "summary": "El primer ministro israelí, Benjamin Netanyahu, emerge como el gran perdedor tras el reciente acuerdo entre Estados Unidos e Irán. A pesar de las promesas de mantener la ocupación israelí en Líbano, el acuerdo, según el primer ministro de Pakistán, Shehbaz Sharif, contempla el fin de los combates en todos los frentes. Sin embargo, el ministro de Defensa israelí, Israel Katz, ha advertido que el ejército no abandonará las zonas ocupadas en Líbano, Siria y Gaza.\n\nLa presión de los socios del gobierno israelí para continuar los ataques contra Hezbolá es considerable. El ministro de Seguridad Nacional, Itamar Ben-Gvir, ha declarado que el acuerdo no es vinculante para Israel, mientras que el ministro de Finanzas, Bezalel Smotrich, lo ha calificado de \"perjudicial para Israel y todo el mundo libre\". Incluso Donald Trump ha criticado las tácticas de Israel frente a Hezbolá, sugiriendo que Tel Aviv ha estado combatiendo a la milicia libanesa durante demasiado tiempo.\n\nEste escenario geopolítico subraya las tensiones en Oriente Medio y la compleja relación entre Israel, Estados Unidos e Irán. Las divergencias internas en el gobierno israelí y las críticas externas añaden capas de incertidumbre a la estabilidad regional.", "why": "El acuerdo entre EE. UU. e Irán debilita la posición de Netanyahu y aumenta las tensiones en Oriente Medio.", "importance": 4, "relevance": 3, "tags": ["Oriente Medio", "geopolítica", "Israel", "Irán"], "image": "https://elordenmundial.com/wp-content/uploads/2026/06/previa-netanyahu-guerra-iran-israel-estados-unidos.jpg", "published": "2026-06-17T06:09:39+00:00", "sources": [{"name": "El Orden Mundial", "url": "https://elordenmundial.com/blitz-netanyahu-guerra-iran-israel-estados-unidos/", "type": "blog"}]}, {"id": "0f40c65a7c", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Tensiones UE-China y defensa de Kaja Kallas marcan la agenda política europea.", "summary": "La política exterior de la Unión Europea se encuentra en un punto álgido, con crecientes tensiones con China y defensas internas hacia la Alta Representante de Asuntos Exteriores, Kaja Kallas. Informes selectivos sobre una posible abolición de su Servicio Europeo de Acción Exterior (SEAE) han generado críticas y han obligado a Kallas a reafirmar el papel de los diplomáticos de la UE.\n\nUn aliado clave de Kallas, Marko Mihkelson, presidente del comité de asuntos exteriores del parlamento estonio, ha defendido públicamente a la jefa de la diplomacia europea, calificando las críticas como un ataque contra el \"interés común de Europa\". La tarea de representar la política exterior de la UE es compleja, dada la dualidad del rol de Alta Representante, que actúa como puente entre la Comisión Europea y los ministerios de exteriores nacionales.\n\nParalelamente, la UE debate sobre la adopción de Nuevas Técnicas Genómicas (NGTs) para fortalecer la competitividad y resiliencia de sus sistemas agroalimentarios frente al cambio climático. Este debate se enmarca en un contexto de desafíos para la UE, incluyendo las relaciones con China y la coordinación con Estados Unidos en materia comercial.", "why": "Las tensiones geopolíticas con China y la cohesión interna de la política exterior de la UE son cruciales para su posición global.", "importance": 3, "relevance": 4, "tags": ["UE", "China", "Política exterior"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/05/Rapporteur_new_May_2026.png", "published": "2026-06-17T05:26:39+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/mission-impossible-kaja-kallas/", "type": "blog"}]}, {"id": "cc4708a301", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Fabricante chino Longcheer apuesta por dispositivos con IA en EE. UU. a pesar de la incertidumbre arancelaria", "summary": "Longcheer Technology, un fabricante chino de electrónica con sede en Shanghái, está apostando por el mercado estadounidense para su crecimiento, centrándose en dispositivos impulsados por inteligencia artificial. La empresa, que actúa como fabricante por contrato de smartphones y proveedor de gafas inteligentes para Meta, busca capitalizar la demanda creciente en EE. UU. a pesar de la persistente incertidumbre sobre los aranceles.\n\nEsta estrategia subraya la importancia del mercado de consumo estadounidense para las empresas tecnológicas chinas, incluso en un contexto de tensiones comerciales. Longcheer, conocida por su papel en la cadena de suministro de dispositivos electrónicos, parece no verse disuadida por las posibles barreras arancelarias.\n\nLa apuesta por la IA en dispositivos de consumo en el mercado estadounidense podría indicar una diversificación de las estrategias de crecimiento para los fabricantes chinos, buscando nichos de alta demanda para mitigar riesgos geopolíticos y económicos.", "why": "Un fabricante chino de electrónica busca expandirse en EE. UU. con dispositivos de IA, mostrando la resiliencia de las cadenas de suministro y la demanda de tecnología avanzada.", "importance": 3, "relevance": 3, "tags": ["IA", "EE. UU.", "China", "Aranceles"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F1%2F3%2F6%2F12616316-1-eng-GB%2F4694febb3e60-IMG_56182a.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-17T08:01:58.205262+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/supply-chain/chinese-electronics-maker-longcheer-bets-on-us-growth", "type": "blog"}]}, {"id": "1b85f30e75", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "Debate sobre el futuro de la energía solar europea y la competencia con China", "summary": "Se plantea la pregunta de si es demasiado tarde para la industria solar europea, en el contexto de las negociaciones previas a la COP31 y la competencia con la producción china. La discusión gira en torno a la capacidad de Europa para competir en el sector de energías renovables.\n\nEl artículo sugiere que la producción de energía solar en Europa enfrenta desafíos significativos, posiblemente relacionados con costos, escala o innovación, en comparación con la producción china, que a menudo se beneficia de economías de escala y políticas de apoyo estatal.\n\nLa sostenibilidad y la transición energética son temas cruciales para Europa, y la capacidad de su industria solar para prosperar es un factor importante en la consecución de sus objetivos climáticos y su autonomía energética.", "why": "La competitividad de la industria solar europea es vital para la transición energética del continente y su independencia en materia de energía.", "importance": 3, "relevance": 3, "tags": ["energía solar", "Europa", "China", "sostenibilidad"], "image": "https://www.euractiv.com/content/uploads/sites/2/2025/11/Thumbnails-02-1182x788.png", "published": "2026-06-17T06:26:05+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/voltage-is-it-too-late-for-european-solar/", "type": "blog"}]}, {"id": "b2be184544", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "El régimen talibán fuerza matrimonios de niñas afganas de 10 años", "summary": "Durante los últimos cinco años, las niñas afganas han visto erosionada su libertad y sus futuros, con el cierre de escuelas y universidades, restricciones laborales y la prohibición de viajar largas distancias sin un tutor masculino. La situación se ha agravado recientemente con la imposición de matrimonios forzados a menores.\n\nLa comunidad internacional ha expresado su preocupación por la grave violación de los derechos humanos de las mujeres y niñas en Afganistán bajo el régimen talibán. Organizaciones de derechos humanos denuncian que estas prácticas son sistemáticas y van en contra de los acuerdos internacionales.\n\nLa situación en Afganistán requiere una atención continua y esfuerzos diplomáticos para proteger los derechos fundamentales de la población, especialmente de las mujeres y niñas, y para prevenir estas graves violaciones.", "why": "Se reportan graves violaciones de derechos humanos en Afganistán, incluyendo matrimonios forzados de menores, evidenciando la crisis humanitaria y social en el país.", "importance": 4, "relevance": 1, "tags": ["Afganistán", "Derechos Humanos", "Talibán"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F4%2F2%2F4%2F12614246-1-eng-GB%2F4f9f3cbd3bc9-2009-08-09T120000Z_1704504219_GM1E5891MFF01_RTRMADP_3_AFGHANISTAN.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-17T08:01:58.118590+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/politics/international-relations/afghanistan-turmoil/taliban-forces-10-year-old-afghan-girls-into-marriage", "type": "blog"}]}, {"id": "27953ae6bd", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Myanmar: Aumento alarmante de víctimas por minas terrestres", "summary": "Myanmar registra el mayor número de víctimas por minas antipersonales a nivel mundial, con 2.029 incidentes en 2025, casi el doble que el año anterior. El uso de estas armas, tradicionalmente por parte del ejército, se ha extendido a grupos armados de resistencia desde el golpe militar de 2021. Los niños son especialmente vulnerables, representando más del 20% de las víctimas civiles verificadas en 2023.\n\nLas minas terrestres son frecuentemente plantadas por el ejército birmano alrededor de sus bases para disuadir a las fuerzas de resistencia, pero también se dispersan en zonas rurales y aldeas durante las retiradas. Las entrevistas con supervivientes en los estados de Chin y Rakhine revelan el devastador impacto de estas explosiones en sus vidas, con amputaciones y secuelas permanentes.\n\nLa escalada de incidentes con minas terrestres en Myanmar representa una grave crisis humanitaria y de seguridad. La proliferación de estos artefactos, tanto por fuerzas estatales como no estatales, agrava el conflicto y pone en riesgo a la población civil, especialmente a los menores. La situación requiere una atención internacional urgente para abordar las causas y mitigar las consecuencias.", "why": "Myanmar enfrenta una crisis humanitaria por el aumento de víctimas de minas terrestres, afectando desproporcionadamente a niños y civiles.", "importance": 4, "relevance": 1, "tags": ["Myanmar", "Minas terrestres", "Conflicto", "Derechos humanos"], "image": "https://images.thediplomat.com/v1/td-list-l-2/2026/06/thediplomat_2026-06-15-173323.jpg", "published": "2026-06-17T07:52:00+00:00", "sources": [{"name": "The Diplomat", "url": "https://thediplomat.com/2026/06/survivors-of-myanmars-landmine-blasts-struggle-with-severed-limbs-and-shattered-lives/", "type": "blog"}]}]};

const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

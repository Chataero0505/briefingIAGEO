roduction", "type": "blog"}]}, {"id": "5c94247e4c", "category": "cruce", "topic": "ia", "subtopic": "IA China", "cruce": true, "title": "China presenta hoja de ruta para el internet industrial con IA y 5G como pilares", "summary": "China ha lanzado un plan integral para impulsar su internet industrial, situando la Inteligencia Artificial (IA) y la tecnología 5G en el centro de la modernización de su sector manufacturero. El objetivo es expandir la infraestructura digital industrial y la oferta de datos, promoviendo la adopción de IA en las fábricas y desarrollando plataformas de internet industrial líderes a nivel mundial.\n\nEl plan, emitido conjuntamente por ocho agencias gubernamentales chinas, establece metas ambiciosas para 2030, incluyendo el despliegue de 50.000 redes privadas 5G industriales y el desarrollo de un mecanismo y sistema de datos industriales bien establecidos. Se busca fortalecer las capacidades de telecomunicaciones, potenciar la innovación tecnológica, liderar la definición de estándares internacionales y establecer un mecanismo de protección de seguridad robusto.\n\nEsta iniciativa marca un énfasis renovado en la integración de la IA y el internet industrial, yendo más allá de la mera conectividad. La hoja de ruta subraya el papel de las \"aplicaciones integradas\" para soportar el internet industrial y su uso práctico en entornos reales, lo que podría tener implicaciones significativas para la competitividad y la eficiencia de la manufactura china en la era de la Industria 4.0 y 5.0.", "why": "China busca consolidar su liderazgo en manufactura avanzada mediante la integración de IA y 5G en su infraestructura industrial, lo que podría redefinir las cadenas de suministro globales.", "importance": 4, "relevance": 5, "tags": ["Internet Industrial", "IA", "5G", "Manufactura"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/07/01/472e7423-8073-4627-98dc-bcd16bfeb9d4_dd49712d.jpg?itok=e2nxwqtc&v=1782889735", "published": "2026-07-01T07:09:03+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/tech/article/3359015/china-unveils-industrial-internet-road-map-ai-5g-core-manufacturing-upgrade?utm_source=rss_feed", "type": "blog"}]}, {"id": "a34a8a7a9c", "category": "cruce", "topic": "ia", "subtopic": "Energía", "cruce": true, "title": "Cadence y NVIDIA integran gemelos digitales para acelerar el diseño de centros de datos de IA", "summary": "Cadence ha integrado su plataforma Reality Digital Twin con NVIDIA Omniverse, utilizando la extensión Cadence Reality DT Experience. Esta colaboración crea una solución unificada y físicamente precisa de gemelo digital para optimizar el ciclo de vida completo del diseño de centros de datos, desde la creación de prototipos hasta la planificación de capacidad operativa.\n\nLa rápida expansión de la infraestructura de IA exige un cambio de paradigma en el diseño, construcción y operación de centros de datos. Los flujos de trabajo tradicionales, a menudo fragmentados y dependientes de herramientas aisladas, dificultan la obtención del contexto operativo completo necesario para entornos de computación de alto rendimiento (HPC).\n\nLa integración de simulaciones de dinámica de fluidos computacional (CFD) basadas en física con NVIDIA Omniverse y Universal Scene Description (OpenUSD) aborda estos desafíos. Esto permitirá una optimización más eficiente de los centros de datos, un aspecto crítico dada la creciente demanda de energía y recursos para soportar cargas de trabajo de IA.", "why": "La colaboración entre Cadence y NVIDIA para crear gemelos digitales de centros de datos es crucial para optimizar la infraestructura energética y de computación necesaria para la IA.", "importance": 4, "relevance": 5, "tags": ["Gemelos Digitales", "Centros de Datos", "IA", "NVIDIA"], "image": "https://semiengineering.com/wp-content/uploads/2026/06/data-center-06-26-AdobeStock_1647933846-scaled.jpeg?fit=2560%2C1440&ssl=1", "published": "2026-07-01T07:01:51+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/cadence-reality-digital-twin-platform-and-nvidia-omniverse-integration/", "type": "blog"}]}, {"id": "84755b1f23", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Empresas indias de TI aceleran adquisiciones ante la reconfiguración del mercado por la IA", "summary": "Las empresas de software indias están invirtiendo fuertemente en adquisiciones para expandir rápidamente sus ofertas, ante las crecientes amenazas de la inteligencia artificial y la desaceleración del gasto tecnológico. Un ejemplo reciente es la compra de la firma alemana Nagarro por parte de Persistent Systems por 1.450 millones de dólares.\n\nEstas adquisiciones buscan fortalecer la posición de las empresas indias en un mercado cada vez más competitivo y volátil. La IA está reconfigurando las demandas de los clientes, quienes a su vez están consolidando proveedores, lo que presiona a las empresas de servicios de TI a adaptarse rápidamente.\n\nLa estrategia de fusiones y adquisiciones subraya la urgencia de las empresas indias por diversificar y mejorar sus capacidades tecnológicas para mantener su crecimiento y relevancia en la era de la IA.", "why": "La consolidación y adaptación de las empresas de TI indias mediante adquisiciones refleja el impacto transformador de la IA en el sector tecnológico global.", "importance": 4, "relevance": 4, "tags": ["India", "IA", "Adquisiciones", "TI"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F4%2F4%2F1%2F3%2F12673144-2-eng-GB%2F35bd46ba9405-1b.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-07-01T12:57:44.169991+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/technology/indian-it-firms-ramp-up-acquisitions-as-ai-reshapes-growth", "type": "blog"}]}, {"id": "cb399f7a60", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Apptronik presenta su robot humanoide Apollo 2 y una nueva instalación de entrenamiento de IA", "summary": "La empresa de robótica Apptronik ha anunciado el lanzamiento de Apollo 2, su robot humanoide actualizado, y la apertura de su nueva instalación de entrenamiento y recopilación de datos, el Robot Park, en Austin, Texas. Apollo 2 estará disponible en configuraciones bípedas y con ruedas, diseñado para aprender del mundo real a través de la recopilación masiva de datos.\n\nLos datos recopilados por Apollo 2, en el marco de una asociación de investigación con Google DeepMind, contribuirán al avance de Gemini Robotics, los modelos fundacionales de DeepMind para robótica. La nueva instalación se suma a otros Robot Parks de Apptronik en todo el mundo, creando un sistema integrado para el desarrollo y despliegue rápido de inteligencia en robots humanoides.\n\nLa compañía enfatiza su enfoque en la aplicación práctica de los robots en el trabajo diario, buscando crear un ciclo de aprendizaje continuo donde los robots mejoren con cada ciclo de operación en entornos y tareas reales.", "why": "Un avance en la robótica humanoide y la recopilación de datos para IA, con implicaciones para la automatización industrial.", "importance": 3, "relevance": 5, "tags": ["robótica humanoide", "IA", "Apptronik", "Google DeepMind"], "image": "https://www.therobotreport.com/wp-content/uploads/2026/06/apollo2-featured.jpg", "published": "2026-07-01T12:30:31+00:00", "sources": [{"name": "The Robot Report", "url": "https://www.therobotreport.com/apptronik-unveils-apollo-2-flagship-data-collection-training-facility/", "type": "blog"}]}, {"id": "18158eb3d3", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Kling AI de China busca recaudar 3.000 millones de dólares con una valoración de 18.000 millones", "summary": "Kling AI, una empresa derivada de Kuaishou Technology, está cerca de cerrar una ronda de financiación de 3.000 millones de dólares que la valoraría en 18.000 millones de dólares. La compañía, especializada en la generación de vídeo con IA, planea iniciar el proceso de cotización en la bolsa de Hong Kong en el próximo año.\n\nLa valoración actual es una reducción respecto al objetivo inicial de 20.000 millones de dólares fijado en abril, reflejando un cambio en el sentimiento del mercado. Entre los inversores que respaldan esta ronda se encuentra Tencent. Kuaishou Technology, competidor de Douyin, ya había indicado en mayo su intención de reestructurar Kling AI y buscar inversores externos.\n\nLos fondos recaudados se destinarán a la expansión de la empresa, incluyendo el desarrollo de su modelo de vídeo IA y la preparación para su salida a bolsa, en un mercado chino de IA cada vez más competitivo.", "why": "Una importante ronda de financiación para una startup china de IA en el sector de generación de vídeo, destacando la competencia y el crecimiento del mercado asiático.", "importance": 4, "relevance": 4, "tags": ["IA", "China", "financiación", "Kling AI"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/07/01/ff80c0d1-aba3-41d4-ad47-16c24845370e_e292ebfd.jpg?itok=bWY3sX4t&v=1782908857", "published": "2026-07-01T12:27:43+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/tech/big-tech/article/3359059/chinas-kling-ai-nears-us3-billion-round-us18-billion-valuation-sources?utm_source=rss_feed", "type": "blog"}]}, {"id": "a340849666", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "La IA fuerza a RRHH y Finanzas a colaborar estrechamente", "summary": "La métrica tradicional de crecimiento de las startups tecnológicas, el número de empleados (headcount), está siendo cuestionada debido a la creciente adopción de la IA y la automatización. Las empresas se enfrentan a la presión de optimizar sus equipos y evaluar la contratación de manera diferente, lo que obliga a los departamentos de Recursos Humanos y Finanzas a trabajar de forma más coordinada.\n\nUn reciente evento organizado por Rippling, plataforma de RRHH, nóminas y TI, reunió a expertos para discutir cómo las empresas están abordando esta nueva realidad. Se destacó un cambio en la evaluación del rendimiento, pasando de medir la productividad individual a evaluar la \"capacidad\" general del equipo y la eficiencia en la entrega de resultados.\n\nLa discusión giró en torno a cómo las decisiones de contratación deben alinearse con los objetivos de negocio en un entorno donde la IA puede asumir tareas previamente humanas. La colaboración entre RRHH y Finanzas se vuelve crucial para gestionar los costes de personal de manera efectiva y estratégica.", "why": "La integración de la IA en las operaciones empresariales está redefiniendo las métricas de crecimiento y la gestión de talento.", "importance": 3, "relevance": 5, "tags": ["Inteligencia Artificial", "Recursos Humanos", "Automatización"], "image": "https://images.sifted.eu/wp-content/uploads/2026/06/30143926/Rhiannon-Barry.jpeg?w=800&h=800&q=75&fit=crop&auto=compress,format", "published": "2026-07-01T08:36:56+00:00", "sources": [{"name": "Sifted", "url": "https://sifted.eu/articles/the-headcount-paradox-brnd/", "type": "blog"}]}, {"id": "fd956cce30", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "BYD revoluciona las baterías de vehículos eléctricos sin níquel, impactando a Indonesia", "summary": "BYD ha logrado un avance significativo con su nuevo SUV Datang, que ha vendido 150.000 unidades en China sin utilizar níquel en sus baterías. Este éxito rompe con la creencia generalizada en la industria de que las baterías de alto contenido de níquel son esenciales para la autonomía de los vehículos eléctricos de largo alcance.\n\nEste desarrollo tiene implicaciones directas para la industria del níquel en Indonesia, que había apostado por este mineral como una fuente de poder en la cadena de suministro global de vehículos eléctricos. La presentación del Datang, con un precio que oscila entre los 36.000 y 46.500 dólares, demuestra un crecimiento en los márgenes de BYD, alejándose de su modelo de bajo coste anterior.\n\nAunque el lanzamiento global del Datang para Europa y el Sudeste Asiático está previsto para finales de año, su fuerte acogida en China ya ha sacudido las expectativas de Indonesia. La capacidad de BYD para ofrecer vehículos de alta gama sin depender del níquel podría reconfigurar la dinámica del mercado y las estrategias de suministro de materias primas.", "why": "Un avance en la tecnología de baterías para vehículos eléctricos podría alterar significativamente las cadenas de suministro globales de materias primas.", "importance": 4, "relevance": 4, "tags": ["BYD", "Baterías", "Vehículos Eléctricos", "Indonesia"], "image": "https://asiatimes.com/wp-content/uploads/2026/07/BYD-Blade-Battery.jpg", "published": "2026-07-01T07:16:16+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/07/byd-battery-breakthrough-crashes-indonesias-nickel-cartel-dream/", "type": "blog"}]}, {"id": "25152449fb", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "China necesitaría hacer historia tres veces para invadir Taiwán con éxito", "summary": "Un análisis de War on the Rocks sugiere que una invasión anfibia de Taiwán por parte de China presentaría desafíos operativos sin precedentes. A diferencia de la invasión de Normandía en 1944, que fue la operación anfibia más grande y compleja hasta la fecha, el tamaño de Taiwán no es el principal obstáculo. Los verdaderos retos radican en la ejecución de tres misiones clave que nunca se han llevado a cabo con éxito bajo condiciones de amenaza modernas: un desembarco anfibio contra una amenaza creíble de misiles antiaéreos costeros, un despliegue aéreo a gran escala contra defensas aéreas modernas, y un asalto aéreo importante y disputado a larga distancia.\n\nEstos tres escenarios, denominados \"Los Tres Jamás\", implicarían que el Ejército Popular de Liberación tendría que innovar y ejecutar con éxito operaciones militares que carecen de precedentes históricos recientes. El análisis contrasta la modernización rápida del EPL con la falta de precedentes operativos para tales acciones, lo que subraya la dificultad inherente de una operación de esta magnitud y complejidad.\n\nLa importancia de este análisis radica en la evaluación de las capacidades reales de China para llevar a cabo una invasión de Taiwán, más allá de la mera modernización militar. La viabilidad de tal operación depende de superar obstáculos operacionales históricos, lo que podría influir en las estrategias de defensa y disuasión de la región.", "why": "Evalúa la viabilidad de una invasión de Taiwán por parte de China, destacando los enormes desafíos operativos que requerirían innovaciones militares sin precedentes.", "importance": 4, "relevance": 4, "tags": ["Taiwán", "China", "Invasión", "Operaciones Militares"], "image": "https://warontherocks.com/wp-content/uploads/wotr-og-images/wotr-og-45424-26ed2a962d02.jpg", "published": "2026-07-01T07:15:02+00:00", "sources": [{"name": "War on the Rocks", "url": "https://warontherocks.com/the-three-nevers-to-invade-taiwan-china-would-have-to-make-military-history-thrice/", "type": "blog"}]}, {"id": "cd8b47055e", "category": "ia", "topic": "ia", "subtopic": "Investigación", "cruce": false, "title": "La observabilidad es clave en el diseño de chiplets para la era de la IA", "summary": "La observabilidad integrada en el diseño de chiplets se está volviendo crucial para gestionar el rendimiento, la fiabilidad y la seguridad de los sistemas de próxima generación. La IA puede interpretar el comportamiento del sistema a escala, pero solo si la observabilidad se diseña como una capacidad arquitectónica fundamental desde el principio.\n\nExpertos de la industria, incluyendo representantes de Arteris, Axiomise, Baya Systems, Cadence, Keysight EDA, Movellus, Siemens EDA, Synopsys y Vinci, discuten la importancia de la \"observabilidad in-silicon\" (visibilidad en el propio chip). Esta capacidad permite un análisis de datos y una resiliencia mejorados en los sistemas de alto rendimiento.\n\nLa creciente complejidad de los diseños de semiconductores, especialmente con la adopción de chiplets y la integración de IA, hace que la capacidad de monitorizar y diagnosticar el comportamiento del chip en tiempo real sea indispensable para la innovación y la fiabilidad.", "why": "La observabilidad integrada en el diseño de chiplets es esencial para garantizar el rendimiento y la fiabilidad de los sistemas avanzados que albergarán la IA.", "importance": 3, "relevance": 5, "tags": ["Chiplets", "IA", "Observabilidad", "Semiconductores"], "image": "https://semiengineering.com/wp-content/uploads/2026/06/AdobeStock_532528757-scaled.jpeg?fit=2560%2C1440&ssl=1", "published": "2026-07-01T07:01:55+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/observability-is-a-missing-layer-in-ai-era-chiplet-design/", "type": "blog"}]}, {"id": "8daf3358c9", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "China y la UE establecen un nuevo mecanismo de consulta comercial y de inversión", "summary": "China y la Unión Europea han lanzado oficialmente el Mecanismo de Consulta Comercial y de Inversión, un paso significativo para gestionar su compleja relación económica a través del diálogo.\n\nLa reunión inaugural, copresidida por el Ministro de Comercio chino Wang Wentao y el Comisario Europeo de Comercio y Seguridad Económica, Maros Sefcovic, tuvo lugar en Bruselas el 29 de junio. Aunque no se anunciaron políticas concretas, el mecanismo establece un marco institucional permanente para consultas regulares entre ambas potencias económicas.\n\nEste acuerdo se produce en un momento de profunda transformación del sistema comercial global, donde los gobiernos buscan equilibrar la competitividad económica con la seguridad nacional, la resiliencia de las cadenas de suministro y las políticas industriales. La creación de este canal de diálogo subraya la voluntad de ambas partes de gestionar sus diferencias económicas mediante la interacción.", "why": "Establece un canal formal de diálogo entre dos de las mayores economías del mundo para gestionar sus diferencias comerciales.", "importance": 4, "relevance": 3, "tags": ["China", "UE", "Comercio", "Diplomacia económica"], "image": "https://asiatimes.com/wp-content/uploads/2020/05/China-EU-Flags-1.jpg", "published": "2026-07-01T10:23:43+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/07/new-china-eu-trade-mechanism-puts-talks-over-tariffs/", "type": "blog"}]}, {"id": "8b5f5483ff", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "China busca fortalecer su influencia en Bangladesh en un contexto de cambio político", "summary": "El nuevo primer ministro de Bangladesh, Tarique Rahman, se reunió recientemente en Beijing con el presidente chino Xi Jinping, marcando un posible giro en las relaciones bilaterales. Históricamente, Bangladesh ha mantenido estrechos lazos con la India.\n\nLa visita se produce tras un cambio de gobierno en Bangladesh y podría ser aprovechada por China para aumentar su presencia e inversiones en la región del Golfo de Bengala. Las promesas de inversión china podrían fortalecer la posición de Beijing en la zona.\n\nSin embargo, el artículo sugiere que la influencia política que China busca obtener a través de estas inversiones podría no materializarse fácilmente, a pesar de los lazos económicos que se fortalezcan.", "why": "China busca expandir su influencia geopolítica y económica en el sur de Asia a través de inversiones en Bangladesh.", "importance": 3, "relevance": 4, "tags": ["China", "Bangladesh", "Geopolítica", "Inversión"], "image": "https://df16bd12.delivery.rocketcdn.me/wp-content/uploads/2020/11/South_Asia_header_grey.jpg", "published": "2026-07-01T10:00:21+00:00", "sources": [{"name": "Geopolitical Futures", "url": "https://geopoliticalfutures.com/china-makes-its-move-in-bangladesh/", "type": "newsletter"}]}, {"id": "df27d890f6", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "El Ejército de EE. UU. busca un sucesor para su sistema de inteligencia 'Trojan Spirit'", "summary": "El programa 'Trojan Spirit', implementado en 1990, revolucionó el acceso a inteligencia para los comandantes desplegados, permitiendo un acceso casi en tiempo real a información sensible y creando una ventaja decisiva en el campo de batalla. Este sistema sentó las bases del modelo de inteligencia en red que utiliza el ejército estadounidense hoy en día.\n\nSin embargo, tras más de 40 años de servicio, el sistema se enfrenta a la obsolescencia. La modernización incremental choca con la realidad de la guerra moderna, que difiere drásticamente de los conflictos de la época en que 'Trojan' fue concebido. La naturaleza más contenida geográficamente de las guerras pasadas contrastaba con los desafíos actuales.\n\nEl artículo subraya la necesidad de un sucesor que pueda adaptarse a las nuevas amenazas y al entorno operativo actual, garantizando que el ejército mantenga su ventaja informativa en un panorama de seguridad en constante evolución.", "why": "La modernización de los sistemas de inteligencia militar es crucial para mantener la superioridad estratégica en conflictos modernos.", "importance": 4, "relevance": 3, "tags": ["Inteligencia Militar", "Ejército EE.UU.", "Tecnología de Defensa"], "image": "https://warontherocks.com/wp-content/uploads/wotr-og-images/wotr-og-45463-32f9ebfd681d.jpg", "published": "2026-07-01T08:00:30+00:00", "sources": [{"name": "War on the Rocks", "url": "https://warontherocks.com/cogs-of-war/trojan-spirit-the-armys-intelligence-backbone-needs-a-successor/", "type": "blog"}]}, {"id": "6de0a55add", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Rambus y Telechips colaboran en SoCs seguros para vehículos definidos por software", "summary": "Telechips está desarrollando plataformas SoC (System-on-Chip) escalables y heterogéneas, integrando seguridad a nivel de sistema y \"Root of Trust\" basado en hardware, para el vehículo definido por software (SDV). La colaboración con Rambus, que aporta su chip RT-648 con procesador Arm Cortex-M33, busca habilitar un arranque seguro, una gestión robusta de claves y una operación confiable del sistema.\n\nLa arquitectura automotriz está migrando de unidades de control electrónico (ECU) distribuidas a modelos de computación zonal centralizada, impulsada por cargas de trabajo como sistemas avanzados de asistencia al conductor (ADAS) basados en IA, cabinas digitales y actualizaciones \"over-the-air\" (OTA). Esta consolidación en SoCs de alto rendimiento mejora la eficiencia, pero introduce desafíos en aislamiento y seguridad.\n\nEsta iniciativa es crucial para la seguridad y escalabilidad de los futuros vehículos, especialmente a medida que integran más funciones de IA y conectividad. La protección de datos y la integridad del sistema son fundamentales para la adopción de tecnologías de conducción autónoma y servicios conectados.", "why": "La integración de seguridad a nivel de hardware en SoCs automotrices es esencial para la creciente complejidad y las funciones de IA en los vehículos definidos por software.", "importance": 3, "relevance": 4, "tags": ["Automoción", "SoC", "Seguridad", "IA"], "image": "https://semiengineering.com/wp-content/uploads/2017/05/semi_fb_thumb.jpg?fit=250%2C250&ssl=1", "published": "2026-07-01T07:02:19+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/securing-the-software-defined-vehicle-how-rambus-and-telechips-enable-safe-scalable-automotive-soc/", "type": "blog"}]}, {"id": "f343935650", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Klarna gana demanda antimonopolio contra Google por 1.970 millones de dólares", "summary": "La fintech sueca Klarna ha ganado una demanda antimonopolio contra Google, obteniendo una indemnización de 1.970 millones de dólares. La subsidiaria de Klarna, PriceRunner, alegó que Google favoreció su propio servicio de comparación de compras, lo que resultó en pérdidas de ingresos y un aumento de costes para los consumidores.\n\nEl tribunal de patentes y mercados de Estocolmo falló a favor de Klarna, ordenando a Google el pago de la mencionada suma. Klarna adquirió PriceRunner en 2022 para integrar la comparación de productos y servicios en su aplicación.\n\nEsta decisión judicial podría fomentar un mercado más competitivo en el ámbito de la comparación de productos y servicios en línea.", "why": "Una victoria legal significativa para una empresa de tecnología financiera contra un gigante tecnológico en un caso de prácticas anticompetitivas.", "importance": 4, "relevance": 2, "tags": ["antimonopolio", "Google", "Klarna", "litigio"], "image": "https://images.sifted.eu/wp-content/uploads/2023/10/26153825/Klarna-HQ-in-Stockholm.jpg?w=1600&h=1067&q=75&fit=crop&auto=compress,format", "published": "2026-07-01T12:32:51+00:00", "sources": [{"name": "Sifted", "url": "https://sifted.eu/articles/klarna-wins-1-97bn-antitrust-lawsuit-against-google/", "type": "blog"}]}, {"id": "7d009bfec4", "category": "ia", "topic": "ia", "subtopic": "Otros", "cruce": false, "title": "Elon Musk promueve la idea de centros de datos en órbita para IA, pero enfrenta desafíos técnicos y económicos", "summary": "Elon Musk ha propuesto la creación de centros de datos en órbita, sugiriendo que serían la solución más económica para la computación de IA en un plazo de dos a tres años. SpaceX ha presentado solicitudes para una constelación de hasta un millón de satélites de datos en órbita baja terrestre.\n\nSin embargo, la viabilidad de esta ambiciosa propuesta es cuestionable. Musk es conocido por sus plazos optimistas, y la logística de desplegar un millón de satélites requeriría un aumento astronómico en la capacidad de lanzamiento y fabricación. Actualmente, SpaceX ya domina una gran parte de los satélites activos en órbita.\n\nLa idea de centros de datos espaciales para IA, aunque futurista, enfrenta obstáculos significativos en términos de escalabilidad, costes y la infraestructura necesaria para su operación y mantenimiento, lo que hace que su implementación práctica en el corto plazo sea incierta.", "why": "Una propuesta audaz para la infraestructura de IA que podría redefinir la computación, pero que enfrenta serias dudas sobre su factibilidad.", "importance": 3, "relevance": 3, "tags": ["IA", "espacio", "centros de datos", "Elon Musk"], "image": "https://spectrum.ieee.org/media-library/globe-wrapped-in-multicolored-pins-and-connecting-lines-symbolizing-global-networks.png?id=67007490&width=980", "published": "2026-07-01T12:00:01+00:00", "sources": [{"name": "IEEE Spectrum (IA)", "url": "https://spectrum.ieee.org/orbital-data-center-hype", "type": "blog"}]}, {"id": "474d4e312b", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Google lanza un altavoz inteligente con Gemini, pero la IA aún no está a la altura", "summary": "Google ha presentado su nuevo altavoz inteligente, el Google Home Speaker, el primero en seis años y diseñado específicamente para integrar Gemini. El dispositivo, con un precio de 99,99 dólares, destaca por su diseño y calidad de sonido para su tamaño, además de ser un controlador para el hogar inteligente compatible con Matter y Thread. Sin embargo, la experiencia de usuario se ve empañada por la lentitud e inconsistencia de Gemini para el hogar, y algunas funcionalidades requieren pago adicional.\n\nEste lanzamiento marca un intento de Google por revitalizar su presencia en el mercado de los altavoces inteligentes, un sector que ha luchado por encontrar un propósito más allá de las funciones básicas como la música o el control de luces. La apuesta por Gemini, la IA conversacional de Google, busca dotar a estos dispositivos de una mayor inteligencia y utilidad, similar a lo que Amazon ha intentado con su Alexa renovada.\n\nLa principal preocupación reside en si Gemini para el hogar alcanzará la madurez esperada. A pesar de las promesas de una comprensión conversacional avanzada, su rendimiento actual, marcado por la lentitud y la falta de fiabilidad, genera dudas sobre su capacidad para justificar la inversión en el nuevo hardware y para competir eficazmente en un mercado que demanda respuestas rápidas y precisas.", "why": "La integración de IA avanzada en dispositivos domésticos es clave para la próxima generación de asistentes inteligentes, pero su rendimiento actual es un factor crítico para la adopción.", "importance": 3, "relevance": 3, "tags": ["Google Home Speaker", "Gemini", "Asistente inteligente"], "image": "https://platform.theverge.com/wp-content/uploads/sites/2/2026/06/268614_Google_Home_Speaker_JTuohy_0009.jpg?quality=90&strip=all&crop=0%2C10.732984293194%2C100%2C78.534031413613&w=1200", "published": "2026-07-01T12:00:00+00:00", "sources": [{"name": "The Verge (IA)", "url": "https://www.theverge.com/tech/959503/google-home-speaker-review-gemini-for-home", "type": "blog"}]}, {"id": "127a1879e8", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "El yen japonés se debilita drásticamente, alcanzando mínimos históricos y planteando desafíos económicos", "summary": "El yen japonés ha caído a niveles no vistos desde 1986, cotizando alrededor de 162 por dólar, lo que genera preocupación sobre la capacidad de Japón para gestionar su deuda pública y la estabilidad económica.\n\nEsta depreciación se atribuye a políticas monetarias expansivas del Banco de Japón (BoJ) implementadas hace décadas, cuyos efectos negativos ahora resurgen. Los mercados especulan sobre si el yen podría caer aún más, hasta 170 o 200 por dólar, poniendo a prueba la resistencia de la economía japonesa.\n\nLa situación actual recuerda a la crisis de los años 80, cuando el acuerdo del Plaza provocó una apreciación del yen y posteriores políticas de relajación monetaria que inflaron una burbuja de activos. La debilidad del yen, que ya ha caído un 3,8% este año, complica los esfuerzos del BoJ y del gobierno para controlar la inflación y la abultada deuda pública del país.", "why": "La drástica caída del yen japonés amenaza la estabilidad económica del país y plantea interrogantes sobre la gestión de su deuda pública.", "importance": 4, "relevance": 2, "tags": ["Japón", "Yen", "Economía", "Mercados"], "image": "", "published": "2026-07-01T09:58:18+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/07/bank-of-japans-monetary-monster-is-finally-turning-on-its-maker/", "type": "blog"}]}, {"id": "b7a2a4e176", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Rusia cierra pasos ferroviarios fronterizos con Finlandia, Estonia y Letonia", "summary": "Rusia ha suspendido todo el tráfico ferroviario de personas, vehículos, bienes y carga con Finlandia, Estonia y Letonia a partir del 1 de julio. La decisión, anunciada en una orden gubernamental, afecta a varios cruces fronterizos clave.\n\nEl Ministerio de Asuntos Exteriores ruso ha notificado formalmente a las naciones bálticas y a Finlandia sobre estas \"temporales\" clausuras, sin ofrecer explicaciones ni plazos para su reapertura. Los pasos afectados incluyen importantes conexiones ferroviarias como la Estación Finlandia de San Petersburgo y otros puntos en las regiones de Leningrado y Carelia, así como cruces con Estonia y Letonia.\n\nEsta medida representa un nuevo endurecimiento de las relaciones entre Rusia y la Unión Europea, limitando aún más las conexiones físicas y logísticas entre las partes.", "why": "Rusia restringe aún más las conexiones físicas y logísticas con la Unión Europea al cerrar pasos ferroviarios fronterizos.", "importance": 3, "relevance": 3, "tags": ["Rusia", "UE", "Fronteras", "Logística"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/07/01/GettyImages-1810111434-scaled.jpg", "published": "2026-07-01T09:51:26+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/russia-suspends-railway-border-crossings-finland-baltic-neighbors/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "ec97b990b7", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "La inflación de la Eurozona cae al 2,8% en junio, superando las expectativas", "summary": "La tasa de inflación interanual de la Eurozona se situó en el 2,8% en junio, una cifra inferior a la esperada y una disminución respecto a los meses anteriores. Este descenso es una señal positiva para el Banco Central Europeo (BCE) en su lucha contra las presiones inflacionistas.\n\nLa caída de la inflación se atribuye a varios factores, incluyendo la moderación de los precios de la energía y la normalización de las cadenas de suministro. Sin embargo, la inflación subyacente, que excluye los componentes volátiles como la energía y los alimentos, aún podría presentar desafíos.\n\nEste dato de inflación es crucial para las futuras decisiones de política monetaria del BCE. Una inflación decreciente podría dar margen al banco central para considerar una pausa o incluso una reversión en las subidas de tipos de interés, lo que tendría implicaciones significativas para el crecimiento económico y los mercados financieros de la Eurozona.", "why": "La evolución de la inflación en la Eurozona es un indicador clave para la política monetaria del BCE y la estabilidad económica de la región.", "importance": 4, "relevance": 1, "tags": ["Eurozona", "Inflación", "BCE"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F7b0e0479-c35d-4cd5-8353-98357fb049f2.png?source=next-barrier-page", "published": "2026-07-01T11:02:50+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/c4408588-ca9c-4c9f-b058-c8e2d0cc39e5", "type": "blog"}]}, {"id": "9dabfc4d3e", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Francia convoca elecciones presidenciales anticipadas para abril y mayo", "summary": "Los votantes franceses acudirán a las urnas para elegir un nuevo presidente los días 18 de abril y 2 de mayo del próximo año. La decisión, aún no hecha pública oficialmente, se espera que sea anunciada tras una reunión de gabinete. Las fechas elegidas se acercan al 13 de mayo, fecha en la que concluye el segundo mandato del actual presidente, Emmanuel Macron.\n\nDado que Macron no puede presentarse a un tercer mandato consecutivo por impedimento constitucional, un gran número de candidatos se perfilan para sucederle. Entre los aspirantes se encuentran dos de sus ex primeros ministros, Edouard Philippe y Gabriel Attal, así como el líder de la izquierda radical, Jean-Luc Mélenchon.\n\nLa contienda electoral se perfila reñida, con el partido de extrema derecha Agrupación Nacional como un fuerte contendiente. Sin embargo, la decisión sobre quién será su candidato, Marine Le Pen o Jordan Bardella, dependerá de una resolución judicial sobre la apelación de Le Pen a una condena por malversación de fondos de la UE y su inhabilitación para ejercer cargos públicos.", "why": "Un cambio político significativo en Francia podría tener repercusiones en la política europea y las relaciones internacionales.", "importance": 4, "relevance": 1, "tags": ["Francia", "Elecciones", "Política Europea"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/07/01/GettyImages-2268243073-scaled.jpg", "published": "2026-07-01T08:25:55+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/france-to-elect-new-president-on-april-18-and-may-2-2027/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

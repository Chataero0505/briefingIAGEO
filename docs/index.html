estas reformas es crucial para que Hungría reciba los fondos congelados, que están condicionados a avances en salvaguardias anticorrupción, transparencia y Estado de derecho. La iniciativa también contempla la disolución de fundaciones que no realizan actividades de educación superior, como el Mathias Corvinus Collegium.", "why": "Hungría da pasos para recuperar fondos cruciales de la UE mediante reformas anticorrupción, lo que podría influir en la gobernanza y la transparencia en el bloque.", "importance": 3, "relevance": 3, "tags": ["Hungría", "UE", "Corrupción", "Fondos europeos"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/02/GettyImages-2156024697.jpg", "published": "2026-06-10T12:23:16+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/hungary-seeks-to-unlock-e10-4bn-in-eu-funds-with-anti-corruption-overhaul/", "type": "blog"}]}, {"id": "503afc1cfd", "category": "ia", "topic": "ia", "subtopic": "Regulación", "cruce": false, "title": "Autoridades europeas imponen restricciones al negocio europeo de Revolut", "summary": "El Banco Central Europeo (BCE) ha impuesto restricciones al negocio europeo de la fintech Revolut, citando preocupaciones sobre los riesgos en su proceso de aprobación de productos. Según informes, el BCE pausó el permiso para que la compañía lanzara nuevos productos en el Espacio Económico Europeo el verano pasado hasta que se subsanaran \"deficiencias\" en su proceso de aprobación.\n\nRevolut fue obligada a realizar una revisión independiente de sus funciones de riesgo, cumplimiento y legales para su proceso de aprobación de nuevas iniciativas en Europa. Estas restricciones, comunicadas en julio de 2025, también impedían a Revolut adquirir empresas o incorporar nuevos clientes fuera de Europa. La compañía ha declarado estar en \"diálogo continuo y constructivo\" con los reguladores y comprometida con \"los más altos estándares de gobernanza y gestión de riesgos\".\n\nQueda por determinar la duración de estas restricciones y el impacto final en las operaciones y el crecimiento de Revolut en Europa. La supervisión regulatoria sobre las fintechs y sus procesos internos de gestión de riesgos es un tema clave a vigilar en el sector financiero.", "why": "Las restricciones impuestas por el BCE a Revolut resaltan el escrutinio regulatorio sobre las fintechs y sus procesos de gestión de riesgos en Europa.", "importance": 3, "relevance": 3, "tags": ["Revolut", "BCE", "Fintech", "Regulación"], "image": "https://images.sifted.eu/wp-content/uploads/2026/06/10115538/tabrez-syed-PDnv0eG5yOA-unsplash-scaled.jpg?w=2048&h=1371&q=75&fit=crop&auto=compress,format", "published": "2026-06-10T11:57:47+00:00", "sources": [{"name": "Sifted", "url": "https://sifted.eu/articles/european-authorities-curb-revolut/", "type": "blog"}]}, {"id": "3aada47eae", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Eurodiputados y países de la UE alcanzan un acuerdo sobre defensa tras \"reticencias\"", "summary": "Los eurodiputados y los Estados miembros de la UE han llegado a un acuerdo final sobre un paquete legislativo de defensa, aunque el proceso estuvo marcado por la \"inflexibilidad\" de los países miembros, según la perspectiva del Parlamento Europeo.\n\nEl acuerdo, que abarca diversas medidas de defensa, se alcanzó tras negociaciones que evidenciaron tensiones entre las instituciones europeas y los gobiernos nacionales.\n\nEste pacto es relevante en el contexto actual de creciente preocupación por la seguridad en Europa y la necesidad de fortalecer la cooperación en defensa.", "why": "Refleja los desafíos y avances en la cooperación en defensa dentro de la Unión Europea.", "importance": 3, "relevance": 3, "tags": ["UE", "Defensa", "Cooperación"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2279257855-1186x788.jpg", "published": "2026-06-10T11:47:08+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/meps-grudgingly-strike-final-defence-omnibus-deal-with-eu-countries/", "type": "blog"}]}, {"id": "16ba9a321c", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "Un exempleado de Bolt gana un caso contra la empresa tras ser despedido, utilizando ChatGPT para construir su defensa.", "summary": "Rizwan Mahmood, exempleado de la empresa tecnológica estonia Bolt, ha ganado un caso contra su empleador tras ser despedido en marzo de 2025. Mahmood utilizó extensivamente ChatGPT para preparar su defensa y presentar una disputa ante el Comité de Resolución de Disputas Laborales de Estonia.\n\nSegún el comité, Bolt argumentó que Mahmood \"no había podido cumplir con sus deberes durante mucho tiempo\", basándose en feedback verbal y escrito. Sin embargo, Mahmood defendió que sus evaluaciones de desempeño eran positivas, que no se le había aplicado un plan de mejora de rendimiento y que no se le había advertido de que su puesto estaba en riesgo. El comité falló a favor de Mahmood, ordenando a Bolt pagarle 14.500 euros, el equivalente a tres meses de salario.\n\nLa empresa, por su parte, declaró que se toma estos asuntos \"muy en serio\" pero no discute casos de empleo públicamente. Este caso pone de relieve el potencial de las herramientas de IA como ChatGPT para asistir a individuos en la gestión de disputas laborales y la defensa de sus derechos.", "why": "Demuestra cómo las herramientas de IA como ChatGPT pueden ser utilizadas por individuos para construir argumentos legales y defenderse en disputas laborales.", "importance": 3, "relevance": 3, "tags": ["IA", "ChatGPT", "Despido", "Estonia"], "image": "https://images.sifted.eu/wp-content/uploads/2026/06/10093159/Riz.jpeg?w=800&h=800&q=75&fit=crop&auto=compress,format", "published": "2026-06-10T10:40:13+00:00", "sources": [{"name": "Sifted", "url": "https://sifted.eu/articles/advice-for-dismissed-techies/", "type": "blog"}]}, {"id": "d506f5da28", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "China se arriesga a \"manos sucias\" con el programa de alimentación de Prabowo en Indonesia", "summary": "China está ampliando su relación con Indonesia, tradicionalmente centrada en infraestructuras, para incluir el programa \"Makan Bergizi Gratis\" (MBG) del presidente Prabowo Subianto. El consejero de la embajada china asistió a la inauguración de un centro de servicios de nutrición y promovió la cooperación en este ámbito, presentándolo como una contribución al bienestar social.\n\nAunque la cooperación en alimentación infantil parece inofensiva, el programa MBG se ha vuelto políticamente controvertido e institucionalmente vulnerable en Indonesia. La reciente detención de Dadan Hindayana, exjefe de la Agencia Nacional de Nutrición, junto con otros dos individuos, por presuntos vínculos con el programa, subraya esta vulnerabilidad.\n\nBeijing debería proceder con cautela, ya que asociarse con un programa tan sensible y políticamente cargado podría tener consecuencias negativas para su imagen y sus relaciones diplomáticas en la región.", "why": "La expansión de la influencia china a través de programas sociales sensibles en Indonesia podría generar tensiones diplomáticas y afectar la percepción de China en el Sudeste Asiático.", "importance": 3, "relevance": 3, "tags": ["China", "Indonesia", "Política exterior"], "image": "https://asiatimes.com/wp-content/uploads/2026/06/Indonesia-Free-Meal-Program-Prabowo-Populism.jpg", "published": "2026-06-10T08:05:17+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/china-risks-dirty-hands-from-prabowos-tainted-meal-deal/", "type": "blog"}]}, {"id": "4388f7a32d", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Incertidumbre en Indonesia: El nuevo fondo soberano genera opiniones divididas entre agencias de calificación", "summary": "Indonesia se encuentra en una encrucijada económica, con visiones contrapuestas sobre su futuro. Mientras algunos ejecutivos ven el país como un mercado grande y estable con oportunidades emergentes, los inversores internacionales expresan crecientes dudas sobre la dirección que está tomando la nación.\n\nEsta dualidad se refleja en las calificaciones del nuevo fondo soberano de Indonesia, PT Danantara Investment Management. Moody's le otorgó una calificación Baa2 con perspectiva negativa, mientras que S&P Global Ratings le dio un rating a largo plazo de BBB con perspectiva estable. Ambas agencias vinculan el perfil crediticio del fondo al apoyo del gobierno indonesio y a su propia solvencia soberana.\n\nEl debate se centra en si estas calificaciones son positivas o negativas, pero la atención que genera Danantara, un símbolo del esfuerzo estatal por dirigir el desarrollo económico, subraya la importancia de la percepción de los inversores sobre la estabilidad política y las reformas económicas en Indonesia.", "why": "La divergencia en las calificaciones del fondo soberano de Indonesia refleja la incertidumbre de los inversores sobre la dirección económica y política del país.", "importance": 3, "relevance": 3, "tags": ["Indonesia", "fondo soberano", "inversión", "calificadoras"], "image": "https://asiatimes.com/wp-content/uploads/2026/06/Indonesia-Prabowo-Subianto.jpg", "published": "2026-06-10T05:08:17+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/a-question-of-trust-in-prabowos-indonesia/", "type": "blog"}]}, {"id": "b0b1d21885", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Inversores chinos buscan vías alternativas para participar en la potencial salida a bolsa de SpaceX", "summary": "Ante la exclusión de la Oferta Pública Inicial (OPI) de SpaceX, inversores chinos están explorando estrategias creativas para obtener exposición a la compañía espacial de Elon Musk. Las opciones incluyen el uso de acciones \"proxy\" (representativas) y la especulación en la cadena de suministro, buscando capitalizar lo que podría ser la mayor cotización bursátil de la historia.\n\nSpaceX ha vetado la participación de inversores de China continental y Hong Kong en su OPI, citando preocupaciones regulatorias y de cumplimiento. La empresa ha fijado un precio de salida de 135 dólares por acción, aspirando a una valoración de aproximadamente 1,8 billones de dólares antes de su debut esperado en el Nasdaq. La demanda de la oferta ha superado los 250.000 millones de dólares, indicando una sobre suscripción significativa.\n\nEsta situación genera un \"miedo a perderse algo\" (FOMO) entre los inversores chinos, quienes recurren a cuentas extraterritoriales, acciones \"proxy\" en el mercado A-share y otras inversiones temáticas relacionadas con el espacio comercial. Incluso los operadores transfronterizos experimentados se encuentran con obstáculos considerables para acceder a esta oportunidad de inversión.", "why": "La exclusión de inversores chinos de la OPI de SpaceX impulsa la búsqueda de métodos alternativos para invertir en el sector espacial, evidenciando el interés y las barreras en el mercado.", "importance": 3, "relevance": 3, "tags": ["SpaceX", "inversores chinos", "OPI", "espacio"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/06/10/5a28f9b8-ab38-4e1e-a4e6-418b6ac98e32_480a7d4a.jpg?itok=3irbRq-M&v=1781065743", "published": "2026-06-10T05:00:07+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/tech/article/3356580/shut-out-spacex-ipo-chinese-investors-get-creative-catch-ride?utm_source=rss_feed", "type": "blog"}]}, {"id": "e73423e11a", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Lanzamiento de Mythos por Matthew Berman", "summary": "Matthew Berman ha anunciado oficialmente el lanzamiento de Mythos. La información proporcionada se limita a enlaces de redes sociales y un contacto para consultas de medios o patrocinios.\n\nNo se ofrecen detalles sobre la naturaleza de Mythos, su funcionalidad o su propósito.\n\nLa comunicación se centra en la promoción del lanzamiento y la dirección de consultas externas.", "why": "Anuncio de un nuevo producto o servicio en el ámbito de la IA, aunque sin detalles específicos.", "importance": 1, "relevance": 3, "tags": ["IA", "Lanzamiento", "Mythos"], "image": "https://i3.ytimg.com/vi/naOUMQt-8pU/hqdefault.jpg", "published": "2026-06-09T21:36:19+00:00", "sources": [{"name": "Matthew Berman", "url": "https://www.youtube.com/shorts/naOUMQt-8pU", "type": "youtube"}]}, {"id": "c14f572fcd", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Fuerte apreciación del dólar agrava la carga económica de países asiáticos", "summary": "La continua apreciación del dólar estadounidense está intensificando las dificultades económicas en varios países asiáticos, especialmente aquellos que ya enfrentan altos precios del petróleo debido al conflicto en Irán. El aumento de las expectativas de una subida de tipos de interés por parte de la Reserva Federal de EE. UU. y la elevada incertidumbre económica global dificultan la defensa de las monedas locales.\n\nEsta situación se suma a las presiones inflacionarias y a los desafíos para la balanza de pagos de las economías asiáticas. La fortaleza del dólar encarece las importaciones, particularmente de energía y materias primas, y aumenta el costo del servicio de la deuda denominada en dólares.\n\nLos gobiernos de la región deberán gestionar cuidadosamente sus políticas monetarias y fiscales para mitigar los efectos adversos de la fortaleza del dólar y la volatilidad de los mercados financieros internacionales, buscando mantener la estabilidad económica y el crecimiento.", "why": "La fortaleza del dólar y las expectativas de subidas de tipos en EE. UU. complican la situación económica de los países asiáticos.", "importance": 3, "relevance": 2, "tags": ["Dólar", "Asia", "Economía", "Tipos de interés"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F8%2F1%2F5%2F6%2F12596518-1-eng-GB%2Fe865c59df320-photo_SXM2024100800005730a.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T12:44:56.023963+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/markets/strong-dollar-rally-weighs-heavier-on-struggling-asian-countries", "type": "blog"}]}, {"id": "23c820a359", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Filipinas considera vital establecer fronteras marítimas con Japón para su defensa nacional", "summary": "El establecimiento de límites marítimos claros entre Filipinas y Japón es de vital importancia para la defensa nacional filipina, según ha declarado la Secretaria de Asuntos Exteriores de Filipinas, Maria Theresa Lazaro. La funcionaria enfatizó la necesidad de definir estas fronteras en el contexto de la seguridad regional.\n\nLazaro sugirió que las negociaciones para establecer estas fronteras marítimas no deberían incluir a China, a pesar de las críticas que esta postura pueda generar. La declaración se realizó en el marco del Foro \"Futuro de Asia\" en Tokio, subrayando la importancia de las relaciones bilaterales y la seguridad marítima en la región.\n\nEsta postura refleja las crecientes preocupaciones de seguridad en el Mar de China Meridional y la búsqueda de Filipinas por fortalecer sus alianzas estratégicas para garantizar su soberanía y defensa.", "why": "Filipinas busca establecer fronteras marítimas con Japón para reforzar su defensa nacional, excluyendo a China de las negociaciones.", "importance": 3, "relevance": 2, "tags": ["Filipinas", "Japón", "Defensa", "Fronteras marítimas"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F7%2F5%2F1%2F8%2F12598157-1-eng-GB%2Fd79cfe7d7f6a-IMGL2006.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T12:44:54.987163+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/editor-s-picks/interview/setting-sea-border-with-japan-vital-philippine-foreign-secretary", "type": "blog"}]}, {"id": "59966b658f", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Irlanda del Norte revive \"capítulos más oscuros\" ante terrorismo antiinmigrante", "summary": "Varios distritos de Belfast han sido escenario de disturbios y ataques contra hogares y negocios de minorías étnicas, en incidentes que recuerdan a los \"Troubles\" de antaño. La policía y los bomberos lucharon por contener a multitudes de militantes antiinmigrantes.\n\nDecenas de viviendas, vehículos y al menos un autobús urbano fueron incendiados. Las autoridades se centraron en garantizar la seguridad de las personas amenazadas, en lugar de confrontar y arrestar a los atacantes. El primer ministro británico, Keir Starmer, prometió identificar y procesar a los responsables.\n\nEstos actos de violencia xenófoba plantean serias preocupaciones sobre la cohesión social y la seguridad en la región, y suponen un retroceso a períodos de conflicto intenso.", "why": "La violencia antiinmigrante en Irlanda del Norte evoca un pasado de conflicto y genera inestabilidad social y de seguridad.", "importance": 3, "relevance": 2, "tags": ["Irlanda del Norte", "Inmigración", "Violencia", "Seguridad"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/06/10/crowd-riot-scaled.jpg", "published": "2026-06-10T12:34:34+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/anti-immigrant-terror-takes-northern-ireland-back-darkest-chapters/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "2979380e6f", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Miles de africanos huyen de Sudáfrica en medio de un clima anti-inmigrante", "summary": "Miles de ciudadanos africanos están abandonando Sudáfrica, huyendo de un creciente sentimiento y acciones anti-inmigrantes en el país. La información disponible no especifica el número exacto de personas afectadas ni las causas concretas de este sentimiento, pero señala una tendencia preocupante.\n\nSudáfrica ha sido históricamente un destino para migrantes de otros países africanos, pero ha experimentado episodios de xenofobia y violencia contra extranjeros en el pasado. Estos eventos suelen estar vinculados a tensiones económicas y sociales, como el desempleo y la competencia por recursos.\n\nLa situación requiere una monitorización cuidadosa para entender las causas subyacentes y las posibles repercusiones humanitarias y de estabilidad regional. La respuesta del gobierno sudafricano y las organizaciones internacionales será crucial.", "why": "La migración forzada de miles de africanos debido a la xenofobia en Sudáfrica tiene implicaciones humanitarias y de estabilidad regional.", "importance": 3, "relevance": 2, "tags": ["Migración", "Sudáfrica", "Xenofobia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Fc58b3263-d768-41ae-a1c2-721bd0720d5e.jpg?source=next-barrier-page", "published": "2026-06-10T12:09:08+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/f7721f36-7906-4da9-8f7f-34f4c7cf7ae8", "type": "blog"}]}, {"id": "3a4c3fbb35", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Irán denuncia que 20.000 personas se quedaron sin agua tras ataques estadounidenses a depósitos", "summary": "Irán ha declarado que aproximadamente 20.000 personas han quedado sin acceso a agua potable después de que fuerzas estadounidenses atacaran depósitos de agua. Los detalles sobre la ubicación exacta de los depósitos y la naturaleza de los \"ataques\" no se especifican en la información proporcionada.\n\nEste incidente se produce en un contexto de tensiones geopolíticas y posibles enfrentamientos en la región. La infraestructura hídrica es vital y su afectación puede tener consecuencias humanitarias graves, especialmente en zonas con escasez de agua.\n\nSerá crucial verificar la información y las circunstancias exactas de estos ataques. Las repercusiones diplomáticas y humanitarias de un incidente de esta naturaleza podrían ser significativas, y se deberá seguir de cerca la respuesta de las partes involucradas y de la comunidad internacional.", "why": "El presunto ataque estadounidense a depósitos de agua en Irán, que habría dejado a 20.000 personas sin suministro, eleva las tensiones y plantea serias preocupaciones humanitarias.", "importance": 3, "relevance": 2, "tags": ["Irán", "EE. UU.", "Conflicto", "Agua"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F58e347e2-d0fc-4a43-b663-55980732d28b.jpg?source=next-barrier-page", "published": "2026-06-10T11:51:47+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/155db8a4-f2ff-463b-9c6c-2b1a8104750c", "type": "blog"}]}, {"id": "c86c590596", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Bélgica rechaza demanda de EE. UU. para prohibir viajes desde Congo por el Mundial de Fútbol", "summary": "Bélgica ha rechazado la exigencia de Estados Unidos de imponer una prohibición de entrada a viajeros procedentes de la República Democrática del Congo (RDC) en el contexto de la Copa del Mundo. El ministro de Salud belga, Frank Vandenbroucke, afirmó que el país seguirá el consejo científico en lugar de ceder a la presión política de Washington.\n\nLa decisión belga se basa en la evaluación científica de que las medidas de contención deben centrarse \"donde la crisis está azotando\". Actualmente, no se propone una prohibición de entrada generalizada. Bélgica está en consulta con \"socios involucrados\" y el Centro Europeo para la Prevención y el Control de Enfermedades (ECDC).\n\nEste desacuerdo pone de manifiesto las diferentes aproximaciones entre países ante crisis sanitarias globales y la influencia de eventos masivos como la Copa del Mundo. La gestión de brotes epidémicos y la coordinación internacional en salud pública seguirán siendo temas de gran relevancia.", "why": "El rechazo de Bélgica a la demanda de EE. UU. de prohibir viajes desde Congo evidencia las tensiones en la coordinación internacional de salud pública ante crisis sanitarias.", "importance": 3, "relevance": 2, "tags": ["Bélgica", "EE. UU.", "Salud Pública", "Congo"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/06/10/GettyImages-1236816592-scaled.jpg", "published": "2026-06-10T11:49:59+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/belgium-frank-vandenbroucke-us-world-cup-congo-travel-ban-ebola/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "7250a9d09b", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Polémica en Grecia por comentarios de un diputado sobre el hundimiento de barcos de migrantes", "summary": "Un diputado griego del partido gobernante Nueva Democracia, Makis Voridis, ha generado una fuerte controversia tras preguntar retóricamente \"¿Hundimos el bote o no?\" en relación con las embarcaciones de migrantes.\n\nLa declaración se produjo durante un debate sobre la implementación del pacto migratorio de la UE. La oposición criticó duramente las palabras de Voridis, calificándolas de retórica de extrema derecha y comparándolas con políticas de estilo Trump. El diputado defendió posteriormente que su pregunta era retórica y buscaba evitar cruces irregulares.\n\nEste incidente subraya las tensiones políticas en Grecia y el debate sobre las políticas migratorias en Europa, especialmente con la inminente entrada en vigor del nuevo pacto migratorio de la UE.", "why": "Evidencia las divisiones y el tono del debate migratorio en Europa.", "importance": 3, "relevance": 2, "tags": ["Migración", "Grecia", "Política"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/migr.jpg", "published": "2026-06-10T11:43:57+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/greek-mp-sparks-backlash-over-sinking-migrant-boats/", "type": "blog"}]}, {"id": "8da523b243", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "El \"problema de Chechenia\" de Rusia: la sucesión de Kadyrov y la estabilidad regional", "summary": "El artículo de Geopolitical Futures aborda la volátil situación en Chechenia, una república rusa marcada por la inestabilidad durante más de un siglo. El líder actual, Ramzan Kadyrov, cuya salud es objeto de rumores, ha construido su poder en torno a su figura, pero carece de un sucesor claro.\n\nLa falta de un plan de sucesión definido en Chechenia representa un desafío para el presidente Vladimir Putin, ya que una transición fallida podría desestabilizar la región del Cáucaso.\n\nLa estabilidad del Cáucaso ruso es un factor crucial para la seguridad interna de Rusia y su influencia regional. La situación en Chechenia es un punto a vigilar en la política interna rusa.", "why": "La sucesión de Kadyrov en Chechenia podría tener repercusiones en la estabilidad del Cáucaso.", "importance": 3, "relevance": 2, "tags": ["Rusia", "Chechenia", "Estabilidad"], "image": "https://df16bd12.delivery.rocketcdn.me/wp-content/uploads/2020/11/Eurasia_header_grey.jpg", "published": "2026-06-10T11:27:36+00:00", "sources": [{"name": "Geopolitical Futures", "url": "https://geopoliticalfutures.com/russias-chechnya-problem/", "type": "newsletter"}]}, {"id": "9df5f92487", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Elon Musk criticado por avivar tensiones antes de disturbios en Belfast", "summary": "El gobierno británico ha criticado duramente a Elon Musk, propietario de X (anteriormente Twitter), acusándolo de exacerbar las tensiones en línea antes de los disturbios ocurridos en Belfast. Las protestas se produjeron tras un apuñalamiento en la capital de Irlanda del Norte.\n\nMusk había compartido un mensaje de un activista de extrema derecha, Tommy Robinson, que detallaba lugares de protesta. El propietario de X, conocido por sus críticas al gobierno laborista, había publicado previamente un mensaje instando a protestar \"REPETIDAMENTE y FUERTEMENTE\" para lograr cambios.\n\nLos incidentes en Belfast incluyeron incendios de casas, coches y un autobús. Un hombre de 30 años de origen sudanés ha sido acusado de intento de asesinato por el apuñalamiento. La controversia pone de manifiesto el papel de las plataformas de redes sociales en la difusión de información y la posible incitación a la violencia.", "why": "Destaca el impacto de las redes sociales y figuras influyentes en la escalada de tensiones sociales y políticas, con implicaciones para la estabilidad.", "importance": 3, "relevance": 2, "tags": ["Redes Sociales", "Política", "Disturbios", "Elon Musk"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/06/10/GettyImages-2280174132-scaled.jpg", "published": "2026-06-10T09:10:33+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/labour-slams-appalling-elon-musk-after-belfast-riots/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "1049bb342d", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "La FIFA: de Estado paralelo a vasallo de Trump", "summary": "Estados Unidos ha marcado el torneo con la guerra en Irán, las redadas migratorias, las tensiones con sus aliados o las restricciones de viaje. Pese a todo, ha contado con el beneplácito de la organización.\n\nLa FIFA, que en su momento fue descrita como un \"Estado paralelo\" por su poder e influencia, parece haber pasado a una posición de \"vasallaje\" respecto a las políticas y presiones de Estados Unidos, particularmente bajo la administración Trump.\n\nEsta dinámica plantea interrogantes sobre la independencia y el rol de las organizaciones deportivas internacionales frente a las agendas políticas de las grandes potencias.", "why": "La influencia de la política estadounidense en organizaciones deportivas globales como la FIFA puede tener repercusiones en la diplomacia y las relaciones internacionales.", "importance": 3, "relevance": 2, "tags": ["FIFA", "Política EE. UU.", "Relaciones internacionales"], "image": "https://asiatimes.com/wp-content/uploads/2026/06/Iran-Flag-Iran-War.jpg", "published": "2026-06-10T08:32:55+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/there-is-no-military-solution-to-the-middle-easts-imbroglio/", "type": "blog"}]}, {"id": "a81a4b2cfc", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "No hay solución militar para el conflicto de Oriente Medio", "summary": "El artículo argumenta que la administración Obama, al centrarse en el acuerdo nuclear con Irán, desaprovechó la oportunidad de utilizar su influencia económica y diplomática para abordar los comportamientos desestabilizadores de Irán en la región. A pesar de las reservas, el autor apoyó el Plan de Acción Integral Conjunto (JCPOA) por ser un acuerdo negociado y por la esperanza de que condujera a un marco de paz regional.\n\nEl autor critica la interferencia republicana en el proceso del JCPOA, calificándola de inaceptable. La negociación del acuerdo nuclear con Irán, aunque buscaba prevenir la obtención de armas nucleares, no abordó de manera efectiva las acciones de Irán que desestabilizan la región, como su apoyo a grupos proxy y su interferencia en asuntos de otros países.\n\nSe concluye que la vía militar no es la solución para los complejos problemas de Oriente Medio, y que se requieren enfoques diplomáticos y regionales más amplios para lograr una paz duradera, abordando las causas subyacentes de la inestabilidad.", "why": "La persistencia de conflictos en Oriente Medio y la ineficacia de las soluciones militares subrayan la necesidad de enfoques diplomáticos y regionales para la estabilidad global.", "importance": 3, "relevance": 2, "tags": ["Oriente Medio", "Diplomacia", "Irán"], "image": "https://elordenmundial.com/wp-content/uploads/2026/06/previa-fifa-estado-paralelo-vasallo-trump-orden-internacional.jpg", "published": "2026-06-10T07:35:39+00:00", "sources": [{"name": "El Orden Mundial", "url": "https://elordenmundial.com/fifa-estado-paralelo-vasallo-trump-orden-internacional/", "type": "blog"}]}, {"id": "6592294bcc", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Violencia en Belfast reaviva el debate sobre inmigración en el Reino Unido", "summary": "Un violento incidente en Belfast, que ha llevado a la imputación de un ciudadano sudanés por intento de asesinato, ha desatado una nueva batalla política en el Reino Unido, especialmente en el ala derecha. Los líderes políticos han condenado las protestas y la atención se centra ahora en cómo este caso ha reavivado las preguntas sobre la inmigración, la seguridad fronteriza y el sistema de permiso de residencia indefinida británico.\n\nEl incidente ha puesto de manifiesto las tensiones existentes en torno a la política migratoria del país. Partidos políticos, incluido Reform UK, se ven obligados a posicionarse y a gestionar la narrativa pública, especialmente ante la proximidad de elecciones y el historial de algunas de sus figuras en gobiernos anteriores.\n\nLa noticia subraya la sensibilidad del tema migratorio en la política británica y su potencial para movilizar el debate público y electoral.", "why": "Destaca cómo incidentes aislados pueden catalizar debates políticos de gran calado sobre inmigración y seguridad en Europa.", "importance": 3, "relevance": 2, "tags": ["Inmigración", "Política", "Reino Unido"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2025/03/27/PASAA_PODCAST-HERO-16BY9.png", "published": "2026-06-10T07:17:58+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/podcast/politics-at-sam-and-annes/belfast-violence-prompts-fight-on-the-right/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "c13890f731", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Una startup europea crea un equipo de \"fundadores de fantasía\" para un torneo deportivo, mencionando el uso de IA para la selección de jugadores.", "summary": "En el contexto del inicio de un torneo deportivo, la publicación Sifted ha elaborado una lista de \"fundadores de startups europeos\" que conformarían un equipo ideal, comparando sus habilidades con las de los futbolistas. La lista incluye a CEOs y VCs de empresas tecnológicas europeas.\n\nSe destaca la competitividad de los fundadores de startups y su capacidad para \"inventar roles\" y \"pivotar\" estrategias, similar a las tácticas deportivas. Como anécdota, se menciona que un fundador utiliza \"agentes de IA\" para tomar decisiones en su equipo de fútbol de fantasía de la Premier League.\n\nLa noticia se centra en la creación de este equipo de fantasía y las comparaciones entre el mundo de las startups y el deporte, con una mención secundaria al uso de IA como una herramienta para la toma de decisiones en un contexto lúdico.", "why": "Se menciona el uso de IA por parte de un fundador de startup para optimizar decisiones en un juego de fantasía.", "importance": 1, "relevance": 2, "tags": ["IA", "Startups", "Fútbol de Fantasía", "Europa"], "image": "https://images.sifted.eu/wp-content/uploads/2026/06/09211432/fauzan-saari-AmhdN68wjPc-unsplash.jpg?w=640&h=360&q=75&fit=crop&auto=compress,format", "published": "2026-06-10T10:40:32+00:00", "sources": [{"name": "Sifted", "url": "https://sifted.eu/articles/our-fantasy-world-cup-team-of-founders/", "type": "blog"}]}, {"id": "148389bf4e", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Crisis de deuda soberana: el modelo de transparencia es insuficiente", "summary": "Durante décadas, la comunidad financiera global ha abordado las crisis de deuda soberana centrándose en la transparencia y la rendición de cuentas, un enfoque que se ha mostrado inadecuado ante el creciente endeudamiento de las economías emergentes.\n\nEl modelo tradicional, impulsado por el FMI y el Banco Mundial, se basa en la \"gobernanza buena\" y la \"vigilancia vertical\", asumiendo un entorno de cumplimiento normativo que a menudo no existe en la práctica. Las crisis de deuda soberana son frecuentemente el resultado de ecosistemas creados deliberadamente donde élites locales y actores externos coluden para generar deuda insostenible para beneficio privado.\n\nPara abordar eficazmente estas crisis, es necesario ir más allá de la mera mejora de la transparencia y adoptar un marco que reconozca las realidades de poder, capacidades e intereses. La creciente dependencia de las economías emergentes de los recursos del mercado, en lugar de la financiación para el desarrollo, agrava la situación.", "why": "La insuficiencia de los modelos actuales para gestionar crisis de deuda soberana pone en riesgo la estabilidad económica de las economías emergentes y la confianza en el sistema financiero global.", "importance": 3, "relevance": 1, "tags": ["Deuda soberana", "Economía emergente", "Finanzas globales"], "image": "https://asiatimes.com/wp-content/uploads/2026/06/Sri-Lanka-Rupee-Currency.jpg", "published": "2026-06-10T06:51:43+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/beyond-transparency-a-better-model-for-sovereign-debt-crises/", "type": "blog"}]}, {"id": "2e8b385cd4", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Malasia impone prohibición de importación de camarones tailandeses, afectando a la industria local", "summary": "Malasia ha implementado una prohibición de importación de camarones procedentes de Tailandia, lo que representa un duro golpe para los productores de mariscos tailandeses. Esta medida agrava las dificultades que ya enfrenta el sector, que lucha contra el aumento de los costos de los piensos y el combustible.\n\nLa industria de mariscos de Tailandia, uno de los mayores exportadores mundiales de camarones, se enfrenta a un panorama complicado. La prohibición de importación por parte de Malasia, un mercado importante, añade presión a las empresas que ya lidian con el incremento de los costos operativos.\n\nLa situación pone de manifiesto la fragilidad de las cadenas de suministro en el sector alimentario y la necesidad de que el gobierno tailandés negocie activamente con Malasia y explore nuevos mercados para mitigar el impacto económico.", "why": "La prohibición de importación de camarones tailandeses por parte de Malasia golpea a la industria local, ya afectada por el aumento de costos.", "importance": 2, "relevance": 1, "tags": ["Tailandia", "Malasia", "Comercio", "Cadena de suministro"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F9%2F7%2F4%2F12594795-2-eng-GB%2F7fff43a3d0a7-2026-03-26T052027Z_964052355_RC2BBKABUYOG_RTRMADP_3_IRAN-CRISIS-THAILAND-FISHERMEN.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-10T12:44:56.109863+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/fisheries/thailand-s-shrimp-industry-hit-by-malaysia-s-import-ban", "type": "blog"}]}, {"id": "bde7188225", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Rechazo a cambios en las normas de presentación de cuentas de pequeñas empresas en el Reino Unido", "summary": "Se ha generado una fuerte oposición a las recientes modificaciones en las reglas de presentación de información financiera para las pequeñas empresas en el Reino Unido. Los detalles específicos de estas modificaciones y la naturaleza exacta de la \"reacción\" no se detallan en la información proporcionada, pero la controversia sugiere un impacto significativo en el sector empresarial.\n\nEstos cambios se producen en un contexto de revisión continua de las regulaciones financieras y corporativas, a menudo con el objetivo de simplificar o endurecer los requisitos para diferentes tamaños de empresas. La reacción del mercado y de los afectados es un indicador clave de la efectividad y la aceptabilidad de dichas reformas.\n\nSerá importante observar cómo el gobierno británico responde a esta \"reacción\" y si se reconsideran o ajustan las nuevas normas. El impacto a largo plazo en la facilidad de hacer negocios y en la transparencia financiera de las pequeñas empresas será un factor a seguir.", "why": "Las modificaciones regulatorias en la presentación de cuentas de empresas pueden afectar la transparencia y la carga administrativa para el sector empresarial.", "importance": 2, "relevance": 1, "tags": ["Regulación", "Empresas", "Reino Unido"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F337e1252-92a4-444f-becf-1447f9f4a575.jpg?source=next-barrier-page", "published": "2026-06-10T12:16:23+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/69aa8a0e-370d-464e-8585-e78e22e205ab", "type": "blog"}]}, {"id": "fce5f11964", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Museos de arte exploran la figura del \"curador botánico\"", "summary": "El Fondation Beyeler, un museo de arte moderno y contemporáneo en Suiza, ha nombrado a Rahel Kesselring como su \"curadora botánica\", una figura pionera en el ámbito de las instituciones artísticas.\n\nEsta iniciativa sigue una tendencia creciente en galerías como Tate y Serpentine, que han incorporado curadores de sostenibilidad, ecología y cambio climático. El nombramiento en Fondation Beyeler se distingue por su enfoque específico en las plantas, alejándose del lenguaje más amplio de la sostenibilidad.\n\nLa noticia resalta el creciente interés en la intersección entre el arte, la naturaleza y la ecología, reflejado en exposiciones recientes como la Bienal de Venecia. La figura del \"curador botánico\" sugiere una nueva forma de integrar la reflexión sobre el medio ambiente en la curaduría artística.", "why": "Refleja una tendencia emergente en el mundo del arte hacia la integración de la ecología y la naturaleza en la curaduría.", "importance": 2, "relevance": 1, "tags": ["Arte", "Ecología", "Cultura"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Fc9935f4a-cfae-4dd8-b3ad-e8c495a272eb.jpg?source=next-article&fit=scale-down&quality=highest&width=700&dpr=1", "published": "2026-06-10T11:00:07+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/9a59d80d-c8a9-4120-9252-e8da3a09f104", "type": "blog"}]}, {"id": "98e0a40c15", "category": "geo", "topic": "geo", "subtopic": "EE. UU.", "cruce": false, "title": "Exasesor de David Cameron, Steve Hilton, llega a la final por la gubernatura de California", "summary": "Steve Hilton, exasesor del ex primer ministro británico David Cameron, se ha clasificado para la segunda vuelta de las elecciones a gobernador de California, enfrentándose ahora al demócrata Xavier Becerra. La eliminación de Tom Steyer deja a Hilton como el único candidato republicano en la contienda.\n\nAunque California es un estado fuertemente demócrata, la presencia de Hilton en la papeleta final añade un elemento de interés a la elección. Sin embargo, las probabilidades favorecen a Becerra, quien parece tener un camino claro hacia la victoria en noviembre.\n\nLa candidatura de Hilton, un político británico con experiencia en el Reino Unido, representa una curiosidad en el panorama político estadounidense, aunque su impacto en el resultado final parece limitado dada la demografía del estado.", "why": "La participación de figuras políticas internacionales en elecciones locales de EE. UU. puede ser un indicador de tendencias políticas o de la globalización de la influencia política.", "importance": 2, "relevance": 1, "tags": ["Elecciones California", "Política EE. UU.", "Steve Hilton"], "image": "", "published": "2026-06-10T07:42:22+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/09/becerra-hilton-california-governor-primary-00947440?shem=dsdf%2Csharefoc%2Cagadiscoversdl%2C%2Csh%2Fx%2Fdiscover%2Fm1%2F4&utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "aada3fb5ff", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "El Mundial de 2026 será el más caro de la historia debido a la estrategia de precios dinámicos de la FIFA", "summary": "Las entradas para la Copa Mundial de la FIFA 2026 serán significativamente más caras que en ediciones anteriores, con los boletos más económicos para la fase de grupos duplicando su precio en comparación con el Mundial de Qatar 2022. La FIFA proyecta que esta estrategia de \"precios dinámicos\" podría triplicar los ingresos por día de partido, alcanzando un récord de 3.000 millones de dólares.\n\nSin embargo, esta política de precios elevados corre el riesgo de alienar a los aficionados más apasionados, quienes son fundamentales para el valor del producto televisivo del torneo. La FIFA busca maximizar los ingresos, pero podría sacrificar la experiencia de los seguidores más leales.\n\nEl aumento en el coste de las entradas es un factor clave en la proyección de que el Mundial de 2026 se convierta en el evento deportivo más costoso hasta la fecha. La estrategia de la FIFA pone de manifiesto la creciente mercantilización de los grandes eventos deportivos.", "why": "La estrategia de precios de la FIFA para el Mundial 2026 eleva los costes para los aficionados y plantea interrogantes sobre la accesibilidad y el espíritu del evento.", "importance": 2, "relevance": 1, "tags": ["Mundial 2026", "FIFA", "Precios", "Economía"], "image": "https://i1.ytimg.com/vi/hoTTWm2R-wA/hqdefault.jpg", "published": "2026-06-09T18:30:21+00:00", "sources": [{"name": "The Economist (YT)", "url": "https://www.youtube.com/shorts/hoTTWm2R-wA", "type": "youtube"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

ield, donde se enfrenta a la presión del partido Reform UK.\n\nLa campaña de Burnham ha sido objeto de escrutinio por sus posiciones pasadas y su estrategia política, incluyendo comentarios sobre las mujeres WASPI y llamados a elecciones anticipadas. Paralelamente, se debate la situación del actual Primer Ministro Keir Starmer y las dinámicas internas del partido, con algunas voces apuntando a la influencia de los medios en las dificultades del partido.\n\nLa noticia también menciona la parálisis en el gobierno británico, afectando planes como el \"Defence Investment Plan\" y el reinicio de relaciones con la UE. La estrategia de Burnham de \"hacer política local\" mientras aspira a un rol nacional refleja la complejidad del panorama político británico actual.", "why": "La estrategia política de Andy Burnham, enfocada en la política local para alcanzar ambiciones nacionales, refleja las complejas dinámicas del Partido Laborista y el panorama político británico.", "importance": 3, "relevance": 1, "tags": ["política británica", "Partido Laborista", "elecciones", "Reino Unido"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2025/03/27/PASAA_PODCAST-HERO-16BY9.png", "published": "2026-06-11T07:28:40+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/podcast/politics-at-sam-and-annes/the-ghosts-of-burnham-past-haunt-his-campaign/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/andy-burnham-goes-hyper-local-makerfield-vote-looms/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/andy-burnham-premiership-may-not-be-all-that-different/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "4349cc55d8", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Gobierno de Somalia al borde del colapso tras enfrentamientos y crisis electoral", "summary": "El sistema político de Somalia se encuentra en una situación crítica tras intensos enfrentamientos la semana pasada, poniendo en duda la estabilidad del gobierno y el futuro de su sistema electoral.\n\nLos choques ocurrieron en Mogadiscio el 3 de junio entre tropas federales y milicias aliadas a la oposición, exacerbando una crisis política que se ha ido gestando por retrasos en las elecciones y la controvertida extensión de un año del mandato del presidente Hassan Sheikh Mohamud, que expiraba el 15 de mayo. El incidente dejó un muerto y 55 heridos.\n\nLa situación se agrava en el contexto de la \"Africa Brief\" de Foreign Policy, que también menciona políticas de EE. UU. que restringen la entrada de africanos y la delicada gestión de la inmigración por parte del presidente sudafricano tras protestas mortales. La fragilidad del gobierno somalí es un foco de preocupación.", "why": "La inestabilidad política en Somalia amenaza con un colapso gubernamental y profundiza la crisis electoral en un país ya de por sí frágil.", "importance": 3, "relevance": 1, "tags": ["Somalia", "inestabilidad política", "crisis electoral", "conflicto"], "image": "https://foreignpolicy.com/wp-content/uploads/2026/06/Somalia-fighting-GettyImages-2278969002.jpg", "published": "2026-06-10T21:17:02+00:00", "sources": [{"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/10/somalia-government-fighting-electoral-system-hassan-sheikh-mohamud/", "type": "blog"}]}, {"id": "2844b2308e", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Asia duda ante los altos costes de los derechos de retransmisión del Mundial de Fútbol", "summary": "Las cadenas de televisión asiáticas están mostrando reticencia a pagar las elevadas tarifas por los derechos de retransmisión del próximo Mundial de Fútbol, que se celebrará en Norteamérica. La principal razón es que muchos partidos se emitirán durante la madrugada en la región, lo que complica la captación de audiencias.\n\nEsta situación se suma a los cambios en los hábitos de consumo y al auge de las plataformas de streaming, que ya han modificado el panorama de la distribución de contenidos deportivos. FIFA se enfrenta así a un desafío para mantener sus ingresos en uno de sus mercados más importantes.\n\nSerá crucial observar cómo evolucionan las negociaciones y si las cadenas asiáticas encuentran alternativas para ofrecer el contenido a sus espectadores, o si FIFA se ve obligada a ajustar sus expectativas económicas para la región.", "why": "La reticencia de las audiencias asiáticas a pagar por derechos de retransmisión de eventos deportivos de gran magnitud puede afectar los modelos de negocio de las federaciones y la distribución global de contenidos.", "importance": 2, "relevance": 1, "tags": ["Deportes", "Asia", "Derechos de retransmisión"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F0%2F2%2F0%2F2%2F12582020-1-eng-GB%2Fd490f727c078-photo_SXM2022120800011210d.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-11T08:10:14.764854+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/sports/world-cup-2026/world-cup-tests-asia-s-appetite-for-costly-broadcast-rights", "type": "blog"}]}, {"id": "1f8f21bb3c", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Keppel impulsa su expansión inmobiliaria en Hanói ante el alza de precios", "summary": "La firma de gestión de activos Keppel, con sede en Singapur, planea lanzar varios proyectos residenciales en Hanói, la capital de Vietnam. Esta iniciativa marca una intensificación de su presencia en el mercado inmobiliario del norte del país, impulsada por un fuerte aumento en los precios de la vivienda debido a la alta demanda.\n\nLa expansión de Keppel en Vietnam se produce en un contexto de crecimiento económico y urbanización en la región. La empresa ya cuenta con el Hanoi Centre, su primer proyecto comercial en la capital vietnamita, cuya apertura completa está prevista para julio.\n\nSe espera que esta inversión de Keppel contribuya al desarrollo del mercado inmobiliario en Hanói y atraiga a inversores interesados en el potencial de crecimiento de Vietnam.", "why": "La inversión inmobiliaria de grandes empresas en mercados emergentes como Vietnam refleja tendencias económicas y de desarrollo urbano en Asia.", "importance": 2, "relevance": 1, "tags": ["Vietnam", "Inversión", "Mercado inmobiliario"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F1%2F4%2F9%2F0%2F12600941-1-eng-GB%2F587d49903b21-Hanoi-Centre.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-11T08:10:14.672941+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/business-deals/keppel-ramps-up-hanoi-property-push-as-housing-prices-soar", "type": "blog"}]}, {"id": "c41c20af05", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "La escisión política en Malasia beneficia al partido UMNO, allanando su camino hacia la dominación.", "summary": "La decisión del partido islamista PAS de romper su alianza con Bersatu antes de las elecciones estatales de Johor podría ser un regalo político significativo para el partido UMNO. Este movimiento se considera una oportunidad para que UMNO reconstruya su dominio entre los votantes malayos y musulmanes, tras una década de declive electoral.\n\nLas elecciones de Johor son vistas como un barómetro de la política nacional, y una victoria contundente para UMNO (componente principal de la coalición Barisan Nasional) podría servir como plataforma de lanzamiento para su resurgimiento general antes de las próximas elecciones generales, previstas para 2028. La coalición ya demostró fortaleza al obtener una mayoría de dos tercios en la asamblea estatal saliente en las elecciones de 2022.\n\nEl presidente de BN, Ahmad Zahid Hamidi, ha expresado confianza en la capacidad del partido para competir en las próximas elecciones generales por sí solo. Una victoria en Johor reforzaría esta confianza y podría desencadenar una \"ola azul\" a nivel nacional, restaurando a BN como una fuerza política dominante en Malasia.", "why": "Los cambios en el panorama político de Malasia pueden tener repercusiones en la estabilidad regional y las relaciones económicas del sudeste asiático.", "importance": 2, "relevance": 1, "tags": ["Malasia", "Política", "Elecciones"], "image": "https://images.thediplomat.com/v1/td-list-l-2/2026/06/thediplomat_2026-06-11-142445.jpg", "published": "2026-06-11T05:15:00+00:00", "sources": [{"name": "The Diplomat", "url": "https://thediplomat.com/2026/06/why-umno-is-the-biggest-beneficiary-of-malaysias-pas-bersatu-divorce/", "type": "blog"}]}, {"id": "2a691fa0cf", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Críticas a la política de EE. UU. hacia Cuba: \"genocidio económico\" y crisis humanitaria", "summary": "La política de Estados Unidos hacia Cuba, iniciada con el embargo comercial de la administración Eisenhower y ampliada por John F. Kennedy, es calificada de \"genocidio económico\" por su impacto en el pueblo cubano. La administración Trump, en particular, intensificó las sanciones, bloqueó entregas de combustible y amenazó con acciones militares, priorizando el colapso del régimen comunista.\n\nSegún el análisis, estas acciones \"inhumanas y criminales\" han sumido a la isla en una profunda crisis humanitaria, poniendo en peligro su supervivencia. El artículo se basa en la experiencia de Danny Shaw, un académico de estudios latinoamericanos y caribeños que viajó a Cuba y documentó las \"desoladoras condiciones\" tras la imposición de un \"bloqueo energético\".\n\nSe argumenta que el Presidente Trump revivió la Doctrina Monroe con estas acciones en el hemisferio occidental. La política estadounidense busca infligir \"dolor y sufrimiento\" a los cubanos por su apoyo a un gobierno revolucionario, exacerbando una situación ya precaria.", "why": "Las políticas de EE. UU. hacia Cuba, especialmente las de la administración Trump, son criticadas por generar una crisis humanitaria y ser calificadas de \"genocidio económico\".", "importance": 2, "relevance": 1, "tags": ["EE. UU.", "Cuba", "Sanciones", "Economía"], "image": "https://asiatimes.com/wp-content/uploads/2026/06/Cuba-Cuba-Blockade.jpg", "published": "2026-06-11T03:24:20+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/trumps-cuba-strategy-is-economic-genocide/", "type": "blog"}]}, {"id": "4cf649596f", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "La FIFA y el Mundial, marcados por escándalos históricos", "summary": "La Federación Internacional de Fútbol Asociación (FIFA) y el torneo de la Copa del Mundo han estado históricamente plagados de controversias y disputas.\n\nLa naturaleza de estos eventos ha generado un patrón de escándalos y conflictos que han acompañado a la organización y su principal competición a lo largo del tiempo.\n\nLa persistencia de estas problemáticas subraya la necesidad de una gobernanza más transparente y ética en las instituciones deportivas de gran alcance.", "why": "La FIFA y la Copa del Mundo tienen un historial de escándalos, lo que plantea interrogantes sobre la gobernanza y la integridad en el deporte.", "importance": 2, "relevance": 1, "tags": ["FIFA", "Mundial", "Escándalos"], "image": "", "published": "2026-06-10T18:25:19+00:00", "sources": [{"name": "The Economist", "url": "https://www.economist.com/international/2026/06/10/the-world-cup-has-always-been-beset-by-scandal-and-strife", "type": "blog"}]}]};

const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

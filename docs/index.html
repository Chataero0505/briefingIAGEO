a soberanía y la igualdad de los estados miembros. La forma en que se implementen estas salvaguardias será crucial para el futuro de la ampliación de la UE.", "why": "La UE considera un periodo de \"vigilancia\" para nuevos miembros, limitando su poder de veto en áreas clave para asegurar la estabilidad y el cumplimiento de reformas.", "importance": 4, "relevance": 3, "tags": ["UE", "política", "ampliación"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/BT1§.jpg", "published": "2026-06-15T16:09:10+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/the-brief-not-so-fast-eu-membership-with-strings-attached/", "type": "blog"}]}, {"id": "0b323664b7", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Jordan Bardella, líder de RN, habla sobre la UE, la OTAN y Ucrania", "summary": "Jordan Bardella, presidente de Reagrupamiento Nacional (RN), ha concedido una entrevista a POLITICO donde aborda su visión sobre la Unión Europea, la OTAN y la guerra en Ucrania. Bardella reitera que, si bien el proyecto de \"Frexit\" ha sido abandonado, su objetivo sigue siendo \"cambiar\" el funcionamiento de la UE. En la entrevista, también detalla su posicionamiento respecto a la OTAN y las razones por las que no tiene previsto visitar Ucrania.\n\nLa entrevista se produce en un contexto de debate interno dentro de la extrema derecha francesa, con tensiones visibles entre Marine Le Pen y Bardella. La posible inhabilitación de Le Pen para las elecciones presidenciales de 2025 podría consolidar a Bardella como el sucesor natural, aunque su línea política busca un perfil más aceptable para las élites económicas francesas y la patronal, diferenciándose sutilmente de Le Pen.\n\nLas declaraciones de Bardella son relevantes para entender la evolución del nacionalismo francés y su impacto en las futuras políticas europeas, especialmente en lo referente a la soberanía nacional, la defensa y las relaciones con Rusia y la OTAN.", "why": "El líder de la extrema derecha francesa, Jordan Bardella, expone su estrategia para reformar la UE y su postura sobre la OTAN y Ucrania, marcando un posible giro en la política exterior francesa.", "importance": 4, "relevance": 3, "tags": ["Francia", "UE", "política"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/06/01/Paris-PLAYBOOK-SOCIAL-CARD.png", "published": "2026-06-15T16:00:00+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/podcast/playbook-paris-podcast/ue-otan-ukraine-bardella-parle-a-politico/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Descifrando la Guerra (YT)", "url": "https://www.youtube.com/shorts/YgMgKtn1IS4", "type": "youtube"}]}, {"id": "2829ac6425", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "AutoFlight V2000CG obtiene la primera validación de certificado de tipo overseas del mundo en Indonesia", "summary": "La aeronave eVTOL V2000CG CarryAll de AutoFlight ha recibido la validación de certificado de tipo (VTC) en Indonesia, convirtiéndose en la primera aeronave de despegue y aterrizaje vertical eléctrica (eVTOL) del mundo en obtener una validación de certificado de tipo en el extranjero. Esta certificación, emitida el 3 de junio de 2026, confirma que el diseño del V2000CG cumple con los requisitos de aeronavegabilidad tanto de la Administración de Aviación Civil de China (CAAC) como de la Dirección General de Aviación Civil de Indonesia (DGCA), permitiendo su operación comercial.\n\nEl V2000CG obtuvo inicialmente su Certificado de Tipo (TC) de la CAAC en marzo de 2024, tras extensas pruebas y verificaciones. La validación en Indonesia se basó en un análisis comparativo de estándares de aeronavegabilidad, consultas técnicas y revisiones documentales, culminando con inspecciones in situ en China por parte de las autoridades indonesias.\n\nCon más de 17.000 islas, Indonesia enfrenta desafíos logísticos significativos. El transporte marítimo es lento y la carga aérea convencional requiere costosas infraestructuras de pista. El V2000CG, con una capacidad de carga útil de 2 toneladas, una velocidad de crucero de 200 km/h y un alcance de 200 km, aborda estas limitaciones mediante un sistema totalmente eléctrico.", "why": "Establece un precedente para la certificación global de aeronaves eVTOL, facilitando su despliegue internacional y la expansión de la logística aérea avanzada.", "importance": 4, "relevance": 3, "tags": ["eVTOL", "Certificación", "Logística", "Indonesia"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/AutoFlight-Indonesia-7.png", "published": "2026-06-15T14:04:17+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/15/autoflight-granted-worlds-first-evtol-overseas-certificate-in-indonesia/102559/", "type": "blog"}]}, {"id": "febd8f0034", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Amazon Bedrock AgentCore y Deep Agents permiten la creación de agentes de investigación con IA más potentes", "summary": "Amazon Web Services (AWS) ha presentado una nueva capacidad para construir agentes de investigación con inteligencia artificial (IA) que superan las limitaciones de las ventanas de contexto de los modelos de lenguaje grandes (LLM). La solución combina Deep Agents, una herramienta de orquestación de LangChain que crea subagentes especializados, con Amazon Bedrock AgentCore, que proporciona la infraestructura necesaria, incluyendo un navegador web y un entorno Python para análisis de datos.\n\nEste enfoque permite delegar tareas complejas a subagentes aislados que devuelven resultados concisos, liberando espacio en la ventana de contexto del LLM principal para el razonamiento estratégico. Esto es crucial para flujos de trabajo de IA que requieren análisis profundos y procesamiento de grandes cantidades de información, como la investigación competitiva.\n\nLa publicación en el blog de AWS Machine Learning detalla cómo los desarrolladores pueden construir un agente de investigación competitivo utilizando este patrón. La disponibilidad de AgentCore como proveedor nativo de sandbox en la interfaz de línea de comandos de Deep Agents facilita la experimentación con la funcionalidad CodeInterpreter sin necesidad de construir un agente completo.", "why": "Mejora la capacidad de los agentes de IA para realizar investigaciones complejas y análisis de datos, abriendo nuevas posibilidades para la automatización de tareas de conocimiento.", "importance": 3, "relevance": 4, "tags": ["Agentes IA", "LLM", "AWS", "Investigación"], "image": "https://d2908q01vomqb2.cloudfront.net/f1f836cb4ea6efb2a0b1b99f41ad8b103eff4b59/2026/06/15/ML-20818-1.png", "published": "2026-06-15T13:56:33+00:00", "sources": [{"name": "AWS Machine Learning Blog", "url": "https://aws.amazon.com/blogs/machine-learning/build-context-rich-research-agents-with-deep-agents-and-bedrock-agentcore/", "type": "blog"}]}, {"id": "5157b581b7", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Europa busca fortalecer su defensa ante la dependencia de EE. UU., a pesar de contratiempos en proyectos como el FCAS", "summary": "A pesar del reciente anuncio sobre el colapso parcial del proyecto del Sistema de Combate Aéreo Futuro (FCAS), Europa continúa con su objetivo de fortalecer sus capacidades de defensa y reducir la dependencia de sistemas militares estadounidenses. Giuseppe Spatafora, citado por Al Jazeera, señala que las necesidades nacionales a veces chocan con la integración de defensa europea, pero que iniciativas como el \"combat cloud\" del FCAS seguirán adelante, mejorando las capacidades de mando y control cibernético de Europa.\n\nLa creciente desconfianza en la fiabilidad de los suministros estadounidenses, exacerbada por la administración Trump y la disminución de stocks tras conflictos como la guerra de Irán, impulsa a Europa a buscar una mayor autonomía estratégica. Spatafora argumenta que este contratiempo no debe llevar a un retorno a la dependencia de sistemas americanos.\n\nLa tendencia europea hacia una mayor autosuficiencia en defensa es un movimiento estratégico a largo plazo. Aunque proyectos ambiciosos como el FCAS enfrenten dificultades, los componentes clave y la voluntad política de desarrollar capacidades propias persisten, buscando asegurar la soberanía tecnológica y militar del continente.", "why": "Destaca la estrategia europea de autonomía estratégica en defensa, crucial para su posición geopolítica y su capacidad industrial frente a la volatilidad de las alianzas y la competencia global.", "importance": 3, "relevance": 4, "tags": ["Defensa Europea", "Autonomía Estratégica", "EE. UU.", "FCAS"], "image": "https://www.iss.europa.eu/themes/custom/euiss/euiss-share.png", "published": "2026-06-15T13:35:49+00:00", "sources": [{"name": "EUISS", "url": "https://www.iss.europa.eu/press/giuseppe-spatafora-quoted-al-jazeera", "type": "blog"}]}, {"id": "1e3a65f082", "category": "geo", "topic": "geo", "subtopic": "EE. UU.", "cruce": false, "title": "Taiwán teme ser ignorado en cumbres EE. UU.-China, según encuesta", "summary": "Una cumbre entre los presidentes de EE. UU., Donald Trump, y China, Xi Jinping, celebrada en Beijing en mayo de 2026, ha generado preocupación en Taiwán. Según datos recientes de una encuesta nacional, una parte significativa de la población taiwanesa teme que sus intereses puedan ser pasados por alto o sacrificados en aras de estabilizar las relaciones entre las dos superpotencias.\n\nLa encuesta, realizada por el Instituto de Investigación de Defensa y Seguridad Nacional (INDSR) y el Centro de Estudios Electorales de la Universidad Nacional Chengchi, entrevistó a 1.127 adultos entre el 28 y el 31 de mayo de 2026. Los resultados indican una inquietud generalizada sobre la posibilidad de que las prioridades de Taiwán queden marginadas en el contexto de la diplomacia entre Washington y Beijing.\n\nEstas percepciones son cruciales, ya que la opinión pública puede influir en la respuesta de las sociedades democráticas a los desafíos externos. El temor a ser un peón en el tablero geopolítico subraya la delicada posición de Taiwán en las crecientes tensiones entre EE. UU. y China.", "why": "La percepción pública en Taiwán sobre el riesgo de ser sacrificado en las negociaciones entre EE. UU. y China es un indicador clave de la estabilidad regional y las futuras relaciones transpacíficas.", "importance": 3, "relevance": 4, "tags": ["Taiwán", "EE. UU.", "China", "Geopolítica"], "image": "https://images.thediplomat.com/v1/td-list-l-2/2026/05/thediplomat_2026-05-29-213715.jpg", "published": "2026-06-15T13:10:00+00:00", "sources": [{"name": "The Diplomat", "url": "https://thediplomat.com/2026/06/fear-of-being-left-behind-taiwanese-concerns-after-the-trump-xi-summit/", "type": "blog"}]}, {"id": "e79284d74b", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "La instalación de maquinaria industrial, un cuello de botella para la eficiencia", "summary": "Muchos fabricantes priorizan la selección de equipos sin considerar adecuadamente la fase de instalación, tratándola como un problema logístico en lugar de técnico. Esta desconexión entre los creadores de la maquinaria y quienes la instalan puede generar retrasos significativos en la puesta en marcha y afectar el retorno de la inversión.\n\nEl problema surge cuando la maquinaria llega a la planta y la responsabilidad recae en contratistas que carecen de experiencia específica en la fabricación del equipo. Errores en el posicionamiento, calibración o integración con las líneas de producción existentes pueden prolongar el tiempo de arranque, reducir la producción y mermar la rentabilidad esperada.\n\nLa clave para optimizar este proceso radica en integrar la planificación de la instalación desde las etapas tempranas del diseño y selección del equipo. Una colaboración más estrecha entre los fabricantes de maquinaria y los equipos de instalación, junto con una validación previa de la integración en la línea, es fundamental para asegurar que la inversión en nueva tecnología se traduzca rápidamente en eficiencia operativa.", "why": "La correcta instalación de maquinaria industrial es crucial para maximizar la eficiencia y el retorno de la inversión en entornos de fabricación.", "importance": 3, "relevance": 4, "tags": ["Industria 5.0", "Fabricación", "Automatización", "Eficiencia"], "image": "https://imgproxy.divecdn.com/vF5t0QFuRo07gHwNwa0A3Z74DhcudpDKKuv3H_VmZfc/g:ce/rs:fit:770:435/Z3M6Ly9kaXZlc2l0ZS1zdG9yYWdlL2RpdmVpbWFnZS9IZWFkZXJfbWFudWZhY3R1cmluZ19pbWFnZS1FSS0xMDQ2eDYxNnB4LTIwMjYwNS5wbmc=.webp", "published": "2026-06-15T09:00:00+00:00", "sources": [{"name": "Manufacturing Dive", "url": "https://www.manufacturingdive.com/spons/for-most-manufacturers-the-installation-decision-comes-too-late/822383/", "type": "blog"}]}, {"id": "f895343c2e", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "Parallel Systems desarrolla el primer sistema autónomo de transporte ferroviario de mercancías", "summary": "Matt Soule, CEO de Parallel Systems y exingeniero de SpaceX, está liderando el desarrollo de lo que describe como el primer sistema autónomo de transporte ferroviario de mercancías del mundo. La compañía, con sede en Los Ángeles, ha desarrollado vehículos ferroviarios autónomos y eléctricos que operan en \"pelotones\" más pequeños, ofreciendo una alternativa a los trenes convencionales de locomotoras diésel.\n\nEste enfoque busca proporcionar mayor flexibilidad, menores costes operativos y transporte sin emisiones, haciendo que el ferrocarril sea viable para rutas de carga más cortas que tradicionalmente han sido dominadas por camiones. La empresa ha recaudado más de 100 millones de dólares y está realizando pruebas comerciales con Genesee & Wyoming Railroad en Georgia, bajo la supervisión de la Administración Federal de Ferrocarriles (FRA).\n\nEl proyecto representa una de las demostraciones más avanzadas de tecnología ferroviaria autónoma en Estados Unidos. A diferencia de la atención centrada en los camiones autónomos, el transporte ferroviario autónomo de Parallel Systems podría transformar significativamente la logística, ofreciendo una solución más sostenible y eficiente para el movimiento de mercancías.", "why": "La innovación en transporte ferroviario autónomo promete revolucionar la logística con mayor eficiencia, menores costes y sostenibilidad.", "importance": 3, "relevance": 4, "tags": ["IA", "Automatización", "Logística", "Transporte"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/parallel-systems-carriages-1.jpg", "published": "2026-06-15T08:52:31+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/15/interview-parallel-systems-ceo-matt-soule-on-building-the-worlds-first-autonomous-freight-rail-system/102545/", "type": "blog"}]}, {"id": "788c4eaa5f", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Afganistán se enfrenta a una \"trampa hidro-política\" por su potencial hídrico y la dependencia de sus vecinos", "summary": "Afganistán, situado en las cabeceras de importantes sistemas fluviales que alimentan Irán, Pakistán, Uzbekistán y Turkmenistán, es un centro hidrográfico clave para Asia Central y del Sur. Sin embargo, décadas de conflicto han paralizado su desarrollo, impidiendo la construcción de presas, canales y redes de riego modernas. Históricamente, Afganistán ha consumido menos de su cuota legítima de agua, lo que ha generado una dependencia estructural en sus vecinos, quienes han llegado a considerar este flujo natural como permanente.\n\nActualmente, este desequilibrio histórico ha creado una \"trampa hidro-política\" para Afganistán. Por un lado, cualquier intento unilateral de desarrollar infraestructuras hídricas es percibido como una amenaza por sus vecinos, quienes dependen de los flujos de agua no regulados, lo que podría desestabilizar la región. Por otro lado, Afganistán carece de capital, experiencia en ingeniería avanzada y capacidad de construcción de alta calidad, lo que aumenta el riesgo de construir sistemas ineficientes que provoquen pérdidas de agua y daños ecológicos a largo plazo.\n\nLa inacción condena a millones de afganos a la pobreza y la inseguridad alimentaria, pero actuar, especialmente de forma unilateral, podría desencadenar una confrontación regional. Afganistán se encuentra aislado económicamente y enfrenta la difícil tarea de gestionar sus recursos hídricos sin comprometer su estabilidad interna ni las relaciones regionales.", "why": "La gestión de los recursos hídricos en Afganistán es un desafío crítico que, de no abordarse adecuadamente, podría generar inestabilidad regional y agravar la crisis humanitaria en el país.", "importance": 4, "relevance": 3, "tags": ["agua", "Afganistán", "geopolítica", "recursos"], "image": "https://images.thediplomat.com/v1/td-list-l-2/2026/06/thediplomat_2026-06-15-164441.jpg", "published": "2026-06-15T07:38:00+00:00", "sources": [{"name": "The Diplomat", "url": "https://thediplomat.com/2026/06/breaking-afghanistans-hydro-political-trap/", "type": "blog"}]}, {"id": "7c19fd06dd", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Corea del Sur considera la construcción de submarinos nucleares, pero podría desviar recursos de su industria de defensa", "summary": "A finales de mayo de 2026, el Ministro de Defensa de Corea del Sur, Ahn Gyu-back, presentó un plan para alcanzar uno de los principales objetivos de adquisición militar de Seúl: submarinos de propulsión nuclear. Este plan, sin embargo, podría estar yendo en la dirección equivocada.\n\nDurante la reunión inaugural del Comité de Estrategia de Defensa Futura, Corea del Sur publicó su Plan Básico para el Desarrollo de Submarinos de Propulsión Nuclear. El Presidente Lee Jae-myung, quien presidió el comité, enfatizó el significado simbólico de la capacidad de submarinos nucleares y su papel en \"fortalecer las capacidades de la industria de defensa de la República de Corea\".\n\nA pesar de la retórica del presidente, el programa de submarinos nucleares de Corea del Sur corre el riesgo de desviar la industria de defensa del país de su rumbo. Los altos costos y la complejidad tecnológica de desarrollar una capacidad tan específica como la construcción de submarinos nucleares son más costosos, complejos y menos beneficiosos de lo que Seúl podría anticipar. Además, estas dinámicas van en contra de la estrategia orientada a la exportación que ha convertido a la \"K-defense\" en un éxito internacional y podrían drenar talento y recursos de un motor económico innovador.", "why": "La decisión de Corea del Sur de desarrollar submarinos nucleares plantea interrogantes sobre la eficiencia de la asignación de recursos en su industria de defensa y su estrategia de exportación.", "importance": 3, "relevance": 4, "tags": ["Corea del Sur", "defensa", "submarinos", "tecnología"], "image": "https://warontherocks.com/wp-content/uploads/wotr-og-images/wotr-og-44812-ae72e2634cc0.jpg", "published": "2026-06-15T07:30:50+00:00", "sources": [{"name": "War on the Rocks", "url": "https://warontherocks.com/south-korea-could-build-nuclear-submarines-but-it-shouldnt/", "type": "blog"}]}, {"id": "47a2e69739", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "La IA en el borde (Edge AI) impulsa la demanda de Wi-Fi más rápido y fiable", "summary": "La expansión de la IA en el borde (Edge AI) está redefiniendo la interacción con la inteligencia artificial, pasando del análisis masivo de datos en grandes centros de datos a resultados más rápidos y eficientes en aplicaciones locales. Esto incrementa la demanda de tecnologías de comunicación, como el Wi-Fi, que puedan manejar un movimiento de datos más rápido y una mayor fiabilidad.\n\nA diferencia de los \"hyperscalers\" que se centran en búsquedas contextuales masivas y entrenamiento de modelos de lenguaje grandes (LLMs), la IA en el borde se enfoca en tareas más específicas y de menor escala, como el control de robots o la asistencia a la conducción autónoma. Esto implica el uso de modelos de lenguaje más pequeños, especializados en dominios concretos, y un énfasis en la eficiencia energética, buscando una \"inteligencia artificial general (AGI)\" a niveles de potencia ultra bajos.\n\nEl desarrollo de la IA en el borde está generando una necesidad de hardware y sistemas de comunicación optimizados para estas cargas de trabajo. La demanda de mayor velocidad y menor latencia en la transferencia de datos, junto con la necesidad de operar en entornos con recursos limitados, está impulsando la innovación en tecnologías como el Wi-Fi y los semiconductores diseñados para estas aplicaciones.", "why": "La creciente adopción de IA en el borde está generando nuevas demandas en la infraestructura de conectividad y hardware.", "importance": 3, "relevance": 4, "tags": ["Edge AI", "Hardware", "Conectividad"], "image": "https://semiengineering.com/wp-content/uploads/2026/06/Block_diagram_of_SYN20708.jpg", "published": "2026-06-15T07:01:50+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/wi-fi-flies-higher-as-edge-ai-build-out-takes-root/", "type": "blog"}]}, {"id": "84e42977f3", "category": "ia", "topic": "ia", "subtopic": "Investigación", "cruce": false, "title": "Investigadores desarrollan memoria NAND resistente a la radiación para misiones espaciales", "summary": "Investigadores del Instituto Tecnológico de Georgia y la Universidad Estatal de Pensilvania han creado chips de memoria flash NAND ferroeléctrica capaces de soportar niveles de radiación hasta 30 veces superiores a los de la memoria NAND convencional. Esta innovación es crucial para el almacenamiento de datos en el espacio, donde la radiación puede corromper fácilmente la información almacenada en dispositivos tradicionales.\n\nLa memoria NAND ferroeléctrica almacena datos mediante polarización del material, en lugar de carga eléctrica atrapada, lo que la hace significativamente más resiliente a los efectos de la radiación. En pruebas, estos chips han demostrado ser fiables incluso ante niveles de radiación de hasta 1 millón de rads, cumpliendo el umbral de tolerancia para la mayoría de las naves espaciales, incluidas las destinadas a misiones de espacio profundo.\n\nEste avance en tecnología de almacenamiento de datos es vital para la fiabilidad y longevidad de las misiones espaciales. La capacidad de mantener la integridad de los datos en entornos de radiación extrema abre nuevas posibilidades para la exploración espacial y la recopilación de información científica en condiciones adversas.", "why": "Un avance en semiconductores mejora la fiabilidad de los datos en entornos espaciales hostiles, crucial para la exploración.", "importance": 3, "relevance": 4, "tags": ["Semiconductores", "Espacio", "Memoria NAND"], "image": "https://semiengineering.com/wp-content/uploads/2025/10/AdobeStock_209586518-10-07-25-scaled.jpeg?fit=2560%2C1149&ssl=1", "published": "2026-06-15T07:01:24+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/research-bits-june-15/", "type": "blog"}]}, {"id": "b65f38d193", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "Caída del precio del petróleo en EE. UU. tras acuerdo para reabrir el Estrecho de Ormuz", "summary": "El precio promedio de la gasolina en Estados Unidos ha caído por debajo de los 4 dólares por galón. Esta disminución se produce tras un acuerdo alcanzado para reabrir el Estrecho de Ormuz, una ruta marítima vital para el transporte de petróleo.\n\nEl Estrecho de Ormuz es un punto de estrangulamiento clave en el Golfo Pérsico, por donde transita una parte significativa del suministro mundial de petróleo. Cualquier interrupción en su navegación tiene un impacto inmediato en los precios globales de la energía. Los detalles del acuerdo y las partes involucradas no se especifican en el extracto, pero su éxito en normalizar el tráfico marítimo ha aliviado las presiones sobre los precios del crudo.\n\nLa estabilidad en el Estrecho de Ormuz es un factor crítico para la economía global y la seguridad energética. Se debe vigilar la implementación del acuerdo y las posibles repercusiones geopolíticas que puedan surgir en la región.", "why": "La apertura de rutas energéticas clave tiene un impacto directo en los precios globales de la energía y la estabilidad económica.", "importance": 4, "relevance": 2, "tags": ["energía", "petróleo", "Estrecho de Ormuz", "EE. UU."], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2F653abd63-687b-4682-8f8a-65ffb27dda7c.jpg?source=next-barrier-page", "published": "2026-06-15T19:30:31+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/ff17e2a2-7744-4e19-9e1d-23bc5892191c", "type": "blog"}]}, {"id": "914789cd1b", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "UE desarrolla reglas para 'morder fuerte' a futuros miembros que se desvíen", "summary": "La Unión Europea está elaborando salvaguardias robustas para asegurar que los futuros países miembros no retrocedan en sus reformas o utilicen su poder de veto para obstruir al bloque una vez dentro. Así lo ha afirmado la Comisaria de Ampliación, Marta Kos.\n\nKos explicó que si un nuevo Estado miembro sigue las reglas, nada sucederá. Sin embargo, si no las cumplen, \"las salvaguardias morderán fuerte\". Estas declaraciones se producen mientras la UE inicia negociaciones de adhesión detalladas con Ucrania y Moldavia, y Montenegro completa capítulos de negociación. El objetivo es garantizar la estabilidad y la coherencia del bloque ante futuras ampliaciones.\n\nLa implementación de estas salvaguardias será crucial para la cohesión y la eficacia de la UE. Será importante observar cómo se aplican estas reglas en la práctica y si logran prevenir futuros bloqueos o retrocesos en los países miembros.", "why": "La UE busca fortalecer su gobernanza interna y prevenir futuros bloqueos mediante la imposición de reglas más estrictas a los países candidatos.", "importance": 3, "relevance": 3, "tags": ["UE", "ampliación", "regulación"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/06/15/GettyImages-2266515462-scaled.jpg", "published": "2026-06-15T18:44:25+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/article/eu-rules-enlargement-new-members-marta-kos/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "d476ee9d53", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "La empresa de transporte autónomo Einride saldrá a bolsa mediante SPAC", "summary": "Einride AB, compañía especializada en operaciones de transporte eléctrico y autónomo, ha anunciado su intención de cotizar en bolsa a través de una Special Purpose Acquisition Company (SPAC). Los accionistas de Legato Merger Corp. III aprobaron la combinación de negocios a principios de este mes, allanando el camino para la operación.\n\nFundada en 2016, Einride diseña, desarrolla y despliega sistemas de tecnología de transporte para acelerar la transición hacia un modelo logístico más sostenible y eficiente. Su plataforma integra flotas autónomas, infraestructura de carga y un sistema operativo inteligente para la gestión de la carga. La empresa opera bajo la supervisión de equipos licenciados que monitorizan las operaciones autónomas a través de Saga, su sistema operativo impulsado por IA.\n\nLa salida a bolsa proporcionará a Einride la plataforma necesaria para escalar sus tecnologías eléctricas y autónomas a la velocidad que demanda el mercado. La compañía se enfoca en rutas de alto volumen y repetitivas donde la autonomía puede ofrecer la mayor eficiencia de costes y estabilidad operativa, buscando así descarbonizar y automatizar las cadenas de suministro globales.", "why": "La entrada de Einride al mercado público a través de SPAC impulsará la adopción de vehículos autónomos en la logística y el transporte de mercancías.", "importance": 3, "relevance": 3, "tags": ["transporte autónomo", "logística", "SPAC", "IA"], "image": "https://www.therobotreport.com/wp-content/uploads/2026/06/einride-featured.jpg", "published": "2026-06-15T17:27:57+00:00", "sources": [{"name": "The Robot Report", "url": "https://www.therobotreport.com/autonomous-freight-developer-einride-goes-public-via-spac/", "type": "blog"}]}, {"id": "59e69c0d5b", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Países de la UE se resisten a un tope en la red eléctrica y a la agilización de permisos energéticos", "summary": "Varios países de la Unión Europea han expresado su reticencia a aceptar un límite máximo para la red eléctrica y a acelerar los procesos de permisos para proyectos energéticos. Borradores filtrados sugieren que las capitales europeas son reacias a imponer plazos estrictos a las autoridades, ante la amenaza de aprobación tácita.\n\nEsta resistencia surge en un contexto donde la UE busca agilizar la transición energética y la implementación de infraestructuras clave. La propuesta de \"aprobación tácita\" busca evitar bloqueos burocráticos, pero genera preocupación entre los estados miembros sobre la pérdida de control y la posibilidad de imponer proyectos sin el debido escrutinio.\n\nSerá importante vigilar cómo evoluciona esta negociación, ya que la capacidad de la UE para cumplir sus objetivos energéticos y climáticos depende en gran medida de la agilidad en la concesión de permisos y la modernización de su infraestructura eléctrica.", "why": "La resistencia de algunos estados miembros a agilizar permisos energéticos podría ralentizar la transición verde de la UE y la modernización de su red eléctrica.", "importance": 3, "relevance": 3, "tags": ["UE", "energía", "regulación"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-1449707484-1182x788.jpg", "published": "2026-06-15T16:37:56+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/countries-resist-eu-cap-on-grid-energy-project-permitting/", "type": "blog"}]}, {"id": "9571b8113c", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "La UE divide la misión Aspides de la misión en Ormuz; Macron anuncia despliegue rápido", "summary": "La Unión Europea separará la misión naval Aspides, centrada en el Mar Rojo, de cualquier operación en el Estrecho de Ormuz. El presidente francés, Emmanuel Macron, indicó que una misión liderada por Francia y el Reino Unido en Ormuz podría estar lista \"en cuestión de días\", incluyendo el portaaviones Charles de Gaulle.\n\nMacron supeditó el despliegue a un acuerdo internacional entre Washington y Teherán. Alemania e Italia han expresado su disposición a participar en Ormuz, aunque la posible reasignación de sus buques de Ormuz podría afectar a la capacidad de Aspides. La decisión de dividir las misiones busca permitir un despliegue más ágil en Ormuz sin comprometer la operación en el Mar Rojo.\n\nEsta división estratégica responde a la necesidad de abordar las amenazas a la navegación en dos puntos geográficos críticos, permitiendo a la UE una respuesta más flexible y adaptada a cada contexto de seguridad.", "why": "La reconfiguración de las misiones navales de la UE en Ormuz y el Mar Rojo tiene implicaciones directas en la seguridad marítima global y la política exterior europea en regiones estratégicas.", "importance": 3, "relevance": 3, "tags": ["Seguridad Marítima", "Unión Europea", "Oriente Medio"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2273009841.jpg", "published": "2026-06-15T15:32:35+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/eu-splits-aspides-from-hormuz-mission-as-macron-signals-rapid-deployment/", "type": "blog"}]}, {"id": "e5d29aa609", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Europa puede actuar contra Israel sin consenso para frenar la expansión de asentamientos", "summary": "La Unión Europea posee las herramientas políticas y económicas para ejercer presión sobre Israel y detener la expansión de sus asentamientos, a pesar de las divisiones internas. La aceleración del proyecto de asentamientos y la profundización del conflicto frustran a muchos estados miembros de la UE.\n\nAunque las divisiones, ejemplificadas por la postura de Hungría en el pasado, han obstaculizado acciones conjuntas, la tendencia a largo plazo apunta hacia una mayor presión europea. La UE ya ha adoptado sanciones contra colonos violentos en 2024, aunque su implementación ha sido retrasada y limitada.\n\nLa urgencia de actuar radica en evitar la desaparición de un Estado palestino viable. La UE debe desplegar sus herramientas comerciales y financieras de manera más decidida para imponer costes a Israel y asegurar un futuro para los palestinos, antes de que sea demasiado tarde.", "why": "La capacidad de la UE para actuar unilateralmente contra la política de asentamientos de Israel podría tener repercusiones significativas en las relaciones diplomáticas y comerciales entre el bloque y el país.\n", "importance": 3, "relevance": 3, "tags": ["Unión Europea", "Israel", "Política Exterior"], "image": "https://ecfr.eu/wp-content/uploads/2026/06/596098775-scaled.jpg", "published": "2026-06-15T15:13:26+00:00", "sources": [{"name": "ECFR", "url": "https://ecfr.eu/article/europeans-dont-need-consensus-to-challenge-israel-and-its-settlements/", "type": "blog"}]}, {"id": "35dc66a025", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Kaja Kallas presiona a la Comisión Europea para imponer sanciones comerciales a Israel", "summary": "La Alta Representante de Asuntos Exteriores de la UE, Kaja Kallas, instará a la Comisión Europea a proponer medidas restrictivas para prohibir el comercio con asentamientos israelíes ilegales. Kallas afirmó que muchos Estados miembros solicitaron estas medidas en una reunión de ministros de Exteriores en Luxemburgo.\n\nSus declaraciones aumentan la presión sobre la presidenta de la Comisión, Ursula von der Leyen, y el Comisario de Comercio, Maroš Šefčovič, para que presenten opciones legales, a pesar de las divergencias internas sobre la base jurídica y la viabilidad de tales medidas. Kallas pedirá a la Comisión que prepare una lista de opciones para el próximo Consejo de Asuntos Exteriores el 13 de julio.\n\nLas medidas comerciales solo requerirían una mayoría cualificada de países, lo que permitiría sortear la oposición de capitales como Praga. Sin embargo, esta mayoría más reducida aún no se ha logrado para suspender partes del acuerdo comercial entre Israel y la UE.", "why": "La iniciativa de Kaja Kallas para imponer sanciones comerciales a los asentamientos israelíes podría tener un impacto económico significativo y redefinir las relaciones comerciales de la UE con Israel.", "importance": 3, "relevance": 3, "tags": ["Unión Europea", "Israel", "Sanciones Comerciales"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2235360867.jpg", "published": "2026-06-15T15:05:22+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/kallas-puts-pressure-on-her-own-colleagues-over-israel-trade-sanctions/", "type": "blog"}]}, {"id": "74868c74ff", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Google invertirá 1.500 millones de dólares en su centro de datos de Alabama y apoyará la eficiencia energética local", "summary": "Google ha anunciado una inversión de 1.500 millones de dólares para los años 2026 y 2027, destinada a expandir su campus de centros de datos en el condado de Jackson, Alabama. Las instalaciones, operativas desde 2019 en un antiguo emplazamiento de una central de carbón, son cruciales para los servicios digitales de la compañía y para el crecimiento regional.\n\nComo parte de esta expansión, Google asumirá el 100% de los costes de energía e infraestructura. Adicionalmente, la empresa destinará 2 millones de dólares a un fondo de impacto energético, en colaboración con la TVA y CAANEAL, para fomentar programas locales de eficiencia energética y mejoras en la climatización de viviendas.\n\nGoogle también ha anunciado una donación de 550.000 dólares para kits de ciencia, tecnología, ingeniería y matemáticas (STEM) dirigidos a estudiantes de secundaria locales. Estas iniciativas se suman a otros compromisos de la compañía en la región, como el apoyo a la gestión hídrica en la cuenca del río Paint Rock y la formación de más de 130.000 alabamaños en habilidades digitales.", "why": "Google refuerza su infraestructura de centros de datos en EE. UU. con una inversión significativa, destacando su compromiso con la sostenibilidad energética y el desarrollo comunitario local.", "importance": 3, "relevance": 3, "tags": ["Google", "Centros de datos", "Sostenibilidad", "Alabama"], "image": "https://blog.google/static/blogv2/images/google-200x200.png?version=pr20260609-1635", "published": "2026-06-15T15:00:00+00:00", "sources": [{"name": "Google AI Blog (DeepMind)", "url": "https://blog.google/innovation-and-ai/infrastructure-and-cloud/global-network/alabama-investment-june-2026/", "type": "blog"}]}, {"id": "3ba4b652f5", "category": "geo", "topic": "geo", "subtopic": "China/Asia", "cruce": false, "title": "¿Se convertirá China, Inc. en una \"empresa zombi\"?", "summary": "El artículo plantea la preocupante posibilidad de que la economía china pueda enfrentar un destino similar al de Japón en la década de 1990, donde muchas empresas se volvieron \"zombis\": operando de manera no rentable pero mantenidas a flote por préstamos a bajo interés.\n\nSe compara la situación actual de China con la de Japón tras el estallido de su burbuja de activos. Aunque existen diferencias significativas entre ambas economías y sus contextos globales, el autor sugiere que los paralelismos en cuanto a la existencia de \"empresas zombi\" podrían ser importantes. Estas empresas, al no fracasar rápidamente, pueden lastrar el crecimiento económico general, como ocurrió en Japón.\n\nLa pregunta central es si China, al igual que Japón, podría caer en una trampa de estancamiento prolongado debido a la existencia de un gran número de empresas ineficientes pero artificialmente sostenidas. El análisis invita a reflexionar sobre las posibles consecuencias económicas a largo plazo para China y la economía global si este escenario se materializa.", "why": "La potencial \"zombificación\" de la economía china, comparada con el caso japonés, plantea interrogantes sobre la estabilidad económica global y el futuro del crecimiento en la segunda economía mundial.", "importance": 4, "relevance": 2, "tags": ["China", "Economía", "Japón", "Estancamiento"], "image": "https://substackcdn.com/image/fetch/$s_!3hi1!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F3a084927-5ee9-4124-b354-a4b0f8f02fed_868x652.jpeg", "published": "2026-06-15T09:17:45+00:00", "sources": [{"name": "Noahpinion", "url": "https://www.noahpinion.blog/p/will-china-inc-be-zombified", "type": "newsletter"}]}, {"id": "09ba479125", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Amazon busca startups de tecnología climática para su programa de aceleración", "summary": "Amazon ha abierto las inscripciones para su tercer Programa de Aceleración de Sostenibilidad (ASA) en Europa y el Reino Unido, buscando startups y scaleups de tecnología climática. El programa conecta a estas empresas con las operaciones de Amazon para pilotar tecnologías innovadoras, con el objetivo de ayudar a la compañía a alcanzar su meta de cero emisiones netas de carbono para 2040.\n\nDesde su lanzamiento en 2024, el programa ha seleccionado 28 startups de más de 1.100 solicitantes, financiando más de 3 millones de dólares en pilotos exentos de capital. Startups de cohortes anteriores ya están implementando soluciones de energía, agua y residuos en la red logística europea de Amazon, con resultados tempranos que informan decisiones de despliegue más amplias.\n\nEl programa comprime meses de negociación y desarrollo en ocho semanas, facilitando la implementación de tecnologías climáticas a gran escala. Los participantes tendrán la oportunidad de lanzar un piloto totalmente financiado dentro de las operaciones de Amazon, acelerando la adopción de soluciones sostenibles.", "why": "Amazon impulsa la adopción de tecnologías climáticas al facilitar la implementación de soluciones innovadoras en sus operaciones globales.", "importance": 3, "relevance": 3, "tags": ["IA", "Sostenibilidad", "Startups", "Amazon"], "image": "https://images.sifted.eu/wp-content/uploads/2026/06/03143659/unnamed-5-e1780493867438.png?w=1226&h=750&q=75&fit=crop&auto=compress,format", "published": "2026-06-15T09:17:08+00:00", "sources": [{"name": "Sifted", "url": "https://sifted.eu/articles/amazon-next-generation-climate-tech-startups-brnd/", "type": "blog"}]}, {"id": "d29ec238cc", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "CEO de NIO advierte que el mercado automotriz chino podría contraerse entre un 15% y un 20% en 2026", "summary": "Li Bin, CEO de NIO, ha lanzado una advertencia al sector automotriz chino, instando a prepararse para una posible caída interanual del 15% al 20% en las ventas minoristas de automóviles en el mercado doméstico durante 2026. Según Li Bin, la industria automotriz china ha entrado en su \"fase final más intensa\" y el año en curso ha sido el más desafiante desde su ingreso al sector.\n\nLa advertencia se produce en un contexto donde la propiedad de vehículos de pasajeros en China ha alcanzado los 370 millones de unidades, marcando un cambio de un crecimiento rápido a un mercado impulsado por el parque existente y una competencia intensificada. Las ventas minoristas acumuladas de vehículos de pasajeros en lo que va de año ya registran una disminución del 20% interanual.\n\nEsta perspectiva de contracción del mercado automotriz chino, uno de los más grandes del mundo, podría tener implicaciones significativas para los fabricantes locales e internacionales. La intensificación de la competencia y la saturación del mercado sugieren un periodo de ajuste y consolidación en la industria.", "why": "Una posible contracción significativa en el mercado automotriz chino podría afectar la demanda de componentes y la producción industrial.", "importance": 4, "relevance": 2, "tags": ["Mercado automotriz", "China", "Economía"], "image": "https://technode.com/wp-content/uploads/2023/12/nio-auto1191.logowik.com_-e1707296830927.webp", "published": "2026-06-15T06:04:22+00:00", "sources": [{"name": "TechNode", "url": "https://technode.com/2026/06/15/nio-ceo-warns-china-auto-market-could-decline-15-20-in-2026/", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

const DIGEST = {"generated_at": "2026-06-24T09:17:29.383411+00:00", "count": 10, "daily_brief": "", "top": ["bc3fbb50eb", "d67bc25a9d", "903b3c3641", "c2847b29b6", "318c643911"], "stories": [{"id": "bc3fbb50eb", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Masayoshi Son (SoftBank) califica de \"blasfemia\" considerar la IA como una burbuja", "summary": "Masayoshi Son, fundador de SoftBank Group, ha declarado que continuará trabajando hasta bien entrada su vejez para perseguir sus ambiciones en el campo de la inteligencia artificial (IA). Desestimó las opiniones que sugieren que el sector de la IA ha entrado en territorio de burbuja, calificándolas de \"blasfemia\".\n\nSon ha abandonado sus planes de sucesión para centrarse en la búsqueda de la \"superinteligencia artificial\" (ASI). En la reunión anual de la compañía, expresó su deseo de tener \"otros 10 o 15 años\" para dedicar a este objetivo.\n\nLa firme apuesta de Son por la IA, a pesar de las preocupaciones sobre una posible burbuja, subraya la importancia estratégica que SoftBank otorga a esta tecnología y su potencial de crecimiento a largo plazo.", "why": "La visión de un inversor clave como SoftBank sobre el futuro de la IA puede influir en las decisiones de inversión y el desarrollo del sector.", "importance": 4, "relevance": 5, "tags": ["SoftBank", "IA", "Inversión", "Burbuja"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F9%2F6%2F4%2F4%2F12644469-1-eng-GB%2F1bcc1574aa65-photo_SXM2026062400006102.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-24T09:08:22.508904+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/softbank/softbank-s-son-says-calling-ai-a-bubble-is-blasphemy", "type": "blog"}]}, {"id": "d67bc25a9d", "category": "cruce", "topic": "ia", "subtopic": "IA China", "cruce": true, "title": "China busca liderar la revolución eléctrica y tecnológica", "summary": "El artículo argumenta que China está ganando la carrera tecnológica en la \"revolución eléctrica\", un concepto que vincula el ascenso de las grandes potencias a su dominio de las tecnologías clave de cada era. Históricamente, potencias como Países Bajos, Gran Bretaña o EE. UU. alcanzaron su estatus mediante el control de tecnologías como la pólvora, la máquina de vapor o la electricidad.\n\nEl autor sugiere que China, influenciada por análisis históricos sobre el ascenso y caída de potencias, está enfocada en dominar las tecnologías del siglo XXI, que incluyen semiconductores, computación e internet, además de la \"revolución eléctrica\". Se critica la aparente falta de enfoque de Estados Unidos en esta área, a pesar de su importancia histórica.\n\nLa noticia resalta la visión estratégica de China a largo plazo, comparándola con la forma en que las grandes potencias del pasado consolidaron su liderazgo. La \"revolución eléctrica\" se presenta como un eje fundamental para el futuro poderío global, y la narrativa sugiere que China está posicionándose para liderarla.", "why": "La estrategia china de dominar la \"revolución eléctrica\" y otras tecnologías clave del siglo XXI podría redefinir el equilibrio de poder tecnológico global.", "importance": 4, "relevance": 5, "tags": ["China", "tecnología", "geopolítica", "energía"], "image": "https://substackcdn.com/image/fetch/$s_!hFEq!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4541fea4-497c-4080-93b4-039c06df6c43_960x720.jpeg", "published": "2026-06-24T09:01:34+00:00", "sources": [{"name": "Noahpinion", "url": "https://www.noahpinion.blog/p/china-is-winning-the-other-tech-race", "type": "newsletter"}]}, {"id": "903b3c3641", "category": "cruce", "topic": "ia", "subtopic": "IA China", "cruce": true, "title": "China Telecom invierte 1.700 millones de dólares en 40.000 servidores de Huawei", "summary": "China Telecom ha realizado una inversión de 1.700 millones de dólares (11.550 millones de yuanes) para la adquisición de 40.000 servidores de alto rendimiento, destinados a cubrir sus necesidades entre 2026 y 2027. Aunque Huawei no participó directamente en la licitación, las seis empresas adjudicatarias están vinculadas a su ecosistema Kunpeng, lo que sugiere un beneficio indirecto para el gigante tecnológico chino.\n\nEsta adquisición masiva de servidores, que incluye 12.000 unidades C86 compatibles con plataformas domésticas y sistemas x86 tradicionales, se alinea con la política de Beijing de promover el uso de hardware nacional. Empresas como ZTE, H3C, Inspur y Lenovo figuran entre los ganadores del contrato.\n\nLa operación pone de relieve el impulso de China por la autosuficiencia tecnológica y el fortalecimiento de su industria de semiconductores y hardware de IA. La inversión de China Telecom es un reflejo de tendencias similares en otras grandes operadoras estatales chinas, consolidando el ecosistema de Huawei en el mercado de adquisiciones gubernamentales.", "why": "La masiva inversión de China Telecom en servidores vinculados al ecosistema de Huawei refuerza la estrategia de Beijing para la autosuficiencia tecnológica y el desarrollo de hardware nacional.", "importance": 4, "relevance": 5, "tags": ["Huawei", "China Telecom", "servidores", "semiconductores"], "image": "https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/06/24/b0006f64-999d-4abf-9f0f-1907b3104e2d_e60bd951.jpg?itok=ygNv3xe1&v=1782291620", "published": "2026-06-24T09:00:21+00:00", "sources": [{"name": "SCMP Tech", "url": "https://www.scmp.com/tech/big-tech/article/3358204/huawei-partners-win-big-china-telecom-invests-us17-billion-40000-servers?utm_source=rss_feed", "type": "blog"}]}, {"id": "c2847b29b6", "category": "ia", "topic": "ia", "subtopic": "Herramientas/Agentes", "cruce": false, "title": "El 'shift-left' en el diseño de chips complejos: más trabajo temprano para asegurar el éxito", "summary": "El proceso de diseño de chips cada vez más complejos está experimentando un fenómeno conocido como 'shift-left', donde un mayor número de tareas se trasladan a etapas más tempranas del flujo de desarrollo. Esto incluye el prototipado temprano de software, el mapeo de cargas de trabajo, la verificación, la integración multi-física y la calificación de propiedad intelectual (IP).\n\nFrank Schirrmeister, director ejecutivo de programas estratégicos de Soluciones de Sistemas en Synopsys, explica que este desplazamiento aumenta la complejidad general del proceso de diseño. Los ingenieros deben estar al tanto de los puntos problemáticos potenciales, el impacto de la reutilización de diseños y los chiplets, y las metodologías necesarias para entregar chips funcionales a tiempo.\n\nLa creciente complejidad y la necesidad de integrar múltiples funcionalidades en un solo chip hacen que el 'shift-left' sea una estrategia necesaria para mitigar riesgos y asegurar que los diseños complejos puedan ser verificados y validados de manera efectiva antes de la fabricación.", "why": "La adopción de metodologías de diseño más tempranas ('shift-left') es crucial para la viabilidad y el éxito en la producción de hardware de IA y semiconductores avanzados.", "importance": 4, "relevance": 5, "tags": ["semiconductores", "diseño de chips", "hardware IA"], "image": "https://semiengineering.com/wp-content/uploads/2026/06/Screenshot-2026-06-23-at-5.48.29-PM.png", "published": "2026-06-24T07:15:47+00:00", "sources": [{"name": "Semiconductor Engineering", "url": "https://semiengineering.com/how-far-left-can-you-shift/", "type": "blog"}]}, {"id": "318c643911", "category": "ia", "topic": "ia", "subtopic": "Uso profesional/Industria", "cruce": false, "title": "La gestión de activos es clave para el éxito de la Industria 4.0", "summary": "A pesar de las promesas de la Industria 4.0, muchas fábricas siguen enfrentando problemas como el tiempo de inactividad no planificado, que cuesta a las empresas miles de millones de dólares anuales. La razón principal no reside en la falta de sensores o algoritmos avanzados, sino en una infraestructura de gestión de activos (EAM) obsoleta.\n\nLos sistemas de EAM actuales, diseñados para una era industrial anterior, no se han adaptado para integrar eficazmente los datos de los sensores IIoT (Internet Industrial de las Cosas) y los sistemas inteligentes. Esto crea \"islas de inteligencia\" donde los datos y las perspectivas generadas por las nuevas tecnologías no llegan a las personas que necesitan actuar sobre ellas.\n\nPara que la Industria 4.0 cumpla sus promesas, es fundamental modernizar las prácticas de gestión de activos. Esto implica adaptar los sistemas, modelos de datos y procesos para que puedan manejar el flujo de información en tiempo real y permitir una toma de decisiones más ágil y proactiva, optimizando la producción y minimizando las interrupciones.", "why": "La modernización de la gestión de activos es esencial para que las fábricas puedan aprovechar plenamente las capacidades de la Industria 4.0 y reducir los costos operativos.", "importance": 3, "relevance": 5, "tags": ["Industria 4.0", "gestión de activos", "automatización", "fabricación"], "image": "https://roboticsandautomationnews.com/wp-content/uploads/2026/06/asset-management-graphic.png", "published": "2026-06-24T08:42:33+00:00", "sources": [{"name": "Robotics & Automation News", "url": "https://roboticsandautomationnews.com/2026/06/24/equipment-asset-management-practices-industry-4-0/102777/", "type": "blog"}]}, {"id": "e170422e28", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "La industria advierte que la estrategia de baterías de la UE debe materializarse en fábricas para mantener la competitividad", "summary": "La industria europea de baterías advierte que la estrategia del bloque debe ir más allá del diseño de políticas y centrarse en la creación de fábricas para asegurar la competitividad y reducir dependencias estratégicas. Alain Coheur, presidente de la Comisión Consultiva sobre el Cambio Industrial (CCMI), señala que el desafío reside en la ejecución, asegurando que la investigación, la inversión, las cadenas de suministro y las habilidades se desarrollen de forma paralela.\n\nEuropa ha presentado diversas estrategias y leyes, como la Ley de Materias Primas Críticas y la Ley de Industria Net-Zero, pero la industria percibe una brecha entre la ambición política y la capacidad industrial real. La falta de certeza en la inversión y la necesidad de desarrollar nuevas tecnologías, como las baterías de iones de sodio, son puntos clave.\n\nLa capacidad de la UE para transformar la ambición política en capacidad industrial es un punto de referencia crítico para su competitividad general y la transición energética. El fracaso en construir una industria de baterías competitiva tendría implicaciones significativas para las ambiciones industriales más amplias del bloque.", "why": "La capacidad de la UE para fabricar baterías a gran escala es crucial para su competitividad industrial y su transición energética.", "importance": 4, "relevance": 4, "tags": ["baterías", "industria europea", "competitividad"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/CCMI-Debate-on-the-future-of-the-European-battery-industry-7-1182x788.jpg", "published": "2026-06-24T07:35:25+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/interview/eu-battery-strategy-must-deliver-factories-if-europe-is-to-remain-competitive-industry-warns/", "type": "blog"}]}, {"id": "aa18d044a4", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "Unidad de China Resources Power prepara una OPV récord de 3.600 millones de dólares", "summary": "China Resources New Energy, una filial de la empresa estatal China Resources Power, ha captado más de 6,4 billones de yuanes (943.000 millones de dólares) en peticiones de inversores para su Oferta Pública Inicial (OPI). La operación se perfila como la mayor en China en los últimos años.\n\nEsta fuerte suscripción refleja el auge de las cotizaciones en bolsa, especialmente en mercados offshore, y subraya el interés de los inversores en el sector de las energías renovables. La compañía se prepara para su debut en la bolsa de Shenzhen.\n\nLa magnitud de esta OPI en el sector de las energías limpias es un indicador del dinamismo de la economía china y de su apuesta por la transición energética, con implicaciones para la financiación de proyectos sostenibles a nivel global.", "why": "Una OPI de gran envergadura en energías renovables en China puede influir en la financiación global de proyectos sostenibles y en la competencia energética.", "importance": 4, "relevance": 3, "tags": ["China", "Energías renovables", "OPI", "Financiación"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F6%2F3%2F3%2F12643365-1-eng-GB%2F098b113423d6-IMG_1444.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-24T09:08:22.346997+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/markets/ipo/state-backed-china-resources-power-s-unit-to-raise-3.6bn-in-record-ipo", "type": "blog"}]}, {"id": "a92b445985", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "Adani Group planea 10 GW de energía nuclear para 2035 y expandir centros de datos", "summary": "El Adani Group ha fijado el objetivo de alcanzar 10 gigavatios (GW) de capacidad de energía nuclear para 2035, superando la capacidad total actual de India (8 GW). Paralelamente, la compañía busca desarrollar 3 GW de capacidad de centros de datos para 2030. El grupo ha identificado terrenos para la construcción de plantas nucleares, aprovechando la reciente liberalización de las leyes de energía nuclear en India.\n\nEsta estrategia se alinea con la creciente demanda de energía para alimentar la expansión de sus centros de datos. La liberalización de la industria nuclear india, aprobada a finales del año pasado, abre nuevas oportunidades para que empresas como Adani inviertan y desarrollen infraestructura nuclear.\n\nLa ambición de Adani en el sector nuclear y de centros de datos subraya la importancia estratégica de la energía para la infraestructura digital y la necesidad de fuentes de energía fiables y a gran escala. Será clave observar el progreso en la obtención de permisos, la construcción de las plantas y la integración de estas nuevas capacidades energéticas con sus operaciones de centros de datos.", "why": "La expansión de Adani en energía nuclear y centros de datos es crucial para satisfacer la creciente demanda energética de la infraestructura digital en India.", "importance": 4, "relevance": 3, "tags": ["Adani Group", "energía nuclear", "centros de datos", "India"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F9%2F9%2F5%2F12645995-1-eng-GB%2Fc4a74a5f828f-2024-11-21T073842Z_1613276834_RC2H9BA67DX0_RTRMADP_3_ADANI-GROUP-USA.JPG?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-24T09:08:22.110140+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/companies/adani-group/adani-sets-10-gw-nuclear-goal-as-it-expands-data-center-capacity", "type": "blog"}]}, {"id": "acedf3c6e9", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Bolsas de Corea del Sur y Japón pierden impulso ante la caída de valores tecnológicos", "summary": "Los mercados bursátiles de Seúl y Tokio mostraron un comportamiento plano a mediodía del miércoles, tras haber experimentado caídas significativas del 10% y 4% respectivamente el día anterior. Esta pérdida de momentum se atribuye en parte a la debilidad de las acciones tecnológicas.\n\nLos analistas consideran que la reciente caída en el índice KOSPI de Corea del Sur el 23 de junio fue una corrección del mercado más que un colapso. Señalan que la venta masiva se debió a una confluencia de factores, incluyendo la volatilidad generalizada en los mercados asiáticos.\n\nLa tendencia de las bolsas asiáticas, especialmente en el sector tecnológico, es un indicador importante de la salud económica regional y global, así como del apetito por el riesgo de los inversores.", "why": "El comportamiento de las bolsas asiáticas, particularmente en el sector tecnológico, puede reflejar tendencias globales en inversión y confianza económica.", "importance": 3, "relevance": 3, "tags": ["Mercados", "Tecnología", "Asia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F7%2F3%2F9%2F4%2F12644937-1-eng-GB%2F3b925d699c32-photo_SXM2025061200013270.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-24T09:08:22.431792+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/markets/south-korean-and-japanese-stocks-lose-momentum-as-tech-stocks-slump", "type": "blog"}]}, {"id": "513bf3df33", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "La industria advierte que el objetivo de demanda de vivienda de la Comisión es 'extremadamente exigente'", "summary": "La industria de productos de construcción en Europa advierte que no tratar el sector como una cadena de valor industrial estratégica podría ser un error costoso. A pesar de que la Comisión Europea avanza en la dirección correcta, persisten obstáculos significativos para suministrar viviendas asequibles y sostenibles a la escala necesaria.\n\nPascal Eveillard, presidente de Construction Products Europe, señala que el sector opera en una cadena de valor compleja y fragmentada, requiriendo políticas de apoyo consistentes por parte de la UE para mantener su competitividad. A diferencia de otros sectores como la energía, los semiconductores o la automoción, los productos de construcción no reciben aún el mismo nivel de atención estratégica, a pesar de su papel central en la economía y la transición a la sostenibilidad en Europa.\n\nEl ecosistema de la construcción representa alrededor del 10% del PIB de la UE y está intrínsecamente ligado a las necesidades ciudadanas, la competitividad, la asequibilidad de la vivienda, los objetivos climáticos y la resiliencia del entorno construido. La advertencia de la industria subraya la necesidad de un enfoque más estratégico para este sector clave.", "why": "La falta de atención estratégica al sector de productos de construcción podría obstaculizar la transición energética y la asequibilidad de la vivienda en Europa.", "importance": 3, "relevance": 3, "tags": ["construcción", "industria europea", "política UE"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/1041_JZ1_7831-e1782264386757-1332x788.jpg", "published": "2026-06-24T07:30:18+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/interview/commissions-housing-demand-target-extremely-demanding-industry-warns/", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

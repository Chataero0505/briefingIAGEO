il de Zhipu AI y Minimax. Mientras Zhipu AI ha experimentado un fuerte repunte, Minimax no ha seguido la misma tendencia.\n\nZhipu AI, que ha hecho de código abierto su modelo GLM-5.2, ha visto cómo sus acciones se disparaban hasta un 48% en la bolsa de Hong Kong. Este movimiento se produce tras el anuncio de la disponibilidad de su modelo más potente, que cuenta con una ventana de contexto de un millón de tokens. La empresa busca atraer usuarios ante el aumento de precios de modelos competidores occidentales, ofreciendo su plan de codificación GLM a una décima parte del coste de alternativas como Claude Code de Anthropic.\n\nEsta situación pone de manifiesto la competencia en el sector de la IA en China y la importancia del apoyo estatal y los ingresos recurrentes para atraer inversores. La estrategia de Zhipu AI de ofrecer modelos potentes a precios competitivos podría influir en el mercado global de LLM y en la estrategia de las empresas occidentales.", "why": "La estrategia de código abierto y precios competitivos de Zhipu AI podría alterar el mercado global de modelos de lenguaje grandes y la competencia tecnológica.", "importance": 4, "relevance": 5, "tags": ["IA", "Modelos", "China", "Código abierto"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F0%2F6%2F4%2F12604606-1-eng-GB%2Fc759c83e8611-260611163246056-1-.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-15T05:02:02.016006+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/editor-s-picks/interview/indonesian-business-lobby-warns-confusing-policies-sow-dangerous-distrust", "type": "blog"}]}, {"id": "e23618bbbf", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "El sector tecnológico europeo muestra un nuevo brío impulsado por mega-acuerdos", "summary": "El sector tecnol nta obstáculos en la adquisición", "summary": "El Reino Unido ha presentado un nuevo plan, la Fuerza de Tarea de Entrega Rápida de IA (RAID), con el objetivo de integrar la inteligencia artificial en sus fuerzas armadas a un ritmo acelerado. El primer ministro Keir Starmer anunció la iniciativa durante la London Tech Week, destacando su potencial para mejorar la toma de decisiones del personal, reducir la exposición al riesgo y mantener la paridad con adversarios que ya emplean IA.\n\nSin embargo, fundadores e inversores del sector de defensa expresan escepticismo, advirtiendo que los lentos procesos de adquisición del Ministerio de Defensa (MoD) podrían socavar la efectividad de la iniciativa. Craig Beddis, CEO de Hadean, una startup de simulación de defensa, señala que la lentitud en la negociación de contratos puede impedir que las startups crezcan y obtengan financiación, calificando la dependencia de pruebas gratuitas como \"completamente insostenible\".\n\nLa preocupación principal radica en si el gobierno británico podrá superar las barreras burocráticas inherentes a su sistema de adquisición militar para cumplir con las ambiciosas metas de implementación de IA. La agilidad de las startups tecnológicas se ve limitada por la rigidez de los procesos gubernamentales, un desafío clave para la adopción efectiva de tecnologías de vanguardia en el ámbito militar.", "why": "La capacidad del Reino Unido para implementar IA militar de forma ágil es crucial para su competitividad estratégica y defensa en un contexto geopolítico cambiante.", "importance": 3, "relevance": 5, "tags": ["IA militar", "Reino Unido", "Adquisición", "Defensa"], "image": "https://foreignpolicy.com/wp-content/uploads/2026/06/FP-Spots-Final-03_SW_V1.jpg", "published": "2026-06-15T04:13:55+00:00", "sources": [{"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/15/neoliberalism-globalization-competition-cosmopolitanism-economics-reagan-thatcher/", "type": "blog"}, {"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/15/israel-united-states-special-relationship-palestine-netanyahu-trump/", "type": "blog"}, {"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/15/trans-atlanticism-europe-united-states-mark-carney-davos-nato/", "type": "blog"}, {"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/15/climate-change-paris-cop30-china-green-energy/", "type": "blog"}, {"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/15/united-nations-obituary-gaza-ukriane-trump/", "type": "blog"}, {"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/15/immigration-policy-asylum-refugees-borders-law-trump-united-states-europe/", "type": "blog"}, {"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/15/party-democracy-political-system-participation-membership-leaders-elections-voting/", "type": "blog"}, {"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/15/china-economy-decline-demographic-consumption-gdp-xi-jinping/", "type": "blog"}, {"name": "Foreign Affairs", "url": "https://www.foreignaffairs.com/united-states/false-promise-us-china-stability", "type": "blog"}, {"name": "ASPI The Strategist", "url": "https://www.aspistrategist.org.au/theres-value-in-supply-chain-knowledge-china-wants-to-control-it/", "type": "blog"}, {"name": "Lowy Institute", "url": "https://www.youtube.com/shorts/vh1jahZWuEQ", "type": "youtube"}]}, {"id": "e0200d9c95", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Líder de extrema derecha francesa Jordan Bardella advierte a Bruselas que no moderará su postura", "summary": "Jordan Bardella, líder del partido francés de extrema derecha Rassemblement National (RN), ha comunicado a Bruselas que, de llegar a la presidencia, no seguirá el camino de la moderación pragmática que ha adoptado la primera ministra italiana Giorgia Meloni. Bardella planea confrontar a la UE y reconfigurar el bloque desde dentro, buscando reducir la contribución francesa al presupuesto de la UE y fortalecer lazos con aliados nacionalistas.\n\nEn una entrevista exclusiva con POLITICO, Bardella ha dejado claro que sus intenciones de \"cambiarlo todo\" en la UE no han mermado, aunque ahora enfatiza que busca hacerlo \"sin destruir nada\". Sus propuestas incluyen una reducción a la mitad de la contribución francesa al próximo marco financiero plurianual de la UE, un objetivo que ha variado en su cuantificación pero que se mantiene como una prioridad clave. La convicción de Marine Le Pen por malversación de fondos de la UE y su consecuente prohibición de ejercer cargos públicos han impulsado a Bardella a la candidatura presidencial, con una decisión judicial pendiente sobre la condena de Le Pen.\n\nLas declaraciones de Bardella sugieren un posible endurecimiento de las posturas nacionalistas dentro de la UE, lo que podría generar tensiones significativas y desafíos para la cohesión y la toma de decisiones del bloque. La cumbre del G7 en Évian, donde los líderes discutirán temas como China, Ucrania y Oriente Medio, también se perfila como un escenario clave para observar las dinámicas políticas europeas.", "why": "La postura firme del líder de extrema derecha francés Jordan Bardella podría alterar significativamente la dirección política y las prioridades de la Unión Europea.", "importance": 4, "relevance": 4, "tags": ["UE", "Francia", "Extrema derecha", "Política"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2026/02/26/Brussels-Playbook-Podcast_featured-image-updated-26-Feb-2026.png", "published": "2026-06-15T04:05:00+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/podcast/brussels-playbook-podcast/bardella-warns-brussels-he-wont-moderate/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/jordan-bardella-france-far-right-frontrunner-donald-trump-nato-future-of-eu/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/france-jordan-bardella-5-takeaways-from-politico-interview/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/budget-alliances-bardella-veut-toujours-tout-changer-a-lue/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "1ca458245c", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Exportaciones de 'freelancers' paquistaníes alcanzan récord, pero la IA presenta amenazas", "summary": "Las exportaciones de servicios de TI de Pakistán superarán los 1.000 millones de dólares este año fiscal, marcando un hito para el sector de servicios digitales del país. Este crecimiento se sustenta en una gran cantidad de trabajadores autónomos en línea ('gig workers').\n\nLos expertos señalan que el bajo coste de la mano de obra paquistaní es un punto fuerte clave. Sin embargo, la creciente influencia de la inteligencia artificial en la automatización de tareas podría representar una amenaza a largo plazo para este modelo de negocio, especialmente en trabajos repetitivos o de bajo valor añadido.\n\nLa dependencia del país de este sector y la potencial disrupción por la IA plantean interrogantes sobre la sostenibilidad futura del crecimiento y la necesidad de diversificar las habilidades y servicios ofrecidos por los 'freelancers' paquistaníes.", "why": "El auge de los 'freelancers' paquistaníes se enfrenta a la amenaza de la automatización por IA, lo que podría impactar las cadenas de suministro de servicios digitales globales.", "importance": 3, "relevance": 4, "tags": ["IA", "Trabajo", "Pakistán", "Automatización"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F6%2F2%2F3%2F2%2F12612326-1-eng-GB%2F62d61a6c8f03-1cc.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-15T05:02:01.845263+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/technology/artificial-intelligence/zhipu-soars-and-minimax-stumbles-as-china-s-ai-stocks-diverge", "type": "blog"}, {"name": "SCMP Tech", "url": "https://www.scmp.com/tech/tech-trends/article/3357115/zhipu-ais-stock-rockets-after-chinese-firm-makes-glm-52-open-source?utm_source=rss_feed", "type": "blog"}]}, {"id": "6f8304c027", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "Mizuho Bank impulsa la colaboración energética entre Japón y Corea del Sur", "summary": "Mizuho Bank está desarrollando un marco integral para fomentar lazos empresariales y asegurar financiación para compañías japonesas y surcoreanas. Esta iniciativa responde a la creciente necesidad de revisar las estrategias de abastecimiento energético ante el aumento de los riesgos geopolíticos.\n\nLa medida subraya la importancia de la cooperación bilateral en un contexto de incertidumbre global. El presidente de Mizuho Bank, Masahiko Kato, ha destacado la relevancia de crear nuevos mercados entre ambas naciones.\n\nLa iniciativa busca fortalecer la resiliencia de las cadenas de suministro energéticas y promover la estabilidad económica en la región del noreste de Asia.", "why": "Fortalece la resiliencia de las cadenas de suministro energéticas y la cooperación económica entre dos potencias asiáticas clave.", "importance": 3, "relevance": 3, "tags": ["Energía", "Cooperación", "Financiación", "Asia"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F0%2F0%2F0%2F4%2F12604000-1-eng-GB%2F7be500cae4b5-photo_SXM2026061000005062.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-15T05:02:02.254389+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/editor-s-picks/interview/mizuho-bank-to-back-japan-south-korea-firms-energy-procurement-projects2", "type": "blog"}]}, {"id": "13795312af", "category": "geo", "topic": "geo", "subtopic": "Energía", "cruce": false, "title": "Europa debilita sus políticas climáticas ante presiones comerciales y de la industria", "summary": "Europa está experimentando un debilitamiento de sus políticas verdes, influenciado por presiones de socios comerciales y el lobby industrial, lo que añade complejidad a la gestión de riesgos climáticos para las empresas. La revisión del Sistema de Comercio de Emisiones de la UE (ETS), que pone precio al carbono, ha llevado el precio de los permisos a menos de 80 euros, una caída desde los más de 90 euros de enero, encareciendo la contaminación.\n\nA pesar de esto, las emisiones de la generación de energía a partir de combustibles fósiles en el continente disminuyeron ligeramente el año pasado, gracias a un aumento del 25% en la generación de energía solar que compensó la caída en la eólica e hidroeléctrica. La cuota de energía renovable se mantuvo estable en un 47% del mix energético. Las emisiones de las industrias intensivas en energía también se redujeron, principalmente debido a la desaceleración manufacturera, especialmente en los sectores del cemento y el acero.\n\nEl desafío para Europa, que se calienta al doble del promedio mundial, sigue siendo encontrar formas efectivas de abordar y adaptarse al cambio climático, en gran medida causado por la quema de combustibles fósiles. La lista \"Europe's Climate Leaders 2026\" destaca a las empresas que están logrando avances en la reducción de emisiones, pero la incertidumbre regulatoria y la transición energética presentan obstáculos significativos.", "why": "El retroceso en las políticas climáticas europeas podría ralentizar la transición energética y afectar la competitividad de la UE en la economía verde global.", "importance": 3, "relevance": 3, "tags": ["Clima", "Europa", "Transición Energética", "Regulación"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fd1e00ek4ebabms.cloudfront.net%2Fproduction%2Fb7316b1d-5339-420b-970d-afdb08a3b9fd.jpg?source=next-article&fit=scale-down&quality=highest&width=700&dpr=1", "published": "2026-06-15T04:12:22+00:00", "sources": [{"name": "Financial Times (World)", "url": "https://www.ft.com/content/1d4be2a3-e986-40e1-96a4-2ef732ed143a", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/reports/europe-climate-leaders", "type": "blog"}]}, {"id": "0cdb7340be", "category": "geo", "topic": "geo", "subtopic": "Europa", "cruce": false, "title": "Debate sobre la CDU y la AfD en Alemania: una discusión que no se produce", "summary": "Una fotografía de políticos de la CDU y la AfD compartiendo un micrófono en Sajonia-Anhalt ha generado un intenso debate político en Alemania. En lugar de abordar directamente las diferencias ideológicas, la discusión se ha centrado en la \"muro de contención\" (Brandmauer) que separa a los partidos conservadores de la extrema derecha.\n\nGordon Repinski aboga por un retorno a un debate sustantivo sobre las políticas de la AfD, argumentando que la CDU está perdiendo la oportunidad de confrontar a la AfD en sus puntos débiles. Hans-Thomas Tillschneider, portavoz de política cultural de la AfD en Sajonia-Anhalt y cercano a Björn Höcke, rechaza cualquier coalición o tolerancia con la CDU, calificando el acercamiento como \"fraude a los votantes\" y atribuyendo los altos índices de aprobación del partido a su firmeza ideológica.\n\nMientras tanto, la cumbre del G7 en Évian se perfila como un evento clave, con la cobertura de POLITICO sobre la nerviosidad entre bastidores, la gestión de Donald Trump y la estrategia de Emmanuel Macron. La situación política interna alemana, marcada por la polarización y la dificultad para establecer un diálogo constructivo entre los principales partidos, añade una capa de complejidad a la agenda europea.", "why": "La incapacidad de los principales partidos alemanes para debatir constructivamente con la extrema derecha refleja una profunda división política con implicaciones para la estabilidad y el futuro de Alemania en Europa.", "importance": 3, "relevance": 3, "tags": ["Alemania", "Política", "Extrema derecha", "CDU"], "image": "https://www.politico.eu/cdn-cgi/image/width=1200,height=630,fit=crop,quality=80,onerror=redirect/wp-content/uploads/2025/12/15/Berlin-Playbook-Website-card-1-1-1.jpg", "published": "2026-06-15T04:01:03+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.eu/podcast/berlin-playbook-podcast/kumpelei-von-cdu-und-afd-eine-debatte-die-keine-ist/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

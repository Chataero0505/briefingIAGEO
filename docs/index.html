s pasajeros aéreos, que mejora las compensaciones por retrasos y cancelaciones, aunque con condiciones sobre el equipaje de cabina. También se imponen condiciones estrictas para la suspensión de aranceles al CO2, buscando proteger a los agricultores de los altos precios de los fertilizantes.\n\nLa industria de defensa europea, ejemplificada por el fracaso del programa FCAS, enfrenta obstáculos para la colaboración entre naciones, a pesar de los esfuerzos por la autonomía militar. La \"soberanía tecnológica\" europea se considera un objetivo dudoso pero una inversión atractiva, mientras Francia se opone a la \"anglicización\" de las negociaciones comerciales de la UE.", "why": "Muestra la reconfiguración económica y política en Europa y Asia, con énfasis en la soberanía tecnológica, la cooperación industrial y la resiliencia financiera.", "importance": 3, "relevance": 4, "tags": ["Economía europea", "Asia", "Comercio", "Finanzas"], "image": "https://i0.wp.com/asiatimes.com/wp-content/uploads/2024/03/GRRM-LOGO-1-1-1-1-1-1-1.webp?fit=700%2C286&ssl=1", "published": "2026-06-13T06:15:58+00:00", "sources": [{"name": "Asia Times", "url": "https://asiatimes.com/2026/06/when-pressure-fuels-more-pressure/", "type": "blog"}, {"name": "Asia Times", "url": "https://asiatimes.com/2026/06/the-future-of-asian-finance-may-be-built-in-local-currencies/", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/08f2c019-673d-4c7b-b0d5-3f973b573e80", "type": "blog"}, {"name": "Financial Times (World)", "url": "https://www.ft.com/content/fa0545f4-3663-460b-b4ab-773bb3ce7294", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/supervise-this/", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.eu/article/5-things-to-know-about-the-eus-air-passenger-rights-reform-deal/?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/capitals-back-down-in-eleventh-hour-talks-on-air-passenger-rights/", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/capitals-put-strict-conditions-on-co2-tariff-emergency-suspension/", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/opinion/editors-choice-fcas-without-jets-will-never-get-off-the-ground/", "type": "blog"}]}, {"id": "ef80ae1164", "category": "ia", "topic": "ia", "subtopic": "Empresas", "cruce": false, "title": "Ingenieros de Meta describen su unidad de IA como un \"gulag desmoralizador\"", "summary": "Un informe reciente en Wired revela que la unidad de IA aplicada de Meta, creada hace solo tres meses y con unos 6.500 ingenieros y gestores de producto, está experimentando un descontento generalizado. El descontento se manifestó públicamente cuando un empleado interrumpió una presentación interna para insultar a un alto ejecutivo de IA de la compañía.\n\nEste incidente parece reflejar una \"ira latente\" dentro de la unidad, que fue formada apresuradamente a través de correos electrónicos sorpresa. Según un anuncio interno revisado por Business Insider, los empleados fueron asignados a este grupo porque los modelos de IA de Meta aún carecían de la capacidad para superar a los humanos en tareas técnicas complejas, como la codificación.\n\nLa situación en Meta se produce en un contexto de despidos continuos y una inversión masiva en inteligencia artificial. Los ingenieros asignados a esta unidad expresan frustración por la falta de claridad en sus roles y la presión por alcanzar objetivos ambiciosos en un plazo ajustado, lo que genera un ambiente de trabajo tenso y desmotivador.", "why": "La noticia expone los desafíos internos y la posible crisis de moral dentro de una de las divisiones de IA más importantes del mundo, con implicaciones para el desarrollo y la adopción de tecnologías de IA en Meta.", "importance": 3, "relevance": 4, "tags": ["Meta AI", "Cultura empresarial", "Desarrollo IA"], "image": "https://techcrunch.com/wp-content/uploads/2025/07/GettyImages-2194278734.jpg?w=1024", "published": "2026-06-12T23:00:54+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/12/metas-months-old-ai-unit-is-a-soul-crushing-gulag-say-the-engineers-stuck-inside-it/", "type": "blog"}]}, {"id": "9d1a8ab122", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Asia preocupada por el giro de EE. UU. hacia un orden basado en el poder y la salud mental en conflictos", "summary": "Países asiáticos expresaron su inquietud en la cumbre de seguridad de Shangri-La por un posible cambio en la política exterior de EE. UU. bajo la administración Trump, que podría priorizar un enfoque de \"paz a través de la fuerza\" en detrimento del \"orden basado en reglas\". Esta percepción de abandono del rol de guardián del orden internacional por parte de EE. UU. genera incertidumbre en la región.\n\nParalelamente, se aborda la cuestión de la salud mental en contextos de conflicto, destacando los \"costes ocultos\" de su despriorización en las respuestas internacionales a crisis. La falta de atención a la salud mental puede tener consecuencias graves y duraderas para las poblaciones afectadas y la estabilidad a largo plazo.\n\nLa combinación de estas dos noticias subraya la fragilidad del orden internacional y la necesidad de enfoques más holísticos que consideren tanto la seguridad geopolítica como el bienestar humano. La región asiática, en particular, se enfrenta a un escenario de reconfiguración de alianzas y a la necesidad de fortalecer su propia resiliencia ante la incertidumbre global.", "why": "Refleja la creciente incertidumbre geopolítica en Asia y la importancia de la salud mental en la gestión de crisis internacionales.", "importance": 4, "relevance": 3, "tags": ["EE. UU.", "Asia", "Seguridad", "Salud Mental"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F7%2F9%2F6%2F8%2F12588697-1-eng-GB%2F6c97d3be9582-illust_SXM2026060300011364.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T08:20:13.008942+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/comment/asia-shaken-as-us-abandons-role-as-guardian-of-rules-based-order", "type": "blog"}, {"name": "CSIS (YT)", "url": "https://www.youtube.com/shorts/Sscf02bR7R8", "type": "youtube"}]}, {"id": "df28e89b9e", "category": "cruce", "topic": "geo", "subtopic": "EE. UU.", "cruce": true, "title": "EE. UU. derriba drones iraníes en el Estrecho de Ormuz; acuerdo con Irán cerca pero no cerrado", "summary": "Estados Unidos informó haber derribado múltiples drones iraníes que apuntaban a buques comerciales en el Estrecho de Ormuz, en medio de afirmaciones de ambas partes sobre la proximidad de un acuerdo para poner fin a un conflicto regional. El Comando Central de EE. UU. (CENTCOM) aseguró que el tráfico a través del estrecho, una ruta vital para el petróleo y el gas, continúa sin impedimentos, a pesar de las tensiones y los intercambios de fuego recientes.\n\nLas negociaciones entre Washington y Teherán, mediadas por Pakistán, han avanzado, aunque persisten desacuerdos sobre los detalles. Un alto funcionario estadounidense estimó una probabilidad del 80-85% de éxito para un acuerdo a corto plazo, aunque los aspectos nucleares requerirían meses. Irán, por su parte, ha publicado detalles de un borrador de acuerdo que difieren de la versión estadounidense, pero insiste en que un memorando de entendimiento está cerca de ser firmado.\n\nLa situación es compleja, con Israel, bajo el liderazgo de Netanyahu, buscando una victoria total y considerando la escalada militar como una vía para evitar que Irán mantenga su arsenal y fondos. Mientras tanto, Elon Musk se ha convertido en el primer billonario del mundo gracias a la exitosa salida a bolsa de SpaceX, valorada en más de 2 billones de dólares, un evento que podría preceder a una ola de ofertas públicas de empresas de IA.", "why": "La tensión en el Estrecho de Ormuz y las negociaciones con Irán son cruciales para la estabilidad energética global y la política exterior de EE. UU., mientras la IA y el espacio cobran relevancia económica.", "importance": 4, "relevance": 3, "tags": ["Irán", "Estrecho de Ormuz", "Negociaciones", "Energía"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2275575381.jpg", "published": "2026-06-13T07:15:48+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/12/military-escort-oil-tankers-hormuz-00960556?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/musk-becomes-worlds-first-trillionaire-as-spacex-shares-soar/", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/us-says-downed-multiple-iran-drones-as-both-insist-deal-closer/", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/12/a-deal-with-iran-is-near-but-not-final-senior-us-official-says-00960804?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Foreign Policy", "url": "https://foreignpolicy.com/2026/06/12/netanyahu-election-iran-war-outcome-us-trump/", "type": "blog"}, {"name": "Atlantic Council", "url": "https://www.atlanticcouncil.org/dispatches/its-not-a-deal-but-trumps-memorandum-with-iran-can-be-the-start-of-something-bigger/", "type": "blog"}, {"name": "Atlantic Council", "url": "https://www.atlanticcouncil.org/insight-impact/in-the-news/kroenig-interviewed-on-bbc-on-iran-negotiations/", "type": "blog"}, {"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/12/trump-iran-peace-deal-leak-00960515?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Asia Times", "url": "https://asiatimes.com/2026/06/trump-has-backed-away-from-renewed-war-with-iran-heres-why/", "type": "blog"}, {"name": "Geopolitical Futures", "url": "https://geopoliticalfutures.com/daily-memo-details-of-proposed-us-iran-deal/", "type": "newsletter"}]}, {"id": "88622b8175", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "SpaceX debuta en bolsa con una OPV histórica de 75.000 millones de dólares", "summary": "SpaceX ha protagonizado la mayor oferta pública inicial (OPV) de la historia, recaudando 75.000 millones de dólares al fijar el precio de sus 555,6 millones de acciones en 135 dólares cada una. Esta operación podría convertir a su fundador, Elon Musk, en el primer billonario del mundo. Las acciones de la compañía comenzaron a cotizar en el Nasdaq a 150 dólares, un 11% más, y experimentaron un aumento del 30% durante la jornada, cerrando en 160,95 dólares, un 19% más.\n\nEl interés en SpaceX ha sido constante durante sus 24 años de historia, impulsado por sus lanzamientos de cohetes reutilizables, la red de satélites Starlink y su carismático CEO. Sin embargo, esta OPV supera cualquier hito anterior en términos de magnitud y expectación.\n\nLa jornada bursátil estuvo marcada por un volumen de negociación récord, con plataformas como Robinhood reportando tráfico histórico. La COO de SpaceX, Gwynne Shotwell, fue entrevistada por CNBC, ofreciendo detalles sobre la estrategia y el futuro de la compañía en los mercados públicos.", "why": "La OPV de SpaceX establece un nuevo récord histórico y valida el modelo de negocio de la compañía espacial, con implicaciones para el sector aeroespacial y las futuras salidas a bolsa.", "importance": 4, "relevance": 3, "tags": ["SpaceX", "OPV", "Elon Musk", "Mercados"], "image": "https://techcrunch.com/wp-content/uploads/2026/06/elon-nasdaq-spacex-ipo.jpg?resize=1200,801", "published": "2026-06-12T23:15:14+00:00", "sources": [{"name": "TechCrunch AI", "url": "https://techcrunch.com/2026/06/12/spacex-ipo-live-updates-on-everything-you-need-to-know/", "type": "blog"}]}, {"id": "3cff71c81b", "category": "geo", "topic": "geo", "subtopic": "Defensa/Conflictos", "cruce": false, "title": "Gigante alemán de defensa advierte sobre el futuro del programa de tanques europeo", "summary": "El CEO de Rheinmetall, Armin Papperger, ha expresado su preocupación por el futuro del programa franco-alemán Main Ground Combat System (MGCS), destinado a reemplazar los tanques de batalla actuales de ambos países. Papperger teme que Francia pueda retirarse del proyecto, similar a lo ocurrido con el programa de avión de combate Future Combat Air System (FCAS), citando recortes presupuestarios franceses que podrían retrasar aún más el desarrollo.\n\nEl programa MGCS, que busca la cooperación entre empresas como Rheinmetall, KNDS y Thales, ya enfrenta lentitud y una financiación inicial considerada insuficiente (€25 millones). La posible retirada de Francia, sumada a la reducción de su presupuesto, pone en duda la viabilidad y los plazos del proyecto, que es crucial para la autonomía estratégica de defensa europea.\n\nLa advertencia de Rheinmetall subraya las dificultades inherentes a la cooperación en defensa a gran escala dentro de Europa, especialmente ante divergencias políticas y financieras entre los socios clave. La supervivencia del MGCS es un indicador importante de la capacidad de Europa para desarrollar proyectos de defensa ambiciosos de forma conjunta.", "why": "Revela las tensiones y desafíos en la cooperación de defensa europea, afectando la autonomía estratégica y la industria de armamento del continente.", "importance": 3, "relevance": 3, "tags": ["Defensa europea", "Francia", "Alemania", "Cooperación militar"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-2271831314.jpg", "published": "2026-06-13T07:22:49+00:00", "sources": [{"name": "Euractiv", "url": "https://www.euractiv.com/news/german-defence-giant-warns-on-future-of-european-tank/", "type": "blog"}]}, {"id": "da507e6761", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Debate sobre la precisión del censo de población en India", "summary": "Se plantea la cuestión de la exactitud del censo de población de la India, que oficialmente reporta 1.400 millones de habitantes. La noticia describe una escena en Nueva Delhi donde la vida cotidiana transcurre en condiciones precarias, sugiriendo la complejidad de obtener datos demográficos precisos en un país de tal magnitud y diversidad.\n\nLa recopilación de datos demográficos fiables es crucial para la planificación de políticas públicas, la asignación de recursos y la comprensión de las dinámicas sociales y económicas de un país. En el caso de India, la vasta extensión y las disparidades socioeconómicas presentan desafíos significativos para un censo exhaustivo y preciso.\n\nSerá importante observar cómo las autoridades indias abordan los desafíos metodológicos y logísticos para garantizar la fiabilidad de sus estadísticas demográficas, lo cual tiene implicaciones directas en la planificación del desarrollo y la distribución de ayudas.", "why": "La precisión demográfica es fundamental para la planificación y el desarrollo de políticas en países de gran población como India.", "importance": 3, "relevance": 2, "tags": ["India", "Demografía", "Censo"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F9%2F7%2F1%2F8%2F12608179-1-eng-GB%2Fadee88d56f7d-GettyImages-2273915920a.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T08:20:13.525581+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/spotlight/big-in-asia/is-india-really-home-to-1.4-billion-people-it-s-time-to-count", "type": "blog"}]}, {"id": "7fc5f71dc1", "category": "geo", "topic": "geo", "subtopic": "Economía", "cruce": false, "title": "China impulsa el turismo de cruceros para estimular el crecimiento económico", "summary": "China está promoviendo activamente el turismo de cruceros como una estrategia para fomentar el consumo y dinamizar su economía. Esta iniciativa busca ofrecer alternativas de viaje más relajadas frente a la masificación de los periodos vacacionales y apoyar el crecimiento económico en un contexto de sentimiento del consumidor aún moderado.\n\nLa apuesta por el turismo de cruceros se enmarca en los esfuerzos del gobierno chino por diversificar las fuentes de crecimiento y estimular la demanda interna. En un momento en que la recuperación económica global presenta desafíos, China busca capitalizar el potencial del sector turístico para generar actividad económica y empleo.\n\nEl éxito de esta estrategia podría tener implicaciones para las cadenas de suministro relacionadas con la industria de cruceros y el turismo en Asia. Será relevante observar cómo esta iniciativa impacta en el sector y si logra revitalizar de manera significativa la economía china.", "why": "Muestra las estrategias de China para estimular su economía a través del turismo, con posibles repercusiones en las cadenas de suministro.", "importance": 3, "relevance": 2, "tags": ["China", "Economía", "Turismo", "Cruceros"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F1%2F1%2F3%2F12573115-1-eng-GB%2Fc203c15ee624-20260603-Adora-Magic-City.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T08:20:12.898719+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/travel-leisure/china-promotes-cruise-tourism-as-catalyst-for-economic-growth", "type": "blog"}]}, {"id": "8758d753c5", "category": "geo", "topic": "geo", "subtopic": "EE. UU.", "cruce": false, "title": "Relación EE. UU.-México en tensión ante el inicio del Mundial", "summary": "La relación entre Estados Unidos y México se encuentra en un punto delicado, coincidiendo con el inicio de la Copa del Mundo. La presidenta mexicana Claudia Sheinbaum enfrenta desafíos en su relación con el presidente estadounidense Donald Trump, marcados por desacuerdos en temas de comercio, la lucha contra los cárteles de la droga y una creciente disputa por extradiciones.\n\nEstos puntos de fricción amenazan la estabilidad de la relación bilateral, que ya ha sido objeto de negociaciones y tensiones previas. La diplomacia entre ambas administraciones se pone a prueba en un momento de alta visibilidad global.\n\nLa evolución de estas tensiones podría tener implicaciones significativas para la cooperación en seguridad, comercio y migración entre ambos países, especialmente en el contexto de eventos internacionales como el Mundial.", "why": "Destaca la fragilidad de las relaciones diplomáticas y comerciales entre EE. UU. y México ante temas sensibles como el narcotráfico y el comercio.", "importance": 2, "relevance": 2, "tags": ["EE. UU.", "México", "Relaciones bilaterales", "Comercio"], "image": "", "published": "2026-06-13T08:16:37+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.com/live-updates/2026/06/12/world-cup-2026/us-mexico-relationship-fifa-world-cup-2026-00960937?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}]}, {"id": "20634aef49", "category": "geo", "topic": "geo", "subtopic": "EE. UU.", "cruce": false, "title": "EE. UU. abate al líder de la banda criminal venezolana Tren de Aragua; UE dividida sobre precios de medicamentos", "summary": "Estados Unidos ha eliminado a Héctor Guerrero, líder de la banda criminal venezolana Tren de Aragua, en una operación militar. Guerrero enfrentaba cargos en EE. UU. por narcotráfico, armas y terrorismo, y su neutralización representa un golpe a la organización criminal transnacional.\n\nParalelamente, los países de la Unión Europea muestran divisiones sobre cómo abordar la política de precios de medicamentos de EE. UU. Mientras algunos abogan por una estrategia coordinada, otros consideran la posibilidad de actuar de forma independiente. Esta divergencia surge ante las presiones y amenazas de la administración estadounidense respecto a los costos farmacéuticos.\n\nLa operación contra el Tren de Aragua subraya la creciente preocupación por el crimen organizado transnacional, mientras que el debate en la UE sobre los precios de los medicamentos refleja las tensiones comerciales y de salud pública entre Europa y Estados Unidos.", "why": "Destaca la lucha contra el crimen organizado transnacional y las divergencias en la política de precios de medicamentos entre EE. UU. y la UE.", "importance": 2, "relevance": 2, "tags": ["Crimen organizado", "Venezuela", "Salud", "Unión Europea"], "image": "https://www.euractiv.com/content/uploads/sites/2/2026/06/GettyImages-1839792823.jpg", "published": "2026-06-13T06:43:08+00:00", "sources": [{"name": "Politico Europe", "url": "https://www.politico.com/news/2026/06/12/us-kills-venezuelas-tren-de-aragua-leader-in-military-strike-trump-says-00961269?utm_source=RSS_Feed&utm_medium=RSS&utm_campaign=RSS_Syndication", "type": "blog"}, {"name": "Euractiv", "url": "https://www.euractiv.com/news/eu-countries-split-on-whether-to-go-it-alone-or-unite-on-us-drug-pricing/", "type": "blog"}]}, {"id": "9b06ab0105", "category": "ia", "topic": "ia", "subtopic": "Otros", "cruce": false, "title": "Like US models, Chinese AI is learning to ‘game’ safety tests, research lab says", "summary": "Like US models, Chinese AI is learning to ‘game’ safety tests, research lab says\nIn just a few months, Chinese AI models have risen from near-zero ‘evaluation awareness’ to within striking distance of their US counterparts\nRapidly advancing Chinese artificial intelligence models are showing early signs of “evaluation awarene vows-to-defend-nations-interests-after-china-sanctions/", "type": "blog"}, {"name": "Geopolitical Futures", "url": "https://geopoliticalfutures.com/the-great-data-center-race/", "type": "newsletter"}, {"name": "ChinaTalk", "url": "https://www.chinatalk.media/p/sen-slotkin-ndaa-ai-guardrails-and", "type": "newsletter"}, {"name": "CSIS (YT)", "url": "https://www.youtube.com/shorts/y4UrzQEbJDo", "type": "youtube"}]}, {"id": "ac515a93df", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Legado artístico y descubrimiento de artistas olvidados", "summary": "La noticia aborda el descubrimiento de artistas olvidados y su potencial para redefinir narrativas históricas en la historia del arte. Se menciona la posibilidad de que un historiador del arte desentierre obras significativas que obliguen a reconsiderar el canon artístico establecido.\n\nEste tipo de hallazgos, aunque no directamente relacionados con la tecnología, resaltan la importancia de la investigación profunda y la preservación del patrimonio cultural. La historia del arte, al igual que la historia tecnológica, está sujeta a revisiones y nuevas interpretaciones a medida que emerge nueva información.\n\nLa relevancia de esta noticia radica en la metáfora de la exploración y el redescubrimiento, aplicable a cualquier campo del conocimiento, incluida la tecnología, donde la historia de la innovación a menudo oculta contribuciones valiosas que merecen ser reconocidas.", "why": "Ilustra la importancia de la investigación y el redescubrimiento en cualquier campo, incluyendo la historia de la tecnología.", "importance": 1, "relevance": 1, "tags": ["Arte", "Historia", "Cultura"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F3%2F7%2F5%2F6%2F12576573-2-eng-GB%2Fd56794ef5d54-E638-8377.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T08:20:13.120215+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/life-arts/arts/a-swiss-artist-s-portrait-of-meiji-era-japan", "type": "blog"}]}, {"id": "cfa92e6b44", "category": "geo", "topic": "geo", "subtopic": "Otros", "cruce": false, "title": "Refugio budista en Nagano se transforma en alojamiento moderno para turistas", "summary": "El 'shukubo' (alojamiento para peregrinos) Rengein, ubicado en los terrenos del histórico templo budista Zenkoji en Nagano, Japón, ha sido renovado para ofrecer alojamiento moderno a visitantes nacionales e internacionales. La posada, tradicionalmente destinada a monjes y peregrinos, ahora puede albergar hasta 20 huéspedes por noche, combinando su carácter histórico con comodidades contemporáneas.\n\nEsta transformación busca atraer a un público más amplio, incluyendo turistas extranjeros, aprovechando la importancia cultural y espiritual del templo Zenkoji. La iniciativa forma parte de un esfuerzo por revitalizar y hacer más accesibles los sitios patrimoniales japoneses.\n\nLa renovación de Rengein es un ejemplo de cómo los sitios religiosos y culturales en Japón están adaptándose para satisfacer las demandas del turismo moderno, buscando un equilibrio entre la preservación del patrimonio y la experiencia del visitante.", "why": "Adapta un espacio religioso histórico a las necesidades del turismo moderno, mostrando una tendencia de reconversión de patrimonio cultural.", "importance": 1, "relevance": 1, "tags": ["Japón", "Turismo", "Patrimonio"], "image": "https://images.ft.com/v3/image/raw/https%3A%2F%2Fcms-image-bucket-productionv3-ap-northeast-1-a7d2.s3.ap-northeast-1.amazonaws.com%2Fimages%2F5%2F4%2F8%2F1%2F12561845-6-eng-GB%2F7c61c2ab4744-photo_SXM2026052200006917.jpg?fit=cover&gravity=faces&dpr=2&quality=medium&source=nar-cms&format=auto&width=1260&height=630", "published": "2026-06-13T08:20:12.346729+00:00", "sources": [{"name": "Nikkei Asia", "url": "https://asia.nikkei.com/business/travel-leisure/zenkoji-s-shukubo-inn-refurbished-to-welcome-foreign-guests", "type": "blog"}]}]};

function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

const state = { tab:"ia", q:"", hideRead:false, sub:null, read:new Set(lsGet("read",[])) };
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => (DIGEST.stories||[]).find(s=>s.id===id);

function relTime(iso){const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return "hace "+Math.max(1,Math.round(d/60))+" min";
  if(d<86400)return "hace "+Math.round(d/3600)+" h";return "hace "+Math.round(d/86400)+" d";}
const typeIcon=t=>t==="youtube"?"▶":t==="newsletter"?"✉":"◆";
const paras=t=>(t||"").split(/\n{2,}|\n/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join("")||`<p>${esc(t)}</p>`;
const imgTag=(src,cls)=>src?`<img class="${cls}" src="${esc(src)}" loading="lazy" onerror="this.remove()">`:"";
function saveRead(){ lsSet("read",[...state.read]); }

// categoría efectiva de una historia (con respaldo si faltara el campo)
const catOf=s=>s.category||(s.cruce?"cruce":s.topic);
// ¿la historia pertenece a la pestaña actual? Cada hecho está en UNA sola pestaña.
function inTab(s){ return catOf(s)===state.tab; }

function renderBrief(){
  const b=$("#brief");
  if(state.q || !DIGEST.daily_brief){ b.style.display="none"; return; }
  b.style.display=""; b.innerHTML=`<div class="bk">El día en 60 segundos</div><p>${esc(DIGEST.daily_brief)}</p>`;
}

function renderFeatured(){
  const box=$("#featured");
  if(state.q || !(DIGEST.top||[]).length){ box.innerHTML=""; return; }
  const items=(DIGEST.top||[]).map(byId).filter(Boolean);
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="flabel">Lo más importante de hoy</div><div class="frow">`+
    items.map(s=>{const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";const n=(s.sources||[]).length;
      const meta=(s.cruce?'IA × Geo':(s.topic==='ia'?'IA':'Geopolítica'))+' · '+(n>1?n+' fuentes':'1 fuente');
      return `<a class="fitem" data-topic="${s.topic}" href="${esc(u)}" target="_blank" rel="noopener">
        ${s.image?imgTag(s.image,'fimg'):`<span class="ft">${s.topic==='ia'?'IA':'GE'}</span>`}
        <span class="ft2"><span class="fttl">${esc(s.title)}</span><span class="fmeta">${meta}</span></span></a>`;
    }).join("")+`</div>`;
}

function renderSubfilter(pool){
  const box=$("#subfilter");
  const counts={};
  pool.forEach(s=>{ if(s.subtopic) counts[s.subtopic]=(counts[s.subtopic]||0)+1; });
  const subs=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(subs.length<2){ box.innerHTML=""; return; }
  box.innerHTML=`<span class="schip ${state.sub?'':'on'}" data-s="">Todos</span>`+
    subs.map(x=>`<span class="schip ${state.sub===x?'on':''}" data-s="${esc(x)}">${esc(x)} <span style="opacity:.5">${counts[x]}</span></span>`).join("");
  box.querySelectorAll(".schip").forEach(c=>c.onclick=()=>{ state.sub=c.dataset.s||null; render(); });
}

function visible(){
  const q=state.q.toLowerCase().trim();
  return (DIGEST.stories||[]).filter(s=>{
    if(!inTab(s)) return false;
    if(state.hideRead && state.read.has(s.id)) return false;
    if(state.sub && s.subtopic!==state.sub) return false;
    if(q){const hay=(s.title+" "+s.summary+" "+(s.tags||[]).join(" ")+" "+(s.sources||[]).map(x=>x.name).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;}
    return true;
  });
}

function render(){
  renderBrief(); renderFeatured();
  let ia=0,geo=0,cruce=0;
  (DIGEST.stories||[]).forEach(s=>{ const c=catOf(s); if(c==='ia')ia++; else if(c==='geo')geo++; else if(c==='cruce')cruce++; });
  $("#nIa").textContent=ia; $("#nGeo").textContent=geo; const nc=$("#nCruce"); if(nc)nc.textContent=cruce;

  const pool=(DIGEST.stories||[]).filter(s=>inTab(s) && !(state.hideRead&&state.read.has(s.id)));
  renderSubfilter(pool);

  const list=visible(), feed=$("#feed");
  if(!list.length){
    feed.innerHTML=`<div class="empty"><div class="big">Nada por aquí</div>${state.q||state.sub?"Prueba quitando filtros.":"No hay novedades en esta sección por ahora."}</div>`;
    return;
  }
  feed.innerHTML=list.map(s=>{
    const dots=[1,2,3,4,5].map(n=>`<i class="${n<=(s.relevance||s.importance||0)?'on':''}"></i>`).join("");
    const tags=(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const chips=(s.sources||[]).map(x=>`<a class="chip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="ic">${typeIcon(x.type)}</span>${esc(x.name)}</a>`).join("");
    const multi=(s.sources||[]).length>1?`${s.sources.length} fuentes lo cubren`:"Fuente";
    const isRead=state.read.has(s.id);
    const u=(s.sources&&s.sources[0])?s.sources[0].url:"#";
    const badge=s.cruce?`<span class="xbadge">IA × Geo</span>`:`<span class="badge">${s.topic==='ia'?'Inteligencia Artificial':'Geopolítica'}</span>`;
    const sub=s.subtopic&&s.subtopic!=="Otros"?`<span class="sub">${esc(s.subtopic)}</span>`:"";
    return `<article class="card ${isRead?'read':''} ${s.cruce?'cruce':''}" data-topic="${s.topic}" data-id="${s.id}">
      ${imgTag(s.image,'cimg')}
      <div class="cbody">
        <div class="crow">${badge}${sub}<div class="imp">${dots}</div><span class="time">${relTime(s.published)}</span></div>
        <h2><a href="${esc(u)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <div class="summary">${paras(s.summary)}</div>
        ${s.why?`<div class="why"><b>Por qué importa:</b> ${esc(s.why)}</div>`:""}
        ${tags?`<div class="tags">${tags}</div>`:""}
        <div class="srcline"><div class="srclabel">${multi}</div><div class="chips">${chips}</div></div>
        <div class="actions"><button class="mark" data-id="${s.id}">${isRead?"Marcar como no leída":"Marcar como leída"}</button></div>
      </div>
    </article>`;
  }).join("");

  feed.querySelectorAll(".mark").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id; state.read.has(id)?state.read.delete(id):state.read.add(id);
    saveRead(); render();
  });
}

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.tab=t.dataset.t; state.sub=null; render();
});
$("#q").oninput=e=>{ state.q=e.target.value; render(); };
$("#hideRead").onclick=function(){ this.classList.toggle("on"); state.hideRead=this.classList.contains("on"); render(); };

(function(){
  const g=DIGEST.generated_at?new Date(DIGEST.generated_at):new Date();
  const f=g.toLocaleString("es-ES",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"});
  $("#meta").textContent=`Actualizado ${f} · ${DIGEST.count||0} hechos`;
  $("#foot").innerHTML=`Generado automáticamente · ${DIGEST.count||0} hechos tras agrupar duplicados · <a href="estado.html">Estado de las fuentes</a>`;
})();

render();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>

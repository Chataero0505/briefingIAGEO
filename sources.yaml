settings:
  # Cuántas horas hacia atrás miramos en cada actualización.
  # 28 = un poco más de un día, para no perder nada entre ejecuciones.
  lookback_hours: 28

  # Modelo de Gemini (gratis). 'gemini-2.5-flash-lite' da ~1000 peticiones/día
  # (frente a las ~20/día de 'gemini-2.5-flash'). Ideal para el uso diario automático.
  model: "gemini-2.5-flash-lite"

  # Máximo de noticias que se procesan por ejecución (protege el límite gratis).
  max_items_per_run: 200

  # Nivel de detalle de los resúmenes: "breve" | "normal" | "detallado".
  resumen_detalle: "detallado"

  # Bajar el cuerpo real de cada artículo para resumir mejor (recomendado: true).
  fetch_article_bodies: true

  # TUS INTERESES: el briefing ordena y destaca según esto. Edítalo a tu gusto.
  mis_intereses: >
    IA aplicada a la industria y fabricación (Industry 5.0, cobótica, gemelos digitales);
    agentes de IA y automatización del trabajo; avances técnicos de modelos relevantes;
    semiconductores y hardware de IA; regulación de IA y política tecnológica de la UE;
    competición tecnológica EE. UU.-China; energía y sostenibilidad (incluida la energía
    para centros de datos); cadena de suministro y resiliencia industrial.

  # Días que se recuerda una noticia ya vista (para no repetirla).
  seen_retention_days: 60

  # Idioma de salida: todo te llega traducido y resumido aquí.
  output_language: "español (castellano)"

# =====================================================================
#  TUS FUENTES
# ---------------------------------------------------------------------
#  Este es el ÚNICO archivo que tocas para añadir o quitar fuentes.
#  Para añadir una nueva: copia una línea parecida y cámbiala.
#  Para quitar una: borra su línea.
#
#  Tipos de fuente:
#    - youtube : pones el "handle" del canal (lo que empieza por @)
#    - blog / newsletter : pones la web. Si conoces su RSS exacto,
#        puedes ponerlo en "feed:" y el programa lo usa directo;
#        si no, déjalo y el programa intentará encontrarlo solo.
#
#  "topic" es solo una PISTA (ia / geo). El programa reclasifica
#  cada noticia por su cuenta, así que si una fuente de geopolítica
#  publica algo de IA, igualmente acabará en la pestaña correcta.
# =====================================================================


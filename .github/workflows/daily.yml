name: Briefing diario

# Cuándo se ejecuta:
on:
  schedule:
    # 05:00 UTC = ~07:00 en España (06:00 en horario de invierno).
    # Para cambiar la hora, edita el número (en hora UTC).
    - cron: "37 4 * * *"
  workflow_dispatch:        # botón para lanzarlo a mano cuando quieras

permissions:
  contents: write           # necesario para guardar el resultado en el repo

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  generar:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # corta solo si algo se cuelga (nunca más 4 horas)
    env:
      PYTHONUNBUFFERED: "1"      # muestra el progreso al instante en el log
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar el briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u main.py

      - name: Guardar y publicar el resultado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "Sin cambios que guardar."
          else
            git commit -m "Briefing $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi


name: Briefing diario

on:
  schedule:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  generar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar el briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u main.py

      - name: Guardar y publicar el resultado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "Sin cambios que guardar."
          else
            git commit -m "Briefing $(date -u +'%Y-%m-%d %H:%M') UTC"
            rama="${GITHUB_REF_NAME:-main}"
            for intento in 1 2 3 4 5; do
              git pull --rebase --autostash origin "$rama" || true
              if git push origin "HEAD:$rama"; then
                echo "Publicado correctamente (intento $intento)."
                break
              fi
              echo "Guardado rechazado; reintento $intento tras integrar cambios…"
              sleep 5
            done
          fi
